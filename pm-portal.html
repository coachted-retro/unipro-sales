<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Manager — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--purple:#6B21A8;--teal:#0D7490;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:140px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.warn .stat-num{color:var(--orange)}.stat-card.good .stat-num{color:var(--green)}.stat-card.alert .stat-num{color:var(--red)}.stat-card.purple .stat-num{color:var(--purple)}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.warn{border-color:#FED7AA;background:#FFF7ED}.card.alert{border-color:#FCA5A5;background:#FFF5F5}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:15px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-active{background:#DBEAFE;color:#1E40AF}.s-done{background:#D1FAE5;color:#065F46}.s-pending{background:#E5E7EB;color:#374151}.s-hold{background:#FEE2E2;color:#C8102E}
.agetag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em}
.age-ok{background:#D1FAE5;color:#065F46}.age-watch{background:#FEF3C7;color:#D8690B}.age-alert{background:#FEE2E2;color:#C8102E}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.fld{margin-bottom:12px}.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.phase{border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.phase-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;cursor:pointer;background:#FAFBFC}
.phase.active .phase-hd{background:#EFF6FF}.phase.done .phase-hd{background:#F0FDF4}
.phase-name{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:14px;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.phase-dot{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.phase-body{padding:6px 14px 12px;display:none}.phase.open .phase-body{display:block}
.task{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13px}
.task input{width:16px;height:16px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:min(520px,96vw);max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;margin-bottom:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.row-add{display:flex;gap:8px;margin-top:8px}.row-add input,.row-add select{flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px}
.lineitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Project Manager</span>
  <a class="nav-back" href="termac-os.html">&larr; Hub</a>
  <a class="nav-help" href="user-manuals.html?role=pm" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div id="view-list">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><div class="page-title">Project Manager</div>
      <div class="page-sub">Every project run by phase, from survey to closeout, with stage aging so nothing stalls. Hood installations first; the same flow runs any project type.</div></div>
      <button class="btn btn-purple" onclick="newJob()">+ New Project</button>
    </div>
    <div class="stat-strip" id="statStrip"></div>
    <div id="jobList"></div>
  </div>
  <div id="view-detail" style="display:none"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
var KEY='termac_pm_jobs', DESIGN_KEY='termac_stainless_projects', ACCT_KEY='termac_crm_accounts', _cur=null;
var PROJECT_TYPES=['Hood Installation','Stainless Fabrication','Suppression System Install','Exhaust / Make-Up Air','Other Build'];
var DIV_COLOR={'UniPro':'#1B5FA8','Quality III':'#0D7490','GTO':'#D8690B','Filter Man':'#1E7B3C','AllPro':'#6B21A8','Termac':'#C8102E'};
/* phase templates — generic, hood-aware on permit and inspection */
var PHASE_TEMPLATES=[
  {key:'survey',label:'Survey',tasks:['Site visit scheduled','Field measurements taken','Existing conditions photographed','Utility and clearance check','Scope confirmed with customer']},
  {key:'design',label:'Design',tasks:['Stainless spec built','Shop drawings produced','Customer design approval','Engineering review if required']},
  {key:'permit',label:'Permit',tasks:['AHJ identified','Permit application submitted','Plans submitted to AHJ','Permit approved and in hand']},
  {key:'fabrication',label:'Fabrication',tasks:['Materials ordered','Fabrication scheduled','Fabrication complete','QC check passed']},
  {key:'install',label:'Install',tasks:['Install date scheduled','Crew assigned','Delivery coordinated','Installation complete','Site cleaned']},
  {key:'inspection',label:'Inspection',tasks:['Inspection scheduled with AHJ','AHJ inspection passed','Deficiencies corrected','Final sign-off received']},
  {key:'closeout',label:'Closeout',tasks:['As-builts and documents delivered','Warranty information provided','Final invoice sent','Customer sign-off','Project archived']}
];
var WARN_DAYS=14, ALERT_DAYS=30;
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function jobs(){ return lsGet(KEY); }
function find(id){ return jobs().find(function(j){ return j.id===id; }); }
function save(j){ var all=jobs(); var i=all.findIndex(function(x){ return x.id===j.id; }); if(i>=0) all[i]=j; else all.unshift(j); lsSet(KEY,all); }
function days(ms){ return Math.floor((Date.now()-ms)/86400000); }
function ageClass(d){ return d>=ALERT_DAYS?'age-alert':d>=WARN_DAYS?'age-watch':'age-ok'; }

function currentPhase(j){ var p=(j.phases||[]).find(function(x){ return x.status!=='done'; }); return p||null; }
function phaseAge(j){ var cp=currentPhase(j); if(!cp) return 0; return days(cp.startedAt||j.createdAt); }
function jobDone(j){ return (j.phases||[]).every(function(p){ return p.status==='done'; }); }

function renderStats(){
  var all=jobs();
  var active=all.filter(function(j){ return !jobDone(j); }).length;
  var permit=all.filter(function(j){ var cp=currentPhase(j); return cp&&cp.key==='permit'; }).length;
  var fab=all.filter(function(j){ var cp=currentPhase(j); return cp&&cp.key==='fabrication'; }).length;
  var stalled=all.filter(function(j){ return !jobDone(j) && phaseAge(j)>=ALERT_DAYS; }).length;
  function card(n,l,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+n+'</div><div class="stat-lbl">'+l+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=card(active,'Active Projects','')+card(permit,'In Permit','purple')+card(fab,'In Fabrication','warn')+card(stalled,'Stalled 30+ Days', stalled?'alert':'good');
}
function renderList(){
  document.getElementById('view-list').style.display='';
  document.getElementById('view-detail').style.display='none';
  renderStats();
  var all=jobs(), el=document.getElementById('jobList');
  if(!all.length){ el.innerHTML='<div class="muted">No projects yet. Click New Project to start one.</div>'; return; }
  all.sort(function(a,b){ return (jobDone(a)?1:0)-(jobDone(b)?1:0) || phaseAge(b)-phaseAge(a); });
  el.innerHTML=all.map(function(j){
    var cp=currentPhase(j), done=jobDone(j), pa=phaseAge(j), ja=days(j.createdAt);
    var doneCount=(j.phases||[]).filter(function(p){return p.status==='done';}).length, total=(j.phases||[]).length;
    var cls=done?'':(pa>=ALERT_DAYS?'alert':pa>=WARN_DAYS?'warn':'');
    var acc=j.account||{};
    return '<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(acc.name||'Untitled')+' '+(acc.division?'<span class="divtag" style="background:'+(DIV_COLOR[acc.division]||"#888")+'">'+esc(acc.division)+'</span>':'')+'</div>'+
      '<div class="card-meta">'+esc(j.projectType||'Project')+(acc.address?' · '+esc(acc.address):'')+(j.pm?' · PM: '+esc(j.pm):'')+'</div>'+
      '<div class="card-meta" style="margin-top:4px">Phase '+doneCount+' of '+total+(cp?' · now in '+esc(cp.label):' · complete')+' · project age '+ja+'d</div></div>'+
      '<div style="text-align:right">'+(done?'<span class="status s-done">Complete</span>':'<span class="agetag '+ageClass(pa)+'">'+pa+'d in '+esc(cp?cp.label:'')+'</span>')+'</div></div>'+
      '<div style="margin-top:10px"><button class="btn btn-purple" onclick="openJob(\''+j.id+'\')">Open</button></div></div>';
  }).join('');
}

/* ---------- new job ---------- */
function newJob(){
  var accts=lsGet(ACCT_KEY);
  var acctOpts=accts.length?('<option value="">Select an account...</option>'+accts.map(function(a){ return '<option value="'+esc(a.id)+'">'+esc(a.name)+(a.division?' ('+esc(a.division)+')':'')+'</option>'; }).join('')+'<option value="__manual">Enter manually...</option>'):'<option value="__manual">Enter manually (no CRM accounts found)</option>';
  var typeOpts=PROJECT_TYPES.map(function(t){ return '<option>'+t+'</option>'; }).join('');
  openModal('<h3>New Project</h3>'+
    '<div class="fld"><label>Account</label><select id="njAcct" onchange="njAcctChange()">'+acctOpts+'</select></div>'+
    '<div id="njManual" style="display:none"><div class="grid2"><div class="fld"><label>Client name</label><input id="njName"></div><div class="fld"><label>Division</label><select id="njDiv"><option>AllPro</option><option>UniPro</option><option>Quality III</option><option>GTO</option><option>Filter Man</option><option>Termac</option></select></div></div><div class="fld"><label>Site address</label><input id="njAddr"></div></div>'+
    '<div class="fld"><label>Project type</label><select id="njType">'+typeOpts+'</select></div>'+
    '<div class="fld"><label>Assigned PM</label><input id="njPM" placeholder="Project manager name"></div>'+
    '<div class="fld"><label>Linked design project (optional)</label><select id="njDesign"><option value="">None</option></select></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="createJob()">Create</button></div>');
  njRefreshDesign('');
}
function njAcctChange(){
  var v=document.getElementById('njAcct').value;
  document.getElementById('njManual').style.display = v==='__manual' ? '' : 'none';
  njRefreshDesign(v);
}
function njRefreshDesign(acctId){
  var sel=document.getElementById('njDesign'); if(!sel) return;
  var dp=lsGet(DESIGN_KEY);
  var list=dp.filter(function(p){ return acctId && acctId!=='__manual' ? (p.accountId===acctId) : true; });
  sel.innerHTML='<option value="">None</option>'+list.map(function(p){ return '<option value="'+esc(p.id)+'">'+esc(p.client||'Project')+' — '+esc((p.status||'draft'))+'</option>'; }).join('');
}
function createJob(){
  var v=document.getElementById('njAcct').value, acct;
  if(v==='__manual'||(!v)){
    var nm=(document.getElementById('njName')||{}).value||'';
    if(!nm){ toast('Pick an account or enter a client name.'); return; }
    acct={ id:'', name:nm, division:(document.getElementById('njDiv')||{}).value||'AllPro', address:(document.getElementById('njAddr')||{}).value||'' };
  } else {
    var a=lsGet(ACCT_KEY).find(function(x){ return x.id===v; })||{};
    acct={ id:a.id||'', name:a.name||'', division:a.division||'', address:a.address||'', phone:a.phone||'' };
  }
  var phases=PHASE_TEMPLATES.map(function(t,i){ return { key:t.key, label:t.label, status:i===0?'active':'pending', startedAt:i===0?Date.now():null, completedAt:null, tasks:t.tasks.map(function(tt){ return {t:tt, done:false}; }) }; });
  var j={ id:'pm'+Date.now(), account:acct, projectType:document.getElementById('njType').value, pm:document.getElementById('njPM').value||'', designProjectId:document.getElementById('njDesign').value||'', createdAt:Date.now(), phases:phases, materials:[], subs:[], notes:'', customerStatus:'' };
  save(j); closeModal(); toast('Project created.'); openJob(j.id);
}

/* ---------- detail ---------- */
function openJob(id){
  _cur=id; var j=find(id); if(!j) return;
  document.getElementById('view-list').style.display='none';
  var d=document.getElementById('view-detail'); d.style.display='';
  var acc=j.account||{}, cp=currentPhase(j), done=jobDone(j);
  var dp=j.designProjectId?lsGet(DESIGN_KEY).find(function(p){ return p.id===j.designProjectId; }):null;
  var specHtml='';
  if(dp){ var s=dp.spec||{}; specHtml='<div class="card" style="border-color:#DDD6FE;background:#FAF5FF"><div class="card-hdr"><div><div class="card-title" style="color:var(--purple)">Linked Stainless Spec</div><div class="card-meta">'+esc(s.grade||'')+' / '+esc(s.gauge||'')+' · '+esc(s.finish||'')+' · '+esc(dp.status||'')+(s.dims?' · '+esc(s.dims):'')+'</div></div><a class="btn btn-purple" href="design-portal.html" style="text-decoration:none">Open in Design Studio</a></div></div>'; }

  d.innerHTML=
    '<button class="btn btn-outline" onclick="renderList()" style="margin-bottom:14px">&larr; All Projects</button>'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">'+
    '<div><div class="page-title" style="font-size:24px">'+esc(acc.name||'Project')+' '+(acc.division?'<span class="divtag" style="background:'+(DIV_COLOR[acc.division]||"#888")+'">'+esc(acc.division)+'</span>':'')+'</div>'+
    '<div class="page-sub">'+esc(j.projectType||'')+(acc.address?' · '+esc(acc.address):'')+(j.pm?' · PM: '+esc(j.pm):'')+' · project age '+days(j.createdAt)+'d</div></div>'+
    (done?'<span class="status s-done" style="align-self:center">Complete</span>':'<span class="agetag '+ageClass(phaseAge(j))+'" style="align-self:center">'+phaseAge(j)+'d in '+esc(cp?cp.label:'')+'</span>')+'</div>'+
    specHtml+
    '<div class="sec-hdr">Phase Pipeline</div>'+ phasesHtml(j)+
    materialsHtml(j)+ subsHtml(j)+
    '<div class="sec-hdr">Customer-Facing Status</div><div class="card"><textarea id="f_custStatus" rows="2" placeholder="One line the customer can see: what is happening and what is next">'+esc(j.customerStatus)+'</textarea><div style="margin-top:8px"><button class="btn btn-blue" onclick="saveCustStatus()">Save Status</button></div></div>'+
    '<div class="sec-hdr">PM Notes</div><div class="card"><textarea id="f_notes" rows="3">'+esc(j.notes)+'</textarea><div style="margin-top:8px"><button class="btn btn-green" onclick="saveNotes()">Save Notes</button></div></div>';
}
function phasesHtml(j){
  return (j.phases||[]).map(function(p,idx){
    var dotColor=p.status==='done'?'var(--green)':p.status==='active'?'var(--blue)':'#9CA3AF';
    var doneN=p.tasks.filter(function(t){return t.done;}).length;
    var age=p.status==='active'?days(p.startedAt||j.createdAt):null;
    var cls='phase'+(p.status==='active'?' active open':'')+(p.status==='done'?' done':'');
    return '<div class="'+cls+'" id="phase-'+p.key+'"><div class="phase-hd" onclick="togglePhase(\''+p.key+'\')">'+
      '<div class="phase-name"><span class="phase-dot" style="background:'+dotColor+'">'+(p.status==='done'?'✓':idx+1)+'</span>'+esc(p.label)+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+(age!==null?'<span class="agetag '+ageClass(age)+'">'+age+'d</span>':'')+'<span class="card-meta">'+doneN+'/'+p.tasks.length+'</span><span class="status '+(p.status==='done'?'s-done':p.status==='active'?'s-active':'s-pending')+'">'+(p.status==='done'?'Done':p.status==='active'?'Active':'Pending')+'</span></div></div>'+
      '<div class="phase-body">'+
      p.tasks.map(function(t,ti){ return '<label class="task"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask(\''+p.key+'\','+ti+')"> '+esc(t.t)+'</label>'; }).join('')+
      '<div class="row-add"><input id="addtask-'+p.key+'" placeholder="Add a task"><button class="btn btn-outline" onclick="addTask(\''+p.key+'\')">Add</button></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
      (p.status!=='done'?'<button class="btn btn-green" onclick="completePhase(\''+p.key+'\')">Mark Phase Complete</button>':'<button class="btn btn-outline" onclick="reopenPhase(\''+p.key+'\')">Reopen Phase</button>')+
      (p.status==='pending'?'<button class="btn btn-blue" onclick="activatePhase(\''+p.key+'\')">Start This Phase</button>':'')+
      '</div></div></div>';
  }).join('');
}
function materialsHtml(j){
  var rows=(j.materials||[]).map(function(m,i){ return '<div class="lineitem"><div><strong>'+esc(m.item)+'</strong> '+(m.qty?'· '+esc(m.qty):'')+(m.vendor?' · '+esc(m.vendor):'')+'</div><div style="display:flex;gap:6px;align-items:center"><span class="status '+(m.status==='received'?'s-done':m.status==='ordered'?'s-active':'s-pending')+'">'+esc(m.status||'needed')+'</span><button class="btn btn-outline" onclick="cycleMat('+i+')">Advance</button><button class="btn btn-outline" onclick="delMat('+i+')">×</button></div></div>'; }).join('');
  return '<div class="sec-hdr">Materials</div><div class="card">'+(rows||'<div class="muted" style="padding:4px">No materials tracked yet.</div>')+
    '<div class="row-add"><input id="mItem" placeholder="Item"><input id="mQty" placeholder="Qty" style="max-width:80px"><input id="mVendor" placeholder="Vendor"><button class="btn btn-outline" onclick="addMat()">Add</button></div></div>';
}
function subsHtml(j){
  var rows=(j.subs||[]).map(function(s,i){ return '<div class="lineitem"><div><strong>'+esc(s.name)+'</strong>'+(s.trade?' · '+esc(s.trade):'')+(s.date?' · '+esc(s.date):'')+'</div><div style="display:flex;gap:6px;align-items:center"><span class="status '+(s.status==='confirmed'?'s-done':'s-pending')+'">'+esc(s.status||'pending')+'</span><button class="btn btn-outline" onclick="cycleSub('+i+')">Toggle</button><button class="btn btn-outline" onclick="delSub('+i+')">×</button></div></div>'; }).join('');
  return '<div class="sec-hdr">Subcontractors</div><div class="card">'+(rows||'<div class="muted" style="padding:4px">No subcontractors tracked yet.</div>')+
    '<div class="row-add"><input id="sName" placeholder="Name"><input id="sTrade" placeholder="Trade"><input id="sDate" type="date" style="max-width:150px"><button class="btn btn-outline" onclick="addSub()">Add</button></div></div>';
}

/* ---------- phase actions ---------- */
function togglePhase(key){ var el=document.getElementById('phase-'+key); if(el) el.classList.toggle('open'); }
function toggleTask(key,ti){ var j=find(_cur); var p=j.phases.find(function(x){return x.key===key;}); p.tasks[ti].done=!p.tasks[ti].done; save(j); openJob(_cur); reopenTo(key); }
function addTask(key){ var v=(document.getElementById('addtask-'+key)||{}).value; if(!v) return; var j=find(_cur); j.phases.find(function(x){return x.key===key;}).tasks.push({t:v,done:false}); save(j); openJob(_cur); reopenTo(key); }
function completePhase(key){ var j=find(_cur); var ph=j.phases; var idx=ph.findIndex(function(x){return x.key===key;}); ph[idx].status='done'; ph[idx].completedAt=Date.now(); var nx=ph.find(function(x){return x.status==='pending';}); if(nx && !ph.some(function(x){return x.status==='active';})){ nx.status='active'; nx.startedAt=Date.now(); } save(j); toast('Phase complete.'); openJob(_cur); }
function activatePhase(key){ var j=find(_cur); var p=j.phases.find(function(x){return x.key===key;}); p.status='active'; if(!p.startedAt) p.startedAt=Date.now(); save(j); openJob(_cur); reopenTo(key); }
function reopenPhase(key){ var j=find(_cur); var p=j.phases.find(function(x){return x.key===key;}); p.status='active'; p.completedAt=null; if(!p.startedAt) p.startedAt=Date.now(); save(j); openJob(_cur); reopenTo(key); }
function reopenTo(key){ var el=document.getElementById('phase-'+key); if(el) el.classList.add('open'); }

/* ---------- materials / subs ---------- */
function addMat(){ var it=document.getElementById('mItem').value; if(!it){ return; } var j=find(_cur); j.materials.push({item:it,qty:document.getElementById('mQty').value,vendor:document.getElementById('mVendor').value,status:'needed'}); save(j); openJob(_cur); }
function cycleMat(i){ var j=find(_cur); var order=['needed','ordered','received']; var m=j.materials[i]; m.status=order[(order.indexOf(m.status)+1)%order.length]; save(j); openJob(_cur); }
function delMat(i){ var j=find(_cur); j.materials.splice(i,1); save(j); openJob(_cur); }
function addSub(){ var n=document.getElementById('sName').value; if(!n){ return; } var j=find(_cur); j.subs.push({name:n,trade:document.getElementById('sTrade').value,date:document.getElementById('sDate').value,status:'pending'}); save(j); openJob(_cur); }
function cycleSub(i){ var j=find(_cur); var s=j.subs[i]; s.status=s.status==='confirmed'?'pending':'confirmed'; save(j); openJob(_cur); }
function delSub(i){ var j=find(_cur); j.subs.splice(i,1); save(j); openJob(_cur); }
function saveNotes(){ var j=find(_cur); j.notes=document.getElementById('f_notes').value; save(j); toast('Notes saved.'); }
function saveCustStatus(){ var j=find(_cur); j.customerStatus=document.getElementById('f_custStatus').value; save(j); toast('Status saved.'); }

function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

renderList();
</script>

<!DOCTYPE html><!-- v=20260624-1900 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System User Manuals — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A1D21;--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--ink:#1A1D21;--soft:#6B7280;--line:#E5E7EB;--bg:#F9FAFB;--white:#fff;--yellow:#D97706;--purple:#6D28D9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Barlow,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.top-nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--red)}
.top-nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#fff;letter-spacing:.12em;text-transform:uppercase}
.top-nav-sep{color:#3A3F47;font-size:18px}
.top-nav-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#9CA3AF;letter-spacing:.08em;text-transform:uppercase}
.top-nav-back{margin-left:auto;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.top-nav-back:hover{background:rgba(255,255,255,.15)}
.shell{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:var(--navy);padding:16px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sb-hdr{padding:0 14px 8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#4B5563;margin-top:8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;font-size:12px;font-weight:500;color:#9CA3AF;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-item.active{background:rgba(200,16,46,.15);border-left-color:var(--red);color:#fff;font-weight:700}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.main{flex:1;padding:32px;max-width:860px}
.page-hdr{margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--line)}
.role-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border-radius:5px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--soft);line-height:1.5;max-width:600px}
.section{margin-bottom:28px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-bottom:12px;padding-bottom:6px;border-bottom:1.5px solid var(--line);display:flex;align-items:center;gap:8px}
.section-title .st-icon{font-size:16px}
.step-list{list-style:none;padding:0}
.step-list li{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F3F4F6;font-size:13px;line-height:1.5}
.step-list li:last-child{border-bottom:none}
.step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step-body strong{display:block;font-weight:700;color:var(--ink);margin-bottom:2px}
.step-body span{color:var(--soft)}
.tip-box{background:#EFF6FF;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:12px;color:#1E40AF;line-height:1.6}
.tip-box strong{display:block;font-weight:700;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:11px}
.warn-box{background:#FFFBEB;border-left:4px solid var(--yellow);border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:12px;color:#92400E;line-height:1.6}
.warn-box strong{display:block;font-weight:700;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:11px}
.shortcut-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.shortcut{background:#F9FAFB;border:1px solid var(--line);border-radius:7px;padding:10px 14px;font-size:12px}
.shortcut strong{display:block;font-weight:700;font-size:13px;margin-bottom:2px}
.shortcut span{color:var(--soft)}
.faq-item{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
.faq-q{padding:12px 16px;font-weight:600;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fff}
.faq-q:hover{background:#F9FAFB}
.faq-a{padding:12px 16px;font-size:12px;color:var(--soft);line-height:1.6;border-top:1px solid var(--line);background:#FAFAFA;display:none}
.faq-a.open{display:block}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.contact-card{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:12px 14px}
.contact-card strong{display:block;font-size:13px;font-weight:700;margin-bottom:2px}
.contact-card span{font-size:11px;color:var(--soft)}
.contact-card a{font-size:12px;color:var(--blue);text-decoration:none}
@media(max-width:768px){.sidebar{display:none}.main{padding:20px}}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="top-nav-logo">Termac One</div>
  <div class="top-nav-sep">|</div>
  <div class="top-nav-title">User Manuals</div>
  <a class="top-nav-back" href="javascript:history.back()">← Back</a>
</nav>
<div class="shell">
<div class="sidebar">
  <div class="sb-hdr">Field Roles</div>
  <div class="sb-item active" onclick="umNav('sales')" id="sbNav-sales"><span class="sb-icon">📊</span>Sales Rep</div>
  <div class="sb-item" onclick="umNav('dms')" id="sbNav-dms"><span class="sb-icon">📞</span>DMS</div>
  <div class="sb-item" onclick="umNav('tech')" id="sbNav-tech"><span class="sb-icon">🔧</span>Tech</div>
  <div class="sb-item" onclick="umNav('scheduler')" id="sbNav-scheduler"><span class="sb-icon">📅</span>Scheduler</div>
  <div class="sb-item" onclick="umNav('dispatcher')" id="sbNav-dispatcher"><span class="sb-icon">🚚</span>Dispatcher</div>
  <div class="sb-hdr">Office Roles</div>
  <div class="sb-item" onclick="umNav('reception')" id="sbNav-reception"><span class="sb-icon">📋</span>Reception</div>
  <div class="sb-item" onclick="umNav('office')" id="sbNav-office"><span class="sb-icon">🏢</span>Office</div>
  <div class="sb-hdr">Management</div>
  <div class="sb-item" onclick="umNav('hr')" id="sbNav-hr"><span class="sb-icon">👥</span>HR Manager</div>
  <div class="sb-item" onclick="umNav('admin')" id="sbNav-admin"><span class="sb-icon">⚙️</span>Admin / Manager</div>
</div>
<div class="main" id="umMain"></div>
</div>

<script>
var MANUALS = {

sales: {
  role:'Sales Rep', icon:'📊', portal:'sales-portal.html',
  sub:'Your guide to managing leads, building pipelines, running site surveys, and closing deals in Termac One.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'Log In', b:'Navigate to your Sales Portal. You are auto-logged in as your demo user. In production, Azure SSO will handle authentication.'},
      {h:'Your Dashboard', b:'The top KPI bar shows your pipeline value, open leads, meetings scheduled, and close rate at a glance. Everything updates in real time.'},
      {h:'Left Rail Navigation', b:'Home, CRM, Tools, People. Stay in Home for your daily overview. CRM is where your deals live.'},
    ]},
    { title:'Working Your Pipeline', icon:'💼', steps:[
      {h:'Add a Lead', b:'CRM → Leads → + New Lead. Fill in business name, address, division, and source. The lead enters at Prospect stage.'},
      {h:'Advance a Lead', b:'Open any lead card. Use the Stage dropdown at the top of the panel to move from Prospect → Warm → Opportunity → Proposal → Accepted. Each stage unlocks new actions.'},
      {h:'Opportunity Stage — Site Survey', b:'When a lead reaches Opportunity, the Site Survey button activates. Run the survey to document scope, extinguisher counts, and system types on-site.'},
      {h:'Accepted Stage — Account Created', b:'Moving a lead to Accepted automatically creates an Account record. You will see it appear in CRM → Accounts immediately.'},
      {h:'Disqualified or Lost', b:'Selecting Disqualified or Lost flags the lead for manager review. Add a reason note — this feeds into coaching and forecasting.'},
    ]},
    { title:'Site Survey', icon:'🏢', steps:[
      {h:'Launch the Survey', b:'From an Opportunity-stage lead, click Run Site Survey. The survey modal opens pre-filled with the account name and address.'},
      {h:'Document Each System', b:'Toggle each service type (extinguishers, suppression, fire alarm, sprinkler, exit lighting, etc.). Fill in unit counts, last service dates, and observed deficiencies.'},
      {h:'AI Scope Builder', b:'After completing the survey, click Generate Scope. The AI reads your survey data and drafts a compliant scope of work with NFPA code references.'},
      {h:'Build the Estimate', b:'From the scope, click Build Estimate to carry line items into a priced proposal. Adjust quantities and pricing, then send.'},
    ]},
    { title:'Tips & Shortcuts', icon:'⚡', shortcuts:[
      {h:'Filter by Division', b:'Use the Division filter in the Leads table to focus on UniPro, GTO, Filter Man, etc.'},
      {h:'Quick Search', b:'The search bar in CRM searches across all leads, accounts, and contacts simultaneously.'},
      {h:'Activity Log', b:'Every call, email, and note you log on a lead card feeds the activity timeline visible to your manager.'},
      {h:'Drip Campaigns', b:'On any lead, use the Drip tab to enroll the contact in a Brevo email sequence. Choose from 20 pre-built sequences by service type.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'Why can\'t I advance a lead past Proposal?', a:'Proposals require a completed site survey and at least one line item in the estimate. Check that both are done before advancing.'},
      {q:'What happens when I mark a lead Lost?', a:'It flags for manager review and removes it from your active pipeline view. The record is preserved — not deleted.'},
      {q:'Can I reassign a lead to another rep?', a:'Yes — open the lead, click the Assigned Rep field, and select any active sales rep. The lead transfers immediately.'},
    ]},
  ]
},

dms: {
  role:'DMS — Deal Management Specialist', icon:'📞', portal:'dms-portal.html',
  sub:'Your guide to the call sheet, lead qualification, callback scheduling, and pipeline handoffs.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'Your Role', b:'DMS is the first voice a prospect hears. You qualify leads, run discovery calls, schedule callbacks, and hand off warm opportunities to Sales Reps.'},
      {h:'The Call Sheet', b:'Your home screen is the call sheet — a prioritized list of leads to contact today. Sorted by due date, heat score, and callback time.'},
      {h:'Division Toggles', b:'Use the division filters at the top (UniPro, GTO, Filter Man, etc.) to focus your calling block on one service line at a time.'},
    ]},
    { title:'Working the Call Sheet', icon:'📋', steps:[
      {h:'Open a Lead', b:'Click any lead row to expand the detail panel. You\'ll see contact info, business type, last activity, and suggested talk track.'},
      {h:'Log a Call', b:'After every call, log the outcome: Reached, VM Left, No Answer, Callback Scheduled, or Not Interested. This updates the lead\'s heat score.'},
      {h:'Schedule a Callback', b:'If the contact asks you to call back, click Schedule Callback. Pick date and time — the lead resurfaces at the top of your sheet at that exact time.'},
      {h:'Qualify and Hand Off', b:'When a contact is ready to move forward, change the stage to Warm or Opportunity and assign to the correct Sales Rep. The lead disappears from your sheet and appears in theirs.'},
    ]},
    { title:'Callback & Due Alerts', icon:'⏰', steps:[
      {h:'Due Alerts', b:'Leads with a scheduled callback due today or overdue show a red badge. These are your first calls of the day — always.'},
      {h:'Overdue Callbacks', b:'If a callback is overdue by more than 24 hours, the lead is flagged in the manager dashboard. Keep your callback list current.'},
      {h:'Bulk Reschedule', b:'If you\'re out sick or on PTO, use the Reassign/Reschedule function to move your callbacks to another DMS or push them forward.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'What do I do if someone says they already use a competitor?', a:'Log it as a Competitor note in the activity log. Flag the lead as Warm — not Lost. Competitive accounts are high-value targets for future outreach.'},
      {q:'How do I handle a contact who asks for a price on the call?', a:'Use the ballpark response from your talk track, then hand to Sales. Never quote a firm price on a DMS call — you don\'t have site data yet.'},
      {q:'Can I see what emails were sent to a lead?', a:'Yes — the Activity tab on any lead card shows all Brevo drip emails sent, opened, and clicked.'},
    ]},
  ]
},

reception: {
  role:'Reception', icon:'📋', portal:'reception-portal.html',
  sub:'Your guide to managing inbound calls, the call log, visitor check-in, and routing inquiries.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'Your Portal', b:'The Reception Portal opens to your live call log. Your name is prompted when you first open — this tags all your logged calls to you.'},
      {h:'Call Log Tabs', b:'Today, This Week, This Month, All, and custom date range. Use Today for your active shift. All gives you full history for lookups.'},
      {h:'Caller ID Lookup', b:'Type any phone number in the search bar to instantly pull up any account or contact in the system matching that number.'},
    ]},
    { title:'Logging Calls', icon:'📞', steps:[
      {h:'New Inbound Call', b:'Click + Log Call. Enter caller name, company, phone, reason for call, and who you routed them to.'},
      {h:'Call Outcomes', b:'Select: Transferred, Message Left, Resolved, or Callback Requested. This keeps the log accurate for manager review.'},
      {h:'Urgent Calls', b:'If a caller reports an active fire safety issue, emergency, or complaint — flag it Urgent. This triggers a notification to the manager.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'A caller says they have a service emergency — what do I do?', a:'Flag the call Urgent, log it immediately, and call the manager directly. Do not put the caller on hold for more than 30 seconds.'},
      {q:'Someone is asking for a quote — who do I route them to?', a:'Route to the DMS team for qualification first. If they already have a site survey on file, route directly to their assigned Sales Rep.'},
      {q:'How do I find who a caller spoke to last time?', a:'Search the call log by company name or phone number. The most recent entry will show which rep or tech handled them.'},
    ]},
  ]
},

tech: {
  role:'Field Technician', icon:'🔧', portal:'tech-portal-v2.html',
  sub:'Your guide to the daily schedule, opening work orders, compliance forms, and completing jobs.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'Your Schedule', b:'When you open the Tech Portal, your jobs for today appear in time order. Each card shows the account, address, job type, and estimated duration.'},
      {h:'Switch Technician', b:'Use the tech pills at the top to view your schedule. In production, you\'ll only see your own jobs.'},
      {h:'Job Status', b:'Jobs start as Scheduled. They move to En Route when you tap Start Travel, then In Progress when you arrive and open the work order.'},
    ]},
    { title:'Running a Job', icon:'🛠️', steps:[
      {h:'Open the Work Order', b:'Tap a job card to open it. Review the job details, deficiency notes from prior visits, and access instructions before you leave.'},
      {h:'Job Brief', b:'Use the Job Brief button for a one-page summary of the account you can review on-site: contacts, history, open deficiencies, and scope.'},
      {h:'Select Job Type', b:'In the work order, select Service, Inspection, or Estimate. This determines which forms and invoice lines appear.'},
      {h:'Build the Invoice', b:'Add line items from the catalog or enter custom items. Pricing pulls from the service catalog. Add parts, labor, and materials.'},
      {h:'Capture Signature', b:'Step 3 is the signature pad. Have the customer or facilities contact sign on your phone/tablet. The signature is embedded in the work order.'},
      {h:'Compliance Forms', b:'For fire inspections — fill out the NFPA 10 or NFPA 96 form. For grease trap jobs — complete the FOG Service Report. Submit to office queue when done.'},
      {h:'Complete the Job', b:'After signature and forms, tap Complete. The job is marked done, invoice is saved, and forms route to the office automatically.'},
    ]},
    { title:'Compliance Forms', icon:'🧯', steps:[
      {h:'When Forms Are Required', b:'Fire inspection jobs require an NFPA 10 (extinguishers) and/or NFPA 96 (hood suppression) form. GTO jobs require a FOG Service Report and Waste Manifest.'},
      {h:'Auto-Fill', b:'Forms auto-fill with the account name, address, today\'s date, your name, and next inspection due date. You only need to fill in the inspection-specific fields.'},
      {h:'Submit to Office Queue', b:'After completing forms, tap Send to Office Queue. The office receives them for AHJ routing and filing within minutes.'},
      {h:'Standalone Form Generator', b:'You can also access forms directly at compliance-forms.html — useful for after-hours corrections or re-submits.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'What if I find a deficiency the customer won\'t fix today?', a:'Document it in the Notes field on the compliance form. Select Pass with Deficiencies as the result. The system flags it for follow-up in 30 days.'},
      {q:'I forgot to log a job — can I backfill it?', a:'Yes — open the Work Order from the job card at any time. You can complete and submit up to 48 hours after the scheduled date.'},
      {q:'The signature pad isn\'t working on my device', a:'Make sure you\'re using a touch-enabled browser (Chrome on Android/iOS). If it still fails, log the customer\'s verbal authorization in the notes field and get a paper signature.'},
    ]},
  ]
},

scheduler: {
  role:'Scheduler', icon:'📅', portal:'scheduler-v2.html',
  sub:'Your guide to building the daily route, assigning jobs to techs, managing capacity, and handling late alerts.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'The Scheduler Board', b:'Your view is a drag-and-drop daily route board. Columns are techs, rows are time slots. Jobs from the queue appear in the unscheduled panel on the left.'},
      {h:'Smart Tools Panel', b:'At the bottom of the board — Notifications, Late Alerts, Route Resequence, and Variance. Check this at the start of every day and at noon.'},
      {h:'Today vs Future', b:'Use the date picker at the top to schedule future days. Locked jobs (confirmed with customer) show a padlock icon — don\'t move without calling first.'},
    ]},
    { title:'Scheduling Jobs', icon:'📋', steps:[
      {h:'Drag to Schedule', b:'Drag any unscheduled job from the left panel onto a tech\'s column at the right time slot. The system checks for conflicts automatically.'},
      {h:'Tech Capacity', b:'Each tech shows their current load (hours) vs capacity. Red = overloaded. Aim to keep each tech between 80–95% of their daily capacity.'},
      {h:'Route Resequence', b:'Click Smart Resequence to let the system optimize the order of jobs by geography. This minimizes drive time across the day.'},
      {h:'Confirm with Customer', b:'Once a job is scheduled, use the Send Confirmation button to send the customer an automated appointment reminder (when Brevo is live).'},
    ]},
    { title:'Late Alerts & Variance', icon:'⚠️', steps:[
      {h:'Late Alerts', b:'The Smart Tools panel flags any tech running more than 30 minutes behind schedule. Address these before noon — reschedule or call ahead.'},
      {h:'Variance Tracking', b:'Variance shows the gap between estimated and actual job duration. High variance means your estimates are off — flag to manager for calibration.'},
      {h:'Emergency Rescheduling', b:'If a tech calls out sick, use the Reassign All button on their column to bulk-move their jobs to other available techs.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'A customer calls to cancel day-of — what do I do?', a:'Drag the job back to the unscheduled panel. Log the cancellation reason on the job. The time slot opens for other jobs or remains empty.'},
      {q:'Can I schedule the same account for multiple techs?', a:'Yes — large accounts (hospitals, multi-building complexes) can have multiple techs assigned for the same day. Just place them in different time slots.'},
    ]},
  ]
},

dispatcher: {
  role:'Dispatcher', icon:'🚚', portal:'dispatch-v2.html',
  sub:'Your guide to live job monitoring, communicating with techs in the field, and managing urgent dispatch needs.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'The Dispatch Board', b:'Your screen is a live view of every active job today — status, tech location (when GPS is live), and time vs schedule.'},
      {h:'Job Statuses', b:'Scheduled → En Route → On Site → Complete. You can see every transition in real time. Anything stuck in En Route too long needs a check-in call.'},
      {h:'Team Chat', b:'Use the floating chat button (bottom right) to message any tech directly. Messages are tagged to the job for record-keeping.'},
    ]},
    { title:'Managing the Field', icon:'🗺️', steps:[
      {h:'Check-In Protocol', b:'If a tech hasn\'t updated status within 45 minutes of their scheduled arrival, call them. Log the outcome in the job notes.'},
      {h:'Emergency Dispatch', b:'For urgent service calls that come in day-of, use Emergency Dispatch. This flags the job red and surfaces it to all available techs.'},
      {h:'Late Jobs', b:'The Smart Tools Late Alerts panel shows every job behind schedule. Your job is to decide: wait it out, reschedule next job, or call the customer.'},
      {h:'Parts Runs', b:'If a tech needs a part mid-job, coordinate pickup from the warehouse or nearest supplier. Log the delay in the job notes for invoice accuracy.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'A tech says a job is taking much longer than estimated — what do I do?', a:'Assess the next job in their queue. If it\'s at risk of being late, call that customer and offer to reschedule or send a different tech.'},
      {q:'A customer calls saying their tech hasn\'t arrived yet', a:'Check the board for that tech\'s current status. If they\'re still at a prior job, call the tech and give the customer an updated ETA. Never give an ETA without confirming with the tech first.'},
    ]},
  ]
},

office: {
  role:'Office Staff', icon:'🏢', portal:'office-portal.html',
  sub:'Your guide to the compliance form queue, deficiency quotes, billing, and account management.',
  sections:[
    { title:'Getting Started', icon:'🚀', steps:[
      {h:'Office Portal Overview', b:'Your portal has tabs for Deficiency Quotes, Compliance Form Queue, Accounts, Billing, and Reports. Use the top tab bar to switch.'},
      {h:'Compliance Form Queue', b:'This is your first stop each morning. Forms submitted by techs the prior day appear here for review, signature, and AHJ routing.'},
      {h:'Notifications', b:'Red badge on any tab means action required — don\'t let these sit. Forms older than 24 hours without review are flagged to the manager.'},
    ]},
    { title:'Compliance Form Queue', icon:'🧯', steps:[
      {h:'Review a Form', b:'Click any form in the queue to open the full submission. Verify all fields are complete and the result makes sense given the job type.'},
      {h:'Route to AHJ', b:'Once reviewed, click Mark Reviewed. For forms requiring AHJ submission (NFPA inspections, FOG certs), attach and email using the route button.'},
      {h:'Generate Missing Forms', b:'If a tech forgot to submit a form, open compliance-forms.html, load the job, complete the form on their behalf, and submit from the office queue.'},
    ]},
    { title:'Deficiency Quotes', icon:'💰', steps:[
      {h:'What is a Deficiency Quote?', b:'When a tech documents a deficiency during inspection, the system creates a deficiency record. Office turns this into a quote and sends it to the customer.'},
      {h:'Build the Quote', b:'Open the deficiency record, click Build Quote. The system pre-fills the account, deficiency description, and suggested corrective line items.'},
      {h:'Send to Customer', b:'Review pricing, add any additional items, and send. The customer receives an email with the quote and a link to approve.'},
    ]},
    { title:'Common Questions', icon:'❓', faqs:[
      {q:'A form is in the queue but has incorrect information — what do I do?', a:'Open the compliance form generator, correct the fields, resubmit. Then mark the old submission as superseded in the queue.'},
      {q:'How long do compliance forms need to be kept on file?', a:'NFPA inspection records — minimum 1 year on premises, 3 years recommended. FOG service records — typically 2 years per local ordinance. When R2 is live, everything is auto-archived.'},
    ]},
  ]
},

hr: {
  role:'HR Manager', icon:'👥', portal:'hr-manager-v3.html',

function umNav(role) {
  document.querySelectorAll('[id^="sbNav-"]').forEach(function(el){ el.classList.remove('active'); });
  var sb = document.getElementById('sbNav-'+role);
  if(sb) sb.classList.add('active');
  renderManual(role);
  // Update URL param
  var url = new URL(window.location);
  url.searchParams.set('role', role);
  history.replaceState(null, '', url);
}

function renderManual(role) {
  var m = MANUALS[role];
  if(!m) return;
  var main = document.getElementById('umMain');

  var sectionsHtml = m.sections.map(function(sec){
    var content = '';
    if(sec.steps){
      content = '<ul class="step-list">' + sec.steps.map(function(s,i){
        return '<li><div class="step-num">'+(i+1)+'</div><div class="step-body"><strong>'+s.h+'</strong><span>'+s.b+'</span></div></li>';
      }).join('') + '</ul>';
    }
    if(sec.shortcuts){
      content = '<div class="shortcut-grid">' + sec.shortcuts.map(function(s){
        return '<div class="shortcut"><strong>'+s.h+'</strong><span>'+s.b+'</span></div>';
      }).join('') + '</div>';
    }
    if(sec.faqs){
      content = sec.faqs.map(function(f,i){
        return '<div class="faq-item"><div class="faq-q" onclick="umToggleFaq(this)">'+f.q+'<span>▼</span></div><div class="faq-a">'+f.a+'</div></div>';
      }).join('');
    }
    return '<div class="section"><div class="section-title"><span class="st-icon">'+sec.icon+'</span>'+sec.title+'</div>'+content+'</div>';
  }).join('');

  var portalLink = m.portal ? '<a href="'+m.portal+'" style="color:var(--red);font-weight:700;text-decoration:none;font-size:12px;margin-top:8px;display:inline-block">→ Open '+m.role+' Portal</a>' : '';

  main.innerHTML =
    '<div class="page-hdr">'+
      '<div class="role-badge">'+m.icon+' '+m.role+'</div>'+
      '<div class="page-title">'+m.role+' User Manual</div>'+
      '<div class="page-sub">'+m.sub+'</div>'+
      portalLink+
    '</div>'+
    sectionsHtml+
    '<div class="section"><div class="section-title"><span class="st-icon">📞</span>Need Help?</div>'+
    '<div class="contact-grid">'+
      '<div class="contact-card"><strong>Platform Support</strong><span>Ted Scholl — Revenue OS</span><br><a href="mailto:tscholl@termac.com">tscholl@termac.com</a></div>'+
      '<div class="contact-card"><strong>Phone</strong><span>Direct line</span><br><a href="tel:2674216336">267-421-6336</a></div>'+
    '</div></div>';
}

function umToggleFaq(el) {
  var answer = el.nextElementSibling;
  var arrow = el.querySelector('span');
  var isOpen = answer.classList.contains('open');
  answer.classList.toggle('open', !isOpen);
  arrow.textContent = isOpen ? '▼' : '▲';
}

document.addEventListener('DOMContentLoaded', function(){
  var params = new URLSearchParams(window.location.search);
  var role = params.get('role') || 'sales';
  if(!MANUALS[role]) role = 'sales';
  umNav(role);
});
</script>

</html>

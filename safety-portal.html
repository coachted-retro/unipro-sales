<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Safety & Compliance — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--purple:#6B21A8;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:150px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.alert .stat-num{color:var(--red)}.stat-card.good .stat-num{color:var(--green)}.stat-card.warn .stat-num{color:var(--orange)}
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.alert{border-color:#FCA5A5;background:#FFF5F5}.card.warn{border-color:#FED7AA;background:#FFF7ED}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:14px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-open{background:#FEE2E2;color:#C8102E}.s-inv{background:#FEF3C7;color:#D8690B}.s-closed{background:#D1FAE5;color:#065F46}.s-done{background:#D1FAE5;color:#065F46}
.sev-minor{background:#DBEAFE;color:#1E40AF}.sev-moderate{background:#FEF3C7;color:#D8690B}.sev-serious{background:#FEE2E2;color:#C8102E}
.rec-tag{background:#7C2D12;color:#fff;border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em;margin-left:6px}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.agetag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em}
.age-ok{background:#D1FAE5;color:#065F46}.age-watch{background:#FEF3C7;color:#D8690B}.age-alert{background:#FEE2E2;color:#C8102E}
.fld{margin-bottom:12px}.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:min(520px,96vw);max-height:92vh;overflow-y:auto;padding:22px}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;margin-bottom:14px}
.chk{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line)}
.chk input{width:16px;height:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Safety &amp; Compliance</span>
  <a class="nav-back" href="termac-os.html">&larr; Hub</a>
  <a class="nav-help" href="user-manuals.html?role=safety" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div><div class="page-title">Safety &amp; Compliance</div>
    <div class="page-sub">Incidents, corrective actions, site audits, and the compliance calendar across all six divisions and five states.</div></div>
    <button class="btn btn-red" onclick="reportIncident()">+ Report Incident</button>
  </div>

  <div class="stat-strip" id="statStrip"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="incidents" onclick="setTab('incidents')">Incident Log</button>
    <button class="tab-btn" data-tab="actions" onclick="setTab('actions')">Corrective Actions</button>
    <button class="tab-btn" data-tab="audits" onclick="setTab('audits')">Safety Audits</button>
    <button class="tab-btn" data-tab="calendar" onclick="setTab('calendar')">Compliance Calendar</button>
  </div>

  <div class="tab-panel active" id="tab-incidents"></div>
  <div class="tab-panel" id="tab-actions"></div>
  <div class="tab-panel" id="tab-audits"></div>
  <div class="tab-panel" id="tab-calendar"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
var INC='termac_safety_incidents', ACT='termac_safety_actions', AUD='termac_safety_audits', CAL='termac_safety_calendar', _tab='incidents';
var DIVISIONS=['UniPro','Quality III','GTO','Filter Man','AllPro','Termac','Shared / Office'];
var DIV_COLOR={'UniPro':'#1B5FA8','Quality III':'#0D7490','GTO':'#D8690B','Filter Man':'#1E7B3C','AllPro':'#6B21A8','Termac':'#C8102E','Shared / Office':'#5A616B'};
var INC_TYPES=['Injury','Near-Miss','Vehicle','Property Damage','Spill / Chemical','Other'];
var AUDIT_ITEMS=['PPE worn and available','Fire extinguishers accessible and tagged','Exits and aisles clear','SDS binder present and current','Ladders and equipment in safe condition','Housekeeping and slip/trip control','Electrical cords and panels safe','Chemical storage and labeling correct','First aid kit stocked','Eye wash / wash station accessible'];
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(d){ if(!d) return null; return Math.round((Date.parse(d)-Date.now())/86400000); }
function daysSince(ms){ return Math.floor((Date.now()-ms)/86400000); }
function dueClass(d){ var n=daysUntil(d); if(n==null) return 'age-ok'; if(n<0) return 'age-alert'; if(n<=7) return 'age-watch'; return 'age-ok'; }

function setTab(t){ _tab=t; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); }); document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+t); }); renderTab(); }
function renderTab(){ ({incidents:renderIncidents,actions:renderActions,audits:renderAudits,calendar:renderCalendar}[_tab]||function(){})(); }

function renderStats(){
  var inc=lsGet(INC), acts=lsGet(ACT);
  var open=inc.filter(function(i){ return i.status!=='closed'; }).length;
  var yr=new Date().getFullYear();
  var recs=inc.filter(function(i){ return i.recordable && new Date(i.date||i.createdAt).getFullYear()===yr; }).length;
  var recDates=inc.filter(function(i){ return i.recordable; }).map(function(i){ return Date.parse(i.date)||i.createdAt; }).filter(Boolean);
  var lastRec=recDates.length?Math.max.apply(null,recDates):null;
  var overdueActs=acts.filter(function(a){ return a.status!=='done' && a.due && daysUntil(a.due)<0; }).length;
  function card(n,l,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+n+'</div><div class="stat-lbl">'+l+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=
    card(open,'Open Incidents', open?'alert':'good')+
    card(recs,'Recordables YTD', recs?'warn':'good')+
    card(lastRec?daysSince(lastRec):'—','Days Since Last Recordable', lastRec?(daysSince(lastRec)>=90?'good':'warn'):'good')+
    card(overdueActs,'Overdue Actions', overdueActs?'alert':'good');
}

/* ---------- incidents ---------- */
function reportIncident(){
  openModal('<h3>Report an Incident</h3>'+
    '<div class="grid2"><div class="fld"><label>Type</label><select id="i_type">'+INC_TYPES.map(function(t){return '<option>'+t+'</option>';}).join('')+'</select></div>'+
    '<div class="fld"><label>Date</label><input id="i_date" type="date" value="'+todayStr()+'"></div></div>'+
    '<div class="grid2"><div class="fld"><label>Division</label><select id="i_div">'+DIVISIONS.map(function(d){return '<option>'+d+'</option>';}).join('')+'</select></div>'+
    '<div class="fld"><label>Severity</label><select id="i_sev"><option>Minor</option><option>Moderate</option><option>Serious</option></select></div></div>'+
    '<div class="grid2"><div class="fld"><label>Location / site</label><input id="i_loc" placeholder="Job site or facility"></div>'+
    '<div class="fld"><label>Person involved</label><input id="i_person" placeholder="Name or role"></div></div>'+
    '<div class="fld"><label>What happened</label><textarea id="i_desc" rows="3"></textarea></div>'+
    '<label class="chk" style="border:none"><input type="checkbox" id="i_rec"> OSHA recordable (lost time, medical treatment beyond first aid, or worse)</label>'+
    '<div class="fld" style="margin-top:8px"><label>Immediate corrective action (optional)</label><input id="i_ca" placeholder="Creates a tracked corrective action"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="saveIncident()">Log Incident</button></div>');
}
function saveIncident(){
  var inc=lsGet(INC), id='inc'+Date.now();
  var rec={ id:id, type:val('i_type'), date:val('i_date'), division:val('i_div'), severity:val('i_sev'), location:val('i_loc'), person:val('i_person'), description:val('i_desc'), recordable:document.getElementById('i_rec').checked, status:'open', createdAt:Date.now() };
  inc.unshift(rec); lsSet(INC,inc);
  var ca=val('i_ca'); if(ca){ addActionRec('Incident: '+rec.type, ca, rec.division, id); }
  closeModal(); toast('Incident logged.'); renderStats(); if(_tab==='incidents') renderIncidents();
}
function renderIncidents(){
  var inc=lsGet(INC);
  var h='';
  if(!inc.length){ h='<div class="muted">No incidents logged. A clean log is the goal, but log every near-miss, that is how the serious ones get prevented.</div>'; document.getElementById('tab-incidents').innerHTML=h; return; }
  inc.forEach(function(i){
    var sevCls=i.severity==='Serious'?'sev-serious':i.severity==='Moderate'?'sev-moderate':'sev-minor';
    var stCls=i.status==='closed'?'s-closed':i.status==='investigating'?'s-inv':'s-open';
    var cls=i.status!=='closed'&&i.severity==='Serious'?'alert':(i.status!=='closed'?'warn':'');
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(i.type)+(i.recordable?'<span class="rec-tag">OSHA Recordable</span>':'')+' <span class="divtag" style="background:'+(DIV_COLOR[i.division]||"#888")+'">'+esc(i.division)+'</span></div>'+
      '<div class="card-meta">'+esc(i.date||'')+(i.location?' · '+esc(i.location):'')+(i.person?' · '+esc(i.person):'')+'</div>'+
      (i.description?'<div class="card-meta" style="margin-top:4px">'+esc(i.description)+'</div>':'')+'</div>'+
      '<div style="text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end"><span class="status '+sevCls+'">'+esc(i.severity)+'</span><span class="status '+stCls+'">'+esc(i.status)+'</span></div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
      (i.status==='open'?'<button class="btn btn-blue" onclick="incStatus(\''+i.id+'\',\'investigating\')">Start Investigation</button>':'')+
      (i.status!=='closed'?'<button class="btn btn-green" onclick="incStatus(\''+i.id+'\',\'closed\')">Close</button>':'<button class="btn btn-outline" onclick="incStatus(\''+i.id+'\',\'open\')">Reopen</button>')+
      '<button class="btn btn-outline" onclick="incAddAction(\''+i.id+'\')">Add Corrective Action</button></div></div>';
  });
  document.getElementById('tab-incidents').innerHTML=h;
}
function incStatus(id,st){ var inc=lsGet(INC); inc.forEach(function(i){ if(i.id===id) i.status=st; }); lsSet(INC,inc); renderStats(); renderIncidents(); }
function incAddAction(id){ var i=lsGet(INC).find(function(x){return x.id===id;}); var t=prompt('Corrective action for this '+(i?i.type:'incident')+':'); if(t){ addActionRec('Incident: '+(i?i.type:''), t, i?i.division:'', id); toast('Corrective action added.'); } }

/* ---------- corrective actions ---------- */
function addActionRec(source, title, division, sourceId){ var a=lsGet(ACT); a.unshift({ id:'act'+Date.now()+Math.floor(Math.random()*1000), source:source, sourceId:sourceId||'', title:title, division:division||'', assignedTo:'', due:'', status:'open', createdAt:Date.now() }); lsSet(ACT,a); }
function renderActions(){
  var a=lsGet(ACT).filter(function(x){ return x.status!=='done'; });
  var done=lsGet(ACT).filter(function(x){ return x.status==='done'; });
  a.sort(function(x,y){ return (Date.parse(x.due)||9e15)-(Date.parse(y.due)||9e15); });
  var h='<div style="margin-bottom:10px"><button class="btn btn-outline" onclick="newAction()">+ Add Corrective Action</button></div>';
  if(!a.length){ h+='<div class="muted">No open corrective actions.</div>'; }
  a.forEach(function(x){
    var n=daysUntil(x.due), cls=(x.due&&n<0)?'alert':(x.due&&n<=7?'warn':'');
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(x.title)+'</div>'+
      '<div class="card-meta">'+esc(x.source||'')+(x.division?' · '+esc(x.division):'')+(x.assignedTo?' · '+esc(x.assignedTo):'')+(x.due?' · due '+esc(x.due):' · no due date')+'</div></div>'+
      '<div style="text-align:right">'+(x.due?'<span class="agetag '+dueClass(x.due)+'">'+(n<0?(-n)+'d late':n+'d left')+'</span>':'')+'</div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-green" onclick="actDone(\''+x.id+'\')">Mark Done</button><button class="btn btn-outline" onclick="actEdit(\''+x.id+'\')">Assign / Due</button><button class="btn btn-outline" onclick="actDel(\''+x.id+'\')">Remove</button></div></div>';
  });
  if(done.length){ h+='<div class="sec-hdr">Completed ('+done.length+')</div>'; done.slice(0,10).forEach(function(x){ h+='<div class="card"><div class="card-hdr"><div><div class="card-title" style="color:var(--soft)">'+esc(x.title)+'</div><div class="card-meta">'+esc(x.source||'')+'</div></div><span class="status s-done">Done</span></div></div>'; }); }
  document.getElementById('tab-actions').innerHTML=h;
}
function newAction(){
  openModal('<h3>Corrective Action</h3><div class="fld"><label>Action</label><input id="a_title"></div>'+
    '<div class="grid2"><div class="fld"><label>Assigned to</label><input id="a_assign"></div><div class="fld"><label>Due date</label><input id="a_due" type="date"></div></div>'+
    '<div class="fld"><label>Division</label><select id="a_div">'+DIVISIONS.map(function(d){return '<option>'+d+'</option>';}).join('')+'</select></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveNewAction()">Save</button></div>');
}
function saveNewAction(){ var t=val('a_title'); if(!t){ toast('Enter the action.'); return; } var a=lsGet(ACT); a.unshift({ id:'act'+Date.now(), source:'Manual', sourceId:'', title:t, division:val('a_div'), assignedTo:val('a_assign'), due:val('a_due'), status:'open', createdAt:Date.now() }); lsSet(ACT,a); closeModal(); toast('Action added.'); renderStats(); renderActions(); }
function actEdit(id){ var x=lsGet(ACT).find(function(z){return z.id===id;}); if(!x) return;
  openModal('<h3>Assign / Schedule</h3><div class="fld"><label>Assigned to</label><input id="a_assign" value="'+esc(x.assignedTo)+'"></div><div class="fld"><label>Due date</label><input id="a_due" type="date" value="'+esc(x.due)+'"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveActEdit(\''+id+'\')">Save</button></div>'); }
function saveActEdit(id){ var a=lsGet(ACT); a.forEach(function(x){ if(x.id===id){ x.assignedTo=val('a_assign'); x.due=val('a_due'); } }); lsSet(ACT,a); closeModal(); renderStats(); renderActions(); }
function actDone(id){ var a=lsGet(ACT); a.forEach(function(x){ if(x.id===id) x.status='done'; }); lsSet(ACT,a); renderStats(); renderActions(); }
function actDel(id){ var a=lsGet(ACT).filter(function(x){return x.id!==id;}); lsSet(ACT,a); renderStats(); renderActions(); }

/* ---------- audits ---------- */
function renderAudits(){
  var au=lsGet(AUD);
  var h='<div style="margin-bottom:10px"><button class="btn btn-blue" onclick="newAudit()">+ New Site Audit</button></div>';
  if(!au.length){ h+='<div class="muted">No audits yet. Run a walk-through and any failed item becomes a corrective action automatically.</div>'; document.getElementById('tab-audits').innerHTML=h; return; }
  au.forEach(function(a){
    var score=a.score!=null?a.score:0, sc=score>=90?'var(--green)':score>=75?'var(--orange)':'var(--red)';
    h+='<div class="card"><div class="card-hdr"><div><div class="card-title">'+esc(a.site||a.division||'Site audit')+' <span class="divtag" style="background:'+(DIV_COLOR[a.division]||"#888")+'">'+esc(a.division||'')+'</span></div>'+
      '<div class="card-meta">'+esc(a.date||'')+(a.auditor?' · '+esc(a.auditor):'')+' · '+(a.fails||0)+' finding'+((a.fails||0)===1?'':'s')+'</div></div>'+
      '<div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:'+sc+'">'+score+'%</div></div></div>';
  });
  document.getElementById('tab-audits').innerHTML=h;
}
function newAudit(){
  openModal('<h3>Site Safety Audit</h3>'+
    '<div class="grid2"><div class="fld"><label>Site / facility</label><input id="au_site"></div><div class="fld"><label>Division</label><select id="au_div">'+DIVISIONS.map(function(d){return '<option>'+d+'</option>';}).join('')+'</select></div></div>'+
    '<div class="grid2"><div class="fld"><label>Auditor</label><input id="au_auditor"></div><div class="fld"><label>Date</label><input id="au_date" type="date" value="'+todayStr()+'"></div></div>'+
    '<div class="sec-hdr" style="margin-top:6px">Checklist · uncheck any that fail</div>'+
    AUDIT_ITEMS.map(function(it,i){ return '<label class="chk"><input type="checkbox" id="au_chk'+i+'" checked> '+esc(it)+'</label>'; }).join('')+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveAudit()">Save Audit</button></div>');
}
function saveAudit(){
  var fails=[], pass=0;
  AUDIT_ITEMS.forEach(function(it,i){ var c=document.getElementById('au_chk'+i); if(c&&c.checked) pass++; else fails.push(it); });
  var score=Math.round(pass/AUDIT_ITEMS.length*100);
  var div=val('au_div'), site=val('au_site');
  var au=lsGet(AUD); au.unshift({ id:'aud'+Date.now(), site:site, division:div, auditor:val('au_auditor'), date:val('au_date'), score:score, fails:fails.length, findings:fails, createdAt:Date.now() }); lsSet(AUD,au);
  fails.forEach(function(f){ addActionRec('Audit: '+(site||div), 'Correct: '+f, div, ''); });
  closeModal(); toast(fails.length?('Audit saved. '+fails.length+' corrective action'+(fails.length>1?'s':'')+' created.'):'Audit saved. Clean walk-through.'); renderStats(); renderAudits();
}

/* ---------- compliance calendar ---------- */
function seedCalendar(){
  if(lsGet(CAL).length) return;
  var y=new Date().getFullYear();
  lsSet(CAL,[
    { id:'cal1', title:'Post OSHA 300A summary', category:'OSHA', dueDate:y+'-02-01', recurrence:'annual', notes:'Post Feb 1 through Apr 30' },
    { id:'cal2', title:'Annual fire / evacuation drill', category:'Drill', dueDate:y+'-06-01', recurrence:'annual', notes:'All facilities' },
    { id:'cal3', title:'Fire extinguisher annual service', category:'Equipment', dueDate:y+'-09-01', recurrence:'annual', notes:'Company vehicles and shops' },
    { id:'cal4', title:'Safety training refresh', category:'Training', dueDate:y+'-03-15', recurrence:'annual', notes:'HazCom, PPE, lifting' }
  ]);
}
function renderCalendar(){
  seedCalendar();
  var cal=lsGet(CAL).slice().sort(function(a,b){ return (Date.parse(a.dueDate)||9e15)-(Date.parse(b.dueDate)||9e15); });
  var h='<div style="margin-bottom:10px"><button class="btn btn-outline" onclick="newCalItem()">+ Add Obligation</button></div>';
  if(!cal.length){ h+='<div class="muted">No compliance obligations tracked.</div>'; document.getElementById('tab-calendar').innerHTML=h; return; }
  cal.forEach(function(c){
    var n=daysUntil(c.dueDate), cls=(n!=null&&n<0)?'alert':(n!=null&&n<=14?'warn':'');
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(c.title)+'</div>'+
      '<div class="card-meta">'+esc(c.category||'')+' · '+esc(c.recurrence||'one-time')+(c.notes?' · '+esc(c.notes):'')+'</div></div>'+
      '<div style="text-align:right"><div class="card-meta">due '+esc(c.dueDate||'')+'</div>'+(c.dueDate?'<span class="agetag '+dueClass(c.dueDate)+'">'+(n<0?(-n)+'d overdue':n+'d')+'</span>':'')+'</div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-green" onclick="calDone(\''+c.id+'\')">Mark Done</button><button class="btn btn-outline" onclick="calDel(\''+c.id+'\')">Remove</button></div></div>';
  });
  document.getElementById('tab-calendar').innerHTML=h;
}
function newCalItem(){
  openModal('<h3>Compliance Obligation</h3><div class="fld"><label>Title</label><input id="c_title"></div>'+
    '<div class="grid2"><div class="fld"><label>Category</label><select id="c_cat"><option>OSHA</option><option>Training</option><option>Drill</option><option>Equipment</option><option>Permit</option><option>Insurance</option><option>Other</option></select></div>'+
    '<div class="fld"><label>Recurrence</label><select id="c_rec"><option>annual</option><option>quarterly</option><option>monthly</option><option>one-time</option></select></div></div>'+
    '<div class="fld"><label>Due date</label><input id="c_due" type="date"></div><div class="fld"><label>Notes</label><input id="c_notes"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveCalItem()">Save</button></div>');
}
function saveCalItem(){ var t=val('c_title'); if(!t){ toast('Enter a title.'); return; } var cal=lsGet(CAL); cal.push({ id:'cal'+Date.now(), title:t, category:val('c_cat'), recurrence:val('c_rec'), dueDate:val('c_due'), notes:val('c_notes') }); lsSet(CAL,cal); closeModal(); toast('Obligation added.'); renderCalendar(); }
function calDone(id){ var cal=lsGet(CAL); cal.forEach(function(c){ if(c.id===id){ var add={annual:365,quarterly:91,monthly:30}[c.recurrence]; if(add&&c.dueDate){ c.dueDate=new Date(Date.parse(c.dueDate)+add*86400000).toISOString().slice(0,10); } else if(add){ c.dueDate=new Date(Date.now()+add*86400000).toISOString().slice(0,10); } else { c.done=true; } } }); lsSet(CAL,cal.filter(function(c){return !c.done;})); toast('Marked done, next due date set.'); renderCalendar(); }
function calDel(id){ var cal=lsGet(CAL).filter(function(c){return c.id!==id;}); lsSet(CAL,cal); renderCalendar(); }

function val(id){ var e=document.getElementById(id); return e?e.value:''; }
function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

renderStats(); renderTab();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accounting Office — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px}
/* DIVISION FILTER */
.divbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.div-pill{background:var(--panel);border:1.5px solid var(--line);border-radius:99px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);cursor:pointer}
.div-pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* STAT STRIP */
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:150px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.alert .stat-num{color:var(--red)}
.stat-card.good .stat-num{color:var(--green)}
.stat-card.warn .stat-num{color:var(--orange)}
/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.badge{background:var(--red);color:#fff;border-radius:99px;font-size:9px;padding:1px 6px;margin-left:4px;font-weight:800}
.tab-panel{display:none}.tab-panel.active{display:block}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);overflow:hidden}
.tbl th{background:var(--navy);color:#fff;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:10px 12px}
.tbl td{padding:9px 12px;border-top:1px solid var(--line);font-size:12px}
.tbl tr:nth-child(even) td{background:#FAFBFC}
.tbl td.num,.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl tr.total td{font-weight:800;background:#F1F5F9;border-top:2px solid var(--navy)}
/* CARDS */
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.overdue{border-color:#FCA5A5;background:#FFF5F5}
.card.warn{border-color:#FED7AA;background:#FFF7ED}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:14px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.card-amt{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;text-align:right}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-current{background:#D1FAE5;color:#065F46}.s-watch{background:#FFFBEB;color:#B88010}.s-high{background:#FEF3C7;color:#D8690B}.s-critical{background:#FEE2E2;color:#C8102E}.s-paid{background:#D1FAE5;color:#065F46}.s-open{background:#DBEAFE;color:#1E40AF}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:min(480px,96vw);max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;margin-bottom:14px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
/* AI */
.ai-box{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px;white-space:pre-wrap;font-size:13px;line-height:1.5;min-height:60px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

<script>
/* ============================================================
   Termac One — Accounting Office (Controller Workspace)
   Reads the existing per-division stores, normalizes every
   division's AR into one model, and adds AP (new), collections,
   expenses, cash position, and AI. No store is renamed; this is
   a read/aggregate layer plus one new payables store.
   ============================================================ */

var DIVISIONS = ['UniPro','Quality III','GTO','Filter Man','AllPro','Termac'];
var DIV_COLOR = {'UniPro':'#1B5FA8','Quality III':'#0E7490','GTO':'#6D28D9','Filter Man':'#B45309','AllPro':'#9D174D','Termac':'#1E7B3C'};

/* Each division's AR comes from one or more legacy job/invoice stores.
   Naming was never consistent, so we read every variant per division. */
var AR_STORES = {
  'UniPro':      ['unipro_jobs','unipro_invoices','quality3_jobs','quality3_invoices'],
  'Quality III': [],
  'GTO':         ['gto_jobs','gto_invoices'],
  'Filter Man':  ['filterman_jobs','filterman_invoices'],
  'AllPro':      ['allpro_jobs','allpro_invoices'],
  'Termac':      ['termac_jobs','termac_invoices','termac_svc_invoices']
};
/* Note: UniPro and Quality III share field crews and feed the same UniPro
   book, so Quality III stores are read under UniPro and re-split by the
   record's own division tag below. */

var AP_KEY    = 'termac_payables';
var COLL_KEY  = 'termac_collections';
var EXP_KEY   = 'termac_expense_reports';

var _div = 'all';
var _tab = 'overview';

/* ---------- helpers ---------- */
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function money(n){ n=Number(n)||0; return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function dateMs(r){
  if(r.completedAt) return Number(r.completedAt);
  if(r.invoiceDate){ var a=Date.parse(r.invoiceDate); if(!isNaN(a)) return a; }
  if(r.date){ var b=Date.parse(r.date); if(!isNaN(b)) return b; }
  if(r.loggedAt) return Number(r.loggedAt);
  if(r.submittedAt) return Number(r.submittedAt);
  return Date.now();
}
function isPaid(r){ return r.paymentStatus==='paid' || r.status==='paid' || r.invoicePaid===true || r.paid===true; }
function amtOf(r){ return Number(r.total||r.revenue||r.amount||r.invoiceAmount||0); }
function acctOf(r){ return r.accountName||r.biz||r.account||r.customer||r.accountId||'Unknown account'; }
function normDiv(d){
  if(!d) return null;
  var s=String(d).toLowerCase().replace(/[^a-z0-9]/g,'');
  if(s.indexOf('quality')>-1||s==='q3'||s==='qiii') return 'Quality III';
  if(s.indexOf('unipro')>-1) return 'UniPro';
  if(s.indexOf('gto')>-1) return 'GTO';
  if(s.indexOf('filter')>-1) return 'Filter Man';
  if(s.indexOf('allpro')>-1) return 'AllPro';
  if(s.indexOf('termac')>-1) return 'Termac';
  return null;
}

/* ---------- AR aggregation (the reconciliation core) ---------- */
function loadAR(){
  var out=[], seen={};
  Object.keys(AR_STORES).forEach(function(div){
    AR_STORES[div].forEach(function(key){
      lsGet(key).forEach(function(r){
        var amt=amtOf(r);
        if(amt<=0) return;
        var id=(r.id||key+'_'+JSON.stringify(r).length)+'';
        if(seen[id]) return; seen[id]=1;
        var d=normDiv(r.division)||div;
        out.push({
          id:id, division:d, account:acctOf(r), amount:amt,
          date:dateMs(r), paid:isPaid(r), paidApplied:Number(r.paidApplied||0),
          serviceType:r.serviceType||r.service||'', source:key
        });
      });
    });
  });
  return out;
}

function ageStatus(inv){
  var ageDays=Math.floor((Date.now()-inv.date)/86400000);
  if(inv.paid) return {days:ageDays,tier:'paid',label:'Paid',cls:'s-paid'};
  if(ageDays>=90) return {days:ageDays,tier:'critical',label:'90+ Overdue',cls:'s-critical',action:'Write-off risk — escalate'};
  if(ageDays>=60) return {days:ageDays,tier:'high',label:'60+ Overdue',cls:'s-high',action:'Call required — payment plan or dispute'};
  if(ageDays>=30) return {days:ageDays,tier:'watch',label:'30+ Overdue',cls:'s-watch',action:'Follow-up — confirm receipt'};
  return {days:ageDays,tier:'current',label:'Current',cls:'s-current'};
}

function loadAP(){ return lsGet(AP_KEY); }
function loadColls(){ return lsGet(COLL_KEY); }
function loadExpenses(){ return lsGet(EXP_KEY); }

/* open balance after any partial collections already applied */
function openBal(i){ if(i.paid) return 0; return Math.max(0, i.amount-(i.paidApplied||0)); }
function fullyPaid(i){ return i.paid || (i.paidApplied||0) >= i.amount-0.01; }

function divMatch(d){ return _div==='all' || d===_div; }

/* ---------- rollup ---------- */
function rollup(){
  var ar=loadAR(), coll=loadColls(), ap=loadAP(), exp=loadExpenses();
  var rows={}; DIVISIONS.forEach(function(d){ rows[d]={div:d,openAR:0,overdue:0,paid:0,coll:0,ap:0,exp:0}; });
  ar.forEach(function(i){ var r=rows[i.division]; if(!r) return; if(fullyPaid(i)){ r.paid+=i.amount; } else { var ob=openBal(i); r.openAR+=ob; var st=ageStatus(i); if(st.tier!=='current') r.overdue+=ob; } });
  coll.forEach(function(c){ var d=normDiv(c.division); if(d&&rows[d]) rows[d].coll+=Number(c.amount)||0; });
  ap.forEach(function(b){ var d=normDiv(b.division); if(d&&rows[d]&&b.status!=='paid') rows[d].ap+=Number(b.amount)||0; });
  exp.forEach(function(e){ var d=normDiv(e.division); if(d&&rows[d]&&e.status!=='approved') rows[d].exp+=Number(e.total||e.amount)||0; });
  return {rows:rows, ar:ar, coll:coll, ap:ap, exp:exp};
}

/* ---------- stat strip ---------- */
function renderStats(){
  var R=rollup(), openAR=0,overdue=0,apOpen=0,collTot=0;
  DIVISIONS.forEach(function(d){ if(!divMatch(d)) return; var r=R.rows[d]; openAR+=r.openAR; overdue+=r.overdue; apOpen+=r.ap; collTot+=r.coll; });
  var net=openAR-apOpen;
  document.getElementById('statStrip').innerHTML=
    card(money(openAR),'Open AR','') +
    card(money(overdue),'AR Overdue (30+)', overdue>0?'alert':'') +
    card(money(apOpen),'AP Open', apOpen>0?'warn':'') +
    card(money(collTot),'Collections Logged','good') +
    card(money(net), net>=0?'Net Position':'Net Shortfall', net>=0?'good':'alert');
  function card(num,lbl,cls){ return '<div class="stat-card '+cls+'"><div class="stat-num">'+num+'</div><div class="stat-lbl">'+lbl+'</div></div>'; }
  var ag=R.ar.filter(function(i){ return !fullyPaid(i) && ageStatus(i).tier!=='current' && divMatch(i.division); }).length;
  var b=document.getElementById('bAging'); if(ag>0){ b.textContent=ag; b.style.display=''; } else b.style.display='none';
}

/* ---------- division bar ---------- */
function renderDivBar(){
  var html='<button class="div-pill '+(_div==='all'?'active':'')+'" onclick="setDiv(\'all\')">All Divisions</button>';
  DIVISIONS.forEach(function(d){ html+='<button class="div-pill '+(_div===d?'active':'')+'" onclick="setDiv(\''+d+'\')">'+esc(d)+'</button>'; });
  document.getElementById('divbar').innerHTML=html;
}
function setDiv(d){ _div=d; renderDivBar(); renderStats(); renderTab(); }

/* ---------- tabs ---------- */
function setTab(t){ _tab=t; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); }); document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+t); }); renderTab(); }
function renderTab(){ ({overview:renderOverview,aging:renderAging,collections:renderCollections,payables:renderPayables,expenses:renderExpenses,cash:renderCash,margin:renderMargin,ai:renderAI}[_tab]||function(){})(); }

/* ---------- overview ---------- */
/* ---------- controller KPI strip ---------- */
function kpiGM(start,end){
  var rev=0; loadAR().forEach(function(i){ if(divMatch(i.division)&&i.date>=start&&i.date<=end) rev+=i.amount; });
  var mat=window.TermacCOGS?TermacCOGS.materialByDivision(start,end):{};
  var lab=window.TermacLabor?TermacLabor.byDivision(start,end):{};
  var apc=apCOGSInPeriod(start,end)||{};
  var cogs=0; DIVISIONS.forEach(function(d){ if(!divMatch(d))return; cogs+=(mat[d]||0)+(lab[d]||0)+(apc[d]||0); });
  return rev>0?((rev-cogs)/rev*100):null;
}
function kpiStrip(){
  var now=Date.now(), D=86400000, s90=now-90*D, s180=now-180*D;
  var ar=loadAR().filter(function(i){ return divMatch(i.division); });
  var openAR=0, curOpen=0;
  ar.forEach(function(i){ if(fullyPaid(i)) return; var ob=openBal(i); openAR+=ob; if(ageStatus(i).tier==='current') curOpen+=ob; });
  var billed90=0; ar.forEach(function(i){ if(i.date>=s90&&i.date<=now) billed90+=i.amount; });
  var coll90=0; loadColls().forEach(function(c){ if(divMatch(normDiv(c.division)) && (Number(c.collectedAt)||0)>=s90) coll90+=Number(c.amount)||0; });

  var dso=billed90>0?Math.round(openAR/(billed90/90)):null;
  var pctCur=openAR>0?Math.round(curOpen/openAR*100):null;
  var pctPast=pctCur==null?null:(100-pctCur);
  var cer=billed90>0?Math.round(coll90/billed90*100):null;
  var gmNow=kpiGM(s90,now), gmPrev=kpiGM(s180,s90);
  var gmDelta=(gmNow!=null&&gmPrev!=null)?(gmNow-gmPrev):null;

  function card(val,lbl,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>'; }
  var dsoCls=dso==null?'':(dso<=35?'good':dso<=55?'warn':'alert');
  var curCls=pctCur==null?'':(pctCur>=80?'good':pctCur>=60?'warn':'alert');
  var cerCls=cer==null?'':(cer>=95?'good':cer>=80?'warn':'alert');
  var gmCls=(gmNow==null||gmDelta==null)?'':(gmDelta>=0?'good':'warn');
  var gmArrow=gmDelta==null?'':(gmDelta>=0?' \u25B2':' \u25BC');
  var gmSub=gmDelta==null?'Gross Margin (90d)':'Gross Margin · '+(gmDelta>=0?'+':'')+gmDelta.toFixed(1)+' pts vs prior 90d';

  return '<div class="sec-hdr">Controller KPIs</div><div class="stat-strip">'+
    card(dso==null?'—':dso, 'DSO · days to collect (90d)', dsoCls)+
    card(pctCur==null?'—':pctCur+'%', (pctPast==null?'AR current':'AR current · '+pctPast+'% past due'), curCls)+
    card(cer==null?'—':cer+'%', 'Collected vs Billed (90d)', cerCls)+
    card(gmNow==null?'—':gmNow.toFixed(1)+'%'+gmArrow, gmSub, gmCls)+
    '</div><div class="muted" style="text-align:left;padding:6px 2px 12px">DSO is open AR divided by average daily billings over the last 90 days; lower is faster cash. Percent current is the share of open AR not yet past due. Collected vs billed compares the last 90 days of collections against what was billed. Gross margin is revenue minus material, labor, and cost-of-goods bills, with the change against the prior 90 days.</div>';
}
function renderOverview(){
  var R=rollup();
  var h=kpiStrip();
  h+='<div class="sec-hdr">Division Rollup</div><table class="tbl"><thead><tr><th>Division</th><th class="num">Open AR</th><th class="num">Overdue</th><th class="num">Paid</th><th class="num">Collections</th><th class="num">AP Open</th><th class="num">Exp Pending</th></tr></thead><tbody>';
  var tot={openAR:0,overdue:0,paid:0,coll:0,ap:0,exp:0};
  DIVISIONS.forEach(function(d){ if(!divMatch(d)) return; var r=R.rows[d];
    tot.openAR+=r.openAR;tot.overdue+=r.overdue;tot.paid+=r.paid;tot.coll+=r.coll;tot.ap+=r.ap;tot.exp+=r.exp;

/* ---------- collections + reconciliation ---------- */
function normName(s){ return String(s==null?'':s).toLowerCase().replace(/[^a-z0-9]/g,''); }

/* find the best open invoice a collection clears */
function findMatch(coll){
  var cd=normDiv(coll.division);
  var cands=loadAR().filter(function(i){ return !fullyPaid(i) && (!cd || i.division===cd); });
  var cn=normName(coll.accountName), inv=normName(coll.invoiceNum), best=null, bestScore=0;
  cands.forEach(function(i){
    var score=0, ob=openBal(i), iname=normName(i.account), iid=normName(i.id);
    if(inv && iid && (iid===inv || iid.indexOf(inv)>-1 || inv.indexOf(iid)>-1)) score+=100;
    if(cn && iname){ if(cn===iname) score+=50; else if(iname.indexOf(cn)>-1||cn.indexOf(iname)>-1) score+=25; }
    if(Math.abs((coll.amount||0)-ob)<0.5) score+=30; else if((coll.amount||0)<ob) score+=8;
    if(score>bestScore){ bestScore=score; best=i; }
  });
  if(!best||bestScore<25) return null;
  var ob=openBal(best);
  var mode = Math.abs((coll.amount||0)-ob)<0.5 ? 'full' : ((coll.amount||0)<ob ? 'partial' : 'full');
  return {inv:best, score:bestScore, mode:mode, openBal:ob};
}

function reconcileBest(collId, forceMode){
  var colls=loadColls(), coll=null; colls.forEach(function(c){ if(c.id===collId) coll=c; });
  if(!coll){ toast('Collection not found.'); return; }
  var m=findMatch(coll); if(!m){ toast('No open invoice matched.'); return; }
  applyReconcile(coll, m.inv.id, m.inv.source, coll.amount||0, (forceMode||m.mode)==='full');
}

function applyReconcile(coll, invId, source, applied, full){
  var arr=lsGet(source), rec=null; arr.forEach(function(r){ if((r.id||'')+''===(invId+'')) rec=r; });
  if(!rec){ toast('Invoice record not found.'); return; }
  var amt=amtOf(rec), cur=Number(rec.paidApplied||0), next=cur+applied;
  if(full || next>=amt-0.01){ rec.paymentStatus='paid'; rec.invoicePaid=true; rec.paid=true; rec.paidApplied=amt; }
  else { rec.paidApplied=next; }
  lsSet(source,arr);
  var colls=loadColls(); colls.forEach(function(c){ if(c.id===coll.id){ c.reconciledInvoiceId=invId; c.reconciledSource=source; c.reconciledApplied=applied; c.reconciledAt=Date.now(); c.status='posted'; } });
  lsSet(COLL_KEY,colls);
  toast(full?'Invoice cleared and marked paid.':'Partial '+money(applied)+' applied.');
  renderStats(); renderTab();
}

function unlinkColl(collId){
  var colls=loadColls(), coll=null; colls.forEach(function(c){ if(c.id===collId) coll=c; });
  if(!coll||!coll.reconciledInvoiceId||coll.reconciledInvoiceId==='none') { clearReview(collId); return; }
  var arr=lsGet(coll.reconciledSource), rec=null; arr.forEach(function(r){ if((r.id||'')+''===(coll.reconciledInvoiceId+'')) rec=r; });
  if(rec){ var amt=amtOf(rec); var back=Math.max(0,(Number(rec.paidApplied||0))-(coll.reconciledApplied||amt)); rec.paidApplied=back; if(back<amt-0.01){ rec.paymentStatus='unpaid'; rec.invoicePaid=false; rec.paid=false; } lsSet(coll.reconciledSource,arr); }
  coll.reconciledInvoiceId=null; coll.reconciledSource=null; coll.reconciledApplied=null; coll.reconciledAt=null; coll.status='collected';
  lsSet(COLL_KEY,colls); toast('Reconciliation reversed.'); renderStats(); renderTab();
}
function dismissColl(collId){ var colls=loadColls(); colls.forEach(function(c){ if(c.id===collId){ c.reconciledInvoiceId='none'; c.reconciledAt=Date.now(); } }); lsSet(COLL_KEY,colls); renderStats(); renderTab(); }
function clearReview(collId){ var colls=loadColls(); colls.forEach(function(c){ if(c.id===collId){ c.reconciledInvoiceId=null; c.reconciledAt=null; } }); lsSet(COLL_KEY,colls); renderStats(); renderTab(); }

/* ---------- cash forecast config ---------- */
var CASH_CFG='termac_cash_cfg';
function cashCfg(){ try{ return JSON.parse(localStorage.getItem(CASH_CFG)||'{}')||{}; }catch(e){ return {}; } }
function saveCashCfg(){
  var c={ onHand:Number(document.getElementById('cashOnHand').value)||0,
          payAmt:Number(document.getElementById('cashPayAmt').value)||0,
          payCycle:document.getElementById('cashPayCycle').value||'',
          payNext:document.getElementById('cashPayNext').value||'' };
  try{ localStorage.setItem(CASH_CFG, JSON.stringify(c)); }catch(e){}
  toast('Cash settings saved.'); renderCash();
}
function cashFmtMD(ms){ return new Date(ms).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function cashPayDates(cfg,startMs,endMs){
  var out=[]; if(!(Number(cfg.payAmt)>0)||!cfg.payCycle||!cfg.payNext) return out;
  var step={weekly:7,biweekly:14,semi:15,monthly:30}[cfg.payCycle]||0; if(!step) return out;
  var d=Date.parse(cfg.payNext); if(!d) return out;
  var g=0; while(d<startMs && g<500){ d+=step*86400000; g++; }
  while(d<=endMs && g<500){ out.push(d); d+=step*86400000; g++; }
  return out;
}

function renderCash(){
  var ar=loadAR().filter(function(i){ return !fullyPaid(i) && divMatch(i.division); });
  var ap=loadAP().filter(function(b){ return b.status!=='paid' && divMatch(normDiv(b.division)); });
  var cfg=cashCfg();
  var openAR=ar.reduce(function(s,i){return s+openBal(i);},0);
  var openAP=ap.reduce(function(s,b){return s+(Number(b.amount)||0);},0);

  // 8-week horizon, weekly windows from today
  var WEEKS=8, NET=30;
  var t0=new Date(); t0.setHours(0,0,0,0); var startMs=t0.getTime();
  var wkMs=7*86400000, horizonEnd=startMs+WEEKS*wkMs-1;
  function wkIndex(ms){ return Math.floor((ms-startMs)/wkMs); }

  var inWk=[],outWk=[],payWk=[],i2; for(i2=0;i2<WEEKS;i2++){ inWk.push(0); outWk.push(0); payWk.push(0); }
  var beyondIn=0,beyondOut=0,atRisk=0;

  ar.forEach(function(i){
    var ob=openBal(i); if(ob<=0) return;
    var st=ageStatus(i);
    if(st.tier==='critical'){ atRisk+=ob; return; }
    var exp=i.date+NET*86400000;
    if(exp<startMs){ var slip=(st.tier==='high')?10:(st.tier==='watch')?3:0; exp=startMs+slip*86400000; }
    var weight=(st.tier==='high')?0.85:1.0, amt=ob*weight, wi=wkIndex(exp); if(wi<0)wi=0;
    if(wi>=WEEKS) beyondIn+=amt; else inWk[wi]+=amt;
  });
  ap.forEach(function(b){
    var a=Number(b.amount)||0; if(a<=0) return;
    var due=Date.parse(b.dueDate)||startMs, wi=wkIndex(due); if(wi<0)wi=0;
    if(wi>=WEEKS) beyondOut+=a; else outWk[wi]+=a;
  });
  cashPayDates(cfg,startMs,horizonEnd).forEach(function(pd){ var wi=wkIndex(pd); if(wi>=0&&wi<WEEKS) payWk[wi]+=Number(cfg.payAmt)||0; });

  var startBal=Number(cfg.onHand)||0, bal=startBal, minBal=startBal, minWk=-1;
  var trail=[]; for(i2=0;i2<WEEKS;i2++){ var net=inWk[i2]-outWk[i2]-payWk[i2]; bal+=net; if(bal<minBal){ minBal=bal; minWk=i2; } trail.push(bal); }
  var endBal=bal;

  var h='<div class="stat-strip">'+
    '<div class="stat-card"><div class="stat-num">'+money(openAR)+'</div><div class="stat-lbl">Total Open AR</div></div>'+
    '<div class="stat-card warn"><div class="stat-num">'+money(openAP)+'</div><div class="stat-lbl">Total Open AP</div></div>'+
    '<div class="stat-card '+(endBal>=0?'good':'alert')+'"><div class="stat-num">'+money(endBal)+'</div><div class="stat-lbl">Projected Balance, 8 wks</div></div>'+
    '<div class="stat-card '+(minBal>=0?'good':'alert')+'"><div class="stat-num">'+money(minBal)+'</div><div class="stat-lbl">Lowest Projected'+(minWk>=0?' (wk '+(minWk+1)+')':'')+'</div></div></div>';

  // controls
  h+='<div class="sec-hdr">8-Week Cash Forecast</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:4px 2px 12px">'+
    '<div><label style="display:block;font-size:11px;color:var(--muted,#64748b);margin-bottom:3px">Cash on hand today</label><input id="cashOnHand" type="number" step="100" value="'+(Number(cfg.onHand)||0)+'" style="padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px;width:140px"></div>'+
    '<div><label style="display:block;font-size:11px;color:var(--muted,#64748b);margin-bottom:3px">Payroll per run</label><input id="cashPayAmt" type="number" step="100" value="'+(Number(cfg.payAmt)||0)+'" style="padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px;width:130px"></div>'+
    '<div><label style="display:block;font-size:11px;color:var(--muted,#64748b);margin-bottom:3px">Cycle</label><select id="cashPayCycle" style="padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px">'+
      ['','weekly','biweekly','semi','monthly'].map(function(v){ var lbl={'':'None',weekly:'Weekly',biweekly:'Every 2 weeks',semi:'Twice a month',monthly:'Monthly'}[v]; return '<option value="'+v+'"'+(cfg.payCycle===v?' selected':'')+'>'+lbl+'</option>'; }).join('')+
      '</select></div>'+
    '<div><label style="display:block;font-size:11px;color:var(--muted,#64748b);margin-bottom:3px">Next pay date</label><input id="cashPayNext" type="date" value="'+esc(cfg.payNext||'')+'" style="padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px"></div>'+
    '<button class="btn btn-green" onclick="saveCashCfg()">Save</button></div>';

  h+='<table class="tbl"><thead><tr><th>Week</th><th class="num">Expected In</th><th class="num">AP Out</th><th class="num">Payroll</th><th class="num">Net</th><th class="num">Projected Balance</th></tr></thead><tbody>';
  for(i2=0;i2<WEEKS;i2++){
    var ws=startMs+i2*wkMs, we=ws+6*86400000, net=inWk[i2]-outWk[i2]-payWk[i2];
    h+='<tr><td>'+cashFmtMD(ws)+' - '+cashFmtMD(we)+'</td>'+
      '<td class="num" style="color:var(--green)">'+money(inWk[i2])+'</td>'+
      '<td class="num" style="color:var(--orange)">'+money(outWk[i2])+'</td>'+
      '<td class="num" style="color:var(--orange)">'+(payWk[i2]?money(payWk[i2]):'—')+'</td>'+
      '<td class="num" style="font-weight:700;color:'+(net>=0?'var(--green)':'var(--red)')+'">'+money(net)+'</td>'+
      '<td class="num" style="font-weight:800;color:'+(trail[i2]>=0?'var(--ink,#0f172a)':'var(--red)')+'">'+money(trail[i2])+(trail[i2]<0?' ⚠':'')+'</td></tr>';
  }
  h+='</tbody></table>';

  h+='<div class="muted" style="text-align:left;padding:8px 2px;line-height:1.5">Starting balance is the cash on hand you enter above. Expected In assumes invoices pay around Net 30; overdue invoices are pulled forward a few days, 60-plus day invoices are counted at 85 percent, and 90-plus is excluded as at-risk and routed to collections. AP Out is bucketed by due date, with anything overdue landing this week. Payroll comes from your settings above. Beyond 8 weeks: '+money(beyondIn)+' AR in, '+money(beyondOut)+' AP out. At-risk AR (90+): '+money(atRisk)+' not counted here. Cash on hand and payroll are company-wide; use All Divisions for the true cash picture. This is a working estimate, not a bank balance.</div>';

  document.getElementById('tab-cash').innerHTML=h;
}

/* ---------- margin by division (real material COGS) ---------- */
var _marginPeriod = 'ytd';
function setMarginPeriod(p){ _marginPeriod = p; renderMargin(); }
function marginRange(p){
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  function sow(){ var x=new Date(now); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x.getTime(); }
  switch(p){
    case 'wtd': return [sow(), Date.now()];
    case 'mtd': return [new Date(y,m,1).getTime(), Date.now()];
    case 'qtd': return [new Date(y,Math.floor(m/3)*3,1).getTime(), Date.now()];
    case 'ytd': return [new Date(y,0,1).getTime(), Date.now()];
    case 'all': return [0, Date.now()];
    default: return [new Date(y,0,1).getTime(), Date.now()];
  }
}
function marginPeriodLabel(p){ return {wtd:'This Week',mtd:'This Month',qtd:'This Quarter',ytd:'Year to Date',all:'All Time'}[p]||'Year to Date'; }
function apCOGSInPeriod(start,end){
  var out={}; DIVISIONS.forEach(function(d){ out[d]=0; });
  loadAP().forEach(function(b){
    var d=normDiv(b.division); if(!d||!(d in out)) return;
    var t=Number(b.loggedAt||(b.dueDate?Date.parse(b.dueDate):0))||0; if(t<start||t>end) return;
    var s=String(b.category||'').toLowerCase();
    if(/chemical|part|material|filter|fuel|gas|propane|subcontract|equipment|hardware|consumable|inventory|product|cylinder|nozzle|extinguisher/.test(s)) out[d]+=Number(b.amount)||0;
  });
  return out;
}
function renderMargin(){
  var rng=marginRange(_marginPeriod), start=rng[0], end=rng[1];
  var mat = (window.TermacCOGS ? window.TermacCOGS.materialByDivision(start,end) : {});
  var lab = (window.TermacLabor ? window.TermacLabor.byDivision(start,end) : {});
  var apc = apCOGSInPeriod(start,end);
  var ar = loadAR();
  var rev={}; DIVISIONS.forEach(function(d){ rev[d]=0; });
  ar.forEach(function(i){ if(rev[i.division]==null) return; if(i.date>=start && i.date<=end) rev[i.division]+=i.amount; });

  var periods=[['wtd','Week'],['mtd','Month'],['qtd','Quarter'],['ytd','YTD'],['all','All']];
  var pbtns=periods.map(function(p){ var on=_marginPeriod===p[0]; return '<button onclick="setMarginPeriod(\''+p[0]+'\')" class="div-pill '+(on?'active':'')+'">'+p[1]+'</button>'; }).join('');

  var rows=DIVISIONS.filter(function(d){ return divMatch(d); });
  var tot={rev:0,mat:0,lab:0,ap:0};
  var bodyRows = rows.map(function(d){
    var r=rev[d]||0, mc=mat[d]||0, lc=lab[d]||0, ac=apc[d]||0, cogs=mc+lc+ac, gp=r-cogs, gm=r?gp/r*100:0;
    tot.rev+=r; tot.mat+=mc; tot.lab+=lc; tot.ap+=ac;
    return '<tr><td><span class="divtag" style="background:'+DIV_COLOR[d]+'">'+esc(d)+'</span></td><td class="num">'+money(r)+'</td><td class="num">'+money(mc)+'</td><td class="num">'+money(lc)+'</td><td class="num">'+money(ac)+'</td><td class="num">'+money(cogs)+'</td><td class="num" style="color:'+(gp>=0?'var(--green)':'var(--red)')+';font-weight:700">'+money(gp)+'</td><td class="num">'+(r?gm.toFixed(1)+'%':'—')+'</td></tr>';
  }).join('');
  var tcogs=tot.mat+tot.lab+tot.ap, tgp=tot.rev-tcogs, tgm=tot.rev?tgp/tot.rev*100:0;

  var h='<div class="divbar">'+pbtns+'</div>'+
    '<div class="muted" style="text-align:left;padding:2px 2px 12px">'+marginPeriodLabel(_marginPeriod)+' &middot; gross margin by division. Material COGS is real warehouse consumption (kitting and use/deduct) valued at unit cost. Labor COGS is on-site time valued at each tech\'s HR rate plus burden, or the general default when a rate is not set. AP COGS is cost-of-goods vendor bills in the period.</div>'+
    '<div class="stat-strip">'+
    '<div class="stat-card"><div class="stat-num">'+money(tot.rev)+'</div><div class="stat-lbl">Revenue (billed)</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+money(tcogs)+'</div><div class="stat-lbl">Total COGS</div></div>'+
    '<div class="stat-card good"><div class="stat-num">'+money(tgp)+'</div><div class="stat-lbl">Gross Profit</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(tot.rev?tgm.toFixed(1)+'%':'—')+'</div><div class="stat-lbl">Gross Margin</div></div></div>'+
    '<table class="tbl"><thead><tr><th>Division</th><th class="num">Revenue</th><th class="num">Material COGS</th><th class="num">Labor COGS</th><th class="num">AP COGS</th><th class="num">Total COGS</th><th class="num">Gross Profit</th><th class="num">GP %</th></tr></thead><tbody>'+
    bodyRows+
    '<tr class="total"><td>'+(_div==='all'?'All Divisions':esc(_div))+'</td><td class="num">'+money(tot.rev)+'</td><td class="num">'+money(tot.mat)+'</td><td class="num">'+money(tot.lab)+'</td><td class="num">'+money(tot.ap)+'</td><td class="num">'+money(tcogs)+'</td><td class="num">'+money(tgp)+'</td><td class="num">'+(tot.rev?tgm.toFixed(1)+'%':'—')+'</td></tr>'+
    '</tbody></table>';

  // top consumed material lines
  if(window.TermacCOGS){
    var det=window.TermacCOGS.detail(start,end);
    var lines=det.lines.filter(function(l){ return divMatch(l.division); }).sort(function(a,b){ return b.cost-a.cost; }).slice(0,12);
    if(lines.length){
      h+='<div class="sec-hdr">Top Material Consumed</div><table class="tbl"><thead><tr><th>Item</th><th>Division</th><th class="num">Qty</th><th class="num">Unit Cost</th><th class="num">Cost</th></tr></thead><tbody>';
      lines.forEach(function(l){ h+='<tr><td>'+esc(l.name)+'</td><td><span class="divtag" style="background:'+DIV_COLOR[l.division]+'">'+esc(l.division)+'</span></td><td class="num">'+l.qty+'</td><td class="num">'+money(l.unitCost)+'</td><td class="num">'+money(l.cost)+'</td></tr>'; });
      h+='</tbody></table>';
    }
  }
  h+='<div class="muted" style="text-align:left;padding:10px 2px">Gross margin here is revenue minus material, direct labor, and cost-of-goods bills. It does not subtract overhead; the full income statement with operating expenses lives in the management dashboard P&L report. Labor cost reflects jobs where on-site time was captured, and gets more exact as HR fills in each tech\'s rate. Quality III material books under the shared UniPro warehouse.</div>';
  document.getElementById('tab-margin').innerHTML=h;
}

/* ---------- AI advisor ---------- */
function renderAI(){
  document.getElementById('tab-ai').innerHTML=
    '<div class="sec-hdr">AI Controller Advisor</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<button class="btn btn-red" onclick="aiCollections()">Build Today\'s Collections Call List</button>'+
    '<button class="btn btn-blue" onclick="aiCash()">Cash-Cycle Read</button></div>'+
    '<div class="ai-box" id="aiOut">Pick an action above. The advisor reads the same live AR, AP, and aging this page shows for the current division filter.</div>';
}
function arSummaryForAI(){
  var ar=loadAR().filter(function(i){ return divMatch(i.division); });
  var open=ar.filter(function(i){return !fullyPaid(i);});
  var lines=open.map(function(i){ var st=ageStatus(i); return i.account+' ('+i.division+'): '+money(openBal(i))+', '+st.days+'d, '+st.label; });
  var apOpen=loadAP().filter(function(b){return b.status!=='paid'&&divMatch(normDiv(b.division));}).reduce(function(s,b){return s+(Number(b.amount)||0);},0);
  return { count:open.length, total:open.reduce(function(s,i){return s+openBal(i);},0), apOpen:apOpen, lines:lines.slice(0,40) };
}
async function callAI(prompt){
  var out=document.getElementById('aiOut'); out.textContent='Thinking...';
  try{
    var res=await fetch('https://unipro-ai-proxy.tedscholl.workers.dev',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:900, messages:[{role:'user',content:[{type:'text',text:prompt}]}] }) });
    var data=await res.json();
    var text=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
    out.textContent=text||'No response. Try again.';
  }catch(e){ out.textContent='Could not reach the advisor. Check the AI proxy connection and try again.'; }
}
function aiCollections(){
  var s=arSummaryForAI();
  if(!s.count){ document.getElementById('aiOut').textContent='No open invoices in this view. Nothing to chase.'; return; }
  var prompt='You are the AR collections lead for Termac Family of Companies, a multi-division fire-protection and commercial-kitchen services company. Below are the open invoices for the current view ('+(_div==='all'?'all divisions':_div)+'). Open count '+s.count+', total '+money(s.total)+', open AP '+money(s.apOpen)+'.\n\nInvoices:\n'+s.lines.join('\n')+'\n\nGive me today\'s call list: rank the accounts to chase first by age and dollars, group by division, and for the worst three give a two-line phone script that stays firm but keeps the account. Plain text, no markdown symbols, no em dashes.';
  callAI(prompt);
}
function aiCash(){
  var s=arSummaryForAI();
  var prompt='You are a financial operations advisor for Termac Family of Companies. Current view: '+(_div==='all'?'all divisions':_div)+'. Open AR '+money(s.total)+' across '+s.count+' invoices, open AP '+money(s.apOpen)+'. Give a short read on the cash-to-cash position and exactly four concrete moves to compress the cash cycle this week: one collections move, one payment-terms move, one deposit or progress-billing idea for large jobs, and one approach for chronic slow-pay institutional accounts. Plain text, no markdown symbols, no em dashes.';
  callAI(prompt);
}

/* ---------- boot ---------- */
renderDivBar(); renderStats(); renderTab();

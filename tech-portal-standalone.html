<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Termac One — Tech Portal</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-main-32.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;
  --red:#C8102E;--yellow:#F2B705;--green:#1E7B3C;--blue:#1B5FA8;--orange:#D8690B;
  --purple:#7C3AED;--gray:#6B7280;--radius:10px;
  --shadow:0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
button{cursor:pointer}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;outline:none;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}

/* ── TOP NAV ── */
.topnav{background:#1A1D21;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:64px;gap:10px}
.topnav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topnav-brand img{height:44px;width:44px;object-fit:contain;border-radius:8px}
.topnav-brand-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705;white-space:nowrap}
.topnav-links{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.topnav-link{display:inline-flex;align-items:center;gap:5px;color:#BFC4CA;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:7px 12px;border-radius:7px;cursor:pointer;border:none;background:none;transition:background .12s,color .12s;white-space:nowrap}
.topnav-link:hover{background:#2A2E33;color:#fff}
.topnav-link.active{background:var(--red);color:#fff}
.topnav-link.green-btn{background:var(--green);color:#fff}
.topnav-link.green-btn:hover{background:#155D2E}
.topnav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topnav-user{display:flex;align-items:center;gap:7px;background:#2A2E33;border-radius:8px;padding:5px 10px}
.topnav-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.topnav-username{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.topnav-signout{background:none;border:1.5px solid rgba(255,255,255,.2);border-radius:6px;color:#BFC4CA;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;padding:4px 8px;cursor:pointer}
.topnav-signout:hover{background:#3A3E45;color:#fff}

/* ── LOGIN ── */
.tech-login{position:fixed;inset:0;background:#1A1D21;display:flex;align-items:center;justify-content:center;z-index:500}
.tech-login-card{background:#22272E;border-radius:14px;padding:32px 36px;width:100%;max-width:380px;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.tech-login-logo{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.tech-login-logo img{height:44px;width:44px;border-radius:8px}
.tech-login-logo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705}
.tech-login-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:22px}
.tech-login-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.tech-login-sel,.tech-login-pin{width:100%;padding:10px 12px;background:#2A2E33;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;margin-bottom:12px}
.tech-login-pin{letter-spacing:.2em;text-align:center}
.tech-login-pin::placeholder{letter-spacing:normal;color:rgba(255,255,255,.25)}
.tech-login-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.tech-login-btn:hover{background:#A50D22}
.tech-login-err{color:#FCA5A5;font-size:12px;margin-top:8px;text-align:center;display:none}

/* ── MAIN LAYOUT ── */
.tech-main{display:none;flex-direction:column;min-height:100vh}
.tech-body{padding:16px;max-width:1300px;width:100%;margin:0 auto}

/* ── HERO CARD ── */
.hero-card{background:linear-gradient(135deg,#1A1D21 60%,#2A1F38);border-radius:14px;padding:20px 24px;margin-bottom:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;border:1px solid rgba(255,255,255,.06)}
.hero-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#fff;flex-shrink:0}
.hero-info{flex:1;min-width:160px}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#fff;letter-spacing:.04em}
.hero-role{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.hero-tier-pill{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:99px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#fff}
.hero-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase}
.hero-score{margin-left:auto;text-align:right;flex-shrink:0}
.hero-score-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:48px;color:var(--purple);line-height:1}
.hero-score-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-top:3px solid var(--line)}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;color:var(--ink)}
.kpi-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.kpi-target{font-size:10px;color:var(--soft);margin-top:3px}

/* ── SECTION CARD ── */
.sec-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── AI CAMERA ── */
.camera-zone{border:2px dashed var(--blue);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:background .15s;background:#EFF6FF}
.camera-zone:hover{background:#DBEAFE}
.camera-zone-icon{font-size:40px;margin-bottom:8px}
.camera-zone-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--blue);margin-bottom:4px}
.camera-zone-sub{font-size:12px;color:var(--soft)}
#cameraFile{display:none}
.camera-preview{margin-top:14px;display:none}
.camera-preview img{max-width:100%;max-height:220px;border-radius:8px;border:2px solid var(--blue)}
.camera-thinking{display:none;text-align:center;padding:16px;color:var(--orange)}
.camera-result{display:none;background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:10px;padding:16px;margin-top:12px}
.camera-result-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--green);margin-bottom:8px}
.camera-result-body{font-size:13px;color:var(--ink);line-height:1.6}
.camera-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* ── TEAMS HUB ── */
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.teams-contact{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F9FAFB;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.teams-contact:hover{border-color:var(--blue);background:#EFF6FF}
.teams-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.teams-name{font-weight:700;font-size:13px;color:var(--ink)}
.teams-role{font-size:11px;color:var(--soft)}
.teams-actions{display:flex;gap:5px;margin-left:auto}
.teams-btn{padding:5px 10px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap}
.teams-btn-chat{background:#5059C9;color:#fff}
.teams-btn-call{background:var(--green);color:#fff}
.teams-group-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:#5059C9;color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.04em;margin-top:10px}
.teams-group-btn:hover{background:#3D4DBF}

/* ── REFERRAL ── */
.referral-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.referral-hdr{background:var(--ink);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.referral-hdr-left{display:flex;align-items:center;gap:10px}
.referral-hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:.4px}
.referral-hdr-qtr{font-size:11px;color:#AEB6BF;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.referral-status-pill{padding:4px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.4px;text-transform:uppercase}
.referral-status-pill.active{background:#1A7A4A;color:#fff}
.referral-status-pill.paused{background:#C0392B;color:#fff}
.referral-body{padding:18px}
.referral-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.referral-metric{background:var(--bg);border-radius:8px;padding:12px 14px;text-align:center}
.referral-metric-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;color:var(--ink)}
.referral-metric-val.green{color:#1A7A4A}
.referral-metric-val.amber{color:#E67E22}
.referral-metric-sub{font-size:11px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.referral-sat-bar{background:var(--bg);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.referral-bar-track{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.referral-bar-fill{height:100%;border-radius:4px}
.referral-bar-fill.green{background:#1A7A4A}
.referral-bar-fill.amber{background:#E67E22}
.referral-bar-fill.red{background:#C0392B}
.referral-cta{background:var(--ink);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.referral-cta-text{font-size:12px;color:#AEB6BF;line-height:1.4}
.referral-cta-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
.referral-cta-btn:hover{background:#A50D22}
.referral-paused-banner{background:#FDEDEC;border:1.5px solid #C0392B;border-radius:8px;padding:11px 14px;font-size:13px;color:#C0392B;font-weight:600;margin-bottom:14px}
.referral-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.referral-breakdown-item{background:var(--bg);border-radius:8px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.referral-breakdown-label{font-size:12px;color:var(--soft);font-weight:600}
.referral-breakdown-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ink)}
.referral-breakdown-val.money{color:#1A7A4A}
.referral-breakdown-val.amber{color:#E67E22}
.referral-history-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
.referral-history-biz{font-weight:700;font-size:13px;color:var(--ink)}
.referral-history-div{font-size:11px;color:var(--soft)}
.referral-history-status{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif}
.referral-history-status.converted{background:#DCFCE7;color:#15803d}
.referral-history-status.pending{background:#FEF3C7;color:#92400e}
.referral-history-bonus{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:#1A7A4A}

/* ── LEAD MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;color:var(--ink)}
.modal-close{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
.form-btn{padding:9px 18px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer}
.form-btn-red{background:var(--red);color:#fff}
.form-btn-red:hover{background:#A50D22}
.form-btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.submit-result{display:none;margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600}
.submit-result.ok{background:#DCFCE7;color:#15803d;border:1px solid #86EFAC}
.submit-result.err{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5}

/* ── DIV CHIPS ── */
.div-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.div-chip{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;user-select:none;transition:all .12s}
.div-chip:hover{filter:brightness(.92)}

/* ── TOAST ── */
#techToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

@media(max-width:600px){
  .hero-card{flex-wrap:wrap}
  .hero-score{margin-left:0;text-align:left}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .referral-metrics{grid-template-columns:repeat(2,1fr)}
  .teams-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .form-full{grid-column:1}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="tech-login" id="techLogin">
  <div class="tech-login-card">
    <div class="tech-login-logo">
      <img src="termac-one-logo.png" alt="T1">
      <span class="tech-login-logo-txt">Termac One</span>
    </div>
    <div class="tech-login-sub">Tech Portal — Field Access</div>
    <label class="tech-login-label">Select Your Name</label>
    <select class="tech-login-sel" id="techLoginName">
      <option value="">— Select name —</option>
      <option value="t1">Marcus Williams</option>
      <option value="t2">Dana Kowalski</option>
      <option value="t3">Ray Santos</option>
      <option value="t4">Tony Ferraro</option>
      <option value="t5">Chris Dolan</option>
      <option value="t6">Jerome Baker</option>
      <option value="t7">Chris Carzo</option>
      <option value="t8">Brad Fickes</option>
      <option value="t9">Dan Rini</option>
      <option value="t10">Joe McDonnell</option>
      <option value="t11">Matt Belz</option>
      <option value="t12">Todd Grill</option>
      <option value="t13">Tom Jordan</option>
      <option value="t14">TJ O'Reilly</option>
      <option value="t15">Aine Curran</option>
      <option value="t16">Samuel Holmes</option>
      <option value="t17">Jasmine Paez</option>
    </select>
    <label class="tech-login-label">PIN</label>
    <input class="tech-login-pin" id="techLoginPin" type="password" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')techLogin()">
    <button class="tech-login-btn" onclick="techLogin()">Sign In →</button>
    <div class="tech-login-err" id="techLoginErr">Incorrect PIN — try again</div>
  </div>
</div>

<!-- TOP NAV -->
<nav class="topnav" id="techNav" style="display:none">
  <div class="topnav-inner">
    <div class="topnav-brand">
      <img src="termac-one-logo.png" alt="Termac One">
      <span class="topnav-brand-txt">Termac One</span>
    </div>
    <div class="topnav-links">
      <button class="topnav-link active" id="tnDash"    onclick="techNav('dashboard')">📋 My Day</button>
      <button class="topnav-link"        id="tnCamera"  onclick="techNav('camera')">📷 AI Camera</button>
      <button class="topnav-link"        id="tnTeams"   onclick="techNav('teams')">💬 Messages</button>
      <button class="topnav-link"        id="tnReferral" onclick="techNav('referral')">💸 Referrals</button>
      <button class="topnav-link" id="tnForms" onclick="window.open('compliance-forms.html?form=nfpa10','_blank')">📋 NFPA Forms</button>
      <button class="topnav-link" id="tnEmployee" onclick="techNav('employee')">👤 Employee Portal</button>
      <button class="topnav-link green-btn" onclick="openLeadModal()">+ Submit Lead</button>
    </div>
    <div class="topnav-right">
      <div class="topnav-user">
        <div class="topnav-avatar" id="techAvatar" style="background:#7C3AED">MW</div>
        <span class="topnav-username" id="techUsername">Tech</span>
      </div>
      <button class="topnav-signout" onclick="techLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="tech-main" id="techMain">
  <div class="tech-body" id="techBody"></div>
</div>

<!-- LEAD MODAL -->
<div class="modal-bg" id="leadModal">
  <div class="modal">
    <div class="modal-title">
      <span>📋 Submit a Lead / Referral</span>
      <button class="modal-close" onclick="closeLeadModal()">✕</button>
    </div>
    <!-- AI Camera in modal -->
    <div style="margin-bottom:16px;background:#EFF6FF;border:1.5px dashed var(--blue);border-radius:10px;padding:14px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:8px">📷 Scan a Tag or Snap a Photo to Auto-Fill</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <label style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--blue);color:#fff;border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:0">
          📷 Take Photo <input type="file" id="modalCamCapture" accept="image/*" capture="environment" style="display:none" onchange="modalAnalyzePhoto(this)">
        </label>
        <label style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;color:var(--blue);border:1.5px solid var(--blue);border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:0">
          🖼️ Upload <input type="file" id="modalCamUpload" accept="image/*" style="display:none" onchange="modalAnalyzePhoto(this)">
        </label>
      </div>
      <div id="modalCamPreview" style="margin-top:10px;display:none"><img style="max-width:100%;max-height:140px;border-radius:7px;border:2px solid var(--blue)"></div>
      <div id="modalCamStatus" style="display:none;margin-top:8px;font-size:12px;color:var(--orange);font-weight:600">🤖 Analyzing photo…</div>
    </div>
    <div class="form-grid">
      <div class="form-full">
        <label>Business Name *</label>
        <input id="lead_biz" placeholder="Restaurant, facility, building…">
      </div>

let _cameraB64 = null;
let _cameraContext = '';

async function cameraAnalyze(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    _cameraB64 = e.target.result.split(',')[1];
    const prev = document.getElementById('camPreview');
    const img  = document.getElementById('camPreviewImg');
    prev.style.display='';
    img.src = e.target.result;

    document.getElementById('camResult').style.display='none';
    document.getElementById('camThinking').style.display='';

    const prompt = `You are a Termac field assistant helping a service technician in the field. 
Analyze this image and provide:
1. What you see (equipment, tag, condition, situation)
2. Relevant observations (service date, expiry, violations, deficiencies)
3. Recommended action (service needed, referral opportunity, immediate concern)
4. Whether this is a cross-sell/referral opportunity for any Termac service (UniPro fire suppression, GTO grease trap, Filter Man hood filter exchange, ALLPro stainless fab, Termac dish machines/chemicals)

Keep your response concise and field-practical. Use clear sections.`;

    try{
      const res = await fetch(AI_PROXY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6', max_tokens:600,
          messages:[{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:file.type||'image/jpeg', data:_cameraB64}},
            {type:'text', text:prompt}
          ]}]
        })
      });
      const data = await res.json();
      const text = data.content?.map(c=>c.text||'').join('') || 'No response received.';
      _cameraContext = text;
      document.getElementById('camResultBody').innerHTML = text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^(\d+\.|#+)\s/gm,'');
      document.getElementById('camResultTitle').textContent = '🤖 AI Analysis';
      document.getElementById('camResult').style.display='';
    } catch(err){
      document.getElementById('camResultBody').innerHTML = '<span style="color:var(--red)">Could not reach AI — check signal and try again.</span>';
      document.getElementById('camResult').style.display='';
    }
    document.getElementById('camThinking').style.display='none';
  };
  reader.readAsDataURL(file);
}

async function modalAnalyzePhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const prev = document.getElementById('modalCamPreview');
    prev.style.display='';
    prev.querySelector('img').src = e.target.result;
    const b64 = e.target.result.split(',')[1];
    const status = document.getElementById('modalCamStatus');
    status.style.display='';
    status.textContent='🤖 Reading tag / image…';
    try{
      const res = await fetch(AI_PROXY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6', max_tokens:300,
          messages:[{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:file.type||'image/jpeg', data:b64}},
            {type:'text', text:'Extract from this image for a service referral form: business name (if visible), address, service type needed, expiry/renewal date (if on a tag), and any relevant notes. Respond in JSON: {"biz":"","addr":"","service":"","expiry":"","notes":""}. JSON only, no markdown.'}
          ]}]
        })
      });
      const data = await res.json();
      const raw = data.content?.map(c=>c.text||'').join('').replace(/```json?|```/g,'').trim();
      const parsed = JSON.parse(raw);
      if(parsed.biz)  document.getElementById('lead_biz').value=parsed.biz;
      if(parsed.addr) document.getElementById('lead_addr').value=parsed.addr;
      if(parsed.expiry) document.getElementById('lead_expiry').value=parsed.expiry;
      if(parsed.notes) document.getElementById('lead_notes').value=parsed.notes;
      status.textContent='✅ Auto-filled from photo — review and adjust as needed.';
      status.style.color='var(--green)';
    } catch(err){
      status.textContent='Could not read photo — fill in manually.';
      status.style.color='var(--red)';
    }
  };
  reader.readAsDataURL(file);
}

function submitLead(){
  const biz   = document.getElementById('lead_biz').value.trim();
  const addr  = document.getElementById('lead_addr').value.trim();
  const phone = document.getElementById('lead_phone').value.trim();
  const notes = document.getElementById('lead_notes').value.trim();
  const res   = document.getElementById('submitResult');
  if(!biz){res.className='submit-result err';res.textContent='Business name is required.';res.style.display='';return;}
  const lead = {
    id:'TECH'+String(Date.now()).slice(-6),
    name:document.getElementById('lead_contact').value.trim()||biz,
    business:biz, address:addr, phone,
    source:'Tech Referral — '+(_tech?_tech.name:'Field'),
    referredBy:_tech?_tech.name:'',
    services: Array.from(_selectedDivs),
    competitor:document.getElementById('lead_competitor').value.trim(),
    expiry:document.getElementById('lead_expiry').value,
    notes, lifecycleStage:'lead', status:'hot',
    created:Date.now(), updated:Date.now(),
    activityLog:[{ts:Date.now(),icon:'🔧',type:'referral',title:'Tech Referral',note:`Submitted by ${_tech?_tech.name:'tech'} from the field.`,who:_tech?_tech.name:'Tech'}]
  };
  const leads = crmLoad('leads');
  leads.unshift(lead);
  crmSave('leads', leads);
  if(_tech){
    _tech.referrals = _tech.referrals||{submitted:0,converted:0,single:0,bundled:0,bonusEarned:0,satPct:85};
    _tech.referrals.submitted = (_tech.referrals.submitted||0)+1;
  }
  res.className='submit-result ok';
  res.textContent=`✅ Referral submitted for ${biz} — routed to the territory rep.`;
  res.style.display='';
  techToast('Referral submitted!');
  setTimeout(closeLeadModal, 2200);
}

// ── DISPATCH CHECK-IN PROTOCOL ────────────────────────────────────────────
// Pings the Dispatch Status Board every 5 minutes with current status.
// In production: POST to /api/dispatch/checkin — Azure Function endpoint.
(function dispatchCheckin() {
  function ping(status, jobName) {
    try {
      var u = JSON.parse(localStorage.getItem('termac_current_user') || sessionStorage.getItem('termac_current_user') || '{}');
      var techId = u.id || u.email || 'unknown_tech';
      var techName = u.name || 'Unknown Tech';
      // Territory-based rough GPS (demo: randomize within Phila metro on each ping)
      var baseLat = 39.95 + (Math.random() - 0.5) * 0.3;
      var baseLng = -75.10 + (Math.random() - 0.5) * 0.4;
      localStorage.setItem('termac_checkin_' + techId, JSON.stringify({
        techId, techName,
        division: PORTAL_DIVISION || 'Field',
        status: status || 'onsite',
        lat: baseLat, lng: baseLng,
        currentJob: jobName || 'Active route',
        jobsComplete: 0, jobsTotal: 0, revenue: 0,
        lastPing: Date.now(),
      }));
    } catch(e) {}
  }
  // Ping on load and every 5 minutes
  ping('onsite');
  setInterval(function(){ ping('onsite'); }, 300000);
})();

</script>
<script>
// ── WAREHOUSE STATUS CHECK (bidirectional) ────────────────────────────────
function checkWarehouseStatus(jobId, containerEl) {
  if (!containerEl) return;
  var status = typeof TermacLifecycle !== 'undefined'
    ? TermacLifecycle.getWarehouseStatus(jobId)
    : _directWarehouseCheck(jobId);

  var html = '';
  if (status.confirmed) {
    html = '<div style="background:#14532D;border-radius:6px;padding:7px 12px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;color:#86EFAC;letter-spacing:.06em;text-transform:uppercase">'
      + '✅ Warehouse: Items Staged &amp; Ready'
      + (status.notes ? '<div style="font-weight:500;font-size:10px;margin-top:2px;color:#4ADE80">' + status.notes + '</div>' : '')
      + '</div>';
  } else if (status.status === 'pending') {
    html = '<div style="background:#3B1F05;border-radius:6px;padding:7px 12px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;color:#FCD34D;letter-spacing:.06em;text-transform:uppercase">'
      + '⏳ Warehouse: Pull Pending — Check Before Departing'
      + '</div>';
  } else {
    html = '<div style="background:#1E293B;border-radius:6px;padding:7px 12px;font-family:Barlow Condensed,sans-serif;font-weight:500;font-size:11px;color:#64748B">'
      + '📦 No warehouse pull requested for this job'
      + '</div>';
  }
  containerEl.innerHTML = html;
}

function _directWarehouseCheck(jobId) {
  try {
    var wa = JSON.parse(localStorage.getItem('warehouse_alerts') || '[]');
    var a = wa.find(function(x){ return x.jobId === jobId; });
    if (!a) return { status: 'no_pull_request', confirmed: false };
    return { status: a.status || 'pending', confirmed: a.confirmed || false, notes: a.warehouseNotes || null, items: a.items || [] };
  } catch(e) { return { status: 'error', confirmed: false }; }
}

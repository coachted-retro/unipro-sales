<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Termac One — Dispatch Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--gold:#F2B705;--green:#059669;--blue:#1B5FA8;--purple:#6D28D9;--orange:#D97706;--ink:#1A1D21;--bg:#EEF0F2;--panel:#fff;--line:#D8DCE0;--soft:#5A616B;--radius:10px;--shadow:0 1px 4px rgba(26,29,33,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Barlow,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
/* NAV */
.trn{background:#1A1D21;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200;flex-shrink:0}
.trn-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;height:50px;padding:0 16px;gap:0}
.trn-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:16px;cursor:default}
.trn-logo img{height:30px;width:30px;object-fit:contain;border-radius:6px}
.trn-logo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#F2B705}
.trn-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA;padding:0 14px;border-left:1px solid #2A2E33;border-right:1px solid #2A2E33;align-self:stretch;display:flex;align-items:center}
.trn-spacer{flex:1}
.trn-btn{background:none;border:1.5px solid #3A3E43;border-radius:7px;color:#BFC4CA;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.10em;text-transform:uppercase;padding:6px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-left:8px;text-decoration:none;transition:border-color .12s,color .12s}
.trn-btn:hover{border-color:#C8102E;color:#fff}
.trn-btn.primary{background:#C8102E;border-color:#C8102E;color:#fff}
.trn-btn.primary:hover{background:#A30D25}
/* TAB BAR */
.tabbar{background:#1A1D21;border-bottom:1px solid #2A2E33;display:flex;padding:0 16px;gap:2px;flex-shrink:0}
.tab{background:none;border:none;color:#6B7280;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.10em;text-transform:uppercase;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:color .12s;white-space:nowrap}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--red)}
/* LAYOUT */
.page{display:none;flex:1;overflow:hidden}.page.active{display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;padding:20px;max-width:1600px;margin:0 auto;width:100%}
/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-top:3px solid var(--line)}
.kpi.red{border-top-color:var(--red)}.kpi.green{border-top-color:var(--green)}.kpi.blue{border-top-color:var(--blue)}.kpi.gold{border-top-color:var(--gold)}.kpi.orange{border-top-color:var(--orange)}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--soft);letter-spacing:.08em;text-transform:uppercase}
/* SECTION */
.sec{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
.sec-body{padding:0}
/* JOB BOARD */
.job-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:0;min-height:300px}
.job-col{border-right:1px solid var(--line);min-height:300px}
.job-col:last-child{border-right:none}
.job-col-hdr{padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.job-col-hdr .count{background:var(--red);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:800}
.job-col-hdr .count.green{background:var(--green)}
.job-col-hdr .count.blue{background:var(--blue)}
.job-col-hdr .count.gold{background:var(--gold);color:#000}
.job-cards{padding:8px}
.job-card{background:#F8F9FA;border-radius:8px;border:1.5px solid var(--line);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.job-card:hover{border-color:var(--red);box-shadow:0 2px 8px rgba(200,16,46,.12)}
.job-card.urgent{border-left:3px solid var(--red);background:#FFF5F5}
.job-card-biz{font-weight:700;font-size:13px;margin-bottom:2px}
.job-card-meta{font-size:11px;color:var(--soft);line-height:1.4}
.job-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
.tag.red{background:#FEE9EC;color:var(--red)}.tag.blue{background:#EBF2FD;color:var(--blue)}.tag.green{background:#ECFDF5;color:#065F46}.tag.gold{background:#FFFBEB;color:#92400E}
/* TECH BOARD */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:16px}
.tech-card{background:#F8F9FA;border-radius:8px;border:1.5px solid var(--line);padding:12px 14px}
.tech-card.available{border-color:var(--green);background:#F0FDF4}
.tech-card.en-route{border-color:var(--blue);background:#EFF6FF}
.tech-card.on-job{border-color:var(--orange);background:#FFFBEB}
.tech-card.off{border-color:#D1D5DB;background:#F9FAFB;opacity:.7}
.tech-name{font-weight:700;font-size:13px;margin-bottom:2px}
.tech-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tech-status.green{color:var(--green)}.tech-status.blue{color:var(--blue)}.tech-status.orange{color:var(--orange)}.tech-status.gray{color:var(--soft)}
.tech-detail{font-size:11px;color:var(--soft);margin-top:4px;line-height:1.4}
/* EMERGENCY */
.emg-form{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.emg-form label{display:block;font-size:11px;font-weight:700;color:var(--soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.emg-form input,.emg-form select,.emg-form textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif;outline:none;transition:border-color .12s}
.emg-form input:focus,.emg-form select:focus,.emg-form textarea:focus{border-color:var(--red)}
.emg-form .full{grid-column:1/-1}
.btn{padding:9px 18px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .12s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#A30D25}
.btn-ghost{background:#F3F4F6;color:var(--ink);border:1.5px solid var(--line)}.btn-ghost:hover{background:#E5E7EB}
/* TOAST */
#dpToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
/* WO MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:min(560px,95vw);box-shadow:0 12px 48px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--soft)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif;outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--red)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>

<nav class="trn">
  <div class="trn-inner">
    <div class="trn-logo">
      <img src="termac-one-logo.png" alt="T1">
      <span class="trn-logo-txt">Termac One</span>
    </div>
    <div class="trn-title">Dispatcher</div>
    <div class="trn-spacer"></div>
    <span id="dpDateLbl" style="color:#6B7280;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-right:12px"></span>
    <button class="trn-btn primary" onclick="openNewWO()">+ New Work Order</button>
    <button class="trn-btn" style="background:#8B0000;border-color:#8B0000;color:#fff;margin-left:6px" onclick="dpTab('emergency')">🚨 Emergency</button>
    <button class="trn-btn" onclick="sessionStorage.setItem('trnReturnUrl','dispatch-portal.html');window.location.href='employee-portal.html'">🏠 Employee Portal</button>
  </div>
</nav>

<div class="tabbar">
  <button class="tab active" id="tab-board" onclick="dpTab('board')">📋 Job Board</button>
  <button class="tab" id="tab-techs" onclick="dpTab('techs')">👷 Tech Status</button>
  <button class="tab" id="tab-emergency" onclick="dpTab('emergency')">🚨 Emergency Dispatch</button>
  <button class="tab" id="tab-log" onclick="dpTab('log')">📝 Dispatch Log</button>
</div>

<!-- JOB BOARD -->
<div class="page active" id="page-board">
  <div class="content">
    <div class="kpi-row" id="dpKPIs"></div>
    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">📋 Today's Job Board</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="dpDivFilter" onchange="dpRenderBoard()" style="padding:5px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700">
            <option value="">All Divisions</option>
            <option>UniPro</option><option>Quality III</option><option>AllPro</option>
            <option>Filter Man</option><option>GTO</option><option>Termac</option>
          </select>
          <button class="btn btn-red" style="font-size:11px;padding:6px 14px" onclick="openNewWO()">+ Work Order</button>
        </div>
      </div>
      <div class="job-cols" id="dpJobCols"></div>
    </div>
  </div>
</div>

<!-- TECH STATUS -->
<div class="page" id="page-techs">
  <div class="content">
    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">👷 Field Tech Status</span>
        <button class="btn btn-ghost" style="font-size:11px;padding:6px 14px" onclick="dpRenderTechs()">↺ Refresh</button>
      </div>
      <div class="tech-grid" id="dpTechGrid"></div>
    </div>
  </div>
</div>

<!-- EMERGENCY DISPATCH -->
<div class="page" id="page-emergency">
  <div class="content">
    <div class="sec">
      <div class="sec-hdr" style="background:#FEF2F2;border-bottom-color:#FECACA">
        <span class="sec-title" style="color:var(--red)">🚨 Emergency Dispatch</span>
        <span style="font-size:11px;color:var(--red);font-weight:600">URGENT — Immediate response required</span>
      </div>
      <div class="emg-form" id="dpEmgForm">
        <div class="full">
          <label>Emergency Type</label>
          <select id="emgType">
            <option>🔥 Fire / Suppression System Failure</option>
            <option>💧 Sprinkler Activation / Water Damage</option>
            <option>🚨 Alarm Malfunction — False Activation</option>
            <option>🧯 Extinguisher Needed — Active Situation</option>
            <option>🏥 Safety Compliance — Immediate Inspection</option>
            <option>⚠️ Chemical Spill / Hood System Down</option>
            <option>🔧 Equipment Failure — Critical</option>
            <option>📋 Other Emergency</option>
          </select>
        </div>
        <div>
          <label>Account / Business Name</label>
          <input id="emgBiz" placeholder="Business name…">
        </div>
        <div>
          <label>Contact Name</label>
          <input id="emgContact" placeholder="On-site contact…">
        </div>
        <div>
          <label>Phone</label>
          <input id="emgPhone" placeholder="Call-back number…">
        </div>
        <div>
          <label>Address</label>
          <input id="emgAddr" placeholder="Full address…">
        </div>
        <div class="full">
          <label>Situation Details</label>
          <textarea id="emgDetails" rows="3" style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif;resize:vertical" placeholder="Describe the emergency situation…"></textarea>
        </div>
        <div>
          <label>Assign Tech</label>
          <select id="emgTech">
            <option value="">— Select On-Call Tech —</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="emgPriority">
            <option value="critical">🔴 CRITICAL — Respond now</option>
            <option value="high">🟠 HIGH — Within 1 hour</option>
            <option value="medium">🟡 MEDIUM — Within 2 hours</option>
          </select>
        </div>
        <div class="full" style="display:flex;gap:10px;padding-top:8px">
          <button class="btn btn-red" style="flex:1;padding:12px" onclick="dpDispatchEmergency()">🚨 DISPATCH NOW</button>
          <button class="btn btn-ghost" onclick="dpClearEmg()">Clear</button>
        </div>
      </div>
    </div>

    <div class="sec" id="dpEmgLogSec">
      <div class="sec-hdr"><span class="sec-title">Recent Emergency Dispatches</span></div>
      <div style="padding:12px" id="dpEmgLog"></div>
    </div>
  </div>
</div>

<!-- DISPATCH LOG -->
<div class="page" id="page-log">
  <div class="content">
    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">📝 Dispatch Log</span>
        <div style="display:flex;gap:8px">
          <select id="dpLogFilter" onchange="dpRenderLog()" style="padding:5px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:12px">
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="all">All</option>
          </select>
        </div>
      </div>
      <div style="padding:12px" id="dpLogList"></div>
    </div>
  </div>
</div>

<!-- NEW WORK ORDER MODAL -->
<div class="modal-bg" id="woModal">
  <div class="modal">
    <div class="modal-title">
      New Work Order
      <button class="modal-close" onclick="closeWO()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Business / Account</label>
        <input id="wo_biz" placeholder="Business name…">
      </div>
      <div class="form-row">
        <label>Contact</label>
        <input id="wo_contact" placeholder="Contact name…">
      </div>
      <div class="form-row">
        <label>Phone</label>
        <input id="wo_phone" placeholder="Phone…">
      </div>
      <div class="form-row">
        <label>Address</label>
        <input id="wo_addr" placeholder="Address…">
      </div>
      <div class="form-row">
        <label>Service Type</label>
        <select id="wo_service">
          <option>Fire Inspection</option><option>Hood Suppression</option>
          <option>Extinguisher Service</option><option>Sprinkler Inspection</option>
          <option>Fire Alarm</option><option>Grease Trap</option>
          <option>Hood Filter Exchange</option><option>Dish Machine</option>
          <option>Chemical Delivery</option><option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Division</label>
        <select id="wo_div">
          <option>UniPro</option><option>Quality III</option><option>AllPro</option>
          <option>Filter Man</option><option>GTO</option><option>Termac</option>
        </select>
      </div>
      <div class="form-row">
        <label>Assign Tech</label>
        <select id="wo_tech"></select>
      </div>
      <div class="form-row">
        <label>Date</label>
        <input id="wo_date" type="date">
      </div>
      <div class="form-row">
        <label>Time</label>
        <input id="wo_time" type="time" value="09:00">
      </div>
      <div class="form-row">
        <label>Est. Duration (hrs)</label>
        <input id="wo_duration" type="number" min="0.5" max="12" step="0.5" value="2">
      </div>
    </div>
    <div class="form-row" style="margin-top:4px">
      <label>Notes</label>
      <textarea id="wo_notes" rows="2" style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif;resize:vertical" placeholder="Special instructions, access notes…"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-red" style="flex:1" onclick="dpSaveWO()">Create Work Order</button>
      <button class="btn btn-ghost" onclick="closeWO()">Cancel</button>
    </div>
  </div>
</div>

<div id="dpToast"></div>

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function dpToast(msg){
  const t=document.getElementById('dpToast');
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2800);
}

// ── TABS ──
function dpTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='board') dpRenderBoard();
  if(name==='techs') dpRenderTechs();
  if(name==='log') dpRenderLog();
  if(name==='emergency'){ dpRenderEmgLog(); dpPopulateTechDropdowns(); }
}

// ── KPIs ──
function dpRenderKPIs(jobs){
  const total=jobs.length, sched=jobs.filter(j=>j.status==='scheduled').length,
        inprog=jobs.filter(j=>['in-progress','en-route'].includes(j.status)).length,
        done=jobs.filter(j=>j.status==='complete').length,
        urgent=jobs.filter(j=>j.urgent).length,
        avail=TECHS.filter(t=>t.status==='available').length;
  document.getElementById('dpKPIs').innerHTML=`
    <div class="kpi blue"><div class="kpi-val">${total}</div><div class="kpi-lbl">Total Jobs Today</div></div>
    <div class="kpi gold"><div class="kpi-val">${sched}</div><div class="kpi-lbl">Scheduled</div></div>
    <div class="kpi orange"><div class="kpi-val">${inprog}</div><div class="kpi-lbl">In Progress</div></div>
    <div class="kpi green"><div class="kpi-val">${done}</div><div class="kpi-lbl">Completed</div></div>
    <div class="kpi red"><div class="kpi-val">${urgent}</div><div class="kpi-lbl">Urgent</div></div>
    <div class="kpi green"><div class="kpi-val">${avail}</div><div class="kpi-lbl">Techs Available</div></div>`;
}

// ── JOB BOARD ──
function dpRenderBoard(){
  const div = document.getElementById('dpDivFilter').value;
  let jobs = dpLoadJobs();
  if(div) jobs = jobs.filter(j=>j.div===div);
  dpRenderKPIs(jobs);

  const cols = {
    scheduled: jobs.filter(j=>j.status==='scheduled'),
    'en-route': jobs.filter(j=>j.status==='en-route'),
    'in-progress': jobs.filter(j=>j.status==='in-progress'),
    complete: jobs.filter(j=>j.status==='complete'),
  };

  function card(j){
    return `<div class="job-card${j.urgent?' urgent':''}" onclick="dpOpenJob('${j.id}')">
      <div class="job-card-biz">${j.urgent?'🔴 ':''} ${escH(j.biz)}</div>
      <div class="job-card-meta">${escH(j.time)} · ${escH(j.duration)}h · ${escH(j.tech||'Unassigned')}</div>
      <div class="job-card-meta">${escH(j.addr||'')}</div>
      <div class="job-card-tags">
        <span class="tag blue">${escH(j.service)}</span>
        <span class="tag ${j.div==='GTO'?'gold':j.div==='Filter Man'?'green':'red'}">${escH(j.div)}</span>
      </div>
    </div>`;
  }

  const colDefs = [
    {key:'scheduled', label:'Scheduled', cls:''},
    {key:'en-route', label:'En Route', cls:'blue'},
    {key:'in-progress', label:'In Progress', cls:'gold'},
    {key:'complete', label:'Complete', cls:'green'},
  ];

  document.getElementById('dpJobCols').innerHTML = colDefs.map(c=>`
    <div class="job-col">
      <div class="job-col-hdr">${c.label} <span class="count ${c.cls}">${cols[c.key].length}</span></div>
      <div class="job-cards">${cols[c.key].map(card).join('')||'<div style="color:var(--soft);font-size:12px;padding:8px 0">No jobs</div>'}</div>
    </div>`).join('');
}

function dpOpenJob(id){
  const jobs = dpLoadJobs();
  const j = jobs.find(x=>x.id===id);
  if(!j) return;
  const statuses = ['scheduled','en-route','in-progress','complete','cancelled'];
  const newStatus = prompt(`Update status for ${j.biz}:\n\nCurrent: ${j.status}\n\nEnter new status:\n• scheduled\n• en-route\n• in-progress\n• complete\n• cancelled`, j.status);
  if(!newStatus || !statuses.includes(newStatus.trim().toLowerCase())) return;
  j.status = newStatus.trim().toLowerCase();
  localStorage.setItem('unipro_jobs', JSON.stringify(jobs));
  dpRenderBoard();
  dpToast('✅ Job updated: '+j.biz);
}

// ── TECH STATUS ──
function dpRenderTechs(){
  const statusMap = {available:{cls:'available',lbl:'Available',color:'green'},
    'en-route':{cls:'en-route',lbl:'En Route',color:'blue'},
    'on-job':{cls:'on-job',lbl:'On Job',color:'orange'},
    off:{cls:'off',lbl:'Off Duty',color:'gray'}};
  document.getElementById('dpTechGrid').innerHTML = TECHS.map(t=>{
    const s = statusMap[t.status]||statusMap.off;
    return `<div class="tech-card ${s.cls}">
      <div class="tech-name">${escH(t.name)}</div>
      <div class="tech-status ${s.color}">${s.lbl}</div>
      <div class="tech-detail">
        ${t.div} · <a href="tel:${t.phone}" style="color:var(--blue)">${t.phone}</a>
        ${t.currentJob?`<br>📍 ${escH(t.currentJob)}${t.eta?' · ETA '+t.eta:''}`:'' }
      </div>
      ${t.status==='available'?`<button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:10px;padding:5px" onclick="dpAssignTech('${t.id}')">Assign to Job</button>`:''}
    </div>`;
  }).join('');
}

function dpAssignTech(techId){
  const tech = TECHS.find(t=>t.id===techId);
  if(!tech) return;
  const jobs = dpLoadJobs().filter(j=>j.status==='scheduled' && (!j.tech||j.tech==='Unassigned'));
  if(!jobs.length){ dpToast('No unassigned jobs available'); return; }
  const list = jobs.map((j,i)=>`${i+1}. ${j.biz} — ${j.service} @ ${j.time}`).join('\n');
  const choice = prompt(`Assign ${tech.name} to which job?\n\n${list}\n\nEnter number:`);
  const idx = parseInt(choice)-1;
  if(isNaN(idx)||idx<0||idx>=jobs.length) return;
  const allJobs = dpLoadJobs();
  const job = allJobs.find(j=>j.id===jobs[idx].id);
  if(job){ job.tech=tech.name; job.status='en-route'; }
  localStorage.setItem('unipro_jobs', JSON.stringify(allJobs));
  tech.status='en-route'; tech.currentJob=jobs[idx].biz;
  dpToast(`✅ ${tech.name} assigned to ${jobs[idx].biz}`);
  dpRenderTechs();
}

// ── EMERGENCY ──
function dpPopulateTechDropdowns(){
  const avail = TECHS.filter(t=>t.status==='available'||t.status==='en-route');
  const opts = ['<option value="">— Select On-Call Tech —</option>',
    ...avail.map(t=>`<option value="${t.id}">${t.name} (${t.div}) — ${t.status==='available'?'✅ Available':'🔵 En Route'}</option>`)].join('');
  const sel = document.getElementById('emgTech');
  if(sel) sel.innerHTML = opts;
  const woSel = document.getElementById('wo_tech');
  if(woSel) woSel.innerHTML = ['<option value="">Unassigned</option>',...TECHS.map(t=>`<option>${t.name} (${t.div})</option>`)].join('');
}

function dpDispatchEmergency(){
  const biz=document.getElementById('emgBiz').value.trim();
  const type=document.getElementById('emgType').value;
  const contact=document.getElementById('emgContact').value.trim();
  const phone=document.getElementById('emgPhone').value.trim();
  const addr=document.getElementById('emgAddr').value.trim();
  const details=document.getElementById('emgDetails').value.trim();
  const techId=document.getElementById('emgTech').value;
  const priority=document.getElementById('emgPriority').value;
  if(!biz||!addr){ dpToast('⚠️ Business and address required'); return; }
  const tech = TECHS.find(t=>t.id===techId);
  const log = JSON.parse(localStorage.getItem('dp_emg_log')||'[]');
  log.unshift({id:'emg_'+Date.now(),ts:Date.now(),type,biz,contact,phone,addr,details,tech:tech?.name||'Unassigned',priority});
  localStorage.setItem('dp_emg_log', JSON.stringify(log));
  // Create job
  const jobs = dpLoadJobs();
  jobs.unshift({id:'emg_j_'+Date.now(),biz,addr,contact,phone,service:'Emergency Dispatch',div:'UniPro',tech:tech?.name||'Unassigned',date:new Date().toISOString().split('T')[0],time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}),duration:2,status:'en-route',notes:type+(details?'\n'+details:''),urgent:true});
  localStorage.setItem('unipro_jobs', JSON.stringify(jobs));
  dpToast(`🚨 Emergency dispatched${tech?' — '+tech.name+' notified':''}!`);
  dpClearEmg();
  dpRenderEmgLog();
}

function dpClearEmg(){
  ['emgBiz','emgContact','emgPhone','emgAddr','emgDetails'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
}

function dpRenderEmgLog(){
  const log = JSON.parse(localStorage.getItem('dp_emg_log')||'[]');
  const el = document.getElementById('dpEmgLog');
  if(!el) return;
  if(!log.length){ el.innerHTML='<div style="color:var(--soft);font-size:13px;text-align:center;padding:20px">No emergency dispatches on record</div>'; return; }
  el.innerHTML = log.slice(0,10).map(e=>`
    <div style="border:1.5px solid #FECACA;background:#FFF5F5;border-radius:8px;padding:12px 14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-weight:700;color:var(--red);font-size:13px">${escH(e.type)}</div>
        <div style="font-size:11px;color:var(--soft)">${new Date(e.ts).toLocaleString()}</div>
      </div>
      <div style="font-weight:700;font-size:13px">${escH(e.biz)}</div>
      <div style="font-size:12px;color:var(--soft)">${escH(e.addr)}${e.contact?' · '+e.contact:''}</div>
      <div style="font-size:12px;margin-top:4px">Tech: <strong>${escH(e.tech)}</strong> · Priority: <strong style="color:var(--red)">${e.priority?.toUpperCase()}</strong></div>
      ${e.details?`<div style="font-size:12px;color:var(--soft);margin-top:4px;font-style:italic">${escH(e.details)}</div>`:''}
    </div>`).join('');
}

// ── DISPATCH LOG ──
function dpRenderLog(){
  const jobs = dpLoadJobs();
  const filter = document.getElementById('dpLogFilter')?.value||'today';
  const today = new Date().toISOString().split('T')[0];
  const week = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const filtered = jobs.filter(j=> filter==='all' ? true : filter==='week' ? j.date>=week : j.date===today);
  const el = document.getElementById('dpLogList');
  if(!filtered.length){ el.innerHTML='<div style="color:var(--soft);font-size:13px;text-align:center;padding:20px">No jobs for this period</div>'; return; }
  const statusColor={scheduled:'#1B5FA8','en-route':'#1B5FA8','in-progress':'#D97706',complete:'#059669',cancelled:'#6B7280'};
  el.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="border-bottom:2px solid var(--line)">${['Time','Business','Service','Tech','Status','Div'].map(h=>`<th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)">${h}</th>`).join('')}</tr></thead>
    <tbody>${filtered.sort((a,b)=>a.time>b.time?1:-1).map(j=>`<tr style="border-bottom:1px solid var(--line)">
      <td style="padding:8px 10px;white-space:nowrap">${escH(j.time)}</td>
      <td style="padding:8px 10px;font-weight:600">${j.urgent?'🔴 ':''} ${escH(j.biz)}</td>
      <td style="padding:8px 10px">${escH(j.service)}</td>
      <td style="padding:8px 10px">${escH(j.tech||'Unassigned')}</td>
      <td style="padding:8px 10px"><span style="color:${statusColor[j.status]||'#6B7280'};font-weight:700;font-size:11px;text-transform:uppercase">${j.status}</span></td>
      <td style="padding:8px 10px">${escH(j.div)}</td>
    </tr>`).join('')}</tbody></table>`;
}

// ── WORK ORDER MODAL ──
function openNewWO(){
  dpPopulateTechDropdowns();
  document.getElementById('wo_date').value = new Date().toISOString().split('T')[0];
  document.getElementById('woModal').classList.add('open');
}
function closeWO(){ document.getElementById('woModal').classList.remove('open'); }
function dpSaveWO(){
  const biz=document.getElementById('wo_biz').value.trim();
  const addr=document.getElementById('wo_addr').value.trim();
  if(!biz){ dpToast('⚠️ Business name required'); return; }
  const jobs=dpLoadJobs();
  jobs.push({
    id:'wo_'+Date.now(),
    biz, addr,
    contact:document.getElementById('wo_contact').value,
    phone:document.getElementById('wo_phone').value,
    service:document.getElementById('wo_service').value,
    div:document.getElementById('wo_div').value,
    tech:document.getElementById('wo_tech').value.split(' (')[0]||'Unassigned',
    date:document.getElementById('wo_date').value,
    time:document.getElementById('wo_time').value,
    duration:parseFloat(document.getElementById('wo_duration').value)||2,
    notes:document.getElementById('wo_notes').value,
    status:'scheduled', urgent:false
  });
  localStorage.setItem('unipro_jobs',JSON.stringify(jobs));
  closeWO();
  dpRenderBoard();
  dpToast('✅ Work order created');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('dpDateLbl').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  dpRenderBoard();
  dpPopulateTechDropdowns();
});

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeWO(); });
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Termac One — Dispatch Dashboard</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--gold:#F2B705;--green:#059669;--blue:#1B5FA8;--orange:#D97706;--purple:#6D28D9;--ink:#1A1D21;--bg:#EEF0F2;--panel:#fff;--line:#D8DCE0;--soft:#5A616B;--radius:10px;--shadow:0 1px 4px rgba(26,29,33,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Barlow,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
.trn{background:#1A1D21;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200}
.trn-inner{display:flex;align-items:center;height:50px;padding:0 16px;gap:0}
.trn-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:16px}
.trn-logo img{height:30px;width:30px;object-fit:contain;border-radius:6px}
.trn-logo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#F2B705}
.trn-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA;padding:0 14px;border-left:1px solid #2A2E33;border-right:1px solid #2A2E33;align-self:stretch;display:flex;align-items:center}
.trn-spacer{flex:1}
.trn-btn{background:none;border:1.5px solid #3A3E43;border-radius:7px;color:#BFC4CA;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.10em;text-transform:uppercase;padding:6px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-left:8px;text-decoration:none;transition:border-color .12s,color .12s}
.trn-btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.trn-btn.emg{background:#7F1D1D;border-color:#EF4444;color:#FCA5A5}
.tabbar{background:#1A1D21;border-bottom:1px solid #2A2E33;display:flex;padding:0 16px;gap:2px}
.tab{background:none;border:none;color:#6B7280;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.10em;text-transform:uppercase;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--red)}
.page{display:none;flex:1;overflow-y:auto}.page.active{display:block}
.content{padding:20px;max-width:1400px;margin:0 auto}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-top:3px solid var(--line)}
.kpi.red{border-top-color:var(--red)}.kpi.green{border-top-color:var(--green)}.kpi.blue{border-top-color:var(--blue)}.kpi.gold{border-top-color:var(--gold)}.kpi.orange{border-top-color:var(--orange)}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--soft);letter-spacing:.08em;text-transform:uppercase}
/* Sections */
.sec{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
/* Job Board */
.board{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line)}
.col{border-right:1px solid var(--line)}.col:last-child{border-right:none}
.col-hdr{padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;color:var(--soft)}
.col-hdr .badge{border-radius:99px;padding:1px 8px;font-size:10px;font-weight:800;color:#fff}
.col-body{padding:8px;min-height:200px}
.job{background:#F8F9FA;border-radius:8px;border:1.5px solid var(--line);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.job:hover{border-color:var(--red)}
.job.urgent{border-left:3px solid var(--red);background:#FFF5F5}
.job-biz{font-weight:700;font-size:13px;margin-bottom:3px}
.job-meta{font-size:11px;color:var(--soft);line-height:1.5}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin-right:3px;margin-top:4px}
.tag-red{background:#FEE9EC;color:var(--red)}.tag-blue{background:#EBF2FD;color:var(--blue)}.tag-green{background:#ECFDF5;color:#065F46}
/* Tech grid */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}
.tech-card{border-radius:8px;padding:12px 14px;border:1.5px solid var(--line);background:#F8F9FA}
.tech-card.avail{border-color:var(--green);background:#F0FDF4}
.tech-card.enroute{border-color:var(--blue);background:#EFF6FF}
.tech-card.onjob{border-color:var(--orange);background:#FFFBEB}
.tech-card.off{opacity:.6}
.tech-name{font-weight:700;font-size:13px;margin-bottom:2px}
.tech-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tech-status.g{color:var(--green)}.tech-status.b{color:var(--blue)}.tech-status.o{color:var(--orange)}.tech-status.s{color:var(--soft)}
.tech-detail{font-size:11px;color:var(--soft);margin-top:4px;line-height:1.5}
/* Emergency form */
.emg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px}
.emg-grid .full{grid-column:1/-1}
.f-label{display:block;font-size:11px;font-weight:700;color:var(--soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.f-input{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif;outline:none;transition:border-color .12s}
.f-input:focus{border-color:var(--red)}
.f-btn{padding:10px 20px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.f-btn-red{background:var(--red);color:#fff}.f-btn-ghost{background:#F3F4F6;border:1.5px solid var(--line);color:var(--ink)}
/* Log table */
.log-table{width:100%;border-collapse:collapse;font-size:13px}
.log-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);border-bottom:2px solid var(--line)}
.log-table td{padding:9px 12px;border-bottom:1px solid var(--line)}
.status-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
/* WO Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:min(560px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.25)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--soft)}
.form-row{margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
#dpToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
</style>
</head>
<body>
<nav class="trn">
  <div class="trn-inner">
    <div class="trn-logo">
      <img src="termac-one-logo.png" alt="T1">
      <span class="trn-logo-txt">Termac One</span>
    </div>
    <div class="trn-title">Dispatch Dashboard</div>
    <div class="trn-spacer"></div>
    <span id="dpDate" style="color:#6B7280;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-right:8px"></span>
    <button class="trn-btn primary" onclick="openWO()">+ Work Order</button>
    <button class="trn-btn emg" onclick="switchTab('emergency')">🚨 Emergency</button>
    <a class="trn-btn" href="dispatcher-portal.html">← Back</a>
  </div>
</nav>
<div class="tabbar">
  <button class="tab active" id="tab-board" onclick="switchTab('board')">📋 Job Board</button>
  <button class="tab" id="tab-techs" onclick="switchTab('techs')">👷 Tech Status</button>
  <button class="tab" id="tab-emergency" onclick="switchTab('emergency')">🚨 Emergency</button>
  <button class="tab" id="tab-log" onclick="switchTab('log')">📝 Log</button>
</div>

<!-- JOB BOARD -->
<div class="page active" id="page-board">
<div class="content">
  <div class="kpi-row" id="kpis"></div>
  <div class="sec">
    <div class="sec-hdr">
      <span class="sec-title">📋 Today's Job Board</span>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="divFilter" onchange="renderBoard()" style="padding:5px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700">
          <option value="">All Divisions</option>
          <option>UniPro</option><option>Quality III</option><option>AllPro</option>
          <option>Filter Man</option><option>GTO</option><option>Termac</option>
        </select>
        <button class="f-btn f-btn-red" style="font-size:11px;padding:6px 14px" onclick="openWO()">+ Work Order</button>
      </div>
    </div>
    <div class="board" id="jobBoard"></div>
  </div>
</div>
</div>

<!-- TECH STATUS -->
<div class="page" id="page-techs">
<div class="content">
  <div class="sec">
    <div class="sec-hdr"><span class="sec-title">👷 Field Tech Status</span><button class="f-btn f-btn-ghost" style="font-size:11px;padding:6px 14px" onclick="renderTechs()">↺ Refresh</button></div>
    <div class="tech-grid" id="techGrid"></div>
  </div>
</div>
</div>

<!-- EMERGENCY -->
<div class="page" id="page-emergency">
<div class="content">
  <div class="sec">
    <div class="sec-hdr" style="background:#FEF2F2;border-bottom-color:#FECACA">
      <span class="sec-title" style="color:var(--red)">🚨 Emergency Dispatch</span>
      <span style="font-size:11px;color:var(--red);font-weight:600">URGENT — Immediate response required</span>
    </div>
    <div class="emg-grid">
      <div class="full"><label class="f-label">Emergency Type</label>
        <select class="f-input" id="emgType">
          <option>🔥 Fire / Suppression System Failure</option>
          <option>💧 Sprinkler Activation / Water Damage</option>
          <option>🚨 Alarm Malfunction — False Activation</option>
          <option>🧯 Extinguisher Needed — Active Situation</option>
          <option>⚠️ Chemical Spill / Hood System Down</option>
          <option>🔧 Equipment Failure — Critical</option>
          <option>📋 Other Emergency</option>
        </select>
      </div>
      <div><label class="f-label">Business Name</label><input class="f-input" id="emgBiz" placeholder="Business name…"></div>
      <div><label class="f-label">Contact Name</label><input class="f-input" id="emgContact" placeholder="On-site contact…"></div>
      <div><label class="f-label">Phone</label><input class="f-input" id="emgPhone" placeholder="Call-back number…"></div>
      <div><label class="f-label">Address</label><input class="f-input" id="emgAddr" placeholder="Full address…"></div>
      <div><label class="f-label">Assign Tech</label><select class="f-input" id="emgTech"></select></div>
      <div><label class="f-label">Priority</label>
        <select class="f-input" id="emgPriority">
          <option value="critical">🔴 CRITICAL — Respond now</option>
          <option value="high">🟠 HIGH — Within 1 hour</option>
          <option value="medium">🟡 MEDIUM — Within 2 hours</option>
        </select>
      </div>
      <div class="full"><label class="f-label">Situation Details</label>
        <textarea class="f-input" id="emgDetails" rows="3" style="resize:vertical" placeholder="Describe the situation…"></textarea>
      </div>
      <div class="full" style="display:flex;gap:10px">
        <button class="f-btn f-btn-red" style="flex:1;padding:12px;font-size:13px" onclick="dispatchEmergency()">🚨 DISPATCH NOW</button>
        <button class="f-btn f-btn-ghost" onclick="clearEmg()">Clear</button>
      </div>
    </div>
  </div>
  <div class="sec"><div class="sec-hdr"><span class="sec-title">Recent Emergency Dispatches</span></div><div style="padding:12px" id="emgLog"></div></div>
</div>
</div>

<!-- LOG -->
<div class="page" id="page-log">
<div class="content">
  <div class="sec">
    <div class="sec-hdr">
      <span class="sec-title">📝 Dispatch Log</span>
      <select id="logFilter" onchange="renderLog()" style="padding:5px 10px;border:1.5px solid var(--line);border-radius:6px;font-size:12px">
        <option value="today">Today</option><option value="week">This Week</option><option value="all">All</option>
      </select>
    </div>
    <div style="padding:0 16px 16px" id="logList"></div>
  </div>
</div>
</div>

<!-- WORK ORDER MODAL -->
<div class="modal-bg" id="woModal">
  <div class="modal">
    <div class="modal-title">New Work Order <button class="modal-close" onclick="closeWO()">✕</button></div>
    <div class="form-grid">
      <div class="form-row"><label class="f-label">Business</label><input class="f-input" id="wo_biz" placeholder="Business name…"></div>
      <div class="form-row"><label class="f-label">Contact</label><input class="f-input" id="wo_contact" placeholder="Contact name…"></div>
      <div class="form-row"><label class="f-label">Phone</label><input class="f-input" id="wo_phone"></div>
      <div class="form-row"><label class="f-label">Address</label><input class="f-input" id="wo_addr"></div>
      <div class="form-row"><label class="f-label">Service Type</label>
        <select class="f-input" id="wo_service">
          <option>Fire Inspection</option><option>Hood Suppression</option><option>Extinguisher Service</option>
          <option>Sprinkler Inspection</option><option>Fire Alarm</option><option>Grease Trap</option>
          <option>Hood Filter Exchange</option><option>Dish Machine</option><option>Chemical Delivery</option><option>Other</option>
        </select>
      </div>
      <div class="form-row"><label class="f-label">Division</label>
        <select class="f-input" id="wo_div">
          <option>UniPro</option><option>Quality III</option><option>AllPro</option>
          <option>Filter Man</option><option>GTO</option><option>Termac</option>
        </select>
      </div>
      <div class="form-row"><label class="f-label">Assign Tech</label><select class="f-input" id="wo_tech"></select></div>
      <div class="form-row"><label class="f-label">Date</label><input class="f-input" id="wo_date" type="date"></div>
      <div class="form-row"><label class="f-label">Time</label><input class="f-input" id="wo_time" type="time" value="09:00"></div>
      <div class="form-row"><label class="f-label">Est. Hours</label><input class="f-input" id="wo_hrs" type="number" min="0.5" max="12" step="0.5" value="2"></div>
    </div>
    <div class="form-row"><label class="f-label">Notes</label><textarea class="f-input" id="wo_notes" rows="2" style="resize:vertical" placeholder="Access notes, special instructions…"></textarea></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="f-btn f-btn-red" style="flex:1;padding:10px" onclick="saveWO()">Create Work Order</button>
      <button class="f-btn f-btn-ghost" onclick="closeWO()">Cancel</button>
    </div>
  </div>
</div>
<div id="dpToast"></div>

<script>
const TECHS=[
  {id:'t1',name:'Marcus Williams',div:'UniPro',status:'on-job',job:'Shore Medical Center',eta:'11:30 AM',phone:'215-555-0101'},
  {id:'t2',name:'Dana Kim',div:'UniPro',status:'available',job:'',eta:'',phone:'215-555-0102'},
  {id:'t3',name:'Ray Santos',div:'UniPro',status:'en-route',job:'Edison Commons',eta:'11:00 AM',phone:'215-555-0103'},
  {id:'t4',name:'Tony Ferraro',div:'Filter Man',status:'available',job:'',eta:'',phone:'215-555-0104'},
  {id:'t5',name:'Chris Okafor',div:'GTO',status:'on-job',job:'Midtown Plaza',eta:'1:00 PM',phone:'215-555-0105'},
  {id:'t6',name:'Jerome Bell',div:'Quality III',status:'available',job:'',eta:'',phone:'215-555-0106'},
  {id:'t7',name:'Lisa Park',div:'Termac',status:'off',job:'',eta:'',phone:'215-555-0107'},
  {id:'t8',name:'Mike Torres',div:'AllPro',status:'available',job:'',eta:'',phone:'215-555-0108'},
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('dpToast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2800)}

function switchTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='board') renderBoard();
  if(name==='techs') renderTechs();
  if(name==='log') renderLog();
  if(name==='emergency'){renderEmgLog();populateTechDropdowns();}
}

function loadJobs(){
  const s=JSON.parse(localStorage.getItem('unipro_jobs')||'[]');
  if(s.length) return s;
  return [
    {id:'j1',biz:'Shore Medical Center',addr:'1 Medical Dr, Somers Point NJ',contact:'Dr. Patel',phone:'609-653-3500',service:'Fire Inspection',div:'UniPro',tech:'Marcus Williams',date:new Date().toISOString().split('T')[0],time:'07:30',hrs:3.5,status:'en-route',notes:'NFPA 25 Annual. Access via loading dock B.',urgent:false},
    {id:'j2',biz:'Edison Commons Food Hall',addr:'1600 Oak Tree Rd, Edison NJ',contact:'Manager on duty',phone:'732-549-1000',service:'Hood Suppression',div:'UniPro',tech:'Ray Santos',date:new Date().toISOString().split('T')[0],time:'11:00',hrs:2,status:'scheduled',notes:'4 hoods. Semi-annual.',urgent:false},
    {id:'j3',biz:'Woodbridge Diner',addr:'540 Route 9, Woodbridge NJ',contact:'Owner — Alex',phone:'732-634-2200',service:'Grease Trap',div:'GTO',tech:'Chris Okafor',date:new Date().toISOString().split('T')[0],time:'09:00',hrs:1.5,status:'complete',notes:'',urgent:false},
    {id:'j4',biz:'Blue Flame Grille',addr:'801 Market St, Philadelphia PA',contact:'Mgr Kim',phone:'215-922-4400',service:'Hood Filter Exchange',div:'Filter Man',tech:'Tony Ferraro',date:new Date().toISOString().split('T')[0],time:'08:00',hrs:1,status:'in-progress',notes:'Weekly exchange.',urgent:true},
    {id:'j5',biz:'La Quinta Inn Philadelphia',addr:'11 S 17th St, Philadelphia PA',contact:'Facilities',phone:'215-557-9939',service:'Fire Alarm',div:'Quality III',tech:'Jerome Bell',date:new Date().toISOString().split('T')[0],time:'14:00',hrs:4,status:'scheduled',notes:'Annual test.',urgent:false},
    {id:'j6',biz:'Jasmine Neighborhood Deli',addr:'2109 S 21st St, Philadelphia PA',contact:'',phone:'',service:'Chemical Delivery',div:'Termac',tech:'Unassigned',date:new Date().toISOString().split('T')[0],time:'13:00',hrs:0.5,status:'scheduled',notes:'',urgent:false},
  ];
}

function renderBoard(){
  const div=document.getElementById('divFilter').value;
  let jobs=loadJobs();
  if(div) jobs=jobs.filter(j=>j.div===div);
  // KPIs
  document.getElementById('kpis').innerHTML=[
    {cls:'blue',val:jobs.length,lbl:'Total Jobs'},
    {cls:'gold',val:jobs.filter(j=>j.status==='scheduled').length,lbl:'Scheduled'},
    {cls:'orange',val:jobs.filter(j=>['in-progress','en-route'].includes(j.status)).length,lbl:'In Progress'},
    {cls:'green',val:jobs.filter(j=>j.status==='complete').length,lbl:'Complete'},
    {cls:'red',val:jobs.filter(j=>j.urgent).length,lbl:'Urgent'},
    {cls:'green',val:TECHS.filter(t=>t.status==='available').length,lbl:'Techs Available'},
  ].map(k=>`<div class="kpi ${k.cls}"><div class="kpi-val">${k.val}</div><div class="kpi-lbl">${k.lbl}</div></div>`).join('');

  const cols=[
    {key:'scheduled',label:'Scheduled',bg:'#6B7280'},
    {key:'en-route',label:'En Route',bg:'#1B5FA8'},
    {key:'in-progress',label:'In Progress',bg:'#D97706'},
    {key:'complete',label:'Complete',bg:'#059669'},
  ];
  const grouped={};
  cols.forEach(c=>grouped[c.key]=jobs.filter(j=>j.status===c.key));

  document.getElementById('jobBoard').innerHTML=cols.map(c=>`
    <div class="col">
      <div class="col-hdr">${c.label} <span class="badge" style="background:${c.bg}">${grouped[c.key].length}</span></div>
      <div class="col-body">${grouped[c.key].map(j=>`
        <div class="job${j.urgent?' urgent':''}" onclick="updateJobStatus('${j.id}')">
          <div class="job-biz">${j.urgent?'🔴 ':''}${esc(j.biz)}</div>
          <div class="job-meta">${esc(j.time)} · ${esc(j.hrs)}h · ${esc(j.tech||'Unassigned')}</div>
          <div class="job-meta">${esc(j.addr||'')}</div>
          <div><span class="tag tag-red">${esc(j.service)}</span><span class="tag tag-blue">${esc(j.div)}</span></div>
        </div>`).join('')||'<div style="color:var(--soft);font-size:12px;padding:8px">No jobs</div>'}
      </div>
    </div>`).join('');
}

function updateJobStatus(id){
  const jobs=loadJobs();
  const j=jobs.find(x=>x.id===id);
  if(!j) return;
  const opts=['scheduled','en-route','in-progress','complete','cancelled'];
  const s=prompt(`Update status for:\n${j.biz}\n\nCurrent: ${j.status}\n\nNew status:\n• scheduled\n• en-route\n• in-progress\n• complete\n• cancelled`,j.status);
  if(!s||!opts.includes(s.trim())) return;
  j.status=s.trim();
  localStorage.setItem('unipro_jobs',JSON.stringify(jobs));
  renderBoard();
  toast('✅ Updated: '+j.biz);
}

function renderTechs(){
  const map={available:{cls:'avail',lbl:'Available',c:'g'},
    'en-route':{cls:'enroute',lbl:'En Route',c:'b'},
    'on-job':{cls:'onjob',lbl:'On Job',c:'o'},
    off:{cls:'off',lbl:'Off Duty',c:'s'}};
  document.getElementById('techGrid').innerHTML=TECHS.map(t=>{
    const s=map[t.status]||map.off;
    return `<div class="tech-card ${s.cls}">
      <div class="tech-name">${esc(t.name)}</div>
      <div class="tech-status ${s.c}">${s.lbl}</div>
      <div class="tech-detail">${esc(t.div)} · <a href="tel:${t.phone}" style="color:var(--blue)">${t.phone}</a>
      ${t.job?`<br>📍 ${esc(t.job)}${t.eta?' · ETA '+t.eta:''}`:''}</div>
      ${t.status==='available'?`<button onclick="assignTech('${t.id}')" style="width:100%;margin-top:8px;padding:5px 0;background:var(--green);color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer">Assign to Job</button>`:''}
    </div>`;
  }).join('');
}

function assignTech(id){
  const t=TECHS.find(x=>x.id===id);
  if(!t) return;
  const unassigned=loadJobs().filter(j=>j.status==='scheduled'&&(!j.tech||j.tech==='Unassigned'));
  if(!unassigned.length){toast('No unassigned jobs');return;}
  const list=unassigned.map((j,i)=>`${i+1}. ${j.biz} — ${j.service} @ ${j.time}`).join('\n');
  const n=parseInt(prompt(`Assign ${t.name} to which job?\n\n${list}\n\nEnter number:`));
  if(isNaN(n)||n<1||n>unassigned.length) return;
  const all=loadJobs();
  const job=all.find(j=>j.id===unassigned[n-1].id);
  if(job){job.tech=t.name;job.status='en-route';}
  localStorage.setItem('unipro_jobs',JSON.stringify(all));
  t.status='en-route';t.job=job.biz;
  toast(`✅ ${t.name} → ${job.biz}`);
  renderTechs();
}

function populateTechDropdowns(){
  const avail=TECHS.filter(t=>['available','en-route'].includes(t.status));
  const opts=['<option value="">— Select Tech —</option>',...avail.map(t=>`<option value="${t.id}">${t.name} (${t.div})</option>`)].join('');
  ['emgTech','wo_tech'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});
}

function dispatchEmergency(){
  const biz=document.getElementById('emgBiz').value.trim();
  const addr=document.getElementById('emgAddr').value.trim();
  if(!biz||!addr){toast('⚠️ Business and address required');return;}
  const techId=document.getElementById('emgTech').value;
  const tech=TECHS.find(t=>t.id===techId);
  const log=JSON.parse(localStorage.getItem('dp_emg_log')||'[]');
  log.unshift({id:'e'+Date.now(),ts:Date.now(),
    type:document.getElementById('emgType').value,biz,
    contact:document.getElementById('emgContact').value,
    phone:document.getElementById('emgPhone').value,
    addr,details:document.getElementById('emgDetails').value,
    tech:tech?.name||'Unassigned',
    priority:document.getElementById('emgPriority').value});
  localStorage.setItem('dp_emg_log',JSON.stringify(log));
  const jobs=loadJobs();
  jobs.unshift({id:'ej'+Date.now(),biz,addr,contact:document.getElementById('emgContact').value,
    phone:document.getElementById('emgPhone').value,service:'Emergency Dispatch',div:'UniPro',
    tech:tech?.name||'Unassigned',date:new Date().toISOString().split('T')[0],
    time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}),
    hrs:2,status:'en-route',notes:document.getElementById('emgType').value,urgent:true});
  localStorage.setItem('unipro_jobs',JSON.stringify(jobs));
  toast('🚨 Dispatched'+(tech?' — '+tech.name:'')+'!');
  clearEmg();renderEmgLog();
}

function clearEmg(){['emgBiz','emgContact','emgPhone','emgAddr','emgDetails'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';})}

function renderEmgLog(){
  const log=JSON.parse(localStorage.getItem('dp_emg_log')||'[]');
  const el=document.getElementById('emgLog');if(!el)return;
  if(!log.length){el.innerHTML='<div style="color:var(--soft);font-size:13px;text-align:center;padding:20px">No emergency dispatches on record</div>';return;}
  el.innerHTML=log.slice(0,8).map(e=>`
    <div style="border:1.5px solid #FECACA;background:#FFF5F5;border-radius:8px;padding:12px 14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <div style="font-weight:700;color:var(--red);font-size:13px">${esc(e.type)}</div>
        <div style="font-size:11px;color:var(--soft)">${new Date(e.ts).toLocaleString()}</div>
      </div>
      <div style="font-weight:700">${esc(e.biz)}</div>
      <div style="font-size:12px;color:var(--soft)">${esc(e.addr)}</div>
      <div style="font-size:12px;margin-top:4px">Tech: <strong>${esc(e.tech)}</strong> · <strong style="color:var(--red)">${(e.priority||'').toUpperCase()}</strong></div>
      ${e.details?`<div style="font-size:12px;color:var(--soft);margin-top:3px;font-style:italic">${esc(e.details)}</div>`:''}
    </div>`).join('');
}

function renderLog(){
  const jobs=loadJobs();
  const f=document.getElementById('logFilter')?.value||'today';
  const today=new Date().toISOString().split('T')[0];
  const week=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const filtered=jobs.filter(j=>f==='all'?true:f==='week'?j.date>=week:j.date===today)
    .sort((a,b)=>a.time>b.time?1:-1);
  const sc={scheduled:'#1B5FA8','en-route':'#1B5FA8','in-progress':'#D97706',complete:'#059669',cancelled:'#6B7280'};
  const el=document.getElementById('logList');
  if(!filtered.length){el.innerHTML='<div style="color:var(--soft);text-align:center;padding:20px;font-size:13px">No jobs for this period</div>';return;}
  el.innerHTML=`<table class="log-table">
    <thead><tr><th>Time</th><th>Business</th><th>Service</th><th>Division</th><th>Tech</th><th>Status</th></tr></thead>
    <tbody>${filtered.map(j=>`<tr>
      <td style="white-space:nowrap">${esc(j.time)}</td>
      <td style="font-weight:600">${j.urgent?'🔴 ':''}${esc(j.biz)}</td>
      <td>${esc(j.service)}</td>
      <td>${esc(j.div)}</td>
      <td>${esc(j.tech||'Unassigned')}</td>
      <td><span class="status-pill" style="background:${sc[j.status]||'#6B7280'}22;color:${sc[j.status]||'#6B7280'}">${j.status}</span></td>
    </tr>`).join('')}</tbody></table>`;
}

function openWO(){
  populateTechDropdowns();
  document.getElementById('wo_date').value=new Date().toISOString().split('T')[0];
  document.getElementById('woModal').classList.add('open');
}
function closeWO(){document.getElementById('woModal').classList.remove('open');}
function saveWO(){
  const biz=document.getElementById('wo_biz').value.trim();
  if(!biz){toast('⚠️ Business name required');return;}
  const jobs=loadJobs();
  const techVal=document.getElementById('wo_tech').value;
  const tech=TECHS.find(t=>t.id===techVal);
  jobs.push({id:'wo'+Date.now(),biz,addr:document.getElementById('wo_addr').value,
    contact:document.getElementById('wo_contact').value,phone:document.getElementById('wo_phone').value,
    service:document.getElementById('wo_service').value,div:document.getElementById('wo_div').value,
    tech:tech?.name||'Unassigned',date:document.getElementById('wo_date').value,
    time:document.getElementById('wo_time').value,hrs:parseFloat(document.getElementById('wo_hrs').value)||2,
    notes:document.getElementById('wo_notes').value,status:'scheduled',urgent:false});
  localStorage.setItem('unipro_jobs',JSON.stringify(jobs));
  closeWO();renderBoard();toast('✅ Work order created');
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('dpDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  renderBoard();
  populateTechDropdowns();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeWO();});
</script>
</body>

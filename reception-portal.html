<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Termac One — Reception</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-main-32.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;
  --red:#C8102E;--yellow:#F2B705;--green:#1E7B3C;--blue:#1B5FA8;--orange:#D8690B;
  --purple:#7C3AED;--gray:#6B7280;--radius:10px;
  --shadow:0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;outline:none;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
button{cursor:pointer}

/* ── TOP NAV ── */
.topnav{background:#1A1D21;border-bottom:3px solid var(--purple);position:sticky;top:0;z-index:200}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:64px}
.topnav-brand{display:flex;align-items:center;gap:10px}
.topnav-brand img{height:44px;width:44px;object-fit:contain;border-radius:8px;flex-shrink:0}
.topnav-brand-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705}
.topnav-links{display:flex;align-items:center;gap:6px}
.topnav-link{
  display:inline-flex;align-items:center;gap:6px;color:#BFC4CA;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;border-radius:7px;
  cursor:pointer;border:none;background:none;transition:background .12s,color .12s;
}
.topnav-link:hover{background:#2A2E33;color:#fff}
.topnav-link.active{background:var(--purple);color:#fff}
.topnav-right{display:flex;align-items:center;gap:10px}
.topnav-user{display:flex;align-items:center;gap:8px;background:#2A2E33;border-radius:8px;padding:6px 12px}
.topnav-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:#fff}
.topnav-username{font-size:12px;font-weight:700;color:#fff}
.topnav-signout{background:none;border:1.5px solid rgba(255,255,255,.2);border-radius:6px;color:#BFC4CA;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:.04em}
.topnav-signout:hover{background:#3A3E45;color:#fff}

/* ── LOGIN ── */
.rcp-login{position:fixed;inset:0;background:#1A1D21;display:flex;align-items:center;justify-content:center;z-index:500}
.rcp-login-card{background:#22272E;border-radius:14px;padding:36px 40px;width:100%;max-width:380px;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.rcp-login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705;margin-bottom:4px}
.rcp-login-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:28px}
.rcp-login-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.rcp-login-sel,.rcp-login-pin{width:100%;padding:10px 12px;background:#2A2E33;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;margin-bottom:14px}
.rcp-login-pin{letter-spacing:.2em;text-align:center}
.rcp-login-pin::placeholder{letter-spacing:normal;color:rgba(255,255,255,.25)}
.rcp-login-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.rcp-login-btn:hover{background:#6D28D9}
.rcp-login-err{color:#FCA5A5;font-size:12px;margin-top:10px;text-align:center;display:none}

/* ── CONTENT ── */
.rcp-main{display:none;flex-direction:column;min-height:100vh}
.rcp-content{padding:18px 20px;max-width:1400px;width:100%}

/* ── CARDS ── */
.rcp-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.rcp-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:14px}

/* ── CALL LOG FORM ── */
.rcp-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rcp-form-full{grid-column:1/-1}
.rcp-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;cursor:pointer;white-space:nowrap}
.rcp-btn-purple{background:var(--purple);color:#fff}
.rcp-btn-blue{background:var(--blue);color:#fff}
.rcp-btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.rcp-btn-red{background:var(--red);color:#fff}
.rcp-alert-red{background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#991B1B;display:none}

/* ── CALL LOG LIST ── */
.rcp-log-item{background:#F9FAFB;border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:4px solid var(--purple)}
.rcp-log-item.complaint{border-left-color:var(--red)}
.rcp-log-time{font-size:11px;color:var(--soft);margin-bottom:4px}
.rcp-log-caller{font-weight:700;font-size:14px;color:var(--ink)}
.rcp-log-detail{font-size:12px;color:var(--soft);margin-top:3px}

/* ── RECORD GRID ── */
.rcp-record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.rcp-record{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-left:4px solid var(--purple);cursor:pointer;transition:box-shadow .12s}
.rcp-record:hover{box-shadow:0 4px 20px rgba(26,29,33,.14)}
.rcp-rec-biz{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ink);margin-bottom:2px}
.rcp-rec-info{font-size:12px;color:var(--soft)}
.rcp-stage-pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif}

/* ── LOOKUP DROPDOWN ── */
.rcp-lookup-wrap{position:relative}
.rcp-lookup-dropdown{display:none;position:absolute;z-index:999;background:#fff;border:1.5px solid var(--line);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:220px;overflow-y:auto;width:100%;margin-top:2px}
.rcp-lookup-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)}
.rcp-lookup-item:last-child{border-bottom:none}
.rcp-lookup-item:hover{background:#F3F4F6}

/* ── TOAST ── */
#rcpToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

.trn-user-chip{display:inline-flex;align-items:center;gap:7px;background:#2A2E33;border-radius:7px;padding:4px 10px 4px 5px;margin-left:8px;cursor:default}
.trn-user-chip-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.trn-user-chip-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:#fff;letter-spacing:.04em}
.trn-user-chip-role{font-family:'Barlow Condensed',sans-serif;font-weight:500;font-size:10px;color:#6B7280;letter-spacing:.04em}
</style>



<style>
/* ── Termac Role Nav ── */
.trn{background:#1A1D21;border-bottom:3px solid #C8102E;position:sticky;top:0;z-index:9999;flex-shrink:0}
.trn-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:0;height:50px;padding:0 16px}
.trn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;margin-right:16px;cursor:pointer;border:none;background:none}
.trn-logo img{height:30px;width:30px;object-fit:contain;border-radius:6px}
.trn-logo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#F2B705;white-space:nowrap}
.trn-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA;padding:0 14px;border-left:1px solid #2A2E33;border-right:1px solid #2A2E33;align-self:stretch;display:flex;align-items:center;white-space:nowrap}
.trn-spacer{flex:1}
.trn-btn{background:none;border:1.5px solid #3A3E43;border-radius:7px;color:#BFC4CA;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.10em;text-transform:uppercase;padding:6px 14px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:border-color .12s,color .12s;margin-left:8px}
.trn-btn:hover{border-color:#C8102E;color:#fff}
.trn-btn.primary{background:#C8102E;border-color:#C8102E;color:#fff}
.trn-btn.primary:hover{background:#A30D25;border-color:#A30D25}

/* ── Call history filter buttons ── */
.rcpFltBtn{padding:4px 10px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink);transition:all .1s}
.rcpFltBtn:hover{border-color:#7C3AED;color:#7C3AED}
.rcpFltActive{background:#7C3AED!important;border-color:#7C3AED!important;color:#fff!important}

/* ══ SPLIT PANEL LAYOUT ══════════════════════════════════════════ */
.rcp-split{display:flex;min-height:calc(100vh - 50px);align-items:flex-start}
.rcp-left-rail{width:260px;flex-shrink:0;background:#1A1D21;min-height:calc(100vh - 50px);padding:14px 12px;position:sticky;top:50px;overflow-y:auto;max-height:calc(100vh - 50px)}
.rcp-right-main{flex:1;min-width:0;padding:14px 16px;overflow:hidden}

/* Rail sections */
.rcp-rail-section{margin-bottom:16px}
.rcp-rail-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#4B5563;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #2A2E33}
.rcp-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.rcp-stat{background:#111418;border-radius:7px;padding:9px 10px;text-align:center}
.rcp-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;line-height:1}
.rcp-stat-lbl{font-size:9px;color:#4B5563;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.rcp-s-purple{color:#A78BFA}
.rcp-s-green{color:#34D399}
.rcp-s-yellow{color:#FCD34D}
.rcp-s-red{color:#F87171}
.rcp-s-blue{color:#60A5FA}
.rcp-s-white{color:#fff}

/* Quick search */
.rcp-rail-search{width:100%;padding:8px 10px;background:#111418;border:1.5px solid #2A2E33;border-radius:7px;color:#fff;font-size:12px;margin-bottom:6px;outline:none}
.rcp-rail-search:focus{border-color:#7C3AED}
.rcp-rail-search::placeholder{color:#4B5563}
.rcp-search-result{background:#111418;border-radius:6px;padding:8px 10px;margin-bottom:4px;cursor:pointer;border-left:3px solid #7C3AED}
.rcp-search-result:hover{background:#1F2937}
.rcp-search-biz{font-size:12px;font-weight:700;color:#fff;margin-bottom:1px}
.rcp-search-meta{font-size:10px;color:#6B7280}
.rcp-search-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-right:3px}

/* Urgent flags */
.rcp-flag-item{background:#111418;border-radius:6px;padding:8px 10px;margin-bottom:4px;border-left:3px solid #F87171}
.rcp-flag-biz{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.rcp-flag-meta{font-size:10px;color:#6B7280}

/* Tab nav */
.rcp-tabs{display:flex;gap:2px;margin-bottom:14px;background:#fff;border-radius:9px;padding:4px;box-shadow:var(--shadow)}
.rcp-tab{flex:1;padding:8px 12px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:none;color:var(--soft);transition:all .12s}
.rcp-tab:hover{background:#F3F4F6;color:var(--ink)}
.rcp-tab.active{background:#7C3AED;color:#fff}
.rcp-tab-badge{display:inline-block;background:rgba(255,255,255,.25);border-radius:99px;padding:0 5px;font-size:9px;margin-left:4px}

/* Cold call table — same style as DMS */
.rcp-call-table{width:100%;border-collapse:collapse}
.rcp-call-table th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--soft);padding:8px 8px;border-bottom:2px solid var(--line);text-align:left;white-space:nowrap;background:#F8F9FA}
.rcp-call-table td{padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
.rcp-call-table tr:hover td{background:#F9FAFB}
.rcp-outcome-sel{padding:5px 7px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;background:#fff;color:var(--ink);width:100%}
.rcp-outcome-sel.hot{background:#DCFCE7;border-color:#16A34A;color:#15803D}
.rcp-outcome-sel.callback{background:#FEF3C7;border-color:#D97706;color:#92400E}
.rcp-outcome-sel.not_interested{background:#FEE2E2;border-color:#DC2626;color:#991B1B}
.rcp-check{width:17px;height:17px;cursor:pointer;accent-color:#7C3AED}
.rcp-notes-inp{padding:5px 7px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;width:100%;resize:vertical;min-height:48px;font-family:inherit;line-height:1.4}
.rcp-notes-inp:focus{outline:none;border-color:#7C3AED}
.rcp-div-btn{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--soft);white-space:nowrap}
.rcp-div-btn.on{color:#fff}
.rcp-cc-progress{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.rcp-cc-bar{flex:1;height:8px;background:#E5E7EB;border-radius:99px;overflow:hidden}
.rcp-cc-fill{height:100%;background:#7C3AED;border-radius:99px;transition:width .4s}

/* CRM search */
.rcp-crm-search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.rcp-crm-search{flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;outline:none}
.rcp-crm-search:focus{border-color:#7C3AED}

</style>
<script src="termac-notify.js"></script>
<style>body{visibility:hidden}</style>
<script>document.addEventListener("DOMContentLoaded",function(){document.body.style.visibility="visible"});</script>
</head>
<body>
<nav class="trn">
  <div class="trn-inner">
    <button class="trn-logo" onclick="window.location.href='termac-os.html'">
      <img src="termac-one-logo.png" alt="Termac">
      <span class="trn-logo-txt">Termac One</span>
    </button>
    <div class="trn-title" id="trnRoleTitle">Reception</div>
    <div class="trn-spacer"></div>
    <button class="trn-btn" onclick="window.open('user-manuals.html?role=reception','_blank')" style="font-size:10px;padding:5px 10px">? Help</button>
    <span class="trn-user-chip" id="rcpUserChip" style="display:none"><span class="trn-user-chip-avatar" id="rcpChipInitials" style="background:#6D28D9"></span><span><span class="trn-user-chip-name" id="rcpChipName"></span><br><span class="trn-user-chip-role">Reception</span></span></span>
    <button class="trn-btn primary" onclick="sessionStorage.setItem('trnReturnUrl','reception-portal.html');window.location.href='employee-portal.html'">🏠 Employee Portal</button>
  </div>
</nav>




<!-- LOGIN -->
<div class="rcp-login" id="rcpLogin" style="display:none">
  <div class="rcp-login-card">
    <div class="rcp-login-logo">Termac One</div>
    <div class="rcp-login-sub">Reception Portal</div>
    <label class="rcp-login-label">Select Your Name</label>
    <select class="rcp-login-sel" id="rcpLoginName">
      <option value="">— Select name —</option>
      <option value="Lauren Canfield">Lauren Canfield</option>
    </select>
    <label class="rcp-login-label">PIN</label>
    <input class="rcp-login-pin" id="rcpLoginPin" type="password" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')rcpLogin()">
    <button class="rcp-login-btn" onclick="rcpLogin()">Sign In →</button>
    <div class="rcp-login-err" id="rcpLoginErr">Incorrect PIN — try again</div>
  </div>
</div>

<!-- TOP NAV -->


<!-- MAIN -->
<div class="rcp-main" id="rcpMain">
  <div class="rcp-split">

    <!-- ══ LEFT RAIL ══ -->
    <div class="rcp-left-rail" id="rcpLeftRail">

      <!-- TODAY'S STATS -->
      <div class="rcp-rail-section">
        <div class="rcp-rail-hdr">📊 Today</div>
        <div class="rcp-stat-row">
          <div class="rcp-stat">
            <div class="rcp-stat-val rcp-s-purple" id="railCallsLogged">0</div>
            <div class="rcp-stat-lbl">Calls In</div>
          </div>
          <div class="rcp-stat">
            <div class="rcp-stat-val rcp-s-green" id="railLeadsCreated">0</div>
            <div class="rcp-stat-lbl">Leads</div>
          </div>
          <div class="rcp-stat">
            <div class="rcp-stat-val rcp-s-yellow" id="railColdWorked">0</div>
            <div class="rcp-stat-lbl">Cold Calls</div>
          </div>
          <div class="rcp-stat">
            <div class="rcp-stat-val rcp-s-red" id="railUrgent">0</div>
            <div class="rcp-stat-lbl">Urgent</div>
          </div>
        </div>
      </div>

      <!-- QUICK SEARCH -->
      <div class="rcp-rail-section">
        <div class="rcp-rail-hdr">🔍 Quick Lookup</div>
        <input class="rcp-rail-search" id="rcpRailSearch" placeholder="Name, business, phone…" oninput="rcpRailSearch(this.value)">
        <div id="rcpRailResults">
          <div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">Type to search all records</div>
        </div>
      </div>

      <!-- URGENT FLAGS -->
      <div class="rcp-rail-section">
        <div class="rcp-rail-hdr">🚨 Needs Follow-Up</div>
        <div id="rcpRailUrgent">
          <div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">No urgent items</div>
        </div>
      </div>

      <!-- RECENT CALLS -->
      <div class="rcp-rail-section">
        <div class="rcp-rail-hdr">📞 Last 5 Calls</div>
        <div id="rcpRailRecent">
          <div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">No calls yet today</div>
        </div>
      </div>

    </div><!-- /left rail -->

    <!-- ══ RIGHT MAIN ══ -->
    <div class="rcp-right-main">

      <!-- Tab nav -->
      <div class="rcp-tabs">
        <button class="rcp-tab active" id="rcpTab-incoming" onclick="rcpSwitchTab('incoming')">📞 Incoming Calls</button>
        <button class="rcp-tab" id="rcpTab-coldcalls" onclick="rcpSwitchTab('coldcalls')">📋 Cold Calls <span class="rcp-tab-badge" id="rcpCCBadge">20</span></button>
        <button class="rcp-tab" id="rcpTab-crm" onclick="rcpSwitchTab('crm')">👥 Leads & Accounts</button>
      </div>

      <!-- Tab panels -->
      <div id="rcpPanel-incoming" class="rcp-content"></div>
      <div id="rcpPanel-coldcalls" style="display:none"></div>
      <div id="rcpPanel-crm" style="display:none"></div>
      <div id="rcpPanel-deficiency" style="display:none"></div>

    </div><!-- /right main -->
  </div><!-- /split -->
</div>

<div id="rcpToast"></div>

<script>
function crmLoad(key){ try{ return JSON.parse(localStorage.getItem('termac_crm_'+key)||'[]'); }catch(e){return[];} }
function crmSave(key,val){ try{ localStorage.setItem('termac_crm_'+key,JSON.stringify(val)); }catch(e){} }
const RCP_DIV_COLORS = {
  'UniPro':'#C8102E','Quality III':'#1B5FA8','AllPro':'#065F46',
  'Filter Man':'#0D7490','GTO':'#92400E','Termac':'#6D28D9'
};
const RCP_DIVISIONS = ['UniPro','Quality III','AllPro','Filter Man','GTO','Termac'];

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── AUTH ──
const RCP_STAFF = {
  'Lauren Canfield': {pin:'2025',initials:'LA'},
};
let _rcpUser = null;
let _rcpTab = 'log';

function rcpLogin(){
  const name = document.getElementById('rcpLoginName').value;
  const pin  = document.getElementById('rcpLoginPin').value.trim();
  const err  = document.getElementById('rcpLoginErr');
  err.style.display='none';
  if(!name){err.textContent='Please select your name.';err.style.display='block';return;}
  const u = RCP_STAFF[name];
  if(!u||u.pin!==pin){err.textContent='Incorrect PIN — try again.';err.style.display='block';return;}
  _rcpUser={name,...u};
  sessionStorage.setItem('rcp_user',JSON.stringify(_rcpUser));
  rcpEnterPortal();
}

function rcpLogout(){
  sessionStorage.removeItem('rcp_user');
  _rcpUser=null;
  document.getElementById('rcpLogin').style.display='flex';
  document.getElementById('rcpNav').style.display='none';
  document.getElementById('rcpMain').style.display='none';
}

function rcpEnterPortal(){
  // Show main first, THEN render
  var el;
  el = document.getElementById('rcpLogin'); if(el) el.style.display='none';
  el = document.getElementById('rcpNav');   if(el) el.style.display='';
  el = document.getElementById('rcpMain');  if(el) el.style.display='flex';
  var navTitle = document.getElementById('trnRoleTitle');
  if(navTitle) navTitle.textContent = 'Reception';
// ── USER IDENTITY CHIP ─────────────────────────────────────────────────
  (function populateUserChip() {
    var name = '';
    // 1. Platform-wide: set by Employee Portal login
    try { name = localStorage.getItem('termac_current_user') || ''; } catch(e) {}
    // 2. Portal-specific fallback: _rcpUser.name from portal login
    if (!name) { try { if(typeof _rcpUser !== 'undefined' && _rcpUser && _rcpUser.name) name = _rcpUser.name; } catch(e) {} }
    // 3. Last resort
    if (!name) name = 'Receptionist';
    var initials = name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase() || 'RC';
    var chip = document.getElementById('rcpUserChip');
    if (chip) chip.style.display = 'inline-flex';
    var ci = document.getElementById('rcpChipInitials');
    if (ci) ci.textContent = initials;
    var cn = document.getElementById('rcpChipName');
    if (cn) cn.textContent = name;
  })();
  // ── END USER CHIP ───────────────────────────────────────────────────────
  setTimeout(function(){ rcpSwitchTab('incoming'); rcpUpdateRail(); }, 50);
}

// ── NAV ──
function rcpNav(tab){
  // Legacy nav — route to new tab system
  if(tab==='log') rcpSwitchTab('incoming');
  else if(tab==='leads'||tab==='contacts'||tab==='accounts') rcpSwitchTab('crm');
}

function rcpRender(tab){
  const el=document.getElementById('rcpContent');
  if(tab==='log')      rcpRenderCallLog(document.getElementById('rcpPanel-incoming')||el);
  else if(tab==='leads')    rcpRenderCRM(el,'leads');
  else if(tab==='contacts') rcpRenderCRM(el,'contacts');
  else if(tab==='accounts') rcpRenderCRM(el,'accounts');
}

function rcpSwitchTab(tab){
  document.querySelectorAll('.rcp-tab').forEach(t=>t.classList.remove('active'));
  const activeTab = document.getElementById('rcpTab-'+tab);
  if(activeTab) activeTab.classList.add('active');
  ['incoming','coldcalls','crm','deficiency'].forEach(p=>{
    const panel=document.getElementById('rcpPanel-'+p);
    if(panel) panel.style.display=(p===tab?'block':'none');
  });
  if(tab==='incoming') rcpRenderCallLog(document.getElementById('rcpPanel-incoming'));
  else if(tab==='coldcalls') rcpRenderColdCalls();
  else if(tab==='crm') rcpRenderAllCRM();
  else if(tab==='deficiency') rcpRenderDeficiencyQueue();
}

function rcpUpdateDefBadge() {
  const queue = JSON.parse(localStorage.getItem('termac_deficiency_queue')||'[]');
  const pending = queue.filter(d=>d.status==='pending').length;
  const badge = document.getElementById('rcpDefBadge');
  if (badge) { badge.textContent=pending; badge.style.display=pending>0?'inline':'none'; }
}

function rcpRenderDeficiencyQueue() {
  const panel = document.getElementById('rcpPanel-deficiency');
  if (!panel) return;
  const queue = JSON.parse(localStorage.getItem('termac_deficiency_queue')||'[]');
  rcpUpdateDefBadge();
  const sevColor = { critical:'#C8102E', major:'#D97706', minor:'#4B5563' };
  const statusLabel = { pending:'Pending Lexi Action', fix_now:'Fix Now', return_visit:'Return Visit Scheduled', resolved:'Resolved' };
  let html = '<div style="padding:16px">';
  html += '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:#C8102E;margin-bottom:4px">Deficiency Queue</div>';
  html += '<div style="font-size:12px;color:#999;margin-bottom:16px">Flagged by field techs. Build quote then choose Fix Now or Return Visit.</div>';
  if (!queue.length) {
    html += '<div style="text-align:center;padding:40px;color:#666;font-family:Barlow Condensed,sans-serif">No deficiencies in queue</div>';
  } else {
    queue.forEach(function(d,i) {
      const sev = d.severity||'minor';
      const color = sevColor[sev]||'#4B5563';
      const isPending = d.status==='pending';
      html += '<div style="background:#1a1a1a;border:1.5px solid '+(isPending&&sev!=='minor'?'#C8102E':'#2a2a2a')+';border-radius:10px;padding:16px;margin-bottom:12px;font-family:Barlow Condensed,sans-serif">';
      html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
      html += '<div><span style="background:'+color+';color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-right:8px">'+(d.sevLabel||sev.toUpperCase())+'</span>';
      html += '<span style="font-size:11px;color:#999">'+(d.createdDate||'')+' '+(d.createdTime||'')+'</span></div>';
      html += '<span style="font-size:11px;color:'+(isPending?'#f87171':'#4ade80')+'">'+(statusLabel[d.status]||d.status)+'</span></div>';
      html += '<div style="font-weight:700;font-size:15px;color:#fff;margin-bottom:2px">'+(d.account||'')+'</div>';
      html += '<div style="font-size:11px;color:#999;margin-bottom:8px">'+(d.address||'')+' | Tech: '+(d.techName||'')+'</div>';
      html += '<div style="font-size:12px;color:#ccc;margin-bottom:4px"><b>Equipment:</b> '+(d.equipment||'')+'</div>';
      html += '<div style="font-size:12px;color:#ccc;margin-bottom:12px"><b>Issue:</b> '+(d.description||'')+'</div>';
      if (isPending) {
        html += '<div style="display:flex;gap:8px">';
        html += '<button onclick="rcpDefAction('+i+',\'fix_now\')" style="flex:1;background:#1E7B3C;color:#fff;border:none;border-radius:7px;padding:9px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px;cursor:pointer">FIX NOW<br><span style="font-weight:400;font-size:10px">Tech fixes on this visit</span></button>';
        html += '<button onclick="rcpDefAction('+i+',\'return_visit\')" style="flex:1;background:#1B5FA8;color:#fff;border:none;border-radius:7px;padding:9px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px;cursor:pointer">RETURN VISIT<br><span style="font-weight:400;font-size:10px">Schedule new WO</span></button>';
        html += '<button onclick="rcpDefAction('+i+',\'resolved\')" style="flex:1;background:#374151;color:#ccc;border:none;border-radius:7px;padding:9px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px;cursor:pointer">RESOLVED<br><span style="font-weight:400;font-size:10px">Mark closed</span></button>';
        html += '</div>';
      } else {
        html += '<div style="font-size:11px;color:#4ade80">Action: '+(d.lexiNotes||d.status)+'</div>';
      }
      html += '</div>';
    });
  }
  html += '</div>';
  panel.innerHTML = html;
}

function rcpDefAction(idx, action) {
  const queue = JSON.parse(localStorage.getItem('termac_deficiency_queue')||'[]');
  if (!queue[idx]) return;
  queue[idx].status = action;
  queue[idx].lexiNotes = action==='fix_now' ? 'Lexi authorized fix now' : action==='return_visit' ? 'Return visit WO created' : 'Marked resolved';
  queue[idx].actionTs = Date.now();
  if (action === 'return_visit') {
    const d = queue[idx];
    try {
      const scheduled = JSON.parse(localStorage.getItem('termac_scheduled_jobs')||'[]');
      scheduled.unshift({ id:'def_return_'+Date.now(), accountId:d.accountId||'', account:d.account,
        address:d.address, division:'UniPro', serviceType:'Deficiency Return Visit - '+d.equipment,
        serviceKey:'deficiency_return', scheduledDate:'TBD - Needs Scheduling',
        scheduledTs:Date.now(), status:'unassigned', techName:null,
        notes:d.description+' (Deficiency logged by '+d.techName+')',
        generatedTs:Date.now(), isDeficiencyReturn:true });
      localStorage.setItem('termac_scheduled_jobs', JSON.stringify(scheduled));
    } catch(e) {}
  }
  localStorage.setItem('termac_deficiency_queue', JSON.stringify(queue));
  rcpRenderDeficiencyQueue();
}

  const callLog = JSON.parse(localStorage.getItem('termac_crm_rcp_calls')||'[]');
  el.innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
    <!-- LOG CALL FORM -->
    <div class="rcp-card">
      <div class="rcp-card-title">📞 Log Incoming Call</div>
      <div id="rcpComplaintAlert" class="rcp-alert-red">⚠️ Complaint — will auto-escalate to management on save.</div>
      <div class="rcp-form-grid">
        <div class="rcp-form-full rcp-lookup-wrap">
          <label>Caller Name</label>
          <input id="rcpCallerName" type="text" placeholder="First Last">
        </div>
        <div class="rcp-form-full rcp-lookup-wrap">
          <label>Company <span style="font-size:10px;color:var(--blue);font-weight:600;text-transform:none;letter-spacing:0">— search accounts</span></label>
          <input id="rcpCallerCompany" type="text" placeholder="Business name" autocomplete="off" oninput="rcpCompanyLookup(this.value)">
          <div id="rcpCompanyDropdown" class="rcp-lookup-dropdown"></div>
        </div>
        <div class="rcp-lookup-wrap">
          <label>Phone <span style="font-size:10px;color:var(--blue);font-weight:600;text-transform:none;letter-spacing:0">— search accounts</span></label>
          <input id="rcpCallerPhone" type="tel" placeholder="(xxx) xxx-xxxx" oninput="rcpPhoneLookup(this.value)">
          <div id="rcpPhoneDropdown" class="rcp-lookup-dropdown"></div>
        </div>
        <div>
          <label>Call Type</label>
          <select id="rcpCallType" onchange="rcpCallTypeChange()">
            <option value="">Select…</option>
            <option>New Service Inquiry</option>
            <option>Existing Customer — Service Question</option>
            <option>Existing Customer — Deficiency / Issue</option>
            <option>Schedule / Reschedule</option>
            <option>Quote / Pricing</option>
            <option>Emergency — Fire Safety</option>
            <option>Complaint</option>
            <option>Vendor / Supplier</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label>Route To</label>
          <select id="rcpRouteTo">
            <option value="">Select…</option>
            <option>Paul Brahan</option>
            <option>Lauren Canfield</option>
            <option>Sales Rep (Territory)</option>
            <option>Scheduling</option>
            <option>Dispatch</option>
            <option>Manager</option>
          </select>
        </div>
        <div>
          <label>Urgency</label>
          <select id="rcpUrgency">
            <option value="Normal">Normal</option>
            <option value="High">High</option>
            <option value="Emergency">Emergency</option>
          </select>
        </div>
        <div class="rcp-form-full">
          <label>Notes</label>
          <textarea id="rcpNotes" rows="3" placeholder="Reason for call, details…"></textarea>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="rcp-btn rcp-btn-purple" onclick="rcpLogCall()">Log Call</button>
        <button class="rcp-btn rcp-btn-blue" onclick="rcpLogAndCreateLead()">Log + Create Lead →</button>
        <button class="rcp-btn rcp-btn-ghost" onclick="rcpClearForm()">Clear</button>
      </div>
    </div>
    <!-- CALL HISTORY LOG -->
    <div class="rcp-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div class="rcp-card-title" style="margin-bottom:0">📋 Call History <span id="rcpHistCount" style="color:var(--ink);font-size:12px;font-weight:700">${callLog.filter(c=>c.ts>=(new Date().setHours(0,0,0,0))).length}</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap" id="rcpFilterBtns">
          <button id="rcpFlt-today"  onclick="rcpSetFilter('today')"  class="rcpFltBtn rcpFltActive">Today</button>
          <button id="rcpFlt-week"   onclick="rcpSetFilter('week')"   class="rcpFltBtn">Week</button>
          <button id="rcpFlt-month"  onclick="rcpSetFilter('month')"  class="rcpFltBtn">Month</button>
          <button id="rcpFlt-all"    onclick="rcpSetFilter('all')"    class="rcpFltBtn">All</button>
        </div>

      <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
        <span style="font-size:11px;color:var(--soft)">Custom:</span>

    if(f.length===0) return '<div style="color:var(--soft);font-size:13px;text-align:center;padding:20px">No calls logged yet today.</div>';

function rcpCallTypeChange(){
  const type = document.getElementById('rcpCallType').value;
  const alert = document.getElementById('rcpComplaintAlert');
  const routeTo = document.getElementById('rcpRouteTo');
  const urgency = document.getElementById('rcpUrgency');
  if(type==='Complaint'){
    alert.style.display='';
    routeTo.value='Paul Brahan';
    urgency.value='High';
  } else if(type==='Emergency — Fire Safety'){
    alert.style.display='none';
    urgency.value='Emergency';
  } else {
    alert.style.display='none';
  }
  if(type==='Existing Customer — Service Question') routeTo.value='Paul Brahan';
}

function rcpCompanyLookup(val){
  const dd = document.getElementById('rcpCompanyDropdown');
  if(!val||val.length<2){dd.style.display='none';return;}
  const q = val.toLowerCase();
  const matches = [];
  ['leads','contacts','accounts'].forEach(pool=>{
    (crmLoad(pool)||[]).forEach(r=>{
      const biz=(r.business||r.name||'').toLowerCase();
      if(biz.includes(q)) matches.push(r);
    });
  });
  if(!matches.length){dd.style.display='none';return;}
  dd.style.display='';
  dd.innerHTML=matches.slice(0,6).map(r=>`
    <div class="rcp-lookup-item" onclick="rcpFillFromRecord(${JSON.stringify(r).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')})">
      <strong>${escH(r.business||r.name||'')}</strong><br>
      <span style="font-size:11px;color:var(--soft)">${escH(r.phone||'')} ${escH(r.address||'')}</span>
    </div>`).join('');
}

function rcpPhoneLookup(val){
  const dd = document.getElementById('rcpPhoneDropdown');
  const digits = val.replace(/\D/g,'');
  if(digits.length<5){dd.style.display='none';return;}
  const matches = [];
  ['leads','contacts','accounts'].forEach(pool=>{
    (crmLoad(pool)||[]).forEach(r=>{
      if((r.phone||'').replace(/\D/g,'').includes(digits)) matches.push(r);
    });
  });
  if(!matches.length){dd.style.display='none';return;}
  dd.style.display='';
  dd.innerHTML=matches.slice(0,4).map(r=>`
    <div class="rcp-lookup-item" onclick="rcpFillFromRecord(${JSON.stringify(r).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')})">
      <strong>${escH(r.business||r.name||'')}</strong><br>
      <span style="font-size:11px;color:var(--soft)">${escH(r.phone||'')} · ${escH(r.lifecycleStage||'lead')}</span>
    </div>`).join('');
}

function rcpFillFromRecord(r){
  document.getElementById('rcpCallerCompany').value = r.business||r.name||'';
  document.getElementById('rcpCallerPhone').value = r.phone||'';
  document.getElementById('rcpCallerName').value = r.name||r.contact||'';
  document.getElementById('rcpCompanyDropdown').style.display='none';
  document.getElementById('rcpPhoneDropdown').style.display='none';
}

function rcpLogCall(){
  const name    = document.getElementById('rcpCallerName').value.trim();
  const company = document.getElementById('rcpCallerCompany').value.trim();
  const phone   = document.getElementById('rcpCallerPhone').value.trim();
  const type    = document.getElementById('rcpCallType').value;
  const routeTo = document.getElementById('rcpRouteTo').value;
  const urgency = document.getElementById('rcpUrgency').value;
  const notes   = document.getElementById('rcpNotes').value.trim();
  if(!name&&!company&&!phone){rcpToast('Enter at least caller name, company, or phone');return;}

  const call = {ts:Date.now(), callerName:name, company, phone, callType:type, routeTo, urgency, notes, loggedBy:_rcpUser?.name||'Reception'};
  const log = JSON.parse(localStorage.getItem('termac_crm_rcp_calls')||'[]');
  log.push(call);
  localStorage.setItem('termac_crm_rcp_calls', JSON.stringify(log));

  // complaint escalation email
  if(type==='Complaint'){
    const subj = encodeURIComponent(`COMPLAINT — ${company||name} — ${new Date().toLocaleString()}`);
    const body = encodeURIComponent(`Termac One Reception Alert\n\nCaller: ${name}\nCompany: ${company}\nPhone: ${phone}\nType: ${type}\nUrgency: ${urgency}\nRouted to: ${routeTo}\nLogged by: ${_rcpUser.name}\n\nNotes:\n${notes}`);
    window.open(`mailto:jkennedy@termac.com,tpittakas@termac.com?subject=${subj}&body=${body}`,'_blank');
  }

  rcpToast('Call logged ✓');
  rcpClearForm();
  rcpRenderCallLog(document.getElementById('rcpPanel-incoming')||document.getElementById('rcpContent'));
  rcpUpdateRail();
}

function rcpLogAndCreateLead(){
  const name    = document.getElementById('rcpCallerName').value.trim();
  const company = document.getElementById('rcpCallerCompany').value.trim();
  const phone   = document.getElementById('rcpCallerPhone').value.trim();
  const notes   = document.getElementById('rcpNotes').value.trim();
  const type    = document.getElementById('rcpCallType').value;
  if(!company&&!name){rcpToast('Enter at least a name or company to create a lead');return;}
  rcpLogCall();
  const lead = {
    id:'RCP'+String(Date.now()).slice(-6),
    name:name||company, business:company||name,
    phone, notes, source:'Reception Call',
    lifecycleStage:'lead', status:'new',
    createdBy:_rcpUser.name, ownedBy:'Unassigned',
    created:Date.now(), updated:Date.now(),
    activityLog:[{ts:Date.now(),icon:'📞',type:'call',title:'Reception Call',note:type||'Inbound call',who:_rcpUser.name}]
  };
  const leads = crmLoad('leads');
  leads.unshift(lead);
  crmSave('leads', leads);
  rcpToast('Lead created and call logged');
  rcpNav('leads');
}

function rcpClearForm(){
  ['rcpCallerName','rcpCallerCompany','rcpCallerPhone','rcpNotes'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  ['rcpCallType','rcpRouteTo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('rcpUrgency').value='Normal';
  document.getElementById('rcpComplaintAlert').style.display='none';
  document.getElementById('rcpCompanyDropdown').style.display='none';
  document.getElementById('rcpPhoneDropdown').style.display='none';
}

// ── CRM VIEWS ──
const RCP_STAGE_COLORS={lead:'#6B7280',contact:'#1B5FA8',opportunity:'#D97706',active:'#1E7B3C',site_visit:'#7C3AED'};
const RCP_STAGE_BG={lead:'#F3F4F6',contact:'#DBEAFE',opportunity:'#FEF3C7',active:'#DCFCE7',site_visit:'#EDE9FE'};
const RCP_STAGE_LABELS={lead:'Lead',contact:'Contact',opportunity:'Opportunity',active:'Active',site_visit:'Site Visit',close:'Closing',onboarding:'Onboarding'};
const RCP_TAB_STAGES={leads:['lead'],contacts:['contact'],accounts:['active','close','onboarding','first_service','renewal']};

function rcpRenderCRM(el, tab){
  const stageKeys = RCP_TAB_STAGES[tab]||['lead'];
  let data = crmLoad('leads').filter(r=>stageKeys.includes(r.lifecycleStage||'lead'));
  if(tab==='accounts'){
    const legacy = crmLoad('accounts').filter(r=>!data.find(x=>x.id===r.id));
    data=[...data,...legacy];
  }
  if(tab==='contacts'){
    const legacy = crmLoad('contacts').filter(r=>!data.find(x=>x.id===r.id));
    data=[...data,...legacy];
  }
  const q = (document.getElementById('rcpCrmSearch')?.value||'').toLowerCase();
  if(q) data=data.filter(r=>JSON.stringify(r).toLowerCase().includes(q));

<script>
// ── Termac role-page navigation ──
(function() {
  var RETURN_KEY = 'trnReturnUrl';

  // Store where we came from so Employee Portal overlay can send us
// ── Call log helpers ──
var _rcpFilter = 'today';

function rcpCallCard(c) {
  var d = new Date(c.ts);
  var dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var timeStr = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  return '<div class="rcp-log-item '+(c.type==='Complaint'?'complaint':'')+'">' +
    '<div class="rcp-log-time">'+dateStr+' '+timeStr+' · '+escH(c.loggedBy||'')+'</div>' +
    '<div class="rcp-log-caller">'+escH(c.name||'Unknown')+(c.company?' — '+escH(c.company):'')+'</div>' +
    '<div class="rcp-log-detail">'+escH(c.type||'')+' · Routed to: '+escH(c.routeTo||'—')+' · '+escH(c.urgency||'Normal')+'</div>' +
    (c.notes?'<div style="font-size:12px;color:var(--soft);margin-top:4px">'+escH(c.notes)+'</div>':'')+
    '</div>';
}

function rcpFilteredCalls(log, filter) {
  var now = new Date();
  var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  var weekStart  = todayStart - (now.getDay() * 86400000);
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  if (filter === 'today')  return log.filter(c => c.ts >= todayStart);
  if (filter === 'week')   return log.filter(c => c.ts >= weekStart);
  if (filter === 'month')  return log.filter(c => c.ts >= monthStart);
  if (filter === 'custom') {
    var from = document.getElementById('rcpDateFrom');
    var to   = document.getElementById('rcpDateTo');
    var fromTs = from && from.value ? new Date(from.value).getTime() : 0;
    var toTs   = to   && to.value   ? new Date(to.value).getTime() + 86399999 : Date.now();
    return log.filter(c => c.ts >= fromTs && c.ts <= toTs);
  }
  return log; // 'all'
}

function rcpSetFilter(filter) {
  _rcpFilter = filter;
  // Update button styles
  ['today','week','month','all'].forEach(function(f) {
    var btn = document.getElementById('rcpFlt-'+f);
    if (!btn) return;
    if (f === filter) btn.classList.add('rcpFltActive');
    else btn.classList.remove('rcpFltActive');
  });
  // Re-render the list
  var allCalls = JSON.parse(localStorage.getItem('termac_crm_rcp_calls')||'[]');
  var filtered = rcpFilteredCalls(allCalls, filter);
  var countEl = document.getElementById('rcpHistCount');
  if (countEl) countEl.textContent = filtered.length;
  var listEl = document.getElementById('rcpCallLogList');
  if (!listEl) return;
  if (filtered.length === 0) {
    listEl.innerHTML = '<div style="color:var(--soft);font-size:13px;text-align:center;padding:20px">No calls in this period.</div>';
  } else {
    listEl.innerHTML = [...filtered].reverse().map(rcpCallCard).join('');
  }
}
  window.trnNavigateTo = function(url) {
    sessionStorage.setItem(RETURN_KEY, window.location.href);
    window.location.href = url;
  };

  // Back: use browser window.location.href='termac-os.html' — works for same-tab rail navigation
  // and for returning from Employee Portal (which uses trnNavigateTo)
  window.trnBack = function() {
    if (history.length > 1) {
      window.location.href='termac-os.html';
    } else {
      window.location.href = 'termac-os.html';
    }
  };
})();
</script>

/* ═══════════════════════════════════════════════════════════════
   TERMAC ONE — INTERNAL MESSAGING SYSTEM

   Storage: Cloudflare KV (primary) → localStorage (fallback)
   Inject into any role page via <script src="termac-chat.js">
═══════════════════════════════════════════════════════════════ */

(function() {
'use strict';

// ── CONFIG ───────────────────────────────────────────────────
const WORKER_URL = 'https://cms-cors-proxy.tedscholl.workers.dev';
const LS_KEY     = 'termac_chat_messages';
const POLL_MS    = 8000; // poll for new messages every 8 seconds

const CHANNELS = [
  { id:'all',        name:'All Staff',     icon:'📢', desc:'Company-wide announcements' },
  { id:'sales',      name:'Sales Team',    icon:'📊', desc:'Reps & territory updates' },
  { id:'dms',        name:'DMS Team',      icon:'📋', desc:'Cold call & outreach team' },

  { id:'office',     name:'Office',        icon:'🏢', desc:'Quotes, billing & admin' },
];

// All known staff for DM list
const STAFF_LIST = [
  'Ted Scholl','Tom Pittakas','TJ O\'Reilly','Brad Fickes','Dan Rini',
  'Chrystal Bush','Tara Colona','Amanda McGowan','Gina Kluge','Kim Reinhart','Donna Meyer',

let _chatOpen    = false;
let _activeRoom  = 'all'; // channel id or 'dm:Name'
let _currentUser = null;

let _unread      = {};    // { roomId: count }
let _pollTimer   = null;
let _lastMsgTs   = 0;

// ── DETECT CURRENT USER ──────────────────────────────────────
function detectUser() {
  // Try various globals set by each portal
  if (window._spRep)   return { name: window._spRep.name,   role: 'Sales Rep' };
  if (window._dmsUser) return { name: window._dmsUser.name, role: 'DMS' };
  if (window._rcpUser) return { name: 'Receptionist', role: 'Reception' };
  if (window._tech)    return { name: window._tech.name,    role: 'Tech' };
  if (window._driver)  return { name: window._driver,       role: 'Driver' };
  if (window._currentUser) return { name: window._currentUser.name, role: window._currentUser.role || 'Staff' };
  return { name: 'Staff', role: 'Staff' };
}

// ── STORAGE ──────────────────────────────────────────────────
async function loadMessages(roomId) {
  try {
    const resp = await fetch(`${WORKER_URL}/chat/${encodeURIComponent(roomId)}`, {
      headers: { 'Content-Type': 'application/json' }
    });
    if (resp.ok) {
      const data = await resp.json();
      _messages[roomId] = data.messages || [];
      return _messages[roomId];
    }
  } catch(e) {}
  // Fallback to localStorage
  const ls = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  _messages[roomId] = ls[roomId] || [];
  return _messages[roomId];
}

async function saveMessage(roomId, msg) {
  const msgs = _messages[roomId] || [];
  msgs.push(msg);
  _messages[roomId] = msgs;

  // Save to localStorage immediately (fast)
  const ls = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  ls[roomId] = msgs.slice(-200); // keep last 200 per room
  localStorage.setItem(LS_KEY, JSON.stringify(ls));

  // Try to save to KV worker
  try {
    await fetch(`${WORKER_URL}/chat/${encodeURIComponent(roomId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
  } catch(e) {}
}

// Poll for new messages
async function pollMessages() {
  if (!_chatOpen || !_activeRoom) return;
  const msgs = await loadMessages(_activeRoom);
  const newMsgs = msgs.filter(m => m.ts > _lastMsgTs);
  if (newMsgs.length > 0) {
    renderMessages();
    _lastMsgTs = Math.max(...msgs.map(m => m.ts));
  }
}

function buildDmList() {
  const list = document.getElementById('tcDmList');
  if (!list) return;

  list.innerHTML = staffNames.map(name => {

    </div>`;

function dmRoomId(otherName) {
  const me = _currentUser?.name || 'Staff';
  const names = [me, otherName].sort();
  return 'dm:' + names.join(':');
}

function escChat(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const safeId = roomId.replace(/[^a-z0-9]/gi,'_');
  const activeBtn = document.getElementById('tcRoom_' + safeId) ||
                    document.getElementById('tcRoom_' + roomId) ||
                    document.getElementById('tcRoom_dm_' + safeId);
  if (activeBtn) activeBtn.classList.add('active');

  // Update header
  const ch = CHANNELS.find(c => c.id === roomId);
  const titleEl = document.getElementById('tcRoomTitle');
  const descEl  = document.getElementById('tcRoomDesc');
  if (titleEl) titleEl.textContent = title || (ch ? '#'+ch.name : roomId);
  if (descEl)  descEl.textContent  = desc  || (ch ? ch.desc : '');

  // Clear unread
  _unread[roomId] = 0;
  updateBadges();

  // Load messages
  const msgs = document.getElementById('tcMessages');
  if (msgs) msgs.innerHTML = '<div id="tcEmpty" style="text-align:center;padding:30px;color:#9CA3AF;font-size:13px">Loading…</div>';

  await loadMessages(roomId);
  renderMessages();

// ── RENDER MESSAGES ──────────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('tcMessages');
  if (!container) return;
  const msgs = _messages[_activeRoom] || [];
  if (msgs.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px"><span style="font-size:32px">💬</span>No messages yet — say something!</div>';
    return;
  }

  const me = _currentUser?.name || 'Staff';
  let html = '';
  let lastDate = '';

  msgs.forEach(m => {
    const d = new Date(m.ts);
    const dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if (dateStr !== lastDate) {
      html += `<div class="tc-msg-date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isMine = m.sender === me;
    const timeStr = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    html += `<div class="tc-msg ${isMine?'mine':'theirs'}">
      <div class="tc-msg-meta">
        ${!isMine?`<span class="tc-msg-sender">${escChat(m.sender)}</span>`:''}
        <span>${timeStr}</span>
      </div>
      <div class="tc-msg-bubble">${escChat(m.text)}</div>
    </div>`;
  });

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// ── SEND ─────────────────────────────────────────────────────
window.tcSend = async function() {
  const inp = document.getElementById('tcInput');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;

  _currentUser = detectUser();
  const msg = { ts: Date.now(), sender: _currentUser.name, role: _currentUser.role, text };

  inp.value = '';
  inp.style.height = 'auto';

  await saveMessage(_activeRoom, msg);
  renderMessages();
};

// ── BADGES ───────────────────────────────────────────────────
function updateBadges() {
  let total = 0;
  Object.entries(_unread).forEach(([room, count]) => {
    const safeId = room.replace(/[^a-z0-9]/gi,'_');
    const badge = document.getElementById('tcBadge_'+safeId) || document.getElementById('tcBadge_'+room);
    if (badge) { badge.textContent = count; badge.style.display = count ? 'block' : 'none'; }
    total += count;
  });
  const fab = document.getElementById('tcBadge');
  if (fab) { fab.textContent = total; fab.style.display = total ? 'block' : 'none'; }
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  injectCSS();
  injectHTML();
  // Load unread counts from localStorage
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  _messages = saved;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();



/* ══ COLD CALLS TAB ════════════════════════════════════════════ */


function rcpRenderColdCalls(){
  const panel = document.getElementById('rcpPanel-coldcalls');
  if(!panel) return;
  const data = crmLoad('dms_coldcall');
  const today = new Date().toISOString().slice(0,10);
  const worked = data.filter(r=>r.dmsContactedToday===today).length;
  const target = 20;
  const pct = Math.min(100,Math.round(worked/target*100));
  const filtered = data.slice(0,target);

  panel.innerHTML = `
    <div class="rcp-cc-progress">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px">📋 ${worked} / ${target} called today</span>
      <div class="rcp-cc-bar"><div class="rcp-cc-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:var(--soft);white-space:nowrap">${pct}%</span>
    </div>
    ${data.length===0
      ? `<div class="rcp-card" style="text-align:center;padding:32px;color:var(--soft)">
           <div style="font-size:32px;margin-bottom:10px">📋</div>
           <div style="font-weight:700;margin-bottom:8px">No cold call leads loaded yet</div>
           <div style="font-size:12px;margin-bottom:14px">Leads from the DMS cold call pool will appear here.<br>A manager can load leads into the pool from the Manager Portal → CRM → Leads.</div>
         </div>`
      : filtered.length===0
      ? '<div class="rcp-card" style="text-align:center;padding:32px;color:var(--soft)"><div style="font-size:32px;margin-bottom:10px">📭</div>All 20 calls worked today — great job!</div>'
      : `<div class="rcp-card" style="padding:0;overflow:hidden">
          <table class="rcp-call-table">
            <thead><tr>
              <th style="width:28px">✓</th>
              <th style="min-width:130px">Business</th>
              <th style="width:120px">Phone</th>
              <th style="width:14%">Lines</th>
              <th style="width:155px">Outcome</th>
              <th>Notes</th>
            </tr></thead>
            <tbody>${filtered.map(r=>rcpColdRow(r,today)).join('')}</tbody>
          </table>
        </div>`
    }`;
  rcpUpdateRail();
}

function rcpColdRow(r, today){
  const contacted = r.dmsContactedToday===today;
  const outcome = r.status||'';
  const outClass = outcome==='hot'?'hot':outcome==='callback'?'callback':outcome==='not_interested'?'not_interested':'';
  const divBtns = RCP_DIVISIONS.map(d=>{
    const on = (r.divisions||[]).includes(d);
    const col = RCP_DIV_COLORS[d]||'#6B7280';
    return `<button class="rcp-div-btn${on?' on':''}" style="${on?'background:'+col+';border-color:'+col+';':''}"
      onclick="rcpColdDivToggle('${r.id||''}','${d}',this)">${d}</button>`;
  }).join(' ');

  return `<tr id="rcp-row-${r.id||''}" class="${contacted?'':''}">
    <td><input type="checkbox" class="rcp-check" ${contacted?'checked':''} onchange="rcpColdToggle('${r.id||''}',this.checked)"></td>
    <td>
      <div style="font-weight:700;font-size:13px;color:var(--ink)">${escH(r.bizName||r.businessName||'Unknown')}</div>
      <div style="font-size:11px;color:#6B7280">${escH(r.city||'')}${r.zip?' · '+escH(r.zip):''}</div>
    </td>
    <td><a href="tel:${escH(r.phone||'')}" style="color:var(--blue);font-size:12px;font-weight:600">${escH(r.phone||'—')}</a></td>
    <td><div style="display:flex;flex-wrap:wrap;gap:3px">${divBtns}</div></td>
    <td>
      <select class="rcp-outcome-sel ${outClass}" id="rcp-out-${r.id||''}"
        onchange="rcpColdOutcome('${r.id||''}',this.value,this)">
        <option value="">— Outcome —</option>
        <option value="hot" ${outcome==='hot'?'selected':''}>🔥 Hot Lead</option>
        <option value="callback" ${outcome==='callback'?'selected':''}>📅 Call Back</option>
        <option value="warm" ${outcome==='warm'?'selected':''}>🌤 Warm</option>
        <option value="voicemail" ${outcome==='voicemail'?'selected':''}>📬 Voicemail</option>
        <option value="no_answer" ${outcome==='no_answer'?'selected':''}>📵 No Answer</option>
        <option value="not_interested" ${outcome==='not_interested'?'selected':''}>✗ Not Interested</option>
        <option value="wrong_number" ${outcome==='wrong_number'?'selected':''}>🚫 Wrong #</option>
        <option value="do_not_call" ${outcome==='do_not_call'?'selected':''}>⛔ DNC</option>
      </select>
    </td>
    <td><textarea class="rcp-notes-inp" placeholder="Notes…" onblur="rcpColdSaveNotes('${r.id||''}',this.value)">${escH(r.dmsNotes||r.notes||'')}</textarea></td>
  </tr>`;
}

function rcpColdToggle(id, checked){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id); if(!r) return;
  const today = new Date().toISOString().slice(0,10);
  r.dmsContactedToday = checked ? today : null;
  r.dmsRep = _rcpUser?.name||'Reception';
  r.updated = Date.now();
  crmSave('dms_coldcall', data);
  rcpUpdateRail();
}

function rcpColdOutcome(id, outcome, selEl){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id); if(!r) return;
  r.status = outcome;
  r.dmsRep = _rcpUser?.name||'Reception';
  r.updated = Date.now();
  // Auto-mark contacted
  const today = new Date().toISOString().slice(0,10);
  if(outcome && outcome!=='') r.dmsContactedToday = today;
  crmSave('dms_coldcall', data);
  // Update select styling
  selEl.className = 'rcp-outcome-sel ' + (outcome==='hot'?'hot':outcome==='callback'?'callback':outcome==='not_interested'?'not_interested':'');
  // Check the checkbox
  const row = document.getElementById('rcp-row-'+id);
  if(row){ const cb=row.querySelector('.rcp-check'); if(cb) cb.checked=true; }
  if(outcome==='hot') rcpToast('🔥 Hot lead flagged — will appear in CRM pipeline!');
  rcpUpdateRail();
}

function rcpColdSaveNotes(id, notes){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id); if(!r) return;
  r.dmsNotes = notes;
  r.notes = notes;
  r.updated = Date.now();
  crmSave('dms_coldcall', data);
}

function rcpColdDivToggle(id, div, btn){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id); if(!r) return;
  if(!r.divisions) r.divisions=[];
  const idx = r.divisions.indexOf(div);
  if(idx===-1){ r.divisions.push(div); btn.classList.add('on'); const col=RCP_DIV_COLORS[div]||'#6B7280'; btn.style.background=col; btn.style.borderColor=col; }
  else { r.divisions.splice(idx,1); btn.classList.remove('on'); btn.style.background=''; btn.style.borderColor=''; }
  crmSave('dms_coldcall', data);
}

/* ══ ALL CRM TAB ════════════════════════════════════════════════ */
function rcpRenderAllCRM(){
  const panel = document.getElementById('rcpPanel-crm');
  if(!panel) return;
  const q = (document.getElementById('rcpCRMSearch')?.value||'').toLowerCase();
  const leads = crmLoad('dms_coldcall').filter(r=>r.status==='hot'||r.status==='warm'||r.status==='callback');
  const contacts = crmLoad('contacts');
  const accounts = crmLoad('accounts');

  const filterRecs = (arr) => q ? arr.filter(r=>JSON.stringify(r).toLowerCase().includes(q)) : arr;

  panel.innerHTML = `
    <div class="rcp-crm-search-bar">
      <input class="rcp-crm-search" id="rcpCRMSearch" placeholder="Search all records by name, phone, business…" oninput="rcpRenderAllCRM()" value="${escH(q)}">
      <span style="font-size:12px;color:var(--soft);white-space:nowrap">${filterRecs(leads).length + filterRecs(contacts).length + filterRecs(accounts).length} records</span>
    </div>
    ${rcpCRMSection('🔥 Active Leads', filterRecs(leads), 'lead')}
    ${rcpCRMSection('👤 Contacts', filterRecs(contacts), 'contact')}
    ${rcpCRMSection('🏢 Accounts', filterRecs(accounts), 'account')}
  `;
  if(q) document.getElementById('rcpCRMSearch').value=q;
}

function rcpCRMSection(title, records, type){
  if(!records.length) return `<div class="rcp-card" style="padding:12px 16px;margin-bottom:10px"><div class="rcp-card-title">${title}</div><div style="color:var(--soft);font-size:13px;text-align:center;padding:12px">No records</div></div>`;
  const colors={'lead':'#F59E0B','contact':'#7C3AED','account':'#1B5FA8'};
  return `<div class="rcp-card" style="padding:0;overflow:hidden;margin-bottom:12px">
    <div style="padding:10px 14px;border-bottom:1px solid var(--line);background:#F8F9FA">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)">${title}</span>
      <span style="margin-left:8px;background:${colors[type]||'#6B7280'};color:#fff;border-radius:99px;padding:1px 8px;font-size:10px;font-weight:700">${records.length}</span>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#F8F9FA">
        <th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--soft);text-align:left;border-bottom:1px solid var(--line)">Name / Business</th>
        <th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--soft);text-align:left;border-bottom:1px solid var(--line)">Phone</th>
        <th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--soft);text-align:left;border-bottom:1px solid var(--line)">Status</th>
        <th style="padding:7px 12px;font-size:10px;font-weight:700;color:var(--soft);text-align:left;border-bottom:1px solid var(--line)">Notes</th>
      </tr></thead>
      <tbody>${records.slice(0,20).map(r=>`<tr style="border-bottom:1px solid var(--line)">
        <td style="padding:9px 12px">
          <div style="font-weight:700;font-size:13px">${escH(r.bizName||r.businessName||r.name||r.business||'—')}</div>
          <div style="font-size:11px;color:var(--soft)">${escH(r.contactName||r.contact||'')}</div>
        </td>
        <td style="padding:9px 12px"><a href="tel:${escH(r.phone||'')}" style="color:var(--blue);font-size:12px;font-weight:600">${escH(r.phone||'—')}</a></td>
        <td style="padding:9px 12px"><span style="background:${colors[type]||'#E5E7EB'};color:#fff;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">${escH(r.status||type)}</span></td>
        <td style="padding:9px 12px;font-size:12px;color:var(--soft);max-width:200px">${escH((r.notes||r.dmsNotes||'').slice(0,80))}${(r.notes||r.dmsNotes||'').length>80?'…':''}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

/* ══ LEFT RAIL ══════════════════════════════════════════════════ */
var _rcpUser = null;

function rcpUpdateRail(){
  const callLog = crmLoad('rcp_calls');
  const today = new Date().toISOString().slice(0,10);
  const todayCalls = callLog.filter(c=>c.ts&&new Date(c.ts).toISOString().slice(0,10)===today);
  const urgent = todayCalls.filter(c=>c.urgency==='Urgent'||c.urgency==='Emergency');
  const todayLeads = crmLoad('dms_coldcall').filter(r=>r.dmsContactedToday===today);

  // Stats
  const eById = id => document.getElementById(id);
  if(eById('railCallsLogged')) eById('railCallsLogged').textContent = todayCalls.length;
  if(eById('railLeadsCreated')) eById('railLeadsCreated').textContent = crmLoad('dms_coldcall').filter(r=>r.createdToday===today).length;
  if(eById('railColdWorked')) eById('railColdWorked').textContent = todayLeads.length;
  if(eById('railUrgent')) eById('railUrgent').textContent = urgent.length;

  // Urgent flags
  const urgEl = eById('rcpRailUrgent');
  if(urgEl){
    if(urgent.length){
      urgEl.innerHTML = urgent.slice(0,3).map(c=>`<div class="rcp-flag-item">
        <div class="rcp-flag-biz">🚨 ${escH(c.callerName||'Unknown')} — ${escH(c.company||'')}</div>
        <div class="rcp-flag-meta">${escH(c.callType||'')} · ${new Date(c.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
      </div>`).join('');
    } else {
      urgEl.innerHTML = '<div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">No urgent items</div>';
    }
  }

  // Recent calls
  const recentEl = eById('rcpRailRecent');
  if(recentEl){
    if(todayCalls.length){
      recentEl.innerHTML = todayCalls.slice(-5).reverse().map(c=>`<div style="padding:7px 0;border-bottom:1px solid #2A2E33;font-size:11px">
        <div style="font-weight:700;color:#BFC4CA">${escH(c.callerName||'Unknown')}</div>
        <div style="color:#4B5563">${escH(c.company||'')} · ${escH(c.callType||'')}</div>
        <div style="color:#4B5563">${new Date(c.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
      </div>`).join('');
    } else {
      recentEl.innerHTML = '<div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">No calls yet today</div>';
    }
  }

  // Update cold call badge
  const ccBadge = eById('rcpCCBadge');
  if(ccBadge) ccBadge.textContent = Math.max(0, 20 - todayLeads.length) + ' left';
}

function rcpRailSearch(q){
  const el = document.getElementById('rcpRailResults');
  if(!el) return;
  if(!q || q.length < 2){ el.innerHTML='<div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">Type to search all records</div>'; return; }
  const ql = q.toLowerCase();
  const match = r => JSON.stringify(r).toLowerCase().includes(ql);
  const leads = crmLoad('dms_coldcall').filter(match).slice(0,4);
  const contacts = crmLoad('contacts').filter(match).slice(0,3);
  const accounts = crmLoad('accounts').filter(match).slice(0,3);
  const all = [
    ...leads.map(r=>({...r,_type:'lead'})),
    ...contacts.map(r=>({...r,_type:'contact'})),
    ...accounts.map(r=>({...r,_type:'account'}))
  ].slice(0,8);
  if(!all.length){ el.innerHTML='<div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">No matches found</div>'; return; }
  const colors={'lead':'#F59E0B','contact':'#7C3AED','account':'#1B5FA8'};
  el.innerHTML = all.map(r=>`<div class="rcp-search-result" onclick="rcpFillFromSearch('${escH(r.id||'')}','${r._type}')">
    <div class="rcp-search-biz">${escH(r.bizName||r.businessName||r.name||r.business||'Unknown')}</div>
    <div class="rcp-search-meta">
      <span class="rcp-search-pill" style="background:${colors[r._type]};color:#fff">${r._type}</span>
      ${escH(r.phone||'')} ${escH(r.contactName||r.contact||'')}
    </div>
  </div>`).join('');
}

function rcpFillFromSearch(id, type){
  // Switch to incoming tab and fill the form
  rcpSwitchTab('incoming');
  const data = crmLoad(type==='lead'?'dms_coldcall':type==='contact'?'contacts':'accounts');
  const r = data.find(x=>x.id===id); if(!r) return;
  const nameEl = document.getElementById('rcpCallerName');
  const compEl = document.getElementById('rcpCompany');
  const phoneEl = document.getElementById('rcpPhone');
  if(nameEl) nameEl.value = r.contactName||r.contact||r.name||'';
  if(compEl) compEl.value = r.bizName||r.businessName||r.name||r.business||'';
  if(phoneEl) phoneEl.value = r.phone||'';
  document.getElementById('rcpRailSearch').value = '';
  document.getElementById('rcpRailResults').innerHTML = '<div style="font-size:10px;color:#4B5563;text-align:center;padding:8px">✓ Form filled from record</div>';
  rcpToast('Record loaded into call form ✓');
}

// Auto-refresh rail every 30s
setInterval(rcpUpdateRail, 30000);

</script>

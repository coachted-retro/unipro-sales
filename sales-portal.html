<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Termac One — Sales Portal</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-main-32.png">
<link rel="alternate icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ── */
:root{
  --bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;
  --red:#C8102E;--yellow:#F2B705;--green:#1E7B3C;--blue:#1B5FA8;--orange:#D8690B;
  --gray:#6B7280;--radius:10px;--shadow:0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06);
  --rail-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;outline:none;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
button{cursor:pointer}

/* ── SIDEBAR ── */
.side-rail{
  position:fixed;top:0;left:0;width:var(--rail-w);height:100vh;
  background:#1A1D21;border-right:1px solid rgba(255,255,255,.06);
  z-index:300;display:flex;flex-direction:column;overflow:hidden;
  transition:width .2s ease;-webkit-font-smoothing:antialiased;
}
.rail-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:72px;flex-shrink:0;border-bottom:3px solid var(--red);
}
.rail-logo{display:flex;align-items:center;gap:10px;overflow:hidden}
.rail-logo-txt{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:.12em;text-transform:uppercase;
  color:#F2B705;white-space:nowrap;transition:opacity .15s,max-width .15s;max-width:130px;
}
body.rail-collapsed .rail-logo-txt{opacity:0;max-width:0}
.rail-tog{
  background:none;border:none;cursor:pointer;color:#BFC4CA;
  font-size:18px;padding:6px;border-radius:5px;flex-shrink:0;line-height:1;
}
.rail-tog:hover{background:#2A2E33;color:#fff}
.rail-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0 16px;scrollbar-width:none}
.rail-nav::-webkit-scrollbar{display:none}
.rail-sec{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.28);padding:10px 16px 2px;white-space:nowrap;
  overflow:hidden;transition:opacity .15s;
}
body.rail-collapsed .rail-sec{opacity:0}
.rail-div{height:1px;background:rgba(255,255,255,.08);margin:6px 0}
.rail-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;
  color:rgba(255,255,255,.55);font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:13px;letter-spacing:.04em;white-space:nowrap;
  border-left:3px solid transparent;transition:background .12s,color .12s,border-color .12s;
}
.rail-item:hover{background:#2A2E33;color:#fff}
.rail-item.ri-active{background:rgba(200,16,46,.18);border-left-color:var(--red);color:#fff}
.ri-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.ri-lbl{overflow:hidden;transition:opacity .15s,max-width .15s;max-width:150px}
body.rail-collapsed .ri-lbl{opacity:0;max-width:0}
.ri-badge{
  margin-left:auto;background:var(--red);color:#fff;border-radius:99px;
  padding:1px 7px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif;
  flex-shrink:0;transition:opacity .15s;
}
body.rail-collapsed .ri-badge{opacity:0}
body.rail-collapsed .rail-item:hover::after{
  content:attr(data-tip);position:fixed;left:70px;
  background:#2A2E33;color:#fff;padding:4px 10px;border-radius:5px;
  font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  white-space:nowrap;pointer-events:none;z-index:400;box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.rail-profile{
  padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;
  display:flex;align-items:center;gap:9px;overflow:hidden;
}
.rail-avatar{
  width:30px;height:30px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;
  color:#fff;flex-shrink:0;
}
.rail-profile-txt{overflow:hidden;transition:opacity .15s,max-width .15s;max-width:130px}
body.rail-collapsed .rail-profile-txt{opacity:0;max-width:0}
.rail-rep-name{font-weight:700;font-size:12px;color:#fff;white-space:nowrap}
.rail-rep-role{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}

/* ── COLLAPSED STATE ── */
body.rail-collapsed{--rail-w:64px}

/* ── MAIN CONTENT ── */
.sp-main{margin-left:var(--rail-w);transition:margin-left .2s ease;min-height:100vh;display:flex;flex-direction:column}
.sp-topbar{
  background:var(--panel);border-bottom:1.5px solid var(--line);
  padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.sp-topbar-left{display:flex;align-items:center;gap:12px}
.sp-page-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
.sp-topbar-right{display:flex;align-items:center;gap:10px}
.sp-content{flex:1;padding:18px 20px;max-width:1400px;width:100%}

/* ── LOGIN SCREEN ── */
.sp-login{
  position:fixed;inset:0;background:#1A1D21;
  display:flex;align-items:center;justify-content:center;z-index:500;
}
.sp-login-card{
  background:#22272E;border-radius:14px;padding:36px 40px;width:100%;max-width:380px;
  border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.sp-login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705;margin-bottom:4px}
.sp-login-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:28px}
.sp-login-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.sp-login-sel{width:100%;padding:10px 12px;background:#2A2E33;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;margin-bottom:14px}
.sp-login-pin{width:100%;padding:10px 12px;background:#2A2E33;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;letter-spacing:.2em;text-align:center;margin-bottom:20px}
.sp-login-pin::placeholder{letter-spacing:normal;color:rgba(255,255,255,.25)}
.sp-login-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.sp-login-btn:hover{background:#A50D22}
.sp-login-err{color:#FCA5A5;font-size:12px;margin-top:10px;text-align:center;display:none}

/* ── CARDS & PANELS ── */
.sp-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.sp-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}

/* ── CRM FILTERS BAR ── */
.sp-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sp-search{flex:1;min-width:200px;max-width:300px;padding:8px 12px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:13px}
.sp-filter-sel{padding:7px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:12px;color:var(--ink)}
.sp-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;cursor:pointer;white-space:nowrap}
.sp-btn-red{background:var(--red);color:#fff}
.sp-btn-blue{background:var(--blue);color:#fff}
.sp-btn-green{background:var(--green);color:#fff}
.sp-btn-yellow{background:var(--yellow);color:#1A1D21}
.sp-btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}

/* ── LEAD / CONTACT CARDS ── */
.sp-record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.sp-record{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-left:4px solid transparent;cursor:pointer;transition:box-shadow .12s}
.sp-record:hover{box-shadow:0 4px 20px rgba(26,29,33,.14)}
.sp-rec-biz{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ink);margin-bottom:2px}
.sp-rec-name{font-size:12px;color:var(--soft);margin-bottom:6px}
.sp-rec-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--soft);margin-bottom:3px}
.sp-rec-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sp-stage-pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
.sp-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sp-rec-btn{padding:4px 10px;border:1.5px solid var(--line);border-radius:5px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;background:#fff;color:var(--ink);cursor:pointer}
.sp-rec-btn:hover{background:var(--bg)}
.sp-rec-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── CALENDAR ── */
.sp-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.sp-cal-hdr{font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;text-align:center;padding:3px 0}
.sp-cal-day{min-height:36px;border-radius:6px;padding:3px 5px;background:#F9FAFB;border:1px solid #E5E7EB;cursor:pointer;transition:background .1s}
.sp-cal-day:hover{background:#EFF6FF}
.sp-cal-day.today{background:var(--red);border-color:var(--red)}
.sp-cal-day.has-appt{background:#EFF6FF;border-color:#BFDBFE}
.sp-cal-day .day-num{font-size:11px;font-weight:700;color:var(--soft)}
.sp-cal-day.today .day-num{color:#fff;font-weight:800}
.sp-cal-day.has-appt .day-num{color:var(--blue)}

/* ── NEEDS ATTENTION ── */
.sp-alert{background:#fff;border-radius:8px;padding:11px 14px;border-left:4px solid var(--yellow);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 1px 3px rgba(26,29,33,.06)}
.sp-alert.sp-alert-red{border-left-color:var(--red)}
.sp-alert.sp-alert-green{border-left-color:var(--green)}
.sp-alert-txt{font-size:13px;color:var(--ink);font-weight:600}
.sp-alert-sub{font-size:11px;color:var(--soft);margin-top:2px}
.sp-alert-btns{display:flex;gap:6px;flex-shrink:0}

/* ── GOALS & STATS ── */
.sp-goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.sp-goal-kpi{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.sp-goal-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--ink);line-height:1}
.sp-goal-lbl{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.sp-goal-sub{font-size:11px;color:var(--soft);margin-top:2px}
.sp-progress-bar{height:8px;background:#E5E7EB;border-radius:99px;overflow:hidden;margin-top:8px}
.sp-progress-fill{height:100%;border-radius:99px;background:var(--green);transition:width .4s}

/* ── QUEUE ── */
.sp-queue-item{background:var(--panel);border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:4px solid var(--blue);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;box-shadow:var(--shadow)}
.sp-queue-item.urgent{border-left-color:var(--red)}
.sp-queue-item.done{opacity:.5;border-left-color:var(--gray)}
.sp-queue-title{font-size:13px;font-weight:700;color:var(--ink)}
.sp-queue-sub{font-size:11px;color:var(--soft);margin-top:3px}

/* ── MODAL ── */
.sp-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:16px}
.sp-modal-bg.open{display:flex}
.sp-modal{background:var(--panel);border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.sp-modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.sp-modal-close{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer;line-height:1}
.sp-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sp-form-full{grid-column:1/-1}
.sp-svc-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.sp-svc-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;user-select:none}

/* ── SITE NOTES BANNER ── */
.sp-site-notes{background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:#78350F}
.sp-site-notes-lbl{font-size:10px;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}

/* ── TOAST ── */
#spToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

/* ── WEEKLY REPORT ── */
.sp-week-section{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.sp-week-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin-bottom:12px}
.sp-week-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.sp-week-row:last-child{border-bottom:none}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  :root{--rail-w:0px}
  .side-rail{width:240px!important;transform:translateX(-100%);transition:transform .25s ease}
  body.rail-open .side-rail{transform:translateX(0)}
  body.rail-open .rail-overlay{display:block}
  .rail-logo-txt,.ri-lbl,.rail-sec,.rail-profile-txt{opacity:1!important;max-width:200px!important}
  .sp-main{margin-left:0}
}
.rail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299}
body.rail-open .rail-overlay{display:block}
</style>
</head>
<body>

<!-- ══════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div class="sp-login" id="spLogin">
  <div class="sp-login-card">
    <div class="sp-login-logo">Termac One</div>
    <div class="sp-login-sub">Sales Portal — Rep Access</div>
    <label class="sp-login-label">Select Your Name</label>
    <select class="sp-login-sel" id="spLoginName">
      <option value="">— Select rep —</option>
      <option value="Ted Scholl">Ted Scholl</option>
      <option value="Tom Pittakas">Tom Pittakas</option>
      <option value="TJ O'Reilly">TJ O'Reilly</option>
      <option value="Brad Fickes">Brad Fickes</option>
      <option value="Dan Rini">Dan Rini</option>
      <option value="Chris Carzo">Chris Carzo</option>
      <option value="Tom Jordan">Tom Jordan</option>
      <option value="Joe McDonnell">Joe McDonnell</option>
      <option value="Matt Belz">Matt Belz</option>
      <option value="Todd Grill">Todd Grill</option>
    </select>
    <label class="sp-login-label">PIN</label>
    <input class="sp-login-pin" id="spLoginPin" type="password" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')spLogin()">
    <button class="sp-login-btn" onclick="spLogin()">Sign In →</button>
    <div class="sp-login-err" id="spLoginErr">Incorrect PIN — try again</div>
  </div>
</div>

<!-- ══════════════════════════════════
     SIDE RAIL
══════════════════════════════════════ -->
<div class="rail-overlay" onclick="document.body.classList.remove('rail-open')"></div>
<nav class="side-rail" id="sideRail">
  <div class="rail-hdr">
    <div class="rail-logo">
      <img src="termac-one-logo-64.png" alt="Termac One" style="height:44px;width:44px;object-fit:contain;flex-shrink:0;border-radius:8px">
      <span class="rail-logo-txt">Termac One</span>
    </div>
    <button class="rail-tog" onclick="spToggleRail()" title="Collapse/expand">☰</button>
  </div>

  <div class="rail-nav">
    <div class="rail-sec">Pipeline</div>
    <div class="rail-item ri-active" onclick="spNav('leads')" data-tip="Leads" id="spNavLeads">
      <span class="ri-icon">🎯</span><span class="ri-lbl">Leads</span>
    </div>
    <div class="rail-item" onclick="spNav('contacts')" data-tip="Contacts" id="spNavContacts">
      <span class="ri-icon">📞</span><span class="ri-lbl">Contacts</span>
    </div>
    <div class="rail-item" onclick="spNav('opportunities')" data-tip="Opportunities" id="spNavOpportunities">
      <span class="ri-icon">💼</span><span class="ri-lbl">Opportunities</span>
    </div>
    <div class="rail-item" onclick="spNav('accounts')" data-tip="Accounts" id="spNavAccounts">
      <span class="ri-icon">🏢</span><span class="ri-lbl">Accounts</span>
    </div>

    <div class="rail-div"></div>
    <div class="rail-sec">My Work</div>
    <div class="rail-item" onclick="spNav('goals')" data-tip="Goals & Stats" id="spNavGoals">
      <span class="ri-icon">📊</span><span class="ri-lbl">Goals & Stats</span>
    </div>
    <div class="rail-item" onclick="spNav('weekly')" data-tip="Weekly Report" id="spNavWeekly">
      <span class="ri-icon">📋</span><span class="ri-lbl">Weekly Report</span>
    </div>
    <div class="rail-item" onclick="spNav('queue')" data-tip="My Queue" id="spNavQueue">
      <span class="ri-icon">🔔</span><span class="ri-lbl">My Queue</span>
      <span class="ri-badge" id="spQueueBadge" style="display:none">0</span>
    </div>

    <div class="rail-div"></div>
    <div class="rail-sec">Portal</div>
    <div class="rail-item" onclick="spNav('employee')" data-tip="Employee Portal" id="spNavEmployee">
      <span class="ri-icon">👤</span><span class="ri-lbl">Employee Portal</span>
    </div>
  </div>

  <div class="rail-profile">
    <div class="rail-avatar" id="spRailAvatar">T</div>
    <div class="rail-profile-txt">
      <div class="rail-rep-name" id="spRailName">Rep Name</div>
      <div class="rail-rep-role">Sales Rep</div>
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════
     MAIN CONTENT
══════════════════════════════════════ -->
<div class="sp-main" id="spMain" style="display:none">
  <div class="sp-topbar">
    <div class="sp-topbar-left">
      <button style="background:none;border:none;color:var(--soft);font-size:20px;cursor:pointer;display:none" id="spMobMenuBtn" onclick="document.body.classList.toggle('rail-open')">☰</button>
      <div class="sp-page-title" id="spPageTitle">Leads</div>
    </div>
    <div class="sp-topbar-right">
      <span style="font-size:12px;color:var(--soft)" id="spTopDate"></span>
      <button class="sp-btn sp-btn-ghost" onclick="spLogout()" style="font-size:11px;padding:5px 10px">Sign Out</button>
    </div>
  </div>

  <div class="sp-content" id="spContent"></div>
</div>

<!-- ══════════════════════════════════
     ADD / EDIT MODAL
══════════════════════════════════════ -->
<div class="sp-modal-bg" id="spModalBg">
  <div class="sp-modal">
    <div class="sp-modal-title">
      <span id="spModalTitle">Add Lead</span>
      <button class="sp-modal-close" onclick="spCloseModal()">✕</button>
    </div>
    <div id="spModalBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px">

      <button class="sp-btn sp-btn-ghost" onclick="spCloseModal()">Cancel</button>

</div>

<!-- Toast -->

<script>
// ══════════════════════════════════════════════════════
//  SHARED STORAGE (same keys as termac-os.html)
// ══════════════════════════════════════════════════════
function crmLoad(key){ try{ return JSON.parse(localStorage.getItem('termac_crm_'+key)||'[]'); }catch(e){return[];} }
function crmSave(key,val){ try{ localStorage.setItem('termac_crm_'+key,JSON.stringify(val)); }catch(e){} }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════
//  REPS & AUTH (placeholder PINs — replaced by Azure SSO)
// ══════════════════════════════════════════════════════
const SP_REPS = {
  'Ted Scholl':   { pin:'6336', initials:'TS', territory:[] }, // empty = all territory
  'Tom Pittakas': { pin:'7467', initials:'TP', territory:[] },
  "TJ O'Reilly":  { pin:'8031', initials:'TJ', territory:[] },
  'Brad Fickes':  { pin:'2025', initials:'BF', territory:[] },
  'Dan Rini':     { pin:'2025', initials:'DR', territory:[] },
  'Chris Carzo':  { pin:'2025', initials:'CC', territory:[] },
  'Tom Jordan':   { pin:'2025', initials:'TJ', territory:[] },
  'Joe McDonnell':{ pin:'2025', initials:'JM', territory:[] },
  'Matt Belz':    { pin:'2025', initials:'MB', territory:[] },
  'Todd Grill':   { pin:'2025', initials:'TG', territory:[] },
};

let _spRep = null; // currently logged-in rep
let _spTab = 'leads';
let _spEditId = null;

// ══════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ══════════════════════════════════════════════════════
function spLogin() {
  const name = document.getElementById('spLoginName').value;
  const pin  = document.getElementById('spLoginPin').value.trim();
  const err  = document.getElementById('spLoginErr');
  err.style.display = 'none';

  if (!name) { err.textContent = 'Please select your name.'; err.style.display = 'block'; return; }
  const rep = SP_REPS[name];
  if (!rep || rep.pin !== pin) { err.textContent = 'Incorrect PIN — try again.'; err.style.display = 'block'; return; }

  _spRep = { name, ...rep };
  sessionStorage.setItem('sp_rep', JSON.stringify(_spRep));
  spEnterPortal();
}

function spLogout() {
  sessionStorage.removeItem('sp_rep');
  _spRep = null;
  document.getElementById('spLogin').style.display = 'flex';
  document.getElementById('spMain').style.display = 'none';
}

function spEnterPortal() {
  document.getElementById('spLogin').style.display = 'none';
  document.getElementById('spMain').style.display = 'flex';
  // Set rail profile
  document.getElementById('spRailAvatar').textContent = _spRep.initials;
  document.getElementById('spRailName').textContent = _spRep.name;
  // Date in topbar
  document.getElementById('spTopDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  spUpdateQueueBadge();
  // Land on leads
  spNav('leads');
}

// ══════════════════════════════════════════════════════
//  RAIL NAV
// ══════════════════════════════════════════════════════
function spToggleRail() {
  document.body.classList.toggle('rail-collapsed');
  localStorage.setItem('sp_rail_collapsed', document.body.classList.contains('rail-collapsed') ? '1' : '');
}

const SP_TITLES = {
  leads:'Leads', contacts:'Contacts', opportunities:'Opportunities',
  accounts:'Accounts', goals:'Goals & Stats', weekly:'Weekly Report',
  queue:'My Queue', employee:'Employee Portal'
};

function spNav(tab) {
  _spTab = tab;
  // Update active state
  document.querySelectorAll('.rail-item').forEach(el => el.classList.remove('ri-active'));
  const navEl = document.getElementById('spNav' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (navEl) navEl.classList.add('ri-active');

  document.getElementById('spPageTitle').textContent = SP_TITLES[tab] || tab;

}

// ══════════════════════════════════════════════════════
//  RENDER ROUTER
// ══════════════════════════════════════════════════════
function spRender(tab) {
  const el = document.getElementById('spContent');
  el.innerHTML = '';
  if      (tab === 'leads')         spRenderCRM('leads');
  else if (tab === 'contacts')      spRenderCRM('contacts');
  else if (tab === 'opportunities') spRenderCRM('opportunities');
  else if (tab === 'accounts')      spRenderCRM('accounts');
  else if (tab === 'goals')         spRenderGoals();
  else if (tab === 'weekly')        spRenderWeekly();

// ══════════════════════════════════════════════════════
//  SERVICE LABELS / COLORS (matches termac-os)
// ══════════════════════════════════════════════════════
function spSvcLabel(s){ const m={unipro:'UniPro',quality3:'Quality III',allpro:'ALLPro',filterman:'Filter Man',gto:'GTO',termac:'Termac'};return m[s]||s; }
function spSvcColor(s){
  const m={unipro:{bg:'#FEE2E2',color:'#C8102E'},quality3:{bg:'#FEE2E2',color:'#9B1C1C'},
    allpro:{bg:'#DBEAFE',color:'#1B5FA8'},filterman:{bg:'#D1FAE5',color:'#065F46'},
    gto:{bg:'#FEF3C7',color:'#92400E'},termac:{bg:'#E9D5FF',color:'#6D28D9'}};
  return m[s]||{bg:'#F3F4F6',color:'#6B7280'};
}

// ══════════════════════════════════════════════════════
//  STAGE LABELS
// ══════════════════════════════════════════════════════
const SP_STAGES = {
  lead:{label:'Lead',color:'#6B7280',bg:'#F3F4F6'},
  contact:{label:'Contact',color:'#1B5FA8',bg:'#DBEAFE'},
  opportunity:{label:'Opportunity',color:'#D97706',bg:'#FEF3C7'},
  site_visit:{label:'Site Visit',color:'#7C3AED',bg:'#EDE9FE'},
  close:{label:'Closing',color:'#059669',bg:'#D1FAE5'},
  active:{label:'Active',color:'#1E7B3C',bg:'#DCFCE7'},
  onboarding:{label:'Onboarding',color:'#0D7490',bg:'#E0F2FE'},
};

const SP_TAB_STAGES = {
  leads:['lead'],
  contacts:['contact'],
  opportunities:['opportunity','site_visit'],
  accounts:['close','onboarding','first_service','active','renewal','jeopardy'],
};

// ══════════════════════════════════════════════════════
//  CRM VIEWS — LEADS / CONTACTS / OPPORTUNITIES / ACCOUNTS
// ══════════════════════════════════════════════════════
function spRenderCRM(tab) {
  const el = document.getElementById('spContent');
  const stageKeys = SP_TAB_STAGES[tab] || ['lead'];

  // Load from unified leads pool (matches termac-os architecture)
  let data = crmLoad('leads').filter(r => {
    const s = r.lifecycleStage || 'lead';
    return stageKeys.includes(s);
  });

  // Also include legacy per-tab pool for accounts
  if (tab === 'accounts') {
    const legacy = crmLoad('accounts').filter(r => {
      const id = r.id;
      return !data.find(x => x.id === id);
    });
    data = [...data, ...legacy];
  }
  if (tab === 'contacts') {
    const legacyC = crmLoad('contacts').filter(r => !data.find(x => x.id === r.id));
    data = [...data, ...legacyC];
  }

  // Filter to this rep's records only
  data = data.filter(r => {
    const owner = r.ownedBy || r.assignedRep || r.createdBy || '';
    return !owner || owner === _spRep.name || owner === 'Unassigned' || owner === '';
  });

  // Search + filter
  const q = (document.getElementById('spCrmSearch')?.value || '').trim().toLowerCase();
  const co = document.getElementById('spCrmCo')?.value || '';
  const st = document.getElementById('spCrmSt')?.value || '';
  if (q) data = data.filter(r => JSON.stringify(r).toLowerCase().includes(q));
  if (co) data = data.filter(r => (r.company||'').toLowerCase() === co.toLowerCase());
  if (st) data = data.filter(r => (r.status||'') === st);

  // Sort: most recent first
  data.sort((a,b) => (b.updated||b.created||0) - (a.updated||a.created||0));

  // Build HTML
  const isMgr = ['accounts'].includes(tab);
  const addLabel = tab === 'opportunities' ? '+ New Opportunity' : tab === 'accounts' ? '+ New Account' : '+ Add New';

  let html = `
  <!-- Recently Viewed -->
  ${spRecentlyViewed()}
  <!-- Appointments Calendar (leads tab only) -->
  ${tab === 'leads' ? spCalendar() : ''}
  <!-- Plan My Day (leads tab only) -->
  ${tab === 'leads' ? spPlanMyDay() : ''}
  <!-- Needs Attention (leads tab only) -->
  ${tab === 'leads' ? spNeedsAttention() : ''}
  <!-- Filter bar -->
  <div class="sp-filter-bar">
    <input class="sp-search" id="spCrmSearch" placeholder="Search by name, business, zip…" oninput="spRenderCRM('${tab}')" value="${escH(q)}">
    <select class="sp-filter-sel" id="spCrmCo" onchange="spRenderCRM('${tab}')">
      <option value="">All Divisions</option>
      <option>UniPro</option><option>Quality III</option><option>AllPro</option>
      <option>Filter Man</option><option>GTO</option><option>Termac</option>
    </select>
    <select class="sp-filter-sel" id="spCrmSt" onchange="spRenderCRM('${tab}')">
      <option value="">All Statuses</option>
      <option>new</option><option>hot</option><option>warm</option><option>cold</option><option>active</option>
    </select>
    <button class="sp-btn sp-btn-red" onclick="spOpenAdd('${tab}')">+ Add New</button>
    ${tab === 'opportunities' ? '<button class="sp-btn sp-btn-blue" onclick="spOpenAdd(\'opportunity\')">+ New Opportunity</button>' : ''}
  </div>
  <div class="sp-record-grid" id="spRecGrid">`;

  if (!data.length) {
    html += `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--soft);font-size:14px">
      <div style="font-size:32px;margin-bottom:10px">📭</div>
      No ${tab} in your territory yet. Click <strong>+ Add New</strong> to get started.
    </div>`;
  } else {
    html += data.map(r => spRecordCard(r, tab)).join('');
  }

  html += `</div>`;
  el.innerHTML = html;

  // Restore filter values
  if (q) document.getElementById('spCrmSearch').value = q;
  if (co) document.getElementById('spCrmCo').value = co;
  if (st) document.getElementById('spCrmSt').value = st;
}

function spRecordCard(r, tab) {
  const stage = SP_STAGES[r.lifecycleStage || 'lead'] || SP_STAGES.lead;
  const svcs = (r.services || []).map(s => {
    const c = spSvcColor(s);
    return `<span style="background:${c.bg};color:${c.color};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700">${spSvcLabel(s)}</span>`;
  }).join('');
  const borderColor = stage.color;
  const score = r.score ? `<span style="background:${r.score>=8?'#DCFCE7':r.score>=5?'#FEF3C7':'#FEE2E2'};color:${r.score>=8?'#166534':r.score>=5?'#92400E':'#991B1B'};border-radius:99px;padding:1px 7px;font-size:10px;font-weight:800">${r.score}/10</span>` : '';

  return `<div class="sp-record" style="border-left-color:${borderColor}" onclick="spViewRecord('${r.id}','${tab}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
      <div class="sp-rec-biz">${escH(r.business || r.name || '—')}</div>
      ${score}
    </div>
    <div class="sp-rec-name">${escH(r.name || r.contact || '')}${r.role ? ' · ' + escH(r.role) : ''}</div>
    ${r.phone ? `<div class="sp-rec-row">📞 <a href="tel:${escH(r.phone)}" onclick="event.stopPropagation()">${escH(r.phone)}</a></div>` : ''}
    ${r.address ? `<div class="sp-rec-row">📍 ${escH(r.address)}</div>` : ''}
    ${r.siteNotes ? `<div class="sp-site-notes" style="margin-top:8px"><div class="sp-site-notes-lbl">🔶 Site Notes</div>${escH(r.siteNotes)}</div>` : ''}
    <div class="sp-rec-chips">${svcs}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
      <span class="sp-stage-pill" style="background:${stage.bg};color:${stage.color}">${stage.label}</span>
      <div class="sp-actions" onclick="event.stopPropagation()">
        <button class="sp-rec-btn" onclick="spEditRecord('${r.id}','${tab}')">Edit</button>
        <button class="sp-rec-btn primary" onclick="spAdvanceStage('${r.id}','${tab}')">Advance →</button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  RECENTLY VIEWED
// ══════════════════════════════════════════════════════
function spRecentlyViewed() {
  const rv = JSON.parse(sessionStorage.getItem('sp_recently_viewed') || '[]');
  if (!rv.length) return '';
  const cards = rv.slice(0,4).map(item =>
    `<div style="background:#fff;border-radius:8px;padding:9px 12px;min-width:140px;cursor:pointer;border:1.5px solid var(--line)" onclick="spViewRecord('${item.id}','${item.tab}')">
      <div style="font-weight:700;font-size:12px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${escH(item.name)}</div>
      <div style="font-size:11px;color:var(--soft)">${escH(item.business||'')}</div>
    </div>`).join('');
  return `<div style="margin-bottom:14px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:6px">🕐 Recently Viewed</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${cards}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  APPOINTMENTS CALENDAR
// ══════════════════════════════════════════════════════
function spCalendar() {
  const today = new Date();
  const yr = today.getFullYear(), mo = today.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const appts = crmLoad('appointments') || [];
  const dayMap = {};
  appts.forEach(a => {
    if (!a.date) return;
    const d = new Date(a.date);
    if (d.getFullYear() === yr && d.getMonth() === mo) {
      const k = d.getDate(); if (!dayMap[k]) dayMap[k] = []; dayMap[k].push(a);
    }
  });
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate();
    const hasA = dayMap[d]?.length > 0;
    cells += `<div class="sp-cal-day${isToday?' today':''}${hasA?' has-appt':''}" onclick="spShowDayAppts(${d},${yr},${mo})">
      <div class="day-num">${d}</div>
      ${hasA ? `<div style="font-size:9px;font-weight:700;color:${isToday?'#fff':'#1B5FA8'}">${dayMap[d].length}</div>` : ''}
    </div>`;
  }
  return `<div class="sp-card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="sp-card-title" style="margin-bottom:0">🗓 My Appointments — ${monthNames[mo]} ${yr}</div>
      <button class="sp-btn sp-btn-red" style="font-size:10px;padding:4px 10px" onclick="spOpenApptModal()">+ Add</button>
    </div>
    <div class="sp-cal-grid" style="margin-bottom:4px">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="sp-cal-hdr">${d}</div>`).join('')}
    </div>
    <div class="sp-cal-grid">${cells}</div>
    <div id="spDayApptDetail" style="margin-top:10px;display:none"></div>
  </div>`;
}

function spShowDayAppts(d, yr, mo) {
  const appts = (crmLoad('appointments') || []).filter(a => {
    if (!a.date) return false;
    const dt = new Date(a.date);
    return dt.getFullYear() === yr && dt.getMonth() === mo && dt.getDate() === d;
  });
  const el = document.getElementById('spDayApptDetail');
  if (!el) return;
  if (!appts.length) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = appts.map(a => `<div style="background:#EFF6FF;border-radius:7px;padding:8px 12px;margin-bottom:6px;font-size:12px">
    <strong>${escH(a.title||a.business||'Appointment')}</strong>
    ${a.time ? ' · ' + escH(a.time) : ''}${a.address ? '<br>📍 '+escH(a.address) : ''}
    ${a.notes ? '<br><span style="color:var(--soft)">'+escH(a.notes)+'</span>' : ''}
  </div>`).join('');
}

function spOpenApptModal() { spToast('Appointment scheduling — coming soon'); }

// ══════════════════════════════════════════════════════
//  PLAN MY DAY
// ══════════════════════════════════════════════════════
function spPlanMyDay() {
  return `<div style="background:linear-gradient(135deg,#1B5FA8,#0F3E73);border-radius:12px;padding:16px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px">
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;margin-bottom:3px">🧭 Plan My Day</div>
      <div style="font-size:12px;color:rgba(255,255,255,.8)">Pick one or more days — we'll find the best opportunity areas in your territory.</div>
    </div>
    <button onclick="window.open('termac-os.html','_blank')" style="background:#fff;color:#1B5FA8;border:none;border-radius:8px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer">Find My Route →</button>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  NEEDS YOUR ATTENTION
// ══════════════════════════════════════════════════════
function spNeedsAttention() {
  const now = Date.now();
  const day = 86400000;
  const alerts = [];
  const myAccounts = crmLoad('leads').filter(r => {
    const s = r.lifecycleStage || '';
    return ['active','close','onboarding','first_service','renewal'].includes(s) &&
      (!r.ownedBy || r.ownedBy === _spRep.name || !r.ownedBy);
  }).concat(crmLoad('accounts').filter(r =>
    (!r.ownedBy || r.ownedBy === _spRep.name || !r.ownedBy) && r.status === 'active'
  ));

  myAccounts.forEach(r => {
    const lastContact = r.lastContactDate ? new Date(r.lastContactDate).getTime() : (r.updated || r.created || 0);
    const daysSince = Math.floor((now - lastContact) / day);
    const biz = r.business || r.name || '—';

    // Renewal approaching
    if (r.renewalDate) {
      const daysToRenewal = Math.floor((new Date(r.renewalDate).getTime() - now) / day);
      if (daysToRenewal <= 60 && daysToRenewal >= 0 && daysSince > 45) {
        alerts.push({ color:'yellow', icon:'🔔', title:`Renewal approaching — no recent contact`, sub:`${biz} — renews in ${daysToRenewal}d`, id:r.id, tab:'accounts' });
      }
    }
    // No visit 60+ days
    if (daysSince >= 60) {
      alerts.push({ color:'red', icon:'❄️', title:`No visit in ${daysSince}d — account going cold`, sub:`${biz} · Last contact: ${daysSince}d ago`, id:r.id, tab:'accounts' });
    }
  });

  // Hot leads untouched 7+ days
  crmLoad('leads').filter(r => r.status === 'hot' && (!r.ownedBy || r.ownedBy === _spRep.name)).forEach(r => {
    const daysSince = Math.floor((now - (r.updated || r.created || 0)) / day);
    if (daysSince >= 7) {
      alerts.push({ color:'red', icon:'🔥', title:`Hot lead untouched ${daysSince}d`, sub:`${r.business || r.name}`, id:r.id, tab:'leads' });
    }
  });

  if (!alerts.length) return `<div class="sp-card" style="margin-bottom:14px;text-align:center;color:var(--soft);font-size:13px;padding:20px">✅ All clear — nothing needs attention right now.</div>`;

  return `<div style="margin-bottom:14px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:8px">🔺 Needs Your Attention Today</div>
    ${alerts.slice(0,5).map(a => `<div class="sp-alert${a.color==='red'?' sp-alert-red':''}">
      <div>
        <div class="sp-alert-txt">${a.icon} ${escH(a.title)}</div>
        <div class="sp-alert-sub">${escH(a.sub)}</div>
      </div>
      <div class="sp-alert-btns">
        <button class="sp-btn sp-btn-blue" style="font-size:10px;padding:4px 10px" onclick="spViewRecord('${a.id}','${a.tab}')">Act →</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  VIEW / EDIT / ADD RECORD
// ══════════════════════════════════════════════════════
function spViewRecord(id, tab) {
  // Track recently viewed
  const pools = ['leads','contacts','accounts'];
  let r = null; let foundTab = tab;
  for (const p of pools) {
    r = crmLoad(p).find(x => x.id === id);
    if (r) { foundTab = p; break; }
  }
  if (!r) return;
  const rv = JSON.parse(sessionStorage.getItem('sp_recently_viewed') || '[]');
  const newRv = [{ id, tab:foundTab, name:r.name||r.contact||'', business:r.business||'' }, ...rv.filter(x => x.id !== id)].slice(0,8);
  sessionStorage.setItem('sp_recently_viewed', JSON.stringify(newRv));
  // Open detail
  spOpenDetail(r, foundTab);
}

function spOpenDetail(r, tab) {
  const stage = SP_STAGES[r.lifecycleStage || 'lead'] || SP_STAGES.lead;
  const svcs = (r.services || []).map(s => { const c = spSvcColor(s); return `<span style="background:${c.bg};color:${c.color};border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700">${spSvcLabel(s)}</span>`; }).join(' ');
  const extraContacts = (r.extraContacts || []).map((c,i) => `<div style="border-top:1px dashed var(--line);padding-top:8px;margin-top:8px">
    <div style="font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;margin-bottom:4px">Contact ${i+2}${c.role?' — '+escH(c.role):''}</div>
    ${c.name ? `<div style="font-size:13px;font-weight:600">${escH(c.name)}</div>` : ''}

const ROLES_LIST = ['','Owner','General Manager','Manager','Chef / Head Chef','Kitchen Manager','Facilities Manager','Purchasing Manager','Landlord','Property Manager','Office Manager','Other'];
const SVCS_LIST = ['unipro','quality3','allpro','filterman','gto','termac'];

function spOpenAdd(tab) {
  _spEditId = null;
  const tabName = tab === 'opportunity' ? 'Opportunity' : tab.charAt(0).toUpperCase() + tab.slice(1,-1);
  document.getElementById('spModalTitle').textContent = 'Add ' + tabName;
  document.getElementById('spModalBody').innerHTML = spBuildForm(tab, null);
  document.getElementById('spModalBg').classList.add('open');
}

function spEditRecord(id, tab) {
  const pools = ['leads','contacts','accounts'];
  let r = null;
  for (const p of pools) { r = crmLoad(p).find(x => x.id === id); if (r) break; }
  if (!r) return;
  _spEditId = id;
  document.getElementById('spModalTitle').textContent = 'Edit ' + escH(r.business || r.name || 'Record');
  document.getElementById('spModalBody').innerHTML = spBuildForm(tab, r);
  document.getElementById('spModalBg').classList.add('open');
}

function spBuildForm(tab, r) {
  const v = k => r && r[k] ? escH(r[k]) : '';
  const svcBoxes = SVCS_LIST.map(s => {
    const c = spSvcColor(s);
    const chk = r && (r.services||[]).includes(s) ? 'checked' : '';
    return `<label class="sp-svc-chip" style="background:${c.bg};color:${c.color};border-color:${c.color}40"><input type="checkbox" name="sp_svcs" value="${s}" ${chk}> ${spSvcLabel(s)}</label>`;
  }).join('');
  const roleOpts = ROLES_LIST.map(role => `<option ${v('role')===role?'selected':''}>${escH(role)||'— Select role —'}</option>`).join('');
  const statusOpts = ['new','hot','warm','cold'].map(s => `<option ${v('status')===s?'selected':''}>${s}</option>`).join('');

  return `<div class="sp-form-grid">
    <div class="sp-form-full">
      <label>Business Name</label>
      <input id="spf_business" value="${v('business')||v('contact')||''}" oninput="spDupeCheck(this.value,'business')" autocomplete="off">
      <div id="spf_dupe_biz" style="display:none;margin-top:4px"></div>
    </div>
    <div><label>Contact Name</label><input id="spf_name" value="${v('name')}"></div>
    <div>
      <label>Role / Title</label>
      <select id="spf_role">${roleOpts}</select>
    </div>
    <div>
      <label>Phone</label>
      <input id="spf_phone" value="${v('phone')}" oninput="spDupeCheck(this.value,'phone')" autocomplete="off">
      <div id="spf_dupe_phone" style="display:none;margin-top:4px"></div>
    </div>
    <div><label>Email</label><input id="spf_email" value="${v('email')}"></div>
    <div class="sp-form-full"><label>Address / ZIP</label><input id="spf_address" value="${v('address')}"></div>
    <div>
      <label>Division</label>
      <select id="spf_company">
        ${['UniPro','Quality III','AllPro','Filter Man','GTO','Termac'].map(c=>`<option ${v('company')===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div><label>Status</label><select id="spf_status">${statusOpts}</select></div>
    <div class="sp-form-full">
      <label>Services Interested In</label>
      <div class="sp-svc-grid">${svcBoxes}</div>
    </div>
    <div class="sp-form-full"><label>Notes</label><textarea id="spf_notes" rows="3">${v('notes')}</textarea></div>
    <div class="sp-form-full">
      <label style="display:flex;align-items:center;gap:6px">🔶 Site Notes <span style="font-size:10px;font-weight:400;color:var(--soft);text-transform:none;letter-spacing:0">Door codes, delivery instructions, special access</span></label>
      <textarea id="spf_siteNotes" rows="2" placeholder="e.g. Door code #4521 · Call ahead · No deliveries before 10am">${v('siteNotes')}</textarea>
    </div>
  </div>`;
}

function spSaveRecord() {
  const business = document.getElementById('spf_business')?.value.trim();
  const name     = document.getElementById('spf_name')?.value.trim();
  if (!business && !name) { spToast('Please enter a business name or contact name'); return; }

  const svcs = Array.from(document.querySelectorAll('[name="sp_svcs"]:checked')).map(c => c.value);
  const address = document.getElementById('spf_address')?.value.trim() || '';
  const zip = (address.match(/\b\d{5}\b/) || [''])[0];

  const now = Date.now();
  const rec = {
    id: _spEditId || ('SP' + String(now).slice(-6)),
    name: name || business,
    business,
    phone:     document.getElementById('spf_phone')?.value.trim() || '',
    email:     document.getElementById('spf_email')?.value.trim() || '',
    address, zip,
    role:      document.getElementById('spf_role')?.value || '',
    company:   document.getElementById('spf_company')?.value || 'UniPro',
    status:    document.getElementById('spf_status')?.value || 'new',
    services:  svcs,
    notes:     document.getElementById('spf_notes')?.value.trim() || '',
    siteNotes: document.getElementById('spf_siteNotes')?.value.trim() || '',
    lifecycleStage: _spTab === 'contacts' ? 'contact' : _spTab === 'opportunities' ? 'opportunity' : _spTab === 'accounts' ? 'active' : 'lead',
    assignedRep: _spRep.name,
    ownedBy:     _spRep.name,
    createdBy:   _spEditId ? undefined : _spRep.name,
    updated: now,
  };
  if (!_spEditId) rec.created = now;

  // Save to unified leads pool (same as termac-os)
  const data = crmLoad('leads');
  if (_spEditId) {
    const idx = data.findIndex(x => x.id === _spEditId);
    if (idx >= 0) {
      rec.createdBy = data[idx].createdBy || _spRep.name;
      data[idx] = { ...data[idx], ...rec };
    } else data.unshift(rec);
  } else {
    data.unshift(rec);
  }
  crmSave('leads', data);

  spCloseModal();
  spToast(_spEditId ? 'Record updated' : 'Record added');
  spRenderCRM(_spTab);
}

function spCloseModal() {
  document.getElementById('spModalBg').classList.remove('open');
  _spEditId = null;
}

// ══════════════════════════════════════════════════════
//  DUPLICATE DETECTION
// ══════════════════════════════════════════════════════
function spDupeCheck(val, field) {
  const containerId = field === 'business' ? 'spf_dupe_biz' : 'spf_dupe_phone';
  const el = document.getElementById(containerId);
  if (!el) return;
  const q = (val || '').trim().toLowerCase();
  if (q.length < 3) { el.style.display = 'none'; return; }

  const matches = [];
  const seenIds = new Set();
  ['leads','contacts','accounts'].forEach(pool => {
    (crmLoad(pool) || []).forEach(r => {
      if (seenIds.has(r.id)) return;
      const biz = (r.business || r.name || '').toLowerCase();
      const phone = (r.phone || '').replace(/\D/g,'');
      const qPhone = q.replace(/\D/g,'');
      const hit = field === 'business' ? biz.includes(q) : (phone && qPhone.length >= 5 && phone.includes(qPhone));
      if (hit) { seenIds.add(r.id); matches.push({ r, pool }); }
    });
  });

  if (!matches.length) { el.style.display = 'none'; return; }
  const stage = m => SP_STAGES[m.r.lifecycleStage || 'lead']?.label || '—';
  el.style.display = '';
  el.innerHTML = '<div style="background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:7px;padding:8px 10px">'
    + '<div style="font-size:10px;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">⚠️ Possible Duplicates Found</div>'
    + matches.slice(0,3).map(m =>
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #FDE68A">'
        + '<div><div style="font-weight:700;font-size:12px">' + escH(m.r.business||m.r.name||'—') + '</div>'
        + '<div style="font-size:10px;color:#78350F">' + stage(m) + (m.r.phone?' · '+escH(m.r.phone):'') + '</div></div>'
        + '<button type="button" onclick="spCloseModal();spViewRecord(\''+m.r.id+'\',\''+m.pool+'\')" style="background:#D97706;color:#fff;border:none;border-radius:5px;padding:3px 10px;font-size:10px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;cursor:pointer">View →</button>'
        + '</div>').join('')
    + '</div>';
}

// ══════════════════════════════════════════════════════
//  ADVANCE STAGE
// ══════════════════════════════════════════════════════
const STAGE_SEQUENCE = ['lead','contact','opportunity','site_visit','close','onboarding','first_service','active'];
function spAdvanceStage(id, tab) {
  const data = crmLoad('leads');
  const r = data.find(x => x.id === id);
  if (!r) return;
  const cur = r.lifecycleStage || 'lead';
  const idx = STAGE_SEQUENCE.indexOf(cur);
  const next = STAGE_SEQUENCE[idx + 1];
  if (!next) { spToast('Already at final stage'); return; }
  r.lifecycleStage = next;
  r.updated = Date.now();
  r.activityLog = r.activityLog || [];
  r.activityLog.push({ ts:Date.now(), type:'stage', icon:'🔄', title:`Stage: ${cur} → ${next}`, who:_spRep.name });
  crmSave('leads', data);
  spToast('Stage advanced → ' + (SP_STAGES[next]?.label || next));
  spRenderCRM(tab);
}

// ══════════════════════════════════════════════════════
//  LOG ACTIVITY
// ══════════════════════════════════════════════════════
function spLogActivity(id, tab) {
  const note = prompt('Log a call, visit, or note:');
  if (!note) return;
  const data = crmLoad('leads');
  const r = data.find(x => x.id === id);
  if (!r) return;
  r.activityLog = r.activityLog || [];
  r.activityLog.push({ ts:Date.now(), type:'rep', icon:'📝', title:'Activity logged', note, who:_spRep.name });
  r.updated = Date.now();
  r.lastContactDate = new Date().toISOString().slice(0,10);
  crmSave('leads', data);
  spToast('Activity logged');
  spNav(tab);
}

//  GOALS & STATS
// ══════════════════════════════════════════════════════
function spRenderGoals() {
  const el = document.getElementById('spContent');
  const repName = _spRep.name;

  // Pull rep's own records
  const myLeads = crmLoad('leads').filter(r => (r.ownedBy||r.assignedRep||r.createdBy||'') === repName);
  const myAccts = myLeads.filter(r => ['active','close','onboarding','first_service','renewal'].includes(r.lifecycleStage||''));
  const myOppty = myLeads.filter(r => ['opportunity','site_visit'].includes(r.lifecycleStage||''));
  const myContacts = myLeads.filter(r => (r.lifecycleStage||'lead') === 'contact');
  const myRawLeads = myLeads.filter(r => (r.lifecycleStage||'lead') === 'lead');

  // Goals from storage (set by manager or self)
  const GOALS_QUOTA = 'termac_goals_quotas';
  const now = new Date();
  const qKey = repName + '_q' + Math.ceil((now.getMonth()+1)/3);
  let quota = { revQuota:50000, acctTarget:12, callTarget:50, visitTarget:10 };
  try { const all = JSON.parse(localStorage.getItem(GOALS_QUOTA)||'{}'); quota = { ...quota, ...(all[qKey]||{}) }; } catch(e){}

  // Activity this week
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay()); weekStart.setHours(0,0,0,0);
  const weekTs = weekStart.getTime();
  let callsThisWeek = 0, visitsThisWeek = 0;
  myLeads.forEach(r => {
    (r.activityLog||[]).forEach(a => {
      if (a.ts >= weekTs) {
        if (a.type === 'call' || (a.title||'').toLowerCase().includes('call')) callsThisWeek++;
        if (a.type === 'visit' || (a.title||'').toLowerCase().includes('visit')) visitsThisWeek++;
      }
    });
  });

  // Pipeline value estimate (rough: opportunities × avg deal size)
  const pipelineValue = myOppty.length * 4800; // avg deal estimate

  // Quarter label
  const qNum = Math.ceil((now.getMonth()+1)/3);
  const qLabel = `Q${qNum} ${now.getFullYear()}`;

  const kpi = (val, label, sub, color='var(--ink)', pct=null) => `<div class="sp-goal-kpi">
    <div class="sp-goal-val" style="color:${color}">${val}</div>
    <div class="sp-goal-lbl">${label}</div>
    ${sub ? `<div class="sp-goal-sub">${sub}</div>` : ''}
    ${pct !== null ? `<div class="sp-progress-bar"><div class="sp-progress-fill" style="width:${Math.min(100,pct)}%;background:${pct>=100?'var(--green)':pct>=75?'var(--yellow)':'var(--red)'}"></div></div>` : ''}
  </div>`;

  el.innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px">${repName} — ${qLabel} Performance</div>
      <div style="font-size:13px;color:var(--soft)">Your personal pipeline and activity stats. No one else's numbers here.</div>
    </div>
    <button class="sp-btn sp-btn-ghost" onclick="spEditGoals()" style="font-size:11px">⚙️ Set My Targets</button>
  </div>

  <div class="sp-goals-grid">
    ${kpi(myRawLeads.length, 'Active Leads', 'In your territory pipeline', 'var(--blue)')}
    ${kpi(myOppty.length, 'Opportunities', 'Site visits & proposals open', 'var(--orange)')}
    ${kpi(myAccts.length, 'Active Accounts', 'vs target: '+quota.acctTarget, 'var(--green)', Math.round(myAccts.length/quota.acctTarget*100))}
    ${kpi('$'+pipelineValue.toLocaleString(), 'Pipeline Value', 'Est. from open opportunities', 'var(--ink)')}
    ${kpi(callsThisWeek, 'Calls This Week', 'Target: '+quota.callTarget+'/wk', callsThisWeek>=quota.callTarget?'var(--green)':'var(--red)', Math.round(callsThisWeek/quota.callTarget*100))}
    ${kpi(visitsThisWeek, 'Visits This Week', 'Target: '+quota.visitTarget+'/wk', visitsThisWeek>=quota.visitTarget?'var(--green)':'var(--orange)', Math.round(visitsThisWeek/quota.visitTarget*100))}
  </div>

  <!-- Pipeline Breakdown -->
  <div class="sp-card">
    <div class="sp-card-title">My Pipeline Breakdown</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
      ${[
        {label:'Leads', count:myRawLeads.length, color:'var(--gray)'},
        {label:'Contacts', count:myContacts.length, color:'var(--blue)'},
        {label:'Opportunities', count:myOppty.length, color:'var(--orange)'},
        {label:'Active Accounts', count:myAccts.length, color:'var(--green)'},
      ].map(s => `<div style="text-align:center;padding:12px;background:var(--bg);border-radius:8px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:${s.color}">${s.count}</div>
        <div style="font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:3px">${s.label}</div>
      </div>`).join('')}
    </div>
  </div>

  <!-- Services breakdown -->
  <div class="sp-card">
    <div class="sp-card-title">My Accounts by Division</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${['unipro','quality3','allpro','filterman','gto','termac'].map(s => {
      const count = myLeads.filter(r => (r.services||[]).includes(s)).length;
      const c = spSvcColor(s);
      return `<div style="background:${c.bg};color:${c.color};border-radius:8px;padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-weight:800;font-size:22px;font-family:'Barlow Condensed',sans-serif">${count}</div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:2px">${spSvcLabel(s)}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

  spToast('Goal-setting coming soon — manager sets quota, you track activity');
}

// ══════════════════════════════════════════════════════
//  WEEKLY REPORT
// ══════════════════════════════════════════════════════
function spRenderWeekly() {
  const el = document.getElementById('spContent');
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay()); weekStart.setHours(0,0,0,0);
  const weekTs = weekStart.getTime();
  const repName = _spRep.name;

  const myLeads = crmLoad('leads').filter(r => (r.ownedBy||r.assignedRep||r.createdBy||'') === repName);
  let calls=0, visits=0, newLeads=0, newOppty=0, wonAccts=0;

  myLeads.forEach(r => {
    if ((r.created||0) >= weekTs) {
      if ((r.lifecycleStage||'lead') === 'lead') newLeads++;
      if (['opportunity','site_visit'].includes(r.lifecycleStage||'')) newOppty++;
      if (['active','close'].includes(r.lifecycleStage||'')) wonAccts++;
    }
    (r.activityLog||[]).forEach(a => {
      if ((a.ts||0) >= weekTs) {
        if (a.type === 'call' || (a.title||'').toLowerCase().includes('call')) calls++;
        if (a.type === 'visit' || (a.title||'').toLowerCase().includes('visit')) visits++;
      }
    });
  });

  const wkLabel = weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + new Date(weekTs+6*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  el.innerHTML = `
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px">Weekly Report</div>
  <div style="font-size:13px;color:var(--soft);margin-bottom:16px">Week of ${wkLabel} · ${repName}</div>

  <div class="sp-week-section">
    <div class="sp-week-title">📊 This Week's Activity</div>
    ${[
      {label:'Calls Made', val:calls, target:50},
      {label:'Site Visits', val:visits, target:10},
      {label:'New Leads Added', val:newLeads, target:'—'},
      {label:'New Opportunities', val:newOppty, target:'—'},
      {label:'Accounts Won/Closed', val:wonAccts, target:'—'},
    ].map(row => `<div class="sp-week-row">
      <span style="color:var(--soft)">${row.label}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-weight:800;font-size:16px;font-family:'Barlow Condensed',sans-serif">${row.val}</span>
        ${row.target !== '—' ? `<span style="font-size:11px;color:var(--soft)">/ ${row.target} target</span>
        <span style="font-size:11px;font-weight:700;color:${row.val>=row.target?'var(--green)':'var(--red)'}">${row.val>=row.target?'✅ On track':'⚠️ Behind'}</span>` : ''}
      </div>
    </div>`).join('')}
  </div>

  <div class="sp-week-section">
    <div class="sp-week-title">📋 Notes & Highlights</div>
    <textarea id="spWeeklyNotes" rows="6" placeholder="Add your weekly highlights, obstacles, or notes here…" style="width:100%;padding:10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;resize:vertical">${localStorage.getItem('sp_weekly_notes_'+repName+'_'+weekTs)||''}</textarea>
    <button class="sp-btn sp-btn-blue" style="margin-top:8px" onclick="spSaveWeeklyNotes(${weekTs})">Save Notes</button>
  </div>`;
}

function spSaveWeeklyNotes(weekTs) {
  const notes = document.getElementById('spWeeklyNotes')?.value || '';
  localStorage.setItem('sp_weekly_notes_'+_spRep.name+'_'+weekTs, notes);
  spToast('Notes saved');
}

// ══════════════════════════════════════════════════════
//  MY QUEUE
// ══════════════════════════════════════════════════════
function spRenderQueue() {
  const el = document.getElementById('spContent');
  const now = Date.now();
  const day = 86400000;
  const repName = _spRep.name;
  const myLeads = crmLoad('leads').filter(r => (r.ownedBy||r.assignedRep||r.createdBy||'') === repName);
  const queue = [];

  myLeads.forEach(r => {
    const biz = r.business || r.name || '—';
    // Opportunity follow-ups
    if (r.nextFollowupTs && r.nextFollowupTs <= now) {
      queue.push({ urgent:true, icon:'📅', title:'Follow-up due: ' + biz, sub:'Opportunity follow-up overdue', id:r.id, tab:'opportunities' });
    }
    // Hot leads stale
    if (r.status === 'hot') {
      const daysSince = Math.floor((now - (r.updated||r.created||0)) / day);
      if (daysSince >= 3) queue.push({ urgent:true, icon:'🔥', title:'Hot lead needs attention: ' + biz, sub:`${daysSince}d since last update`, id:r.id, tab:'leads' });
    }
    // Renewals
    if (r.renewalDate) {
      const dtr = Math.floor((new Date(r.renewalDate).getTime() - now) / day);
      if (dtr <= 30 && dtr >= 0) queue.push({ urgent:dtr<=7, icon:'🔄', title:'Renewal in ' + dtr + 'd: ' + biz, sub:'Start renewal conversation', id:r.id, tab:'accounts' });
    }
  });

  // Update badge
  spUpdateQueueBadge(queue.length);

  el.innerHTML = `
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px">My Queue</div>
  <div style="font-size:13px;color:var(--soft);margin-bottom:16px">${queue.length} item${queue.length!==1?'s':''} need your attention</div>
  ${!queue.length
    ? `<div class="sp-card" style="text-align:center;padding:32px;color:var(--soft)"><div style="font-size:40px;margin-bottom:10px">✅</div>Queue is clear — great work!</div>`
    : queue.map(item => `<div class="sp-queue-item${item.urgent?' urgent':''}">
        <div>
          <div class="sp-queue-title">${item.icon} ${escH(item.title)}</div>
          <div class="sp-queue-sub">${escH(item.sub)}</div>
        </div>
        <button class="sp-btn sp-btn-blue" style="font-size:11px;padding:5px 12px;flex-shrink:0" onclick="spViewRecord('${item.id}','${item.tab}')">Open →</button>
      </div>`).join('')}`;
}

function spUpdateQueueBadge(count) {
  if (count === undefined) {
    // Quick count without full render
    const now = Date.now(), day = 86400000;
    const repName = _spRep?.name;
    if (!repName) return;
    count = 0;
    crmLoad('leads').filter(r => (r.ownedBy||r.assignedRep||r.createdBy||'') === repName).forEach(r => {
      if (r.nextFollowupTs && r.nextFollowupTs <= now) count++;
      if (r.status === 'hot' && Math.floor((now-(r.updated||r.created||0))/day) >= 3) count++;
      if (r.renewalDate && Math.floor((new Date(r.renewalDate).getTime()-now)/day) <= 30) count++;
    });
  }
  const badge = document.getElementById('spQueueBadge');
  if (badge) { badge.textContent = count; badge.style.display = count > 0 ? '' : 'none'; }
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function spToast(msg, duration=2800) {
  const el = document.getElementById('spToast');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', duration);
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Check for existing session
  try {
    const saved = JSON.parse(sessionStorage.getItem('sp_rep') || 'null');
    if (saved && SP_REPS[saved.name]) {
      _spRep = { ...SP_REPS[saved.name], name: saved.name };
      spEnterPortal();
    }
  } catch(e) {}

  // Rail collapsed state
  if (localStorage.getItem('sp_rail_collapsed') === '1') {
    document.body.classList.add('rail-collapsed');
  }

  // Mobile menu button visibility
  if (window.innerWidth <= 960) {
    document.getElementById('spMobMenuBtn').style.display = 'block';
  }

  // Keyboard shortcut: Escape closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') spCloseModal();
  });

  // Click outside modal closes it
  document.getElementById('spModalBg').addEventListener('click', e => {
    if (e.target.id === 'spModalBg') spCloseModal();
  });
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invoicing & Billing — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--navy:#1A1D21;--ink:#1A1D21;--soft:#6B7280;--line:#E5E7EB;--bg:#F9FAFB;--white:#fff;--gold:#D97706;--purple:#6D28D9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Barlow,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.topnav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--red)}
.topnav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:#fff;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
.topnav-sep{color:#3A3F47;font-size:16px}
.topnav-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#9CA3AF;letter-spacing:.08em;text-transform:uppercase}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{border:none;border-radius:7px;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:none;border:1.5px solid #3A3E43;color:#BFC4CA}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.shell{max-width:1300px;margin:0 auto;padding:24px 20px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:16px 18px}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--ink)}
.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}.kpi-val.gold{color:var(--gold)}
.kpi-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-bar input,.filter-bar select{border:1.5px solid var(--line);border-radius:7px;padding:6px 10px;font-size:12px;font-family:Barlow,sans-serif;background:#fff;outline:none;color:var(--ink)}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--red)}
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:20px}
.tab{padding:8px 16px;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.div-badge{display:inline-block;padding:1px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#fff}
.status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px}
.invoice-table{width:100%;border-collapse:collapse;background:#fff;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.invoice-table th{background:var(--navy);color:#fff;padding:10px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.10em;text-transform:uppercase}
.invoice-table td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.invoice-table tr:last-child td{border-bottom:none}
.invoice-table tr:hover td{background:#F9FAFB}
.empty-state{text-align:center;padding:60px 20px;color:var(--soft)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--ink);margin-bottom:6px}
.export-bar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
</style>
</head>
<body>
<nav class="topnav">
  <span class="topnav-logo" onclick="window.location.href='termac-os.html'">Termac One</span>
  <span class="topnav-sep">|</span>
  <span class="topnav-title">💳 Invoicing & Billing</span>
  <div class="topnav-right">
    <button class="btn btn-outline" onclick="history.back()">← Back</button>
    <button class="btn btn-red" onclick="window.location.href='employee-portal.html'">🏠 Employee Portal</button>
  </div>
</nav>

<div class="shell">
  <!-- KPI Row -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi"><div class="kpi-val green" id="kpiRevToday">$0</div><div class="kpi-lbl">Revenue Today</div></div>
    <div class="kpi"><div class="kpi-val green" id="kpiRevWeek">$0</div><div class="kpi-lbl">This Week</div></div>
    <div class="kpi"><div class="kpi-val green" id="kpiRevMonth">$0</div><div class="kpi-lbl">This Month</div></div>
    <div class="kpi"><div class="kpi-val red" id="kpiUnpaid">$0</div><div class="kpi-lbl">Unpaid / Outstanding</div></div>
    <div class="kpi"><div class="kpi-val" id="kpiInvCount">0</div><div class="kpi-lbl">Total Invoices</div></div>
    <div class="kpi"><div class="kpi-val gold" id="kpiAvgJob">$0</div><div class="kpi-lbl">Avg Job Value</div></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('all',this)">All Invoices</button>
    <button class="tab" onclick="switchTab('unipro',this)">UniPro</button>
    <button class="tab" onclick="switchTab('gto',this)">GTO</button>
    <button class="tab" onclick="switchTab('filterman',this)">Filter Man</button>
    <button class="tab" onclick="switchTab('allpro',this)">AllPro</button>
    <button class="tab" onclick="switchTab('termac',this)">Termac</button>
    <button class="tab" onclick="switchTab('unpaid',this)">⚠️ Unpaid</button>
  </div>

  <!-- Filter + Export Bar -->
  <div class="export-bar">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search account or invoice…" oninput="renderTable()" style="width:220px">
      <select id="dateFilter" onchange="renderTable()">
        <option value="all">All Dates</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
      </select>
      <select id="statusFilter" onchange="renderTable()">
        <option value="all">All Status</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
        <option value="complete">Completed</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="exportCSV()">📤 Export CSV</button>
      <button class="btn btn-green" onclick="loadInvoices()">🔄 Refresh</button>
    </div>
  </div>

  <!-- Invoice Table -->
  <div id="tableWrap"></div>
</div>

<script>
// ── DIVISION CONFIG ───────────────────────────────────────────────────────
const DIV_STORES = [
  { key:'unipro_jobs',        div:'UniPro',      color:'#C8102E' },
  { key:'gto_invoices',       div:'GTO',         color:'#6D28D9' },
  { key:'filterman_invoices', div:'Filter Man',  color:'#0D7490' },
  { key:'allpro_invoices',    div:'AllPro',      color:'#065F46' },
  { key:'termac_invoices',    div:'Termac',      color:'#7C3AED' },
  { key:'quality3_invoices',  div:'Quality III', color:'#1B5FA8' },
];

const DIV_COLORS = {};
DIV_STORES.forEach(d => { DIV_COLORS[d.div] = d.color; });

let _allInvoices = [];
let _activeTab = 'all';

// ── LOAD ALL INVOICES ─────────────────────────────────────────────────────
function loadInvoices() {
  _allInvoices = [];
  DIV_STORES.forEach(store => {
    try {
      const items = JSON.parse(localStorage.getItem(store.key) || '[]');
      items.forEach(inv => {
        // Normalize fields across different division schemas
        _allInvoices.push({
          id:         inv.id || ('inv_' + Math.random().toString(36).slice(2)),
          division:   inv.division || store.div,
          account:    inv.accountName || inv.account || inv.biz || '—',
          date:       inv.date || inv.completedAt ? (inv.date || new Date(inv.completedAt).toLocaleDateString('en-US')) : '—',
          dateTs:     inv.completedAt || (inv.date ? new Date(inv.date).getTime() : 0),
          service:    inv.serviceType || inv.type || inv.service || 'Service',
          total:      parseFloat(inv.total || inv.revenue || inv.totalRevenue || 0),
          status:     inv.paymentStatus || (inv.status === 'complete' ? 'paid' : inv.status === 'cancelled' ? 'cancelled' : 'unpaid'),
          tech:       inv.tech || inv.techName || '—',
          lines:      inv.lines || [],
          _store:     store.key,
        });
      });
    } catch(e) {}
  });

  // Sort newest first
  _allInvoices.sort((a,b) => (b.dateTs||0) - (a.dateTs||0));
  updateKPIs();
  renderTable();
}

// ── KPI CALCULATION ───────────────────────────────────────────────────────
function updateKPIs() {
  const now = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const weekStart  = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay()); weekStart.setHours(0,0,0,0);
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

  const paid = _allInvoices.filter(i => i.status === 'paid' || i.status === 'complete');
  const unpaid = _allInvoices.filter(i => i.status === 'unpaid' || i.status === 'scheduled');

  const sum = arr => arr.reduce((s,i) => s + (i.total||0), 0);
  const fmt = n => '$' + Math.round(n).toLocaleString();

  const today  = paid.filter(i => i.dateTs >= todayStart.getTime());
  const week   = paid.filter(i => i.dateTs >= weekStart.getTime());
  const month  = paid.filter(i => i.dateTs >= monthStart.getTime());

  document.getElementById('kpiRevToday').textContent  = fmt(sum(today));
  document.getElementById('kpiRevWeek').textContent   = fmt(sum(week));
  document.getElementById('kpiRevMonth').textContent  = fmt(sum(month));
  document.getElementById('kpiUnpaid').textContent    = fmt(sum(unpaid));
  document.getElementById('kpiInvCount').textContent  = _allInvoices.length;
  const avg = _allInvoices.length ? sum(_allInvoices) / _allInvoices.length : 0;
  document.getElementById('kpiAvgJob').textContent    = fmt(avg);
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  _activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTable();
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const dateF  = document.getElementById('dateFilter')?.value || 'all';
  const statusF = document.getElementById('statusFilter')?.value || 'all';

  const now = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const weekStart  = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay()); weekStart.setHours(0,0,0,0);
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

  let rows = _allInvoices.filter(inv => {
    // Tab filter
    if (_activeTab !== 'all') {
      if (_activeTab === 'unpaid') { if (inv.status !== 'unpaid' && inv.status !== 'scheduled') return false; }
      else if (!inv.division.toLowerCase().replace(/\s/g,'').includes(_activeTab.replace(/\s/g,''))) return false;
    }
    // Search
    if (search) {
      const hay = (inv.account + inv.division + inv.service + inv.tech).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    // Date filter
    if (dateF === 'today'  && inv.dateTs < todayStart.getTime()) return false;
    if (dateF === 'week'   && inv.dateTs < weekStart.getTime())  return false;
    if (dateF === 'month'  && inv.dateTs < monthStart.getTime()) return false;
    // Status filter
    if (statusF !== 'all') {
      if (statusF === 'paid'     && inv.status !== 'paid' && inv.status !== 'complete') return false;
      if (statusF === 'unpaid'   && inv.status !== 'unpaid' && inv.status !== 'scheduled') return false;
      if (statusF === 'complete' && inv.status !== 'complete') return false;
    }
    return true;
  });

  if (!rows.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No invoices found</div><div style="font-size:13px;margin-top:6px">Invoices appear here when techs and drivers close out jobs in their portals.</div></div>';
    return;
  }

  const statusColor = { paid:'#1E7B3C', complete:'#1E7B3C', unpaid:'#C8102E', scheduled:'#D97706', cancelled:'#6B7280' };
  const statusBg    = { paid:'#DCFCE7', complete:'#DCFCE7', unpaid:'#FEE2E2', scheduled:'#FEF3C7', cancelled:'#F3F4F6' };

  wrap.innerHTML = '<table class="invoice-table">'
    + '<thead><tr><th>Date</th><th>Account</th><th>Division</th><th>Service</th><th>Tech</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>'
    + '<tbody>' + rows.map(inv => {
        const sCol = statusColor[inv.status] || '#6B7280';
        const sBg  = statusBg[inv.status]    || '#F3F4F6';
        const divColor = DIV_COLORS[inv.division] || '#374151';
        return '<tr>'
          + '<td style="font-size:12px;color:var(--soft)">' + esc(inv.date) + '</td>'
          + '<td><strong>' + esc(inv.account) + '</strong></td>'
          + '<td><span class="div-badge" style="background:' + divColor + '">' + esc(inv.division) + '</span></td>'
          + '<td style="font-size:12px">' + esc(inv.service) + '</td>'
          + '<td style="font-size:12px;color:var(--soft)">' + esc(inv.tech) + '</td>'
          + '<td><strong style="color:var(--green)">$' + (inv.total||0).toFixed(2) + '</strong></td>'
          + '<td><span class="status-badge" style="background:' + sBg + ';color:' + sCol + '">' + esc(inv.status) + '</span></td>'
          + '<td style="display:flex;gap:4px">'
            + (inv.status === 'unpaid' ? '<button onclick="markPaid(\'' + inv.id + '\')" style="background:var(--green);color:#fff;border:none;border-radius:5px;padding:4px 8px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;cursor:pointer">Mark Paid</button>' : '')
            + '<button onclick="viewInvoice(\'' + inv.id + '\')" style="background:var(--blue);color:#fff;border:none;border-radius:5px;padding:4px 8px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;cursor:pointer">View</button>'
          + '</td>'
        + '</tr>';
    }).join('') + '</tbody></table>'
    + '<div style="font-size:11px;color:var(--soft);margin-top:10px;text-align:right">' + rows.length + ' invoice' + (rows.length!==1?'s':'') + ' · Total: <strong>$' + rows.reduce((s,i)=>s+(i.total||0),0).toFixed(2) + '</strong></div>';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function markPaid(invId) {
  let found = false;
  DIV_STORES.forEach(store => {
    try {
      const items = JSON.parse(localStorage.getItem(store.key) || '[]');
      const idx = items.findIndex(i => i.id === invId);
      if (idx >= 0) {
        items[idx].paymentStatus = 'paid';
        items[idx].paidAt = Date.now();
        localStorage.setItem(store.key, JSON.stringify(items));
        found = true;
      }
    } catch(e) {}
  });
  if (found) { loadInvoices(); }
}

function viewInvoice(invId) {
  const inv = _allInvoices.find(i => i.id === invId);
  if (!inv) return;
  const w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html><head><title>Invoice ' + inv.id + '<\/title>'
    + '<style>body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:0 auto}'
    + 'h2{color:#C8102E;border-bottom:2px solid #C8102E;padding-bottom:8px;margin-bottom:16px}'
    + 'table{width:100%;border-collapse:collapse;margin:16px 0}'
    + 'th{background:#1A1D21;color:#fff;padding:8px 10px;text-align:left;font-size:12px}'
    + 'td{padding:8px 10px;border-bottom:1px solid #E5E7EB;font-size:13px}'
    + '.total{font-size:18px;font-weight:800;color:#1E7B3C;text-align:right}'
    + '<\/style><\/head><body>'
    + '<h2>Termac Family of Companies — Invoice<\/h2>'
    + '<p><strong>Date:<\/strong> ' + inv.date + '<\/p>'
    + '<p><strong>Account:<\/strong> ' + inv.account + '<\/p>'
    + '<p><strong>Division:<\/strong> ' + inv.division + '<\/p>'
    + '<p><strong>Service:<\/strong> ' + inv.service + '<\/p>'
    + '<p><strong>Technician:<\/strong> ' + inv.tech + '<\/p>'
    + '<p><strong>Status:<\/strong> ' + inv.status + '<\/p>'
    + '<hr><p class="total">Total: $' + (inv.total||0).toFixed(2) + '<\/p>'
    + '<\/body><\/html>');
  w.document.close();
  setTimeout(() => w.print(), 400);
}

function exportCSV() {
  const wrap = document.getElementById('tableWrap');
  const rows = _allInvoices;
  if (!rows.length) { alert('No invoices to export.'); return; }
  const headers = ['Date','Account','Division','Service','Tech','Total','Status','Invoice ID'];
  const csv = [headers.join(',')]
    .concat(rows.map(i => [
      '"' + (i.date||'') + '"',
      '"' + (i.account||'').replace(/"/g,'') + '"',
      '"' + (i.division||'') + '"',
      '"' + (i.service||'').replace(/"/g,'') + '"',
      '"' + (i.tech||'') + '"',
      (i.total||0).toFixed(2),
      '"' + (i.status||'') + '"',
      '"' + (i.id||'') + '"',
    ].join(',')))
    .join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'termac_invoices_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadInvoices);
</script>
</body>
</html>

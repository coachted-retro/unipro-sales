<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accounts Receivable — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:150px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.alert .stat-num{color:var(--red)}.stat-card.good .stat-num{color:var(--green)}.stat-card.warn .stat-num{color:var(--orange)}
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.overdue{border-color:#FCA5A5;background:#FFF5F5}.card.warn{border-color:#FED7AA;background:#FFF7ED}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:14px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.card-amt{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;text-align:right}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-current{background:#D1FAE5;color:#065F46}.s-watch{background:#FFFBEB;color:#B88010}.s-high{background:#FEF3C7;color:#D8690B}.s-critical{background:#FEE2E2;color:#C8102E}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:min(560px,96vw);max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;margin-bottom:14px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.ai-box{background:#F8FAFC;border:1.5px solid var(--line);border-radius:8px;padding:14px;white-space:pre-wrap;font-size:13px;line-height:1.55;min-height:50px;margin-top:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.priority-tag{background:#7C3AED;color:#fff;border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.05em;margin-left:6px}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Accounts Receivable</span>
  <a class="nav-back" href="accounting-portal.html">&larr; Accounting Office</a>
  <a class="nav-help" href="user-manuals.html?role=ar-assistant" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div class="page-title">Accounts Receivable</div>
  <div class="page-sub">Your collection worklist, field-payment reconcile, reminders, and customer statements. Numbers match the controller penny for penny.</div>

  <div class="stat-strip" id="statStrip"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="worklist" onclick="setTab('worklist')">Collection Worklist</button>
    <button class="tab-btn" data-tab="reconcile" onclick="setTab('reconcile')">Reconcile Field Payments</button>
    <button class="tab-btn" data-tab="statement" onclick="setTab('statement')">Customer Statement</button>
    <button class="tab-btn" data-tab="promises" onclick="setTab('promises')">Promises to Pay</button>
  </div>

  <div class="tab-panel active" id="tab-worklist"></div>
  <div class="tab-panel" id="tab-reconcile"></div>
  <div class="tab-panel" id="tab-statement"></div>
  <div class="tab-panel" id="tab-promises"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script src="termac-finance.js"></script>
<script src="termac-credit.js"></script>
<script>
var F=window.TermacFinance, _tab='worklist';
var PROMISES='termac_ar_promises', HOLDREQ='termac_ar_hold_requests';
var DIV_COLOR={'UniPro':'#1B5FA8','Quality III':'#0D7490','GTO':'#D8690B','Filter Man':'#1E7B3C','AllPro':'#6B21A8','Termac':'#C8102E'};
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function money(n){ return F?F.money(n):'$'+(Number(n)||0); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function openBal(i){ return F.openBal(i); }
function fullyPaid(i){ return F.fullyPaid(i); }
function ageStatus(i){ return F.ageStatus(i); }

function setTab(t){ _tab=t; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); }); document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+t); }); renderTab(); }
function renderTab(){ ({worklist:renderWorklist,reconcile:renderReconcile,statement:renderStatement,promises:renderPromises}[_tab]||function(){})(); }

function renderStats(){
  var ar=F.loadAR(), openAR=0, overdue=0;
  ar.forEach(function(i){ if(fullyPaid(i)) return; var ob=openBal(i); openAR+=ob; if(ageStatus(i).tier!=='current') overdue+=ob; });
  var now=Date.now(), s30=now-30*86400000, collMTD=0;
  var mStart=new Date(); mStart=new Date(mStart.getFullYear(),mStart.getMonth(),1).getTime();
  F.loadColls().forEach(function(c){ var t=Number(c.collectedAt)||0; if(t>=mStart) collMTD+=Number(c.amount)||0; });
  var dso=F.dso();
  function card(num,lbl,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+num+'</div><div class="stat-lbl">'+lbl+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=
    card(money(openAR),'Open AR','')+
    card(money(overdue),'Overdue 30+', overdue>0?'alert':'')+
    card(dso==null?'—':dso+' days','Days to Collect', dso==null?'':(dso<=35?'good':dso<=55?'warn':'alert'))+
    card(money(collMTD),'Collected This Month','good');
}

/* ---------- worklist ---------- */
function renderWorklist(){
  var ar=F.loadAR().filter(function(i){ return !fullyPaid(i) && ageStatus(i).tier!=='current'; });
  ar.forEach(function(i){ i._st=ageStatus(i); i._ob=openBal(i); i._pri=i._st.days*i._ob; });
  ar.sort(function(a,b){ return b._pri-a._pri; });
  var h='';
  var held=(window.TermacCredit?TermacCredit.list():[]);
  if(held.length){ h+='<div class="card" style="border-color:#FECACA;background:#FEF2F2;color:#991B1B;font-weight:600">'+held.length+' account'+(held.length>1?'s':'')+' on credit hold: '+held.map(function(r){return esc(r.name);}).join(', ')+'</div>'; }
  if(!ar.length){ h+='<div class="card" style="border-color:#A7F3D0;background:#ECFDF5;color:#065F46;font-weight:600">Nothing overdue. Open receivables are all current.</div>'; document.getElementById('tab-worklist').innerHTML=h; return; }
  h+='<div class="sec-hdr">Chase these first, biggest and oldest money on top</div>';
  ar.forEach(function(i,idx){
    var cls=i._st.tier==='critical'?'overdue':(i._st.tier==='high'||i._st.tier==='watch'?'warn':'');
    var hold=(window.TermacCredit?TermacCredit.badgeHTML(i.account):'');
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+(idx<3?'<span class="priority-tag">TOP '+(idx+1)+'</span> ':'')+esc(i.account)+hold+' <span class="divtag" style="background:'+(DIV_COLOR[i.division]||'#888')+'">'+esc(i.division)+'</span></div>'+
      '<div class="card-meta">'+esc(i.serviceType||'Service')+' · '+i._st.days+' days overdue'+(i._st.action?' · '+esc(i._st.action):'')+'</div></div>'+
      '<div style="text-align:right"><div class="card-amt">'+money(i._ob)+'</div><span class="status s-'+i._st.tier+'">'+i._st.label+'</span></div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
      '<button class="btn btn-green" onclick="markPaid(\''+esc(i.id)+'\',\''+esc(i.source)+'\')">Mark Paid</button>'+
      '<button class="btn btn-blue" onclick="draftReminder(\''+esc(i.id)+'\')">Draft Reminder</button>'+
      '<button class="btn btn-outline" onclick="logPromise(\''+esc(i.id)+'\')">Log Promise</button>'+
      (window.TermacCredit && !TermacCredit.isHeld(i.account)?'<button class="btn btn-outline" onclick="requestHold(\''+esc(i.account)+'\')">Request Hold</button>':'')+
      '</div></div>';
  });
  document.getElementById('tab-worklist').innerHTML=h;
}
function findInv(id){ return F.loadAR().find(function(x){ return (x.id||'')+''===(id+''); }); }
function markPaid(id, source){
  var arr=lsGet(source), hit=false;
  arr.forEach(function(r){ if((r.id||'')+''===(id+'')){ r.paymentStatus='paid'; r.invoicePaid=true; r.paid=true; hit=true; } });
  if(hit){ lsSet(source,arr); toast('Invoice marked paid.'); renderStats(); renderTab(); } else toast('Could not locate that record.');
}

/* ---------- reminder drafting (AI) ---------- */
async function draftReminder(id){
  var i=findInv(id); if(!i) return;
  var st=ageStatus(i);
  openModal('<h3>Payment Reminder</h3><div class="muted" style="padding:6px 0">Drafting a '+(st.days>=90?'firm final':st.days>=60?'firm':'polite')+' reminder for '+esc(i.account)+'...</div><div class="ai-box" id="remOut">Working...</div><div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Close</button><button class="btn btn-blue" id="remCopy" style="display:none" onclick="copyReminder()">Copy</button></div>');
  var tone=st.days>=90?'firm and final, this is the last notice before the account goes on credit hold':st.days>=60?'firm but professional, make clear payment is now seriously overdue':'polite and friendly, a gentle nudge';
  var prompt='You are the accounts receivable assistant for Termac Family of Companies, a fire protection and commercial kitchen services company. Write a short payment reminder email to '+i.account+'. The invoice is for '+(i.serviceType||'service')+', '+money(openBal(i))+', and is '+st.days+' days overdue. Tone: '+tone+'. Keep it under 120 words. Sign as the Termac Accounting Office, billing line 267-421-6336, tscholl@termac.com. Plain text, no markdown symbols, no em dashes. Give a subject line on the first line, then the body.';
  try{
    var res=await fetch('https://unipro-ai-proxy.tedscholl.workers.dev',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:500, messages:[{role:'user',content:[{type:'text',text:prompt}]}] }) });
    var data=await res.json();
    var text=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
    document.getElementById('remOut').textContent=text||'No response. Try again.';
    if(text){ var c=document.getElementById('remCopy'); if(c) c.style.display=''; }
  }catch(e){ document.getElementById('remOut').textContent='Could not reach the drafting service. Check the AI proxy connection.'; }
}
function copyReminder(){ var t=document.getElementById('remOut'); if(t){ navigator.clipboard.writeText(t.textContent).then(function(){ toast('Reminder copied.'); }); } }

/* ---------- promises to pay ---------- */
function logPromise(id){
  var i=findInv(id); if(!i) return;
  openModal('<h3>Log a Promise to Pay</h3>'+
    '<div class="fld"><label>Account</label><input id="pmAcct" value="'+esc(i.account)+'" readonly></div>'+
    '<div class="fld"><label>Amount promised</label><input id="pmAmt" type="number" value="'+openBal(i).toFixed(2)+'"></div>'+
    '<div class="fld"><label>Promised by date</label><input id="pmDate" type="date"></div>'+
    '<div class="fld"><label>Note</label><textarea id="pmNote" rows="2" placeholder="Spoke with..., will mail check..."></textarea></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="savePromise(\''+esc(i.id)+'\',\''+esc(i.account)+'\',\''+esc(i.division)+'\')">Save</button></div>');
}
function savePromise(id,acct,div){
  var p=lsGet(PROMISES);
  p.unshift({ id:'pm'+Date.now(), invId:id, account:acct, division:div, amount:Number(document.getElementById('pmAmt').value)||0, by:document.getElementById('pmDate').value||'', note:document.getElementById('pmNote').value||'', loggedAt:Date.now(), status:'open' });
  lsSet(PROMISES,p); closeModal(); toast('Promise logged.'); if(_tab==='promises') renderPromises();
}
function renderPromises(){
  var p=lsGet(PROMISES);
  var h='<div class="sec-hdr">Promises to pay</div>';
  if(!p.length){ h+='<div class="muted">No promises logged yet. Use Log Promise on the worklist when a customer commits to a date.</div>'; document.getElementById('tab-promises').innerHTML=h; return; }
  p.forEach(function(x){
    var overdue=x.by && x.by < new Date().toISOString().slice(0,10) && x.status==='open';
    h+='<div class="card '+(overdue?'overdue':'')+'"><div class="card-hdr"><div><div class="card-title">'+esc(x.account)+'</div><div class="card-meta">Promised '+money(x.amount)+(x.by?' by '+esc(x.by):'')+(overdue?' · PAST PROMISE DATE':'')+(x.note?' · '+esc(x.note):'')+'</div></div>'+
      '<div style="display:flex;gap:6px">'+(x.status==='open'?'<button class="btn btn-green" onclick="closePromise(\''+x.id+'\')">Kept</button>':'<span class="status s-current">Kept</span>')+'<button class="btn btn-outline" onclick="delPromise(\''+x.id+'\')">Remove</button></div></div></div>';
  });
  document.getElementById('tab-promises').innerHTML=h;
}
function closePromise(pid){ var p=lsGet(PROMISES); p.forEach(function(x){ if(x.id===pid) x.status='kept'; }); lsSet(PROMISES,p); renderPromises(); }
function delPromise(pid){ var p=lsGet(PROMISES).filter(function(x){ return x.id!==pid; }); lsSet(PROMISES,p); renderPromises(); }

/* ---------- request credit hold ---------- */
function requestHold(acct){
  if(!confirm('Send a credit hold request for '+acct+' to the controller?')) return;
  var r=lsGet(HOLDREQ); r.unshift({ account:acct, at:Date.now(), by:'AR' }); lsSet(HOLDREQ,r);
  toast('Hold request sent to the controller.');
}

/* ---------- reconcile field payments ---------- */
function normName(s){ return String(s==null?'':s).toLowerCase().replace(/[^a-z0-9]/g,''); }
function renderReconcile(){
  var colls=F.loadColls().filter(function(c){ return c.status!=='posted'; });
  var h='<div class="sec-hdr">Field payments waiting to apply</div>'+
    '<div class="muted" style="text-align:left;padding:4px 2px 12px">Cash and checks collected by reps and drivers. Match each to its open invoice to clear it.</div>';
  if(!colls.length){ h+='<div class="muted">No unapplied field payments right now.</div>'; document.getElementById('tab-reconcile').innerHTML=h; return; }
  var ar=F.loadAR().filter(function(i){ return !fullyPaid(i); });
  colls.forEach(function(c){
    var cn=normName(c.accountName), cdiv=F.normDiv(c.division), amt=Number(c.amount)||0;
    var match=ar.filter(function(i){ return normName(i.account)===cn && (!cdiv || i.division===cdiv); })
                .sort(function(a,b){ return Math.abs(openBal(a)-amt)-Math.abs(openBal(b)-amt); })[0];
    h+='<div class="card"><div class="card-hdr"><div><div class="card-title">'+esc(c.accountName||'Unknown')+' · '+money(amt)+'</div>'+
      '<div class="card-meta">'+esc(c.method||'')+(c.checkNum?' #'+esc(c.checkNum):'')+' · collected by '+esc(c.collectedBy||'field')+(c.collectedDate?' · '+esc(c.collectedDate):'')+'</div></div>'+
      '<div style="text-align:right">'+(match?'<div class="card-meta">matches invoice</div><div style="font-weight:700">'+esc(match.account)+' · '+money(openBal(match))+'</div>':'<span class="status s-critical">No match</span>')+'</div></div>'+
      (match?'<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-green" onclick="applyColl(\''+esc(c.id||'')+'\',\''+esc(match.id)+'\',\''+esc(match.source)+'\','+amt+')">Apply to Invoice</button></div>':'<div style="margin-top:8px;font-size:11px;color:var(--soft)">Check the account name and division on this payment, or confirm the invoice exists.</div>')+
      '</div>';
  });
  document.getElementById('tab-reconcile').innerHTML=h;
}
function applyColl(collId, invId, source, amt){
  var arr=lsGet(source);
  arr.forEach(function(r){ if((r.id||'')+''===(invId+'')){ var inv=findInv(invId); var bal=inv?openBal(inv):amt; r.paidApplied=(Number(r.paidApplied||0))+amt; if(r.paidApplied>= (Number(r.amount||r.total||r.revenue||0))-0.01){ r.paymentStatus='paid'; r.invoicePaid=true; r.paid=true; } } });
  lsSet(source,arr);
  var colls=lsGet('termac_collections'); colls.forEach(function(c){ if((c.id||'')+''===(collId+'')) c.status='posted'; }); lsSet('termac_collections',colls);
  toast('Payment applied to invoice.'); renderStats(); renderReconcile();
}

/* ---------- customer statement ---------- */
function renderStatement(){
  var accts={}; F.loadAR().forEach(function(i){ if(!fullyPaid(i)) accts[i.account]=true; });
  var names=Object.keys(accts).sort();
  var h='<div class="sec-hdr">Generate a customer statement</div>';
  if(!names.length){ h+='<div class="muted">No accounts with open balances.</div>'; document.getElementById('tab-statement').innerHTML=h; return; }
  h+='<div class="card"><div class="fld"><label>Account</label><select id="stAcct">'+names.map(function(n){ return '<option>'+esc(n)+'</option>'; }).join('')+'</select></div>'+
    '<button class="btn btn-blue" onclick="buildStatement()">Build Statement</button></div><div id="stOut"></div>';
  document.getElementById('tab-statement').innerHTML=h;
}
function buildStatement(){
  var acct=document.getElementById('stAcct').value;
  var rows=F.loadAR().filter(function(i){ return i.account===acct && !fullyPaid(i); }).sort(function(a,b){ return a.date-b.date; });
  var total=rows.reduce(function(s,i){ return s+openBal(i); },0);
  var body='<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px">Statement of Account</div><div class="card-meta">'+esc(acct)+' · as of '+new Date().toLocaleDateString('en-US')+'</div></div><button class="btn btn-outline" onclick="printStatement(\''+esc(acct).replace(/'/g,"")+'\')">Print</button></div>'+
    '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1F5F9;text-align:left"><th style="padding:6px 8px">Date</th><th style="padding:6px 8px">Service</th><th style="padding:6px 8px">Division</th><th style="padding:6px 8px">Age</th><th style="padding:6px 8px;text-align:right">Open</th></tr></thead><tbody>';
  rows.forEach(function(i){ var st=ageStatus(i); body+='<tr style="border-top:1px solid #E2E8F0"><td style="padding:5px 8px">'+new Date(i.date).toLocaleDateString('en-US')+'</td><td style="padding:5px 8px">'+esc(i.serviceType||'Service')+'</td><td style="padding:5px 8px">'+esc(i.division)+'</td><td style="padding:5px 8px">'+st.days+'d</td><td style="padding:5px 8px;text-align:right">'+money(openBal(i))+'</td></tr>'; });
  body+='</tbody><tfoot><tr style="border-top:2px solid var(--navy);font-weight:800"><td colspan="4" style="padding:7px 8px">Total Due</td><td style="padding:7px 8px;text-align:right">'+money(total)+'</td></tr></tfoot></table>'+
    '<div style="margin-top:10px;font-size:11px;color:var(--soft)">Remit to Termac Family of Companies. Questions: 267-421-6336, tscholl@termac.com.</div></div>';
  document.getElementById('stOut').innerHTML=body;
  window._lastStmt={acct:acct, rows:rows, total:total};
}
function printStatement(){
  var s=window._lastStmt; if(!s) return;
  var w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to print.'); return; }
  var html='<html><head><title>Statement - '+esc(s.acct)+'</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#1A1D21}h1{font-size:22px}table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}th{background:#1A1D21;color:#fff;text-align:left;padding:8px}td{padding:7px 8px;border-bottom:1px solid #ddd}tfoot td{font-weight:bold;border-top:2px solid #1A1D21}</style></head><body>'+
    '<h1>Statement of Account</h1><div>'+esc(s.acct)+' &middot; as of '+new Date().toLocaleDateString('en-US')+'</div>'+
    '<table><thead><tr><th>Date</th><th>Service</th><th>Division</th><th>Age</th><th style="text-align:right">Open</th></tr></thead><tbody>'+
    s.rows.map(function(i){ var st=ageStatus(i); return '<tr><td>'+new Date(i.date).toLocaleDateString('en-US')+'</td><td>'+esc(i.serviceType||'Service')+'</td><td>'+esc(i.division)+'</td><td>'+st.days+'d</td><td style="text-align:right">'+money(openBal(i))+'</td></tr>'; }).join('')+
    '</tbody><tfoot><tr><td colspan="4">Total Due</td><td style="text-align:right">'+money(s.total)+'</td></tr></tfoot></table>'+
    '<p style="margin-top:18px;font-size:12px;color:#555">Remit to Termac Family of Companies &middot; 267-421-6336 &middot; tscholl@termac.com</p>'+
    '<script>window.onload=function(){window.print();}<\/script></body></html>';
  w.document.write(html); w.document.close();
}

/* ---------- modal ---------- */
function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

renderStats(); renderTab();

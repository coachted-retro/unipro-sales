<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Procurement & Purchasing — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--purple:#6B21A8;--teal:#0D7490;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:150px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.alert .stat-num{color:var(--red)}.stat-card.good .stat-num{color:var(--green)}.stat-card.warn .stat-num{color:var(--orange)}
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.alert{border-color:#FCA5A5;background:#FFF5F5}.card.warn{border-color:#FED7AA;background:#FFF7ED}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:14px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.card-amt{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;text-align:right}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-draft{background:#E5E7EB;color:#374151}.s-issued{background:#DBEAFE;color:#1E40AF}.s-received{background:#D1FAE5;color:#065F46}.s-closed{background:#D1FAE5;color:#065F46}.s-open{background:#FEF3C7;color:#D8690B}.s-denied{background:#FEE2E2;color:#C8102E}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.agetag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em}
.age-ok{background:#D1FAE5;color:#065F46}.age-watch{background:#FEF3C7;color:#D8690B}.age-alert{background:#FEE2E2;color:#C8102E}
.star{color:var(--yellow)}
.fld{margin-bottom:12px}.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.li-row{display:grid;grid-template-columns:2fr .7fr .9fr auto;gap:6px;align-items:center;margin-bottom:6px}
.li-row input{padding:8px 10px;border:1.5px solid var(--line);border-radius:7px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:min(560px,96vw);max-height:92vh;overflow-y:auto;padding:22px}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;margin-bottom:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.lineitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.li-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Procurement &amp; Purchasing</span>
  <a class="nav-back" href="termac-os.html">&larr; Hub</a>
  <a class="nav-help" href="user-manuals.html?role=procurement" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div><div class="page-title">Procurement &amp; Purchasing</div>
    <div class="page-sub">Purchase orders, requisitions, vendor pricing, and spend across all six divisions. Received POs hand off to Accounts Payable.</div></div>
    <button class="btn btn-purple" onclick="newPO()">+ New Purchase Order</button>
  </div>

  <div class="stat-strip" id="statStrip"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="pos" onclick="setTab('pos')">Purchase Orders</button>
    <button class="tab-btn" data-tab="reqs" onclick="setTab('reqs')">Requisitions</button>
    <button class="tab-btn" data-tab="vendors" onclick="setTab('vendors')">Vendors &amp; Pricing</button>
    <button class="tab-btn" data-tab="spend" onclick="setTab('spend')">Spend</button>
  </div>

  <div class="tab-panel active" id="tab-pos"></div>
  <div class="tab-panel" id="tab-reqs"></div>
  <div class="tab-panel" id="tab-vendors"></div>
  <div class="tab-panel" id="tab-spend"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
var PO='termac_purchase_orders', VEND='termac_vendors', REQ='termac_requisitions', AP_KEY='termac_payables', _tab='pos';
var DIVISIONS=['UniPro','Quality III','GTO','Filter Man','AllPro','Termac','Shared / Office'];
var DIV_COLOR={'UniPro':'#1B5FA8','Quality III':'#0D7490','GTO':'#D8690B','Filter Man':'#1E7B3C','AllPro':'#6B21A8','Termac':'#C8102E','Shared / Office':'#5A616B'};
var APPROVAL_THRESHOLD=2500;
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function money(n){ return '$'+(Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function val(id){ var e=document.getElementById(id); return e?e.value:''; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(d){ if(!d) return null; return Math.round((Date.parse(d)-Date.now())/86400000); }
function poTotal(p){ return (p.items||[]).reduce(function(s,i){ return s+(Number(i.qty)||0)*(Number(i.unitPrice)||0); },0); }
function nextPONum(){ var n=lsGet(PO).length+1; return 'PO-'+('000'+n).slice(-4); }

function setTab(t){ _tab=t; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); }); document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+t); }); renderTab(); }
function renderTab(){ ({pos:renderPOs,reqs:renderReqs,vendors:renderVendors,spend:renderSpend}[_tab]||function(){})(); }

function renderStats(){
  var pos=lsGet(PO);
  var open=pos.filter(function(p){ return p.status!=='closed' && p.status!=='received'; }).length;
  var awaiting=pos.filter(function(p){ return p.status==='issued'; }).length;
  var reqs=lsGet(REQ).filter(function(r){ return r.status==='open'; }).length;
  var committed=pos.filter(function(p){ return p.status==='issued'; }).reduce(function(s,p){ return s+poTotal(p); },0);
  function card(n,l,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+n+'</div><div class="stat-lbl">'+l+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=
    card(open,'Open POs','')+
    card(awaiting,'Awaiting Receipt', awaiting?'warn':'')+
    card(reqs,'Pending Requisitions', reqs?'warn':'')+
    card(money(committed),'Committed Spend','');
}

/* ---------- purchase orders ---------- */
function renderPOs(){
  var pos=lsGet(PO).slice().sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
  var h='';
  if(!pos.length){ h='<div class="muted">No purchase orders yet. Click New Purchase Order to raise one.</div>'; document.getElementById('tab-pos').innerHTML=h; return; }
  pos.forEach(function(p){
    var tot=poTotal(p), n=daysUntil(p.expectedDate);
    var late=p.status==='issued' && p.expectedDate && n<0;
    var cls=late?'alert':(p.status==='issued'&&n!=null&&n<=3?'warn':'');
    var stCls={draft:'s-draft',issued:'s-issued',received:'s-received',closed:'s-closed'}[p.status]||'s-draft';
    var needApp=tot>=APPROVAL_THRESHOLD && !p.approved && p.status==='draft';
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(p.poNumber||'PO')+' · '+esc(p.vendor||'Vendor')+' <span class="divtag" style="background:'+(DIV_COLOR[p.division]||"#888")+'">'+esc(p.division||'')+'</span></div>'+
      '<div class="card-meta">'+(p.items||[]).length+' line'+((p.items||[]).length===1?'':'s')+(p.expectedDate?' · expected '+esc(p.expectedDate):'')+(late?' · OVERDUE':'')+'</div>'+
      (needApp?'<div style="margin-top:4px"><span class="status s-open">Needs approval over '+money(APPROVAL_THRESHOLD)+'</span></div>':'')+'</div>'+
      '<div style="text-align:right"><div class="card-amt">'+money(tot)+'</div><span class="status '+stCls+'">'+esc(p.status)+'</span>'+(late?'<div style="margin-top:4px"><span class="agetag age-alert">'+(-n)+'d late</span></div>':'')+'</div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
      '<button class="btn btn-outline" onclick="viewPO(\''+p.id+'\')">View</button>'+
      (p.status==='draft'?(needApp?'<button class="btn btn-blue" onclick="approvePO(\''+p.id+'\')">Approve</button>':'<button class="btn btn-blue" onclick="issuePO(\''+p.id+'\')">Issue PO</button>'):'')+
      (p.status==='issued'?'<button class="btn btn-green" onclick="receivePO(\''+p.id+'\')">Receive</button>':'')+
      (p.status==='received'?'<button class="btn btn-outline" onclick="closePO(\''+p.id+'\')">Close</button>':'')+
      '<button class="btn btn-outline" onclick="delPO(\''+p.id+'\')">Remove</button></div></div>';
  });
  document.getElementById('tab-pos').innerHTML=h;
}
function poFind(id){ return lsGet(PO).find(function(p){ return p.id===id; }); }
function poSave(p){ var all=lsGet(PO); var i=all.findIndex(function(x){return x.id===p.id;}); if(i>=0) all[i]=p; else all.unshift(p); lsSet(PO,all); }
function newPO(prefill){
  var vs=lsGet(VEND);
  var vOpts='<option value="">Select or type below</option>'+vs.map(function(v){ return '<option>'+esc(v.name)+'</option>'; }).join('');
  var divOpts=DIVISIONS.map(function(d){ return '<option'+(prefill&&prefill.division===d?' selected':'')+'>'+d+'</option>'; }).join('');
  openModal('<h3>New Purchase Order</h3>'+
    '<div class="grid2"><div class="fld"><label>Vendor</label><input id="po_vendor" list="po_vlist" value="'+esc(prefill&&prefill.vendor||'')+'"><datalist id="po_vlist">'+vs.map(function(v){return '<option>'+esc(v.name)+'</option>';}).join('')+'</datalist></div>'+
    '<div class="fld"><label>Division</label><select id="po_div">'+divOpts+'</select></div></div>'+
    '<div class="grid2"><div class="fld"><label>Expected date</label><input id="po_exp" type="date"></div><div class="fld"><label>Notes</label><input id="po_notes"></div></div>'+
    '<div class="sec-hdr" style="margin-top:6px">Line items</div><div id="po_items"></div>'+
    '<button class="btn btn-outline" onclick="poAddRow()" style="margin-top:4px">+ Add Line</button>'+
    '<div style="text-align:right;margin:10px 0;font-weight:800" id="po_totalLbl"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="savePO()">Save Draft</button></div>');
  window._poRows=[]; if(prefill&&prefill.item){ window._poRows.push({item:prefill.item,qty:prefill.qty||1,unitPrice:''}); } else { window._poRows.push({item:'',qty:1,unitPrice:''}); }
  poRenderRows();
}
function poRenderRows(){
  var c=document.getElementById('po_items'); if(!c) return;
  c.innerHTML=window._poRows.map(function(r,i){
    return '<div class="li-row"><input placeholder="Item" value="'+esc(r.item)+'" oninput="poSync()"><input type="number" placeholder="Qty" value="'+esc(r.qty)+'" oninput="poSync()"><input type="number" placeholder="Unit $" value="'+esc(r.unitPrice)+'" oninput="poSync()"><button class="btn btn-outline" onclick="poDelRow('+i+')">×</button></div>';
  }).join('');
  poUpdateTotal();
}
function poSync(){
  var rows=document.querySelectorAll('#po_items .li-row');
  window._poRows=Array.prototype.map.call(rows,function(r){ var ins=r.querySelectorAll('input'); return {item:ins[0].value,qty:ins[1].value,unitPrice:ins[2].value}; });
  poUpdateTotal();
}
function poUpdateTotal(){ var t=window._poRows.reduce(function(s,r){ return s+(Number(r.qty)||0)*(Number(r.unitPrice)||0); },0); var l=document.getElementById('po_totalLbl'); if(l) l.textContent='Total: '+money(t); }
function poAddRow(){ poSync(); window._poRows.push({item:'',qty:1,unitPrice:''}); poRenderRows(); }
function poDelRow(i){ poSync(); window._poRows.splice(i,1); if(!window._poRows.length) window._poRows.push({item:'',qty:1,unitPrice:''}); poRenderRows(); }
function savePO(){
  poSync();
  var vendor=val('po_vendor'); if(!vendor){ toast('Enter a vendor.'); return; }
  var items=window._poRows.filter(function(r){ return r.item; });
  if(!items.length){ toast('Add at least one line item.'); return; }
  var p={ id:'po'+Date.now(), poNumber:nextPONum(), vendor:vendor, division:val('po_div'), expectedDate:val('po_exp'), notes:val('po_notes'), items:items, status:'draft', approved:false, createdAt:Date.now() };
  poSave(p); closeModal(); toast('PO '+p.poNumber+' saved as draft.'); renderStats(); renderPOs();
}
function viewPO(id){
  var p=poFind(id); if(!p) return;
  var rows=(p.items||[]).map(function(i){ return '<div class="lineitem"><div>'+esc(i.item)+' <span style="color:var(--soft)">x'+esc(i.qty)+'</span></div><div>'+money((Number(i.qty)||0)*(Number(i.unitPrice)||0))+'</div></div>'; }).join('');
  openModal('<h3>'+esc(p.poNumber)+'</h3><div class="card-meta" style="margin-bottom:10px">'+esc(p.vendor)+' · '+esc(p.division)+(p.expectedDate?' · expected '+esc(p.expectedDate):'')+'</div>'+rows+
    '<div style="text-align:right;font-weight:800;margin-top:10px">Total: '+money(poTotal(p))+'</div>'+(p.notes?'<div class="card-meta" style="margin-top:6px">'+esc(p.notes)+'</div>':'')+
    '<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>');
}
function approvePO(id){ var p=poFind(id); p.approved=true; poSave(p); toast('Approved. You can issue it now.'); renderPOs(); }
function issuePO(id){ var p=poFind(id); if(poTotal(p)>=APPROVAL_THRESHOLD && !p.approved){ toast('Needs approval first.'); return; } p.status='issued'; p.issuedAt=Date.now(); poSave(p); toast('PO issued to vendor.'); renderStats(); renderPOs(); }
function receivePO(id){
  var p=poFind(id); p.status='received'; p.receivedAt=Date.now(); poSave(p);
  if(confirm('Received '+p.poNumber+'. Send it to Accounts Payable as a bill?')){
    var ap=lsGet(AP_KEY);
    ap.unshift({ id:'ap'+Date.now(), vendor:p.vendor, amount:poTotal(p), division:p.division, category:'Parts & Materials', dueDate:'', invoiceNum:p.poNumber, notes:'From '+p.poNumber, status:'open', loggedAt:Date.now() });
    lsSet(AP_KEY,ap);
    toast('Received and sent to AP.');
  } else toast('Received.');
  renderStats(); renderPOs();
}
function closePO(id){ var p=poFind(id); p.status='closed'; poSave(p); renderStats(); renderPOs(); }
function delPO(id){ if(!confirm('Remove this PO?')) return; lsSet(PO,lsGet(PO).filter(function(p){return p.id!==id;})); renderStats(); renderPOs(); }

/* ---------- requisitions ---------- */
function renderReqs(){
  var reqs=lsGet(REQ).slice().sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
  var h='<div style="margin-bottom:10px"><button class="btn btn-outline" onclick="newReq()">+ Add Requisition</button></div>';
  var open=reqs.filter(function(r){ return r.status==='open'; });
  if(!reqs.length){ h+='<div class="muted">No requisitions. These are buy requests from the field, warehouse, or divisions that you turn into POs.</div>'; document.getElementById('tab-reqs').innerHTML=h; return; }
  if(!open.length) h+='<div class="card" style="border-color:#A7F3D0;background:#ECFDF5;color:#065F46;font-weight:600">No pending requests right now.</div>';
  reqs.forEach(function(r){
    var n=daysUntil(r.neededBy);
    var cls=r.status==='open'&&r.neededBy&&n<3?'warn':'';
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(r.item)+' <span style="color:var(--soft)">x'+esc(r.qty||1)+'</span> '+(r.division?'<span class="divtag" style="background:'+(DIV_COLOR[r.division]||"#888")+'">'+esc(r.division)+'</span>':'')+'</div>'+
      '<div class="card-meta">'+(r.requestedBy?'by '+esc(r.requestedBy):'')+(r.neededBy?' · needed '+esc(r.neededBy):'')+(r.reason?' · '+esc(r.reason):'')+'</div></div>'+
      '<span class="status '+({open:'s-open',approved:'s-issued',ordered:'s-received',denied:'s-denied'}[r.status]||'s-open')+'">'+esc(r.status)+'</span></div>'+
      (r.status==='open'?'<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-green" onclick="reqToPO(\''+r.id+'\')">Create PO</button><button class="btn btn-outline" onclick="reqDeny(\''+r.id+'\')">Deny</button></div>':'')+
      '</div>';
  });
  document.getElementById('tab-reqs').innerHTML=h;
}
function newReq(){
  openModal('<h3>New Requisition</h3><div class="grid2"><div class="fld"><label>Item</label><input id="r_item"></div><div class="fld"><label>Qty</label><input id="r_qty" type="number" value="1"></div></div>'+
    '<div class="grid2"><div class="fld"><label>Division</label><select id="r_div">'+DIVISIONS.map(function(d){return '<option>'+d+'</option>';}).join('')+'</select></div><div class="fld"><label>Needed by</label><input id="r_need" type="date"></div></div>'+
    '<div class="grid2"><div class="fld"><label>Requested by</label><input id="r_by"></div><div class="fld"><label>Reason</label><input id="r_reason"></div></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveReq()">Save</button></div>');
}
function saveReq(){ var it=val('r_item'); if(!it){ toast('Enter an item.'); return; } var r=lsGet(REQ); r.unshift({ id:'req'+Date.now(), item:it, qty:val('r_qty')||1, division:val('r_div'), neededBy:val('r_need'), requestedBy:val('r_by'), reason:val('r_reason'), status:'open', createdAt:Date.now() }); lsSet(REQ,r); closeModal(); toast('Requisition added.'); renderStats(); renderReqs(); }
function reqToPO(id){ var r=lsGet(REQ).find(function(x){return x.id===id;}); if(!r) return; var reqs=lsGet(REQ); reqs.forEach(function(x){ if(x.id===id) x.status='ordered'; }); lsSet(REQ,reqs); newPO({item:r.item,qty:r.qty,division:r.division}); }
function reqDeny(id){ var reqs=lsGet(REQ); reqs.forEach(function(x){ if(x.id===id) x.status='denied'; }); lsSet(REQ,reqs); renderStats(); renderReqs(); }

/* ---------- vendors & pricing ---------- */
function renderVendors(){
  var vs=lsGet(VEND);
  var h='<div class="card"><div class="sec-hdr" style="margin-top:0">Price comparison</div><div style="display:flex;gap:8px"><input id="pc_item" placeholder="Item to compare across vendors" style="flex:1;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px"><button class="btn btn-blue" onclick="priceCompare()">Compare</button></div><div id="pc_out" style="margin-top:10px"></div></div>';
  h+='<div style="margin:10px 0"><button class="btn btn-outline" onclick="newVendor()">+ Add Vendor</button></div>';
  if(!vs.length){ h+='<div class="muted">No vendors yet. Add vendors with their price lists to unlock price comparison.</div>'; document.getElementById('tab-vendors').innerHTML=h; return; }
  vs.forEach(function(v){
    var cat=(v.catalog||[]).map(function(c){ return '<div class="lineitem"><div>'+esc(c.item)+'</div><div>'+money(c.price)+(c.unit?' / '+esc(c.unit):'')+'</div></div>'; }).join('');
    h+='<div class="card"><div class="card-hdr"><div><div class="card-title">'+(v.preferred?'<span class="star">★</span> ':'')+esc(v.name)+'</div><div class="card-meta">'+esc(v.category||'')+(v.terms?' · '+esc(v.terms):'')+(v.phone?' · '+esc(v.phone):'')+'</div></div>'+
      '<div style="display:flex;gap:6px"><button class="btn btn-outline" onclick="vendorCatalog(\''+v.id+'\')">Price List</button><button class="btn btn-outline" onclick="togglePreferred(\''+v.id+'\')">'+(v.preferred?'Unstar':'Prefer')+'</button><button class="btn btn-outline" onclick="delVendor(\''+v.id+'\')">×</button></div></div>'+
      (cat?'<div style="margin-top:8px">'+cat+'</div>':'')+'</div>';
  });
  document.getElementById('tab-vendors').innerHTML=h;
}
function newVendor(){
  openModal('<h3>Add Vendor</h3><div class="grid2"><div class="fld"><label>Name</label><input id="v_name"></div><div class="fld"><label>Category</label><input id="v_cat" placeholder="Chemicals, Steel, Parts..."></div></div>'+
    '<div class="grid2"><div class="fld"><label>Terms</label><select id="v_terms"><option>Net 30</option><option>Net 15</option><option>Net 45</option><option>Net 60</option><option>Due on receipt</option><option>2/10 Net 30</option></select></div><div class="fld"><label>Phone</label><input id="v_phone"></div></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveVendor()">Save</button></div>');
}
function saveVendor(){ var n=val('v_name'); if(!n){ toast('Enter a name.'); return; } var vs=lsGet(VEND); vs.unshift({ id:'v'+Date.now(), name:n, category:val('v_cat'), terms:val('v_terms'), phone:val('v_phone'), preferred:false, catalog:[], createdAt:Date.now() }); lsSet(VEND,vs); closeModal(); toast('Vendor added.'); renderVendors(); }
function togglePreferred(id){ var vs=lsGet(VEND); vs.forEach(function(v){ if(v.id===id) v.preferred=!v.preferred; }); lsSet(VEND,vs); renderVendors(); }
function delVendor(id){ if(!confirm('Remove vendor?')) return; lsSet(VEND,lsGet(VEND).filter(function(v){return v.id!==id;})); renderVendors(); }
function vendorCatalog(id){
  var v=lsGet(VEND).find(function(x){return x.id===id;}); if(!v) return; v.catalog=v.catalog||[];
  var rows=v.catalog.map(function(c,i){ return '<div class="lineitem"><div>'+esc(c.item)+' · '+money(c.price)+(c.unit?' / '+esc(c.unit):'')+'</div><button class="btn btn-outline" onclick="delCatItem(\''+id+'\','+i+')">×</button></div>'; }).join('');
  openModal('<h3>'+esc(v.name)+' · Price List</h3><div id="vc_rows">'+(rows||'<div class="muted" style="padding:4px">No items yet.</div>')+'</div>'+
    '<div class="li-row" style="grid-template-columns:2fr 1fr 1fr;margin-top:10px"><input id="vc_item" placeholder="Item"><input id="vc_price" type="number" placeholder="Price"><input id="vc_unit" placeholder="Unit (ea, case)"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px"><button class="btn btn-outline" onclick="closeModal()">Done</button><button class="btn btn-green" onclick="addCatItem(\''+id+'\')">Add Item</button></div>');
}
function addCatItem(id){ var it=val('vc_item'); if(!it){ toast('Enter an item.'); return; } var vs=lsGet(VEND); vs.forEach(function(v){ if(v.id===id){ v.catalog=v.catalog||[]; v.catalog.push({item:it,price:Number(val('vc_price'))||0,unit:val('vc_unit')}); } }); lsSet(VEND,vs); vendorCatalog(id); }
function delCatItem(id,i){ var vs=lsGet(VEND); vs.forEach(function(v){ if(v.id===id) v.catalog.splice(i,1); }); lsSet(VEND,vs); vendorCatalog(id); }
function priceCompare(){
  var q=val('pc_item').trim().toLowerCase(); var out=document.getElementById('pc_out'); if(!q){ out.innerHTML=''; return; }
  var hits=[];
  lsGet(VEND).forEach(function(v){ (v.catalog||[]).forEach(function(c){ if(String(c.item).toLowerCase().indexOf(q)>-1) hits.push({vendor:v.name,preferred:v.preferred,item:c.item,price:Number(c.price)||0,unit:c.unit}); }); });
  if(!hits.length){ out.innerHTML='<div class="muted" style="text-align:left;padding:6px 0">No vendor price lists contain that item. Add items to vendor price lists first.</div>'; return; }
  hits.sort(function(a,b){ return a.price-b.price; });
  out.innerHTML=hits.map(function(hh,i){ return '<div class="lineitem"'+(i===0?' style="background:#ECFDF5;border-radius:6px;padding:7px 8px"':'')+'><div>'+(hh.preferred?'<span class="star">★</span> ':'')+esc(hh.vendor)+' · '+esc(hh.item)+(i===0?' <span class="status s-received">Lowest</span>':'')+'</div><div style="font-weight:800">'+money(hh.price)+(hh.unit?' / '+esc(hh.unit):'')+'</div></div>'; }).join('');
}

/* ---------- spend ---------- */
function renderSpend(){
  var pos=lsGet(PO).filter(function(p){ return p.status==='issued'||p.status==='received'||p.status==='closed'; });
  var byDiv={}, byVendor={}, total=0;
  pos.forEach(function(p){ var t=poTotal(p); total+=t; byDiv[p.division]=(byDiv[p.division]||0)+t; byVendor[p.vendor]=(byVendor[p.vendor]||0)+t; });
  var h='<div class="sec-hdr" style="margin-top:0">Committed and received spend</div>';
  if(!total){ h+='<div class="muted">No issued or received POs yet. Spend builds as you issue purchase orders.</div>'; document.getElementById('tab-spend').innerHTML=h; return; }
  h+='<div class="card"><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px">'+money(total)+'</div><div class="stat-lbl">Total across issued, received, and closed POs</div></div>';
  h+='<div class="sec-hdr">By division</div>';
  Object.keys(byDiv).sort(function(a,b){return byDiv[b]-byDiv[a];}).forEach(function(d){ var pctw=Math.round(byDiv[d]/total*100); h+='<div class="card" style="padding:10px 14px"><div class="card-hdr"><div class="card-title">'+esc(d)+'</div><div style="font-weight:800">'+money(byDiv[d])+'</div></div><div style="height:7px;background:#EEF0F2;border-radius:4px;margin-top:6px;overflow:hidden"><div style="height:100%;width:'+pctw+'%;background:'+(DIV_COLOR[d]||'#888')+'"></div></div></div>'; });
  h+='<div class="sec-hdr">Top vendors</div>';
  Object.keys(byVendor).sort(function(a,b){return byVendor[b]-byVendor[a];}).slice(0,8).forEach(function(v){ h+='<div class="lineitem"><div>'+esc(v)+'</div><div style="font-weight:800">'+money(byVendor[v])+'</div></div>'; });
  document.getElementById('tab-spend').innerHTML=h;
}

function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

renderStats(); renderTab();
</script>
</body>
</html>

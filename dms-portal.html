<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Termac One — DMS</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-main-32.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;
  --red:#C8102E;--yellow:#F2B705;--green:#1E7B3C;--blue:#1B5FA8;--orange:#D8690B;
  --gray:#6B7280;--radius:10px;--shadow:0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;outline:none;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
button{cursor:pointer}

/* ── TOP NAV ── */
.topnav{
  background:#1A1D21;border-bottom:3px solid var(--red);
  position:sticky;top:0;z-index:200;
}
.topnav-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:64px;
}
.topnav-brand{display:flex;align-items:center;gap:10px}
.topnav-brand img{height:44px;width:44px;object-fit:contain;border-radius:8px;flex-shrink:0}
.topnav-brand-txt{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705;
}
.topnav-links{display:flex;align-items:center;gap:6px}
.topnav-link{
  display:inline-flex;align-items:center;gap:6px;
  color:#BFC4CA;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  padding:8px 14px;border-radius:7px;cursor:pointer;border:none;background:none;
  transition:background .12s,color .12s;
}
.topnav-link:hover{background:#2A2E33;color:#fff}
.topnav-link.active{background:var(--red);color:#fff}
.topnav-right{display:flex;align-items:center;gap:10px}
.topnav-user{
  display:flex;align-items:center;gap:8px;
  background:#2A2E33;border-radius:8px;padding:6px 12px;
}
.topnav-avatar{
  width:28px;height:28px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:#fff;
}
.topnav-username{font-size:12px;font-weight:700;color:#fff}
.topnav-signout{
  background:none;border:1.5px solid rgba(255,255,255,.2);border-radius:6px;
  color:#BFC4CA;font-size:11px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:.04em;
}
.topnav-signout:hover{background:#3A3E45;color:#fff}

/* ── LOGIN ── */
.dms-login{
  position:fixed;inset:0;background:#1A1D21;
  display:flex;align-items:center;justify-content:center;z-index:500;
}
.dms-login-card{
  background:#22272E;border-radius:14px;padding:36px 40px;width:100%;max-width:380px;
  border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.dms-login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.12em;text-transform:uppercase;color:#F2B705;margin-bottom:4px}
.dms-login-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:28px}
.dms-login-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.dms-login-sel,.dms-login-pin{width:100%;padding:10px 12px;background:#2A2E33;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;margin-bottom:14px}
.dms-login-pin{letter-spacing:.2em;text-align:center}
.dms-login-pin::placeholder{letter-spacing:normal;color:rgba(255,255,255,.25)}
.dms-login-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.dms-login-btn:hover{background:#A50D22}
.dms-login-err{color:#FCA5A5;font-size:12px;margin-top:10px;text-align:center;display:none}

/* ── CONTENT ── */
.dms-main{display:none;flex-direction:column;min-height:100vh}
.dms-content{padding:18px 20px;max-width:1400px;width:100%}

/* ── CARDS ── */
.dms-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.dms-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}

/* ── FILTER BAR ── */
.dms-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dms-search{flex:1;min-width:200px;max-width:300px;padding:8px 12px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:13px}
.dms-filter-sel{padding:7px 10px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:12px;color:var(--ink)}
.dms-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;cursor:pointer;white-space:nowrap}
.dms-btn-red{background:var(--red);color:#fff}
.dms-btn-blue{background:var(--blue);color:#fff}
.dms-btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}

/* ── CALL SHEET ── */
.dms-call-table{width:100%;border-collapse:collapse}
.dms-call-table th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);padding:8px 10px;border-bottom:2px solid var(--line);text-align:left;white-space:nowrap}
.dms-call-table td{padding:10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.dms-call-table tr:hover td{background:#F9FAFB}
.dms-outcome-sel{padding:5px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;background:#fff;color:var(--ink);max-width:160px}
.dms-outcome-sel.hot{background:#DCFCE7;border-color:#16a34a;color:#15803d}
.dms-outcome-sel.callback{background:#FEF3C7;border-color:#d97706;color:#92400e}
.dms-outcome-sel.notinterested{background:#FEE2E2;border-color:#dc2626;color:#991b1b}
.dms-notes-input{padding:5px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;width:180px}
.dms-check{width:18px;height:18px;cursor:pointer;accent-color:var(--green)}
.dms-escalate-sel{padding:5px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:12px;background:#fff;color:var(--ink)}
.dms-escalate-btn{padding:4px 10px;border:none;border-radius:5px;background:var(--orange);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;cursor:pointer}
.dms-progress{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.dms-progress-bar{flex:1;height:10px;background:#E5E7EB;border-radius:99px;overflow:hidden}
.dms-progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s}
.dms-progress-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--ink);white-space:nowrap}
.dms-divs{display:flex;gap:5px;flex-wrap:wrap}
.dms-div-chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid transparent;user-select:none}
.dms-div-chip.sel{border-color:currentColor}
.dms-biz{font-weight:700;font-size:14px;color:var(--ink)}
.dms-addr{font-size:12px;color:#374151}
.dms-contact-info{font-size:12px;color:#374151}

/* ── RECORD GRID (Leads view) ── */
.dms-record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.dms-record{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-left:4px solid var(--blue);cursor:pointer;transition:box-shadow .12s}
.dms-record:hover{box-shadow:0 4px 20px rgba(26,29,33,.14)}
.dms-rec-biz{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ink);margin-bottom:2px}
.dms-rec-info{font-size:12px;color:var(--soft)}

/* ── TOAST ── */
#dmsToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D21;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

/* ── MODAL ── */
.dms-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:16px}
.dms-modal-bg.open{display:flex}
.dms-modal{background:var(--panel);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.dms-modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.dms-modal-close{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer}
.dms-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dms-form-full{grid-column:1/-1}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="dms-login" id="dmsLogin">
  <div class="dms-login-card">
    <div class="dms-login-logo">Termac One</div>
    <div class="dms-login-sub">DMS Portal — Call Sheet Access</div>
    <label class="dms-login-label">Select Your Name</label>
    <select class="dms-login-sel" id="dmsLoginName">
      <option value="">— Select name —</option>
      <option value="Chrystal Bush">Chrystal Bush</option>
      <option value="Tara Colona">Tara Colona</option>
      <option value="Amanda McGowan">Amanda McGowan</option>
      <option value="Gina Kluge">Gina Kluge</option>
      <option value="Kim Reinhart">Kim Reinhart</option>
      <option value="Donna Meyer">Donna Meyer</option>
      <option value="Lauren Canfield">Lauren Canfield</option>
    </select>
    <label class="dms-login-label">PIN</label>
    <input class="dms-login-pin" id="dmsLoginPin" type="password" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')dmsLogin()">
    <button class="dms-login-btn" onclick="dmsLogin()">Sign In →</button>
    <div class="dms-login-err" id="dmsLoginErr">Incorrect PIN — try again</div>
  </div>
</div>

<!-- TOP NAV -->
<nav class="topnav" id="dmsNav" style="display:none">
  <div class="topnav-inner">
    <div class="topnav-brand">
      <img src="termac-one-logo-64.png" alt="Termac One">
      <span class="topnav-brand-txt">Termac One</span>
    </div>
    <div class="topnav-links">
      <button class="topnav-link active" id="dmsNavLeads" onclick="dmsNav('leads')">🎯 Leads</button>
      <button class="topnav-link" id="dmsNavEmployee" onclick="dmsNav('employee')">👤 Employee Portal</button>
      <a class="topnav-link" href="termac-os.html">🏠 Main Hub</a>
    </div>
    <div class="topnav-right">
      <div class="topnav-user">
        <div class="topnav-avatar" id="dmsAvatar">D</div>
        <span class="topnav-username" id="dmsUsername">DMS Rep</span>
      </div>
      <button class="topnav-signout" onclick="dmsLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="dms-main" id="dmsMain">
  <div class="dms-content" id="dmsContent"></div>
</div>

<!-- MODAL -->
<div class="dms-modal-bg" id="dmsModalBg">
  <div class="dms-modal">
    <div class="dms-modal-title">
      <span id="dmsModalTitle">Call Sheet</span>
      <button class="dms-modal-close" onclick="dmsCloseModal()">✕</button>
    </div>
    <div id="dmsModalBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="dms-btn dms-btn-red" onclick="dmsSaveRecord()" style="flex:1">Save</button>
      <button class="dms-btn dms-btn-ghost" onclick="dmsCloseModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="dmsToast"></div>

<script>
// ── SHARED STORAGE ──
function crmLoad(key){ try{ return JSON.parse(localStorage.getItem('termac_crm_'+key)||'[]'); }catch(e){return[];} }
function crmSave(key,val){ try{ localStorage.setItem('termac_crm_'+key,JSON.stringify(val)); }catch(e){} }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── AUTH ──
const DMS_STAFF = {
  'Chrystal Bush':   {pin:'2025',initials:'CB'},
  'Tara Colona':     {pin:'2025',initials:'TC'},
  'Amanda McGowan':  {pin:'2025',initials:'AM'},
  'Gina Kluge':      {pin:'2025',initials:'GK'},
  'Kim Reinhart':    {pin:'2025',initials:'KR'},
  'Donna Meyer':     {pin:'2025',initials:'DM'},
  'Lauren Canfield': {pin:'2025',initials:'LC'},
};
let _dmsUser = null;
let _dmsTab = 'leads';
let _dmsEditId = null;

function dmsLogin(){
  const name = document.getElementById('dmsLoginName').value;
  const pin  = document.getElementById('dmsLoginPin').value.trim();
  const err  = document.getElementById('dmsLoginErr');
  err.style.display = 'none';
  if(!name){err.textContent='Please select your name.';err.style.display='block';return;}
  const u = DMS_STAFF[name];
  if(!u||u.pin!==pin){err.textContent='Incorrect PIN — try again.';err.style.display='block';return;}
  _dmsUser = {name, ...u};
  sessionStorage.setItem('dms_user', JSON.stringify(_dmsUser));
  dmsEnterPortal();
}

function dmsLogout(){
  sessionStorage.removeItem('dms_user');
  _dmsUser = null;
  document.getElementById('dmsLogin').style.display='flex';
  document.getElementById('dmsNav').style.display='none';
  document.getElementById('dmsMain').style.display='none';
}

function dmsEnterPortal(){
  document.getElementById('dmsLogin').style.display='none';
  document.getElementById('dmsNav').style.display='';
  document.getElementById('dmsMain').style.display='flex';
  document.getElementById('dmsAvatar').textContent = _dmsUser.initials;
  document.getElementById('dmsUsername').textContent = _dmsUser.name;
  dmsNav('leads');
}

// ── NAV ──
function dmsNav(tab){
  _dmsTab = tab;
  document.querySelectorAll('.topnav-link[id^=dmsNav]').forEach(el=>el.classList.remove('active'));
  const btn = document.getElementById('dmsNav'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if(btn) btn.classList.add('active');
  dmsRender(tab);
}

function dmsRender(tab){
  const el = document.getElementById('dmsContent');
  if(tab==='leads') dmsRenderCallSheet(el);
  else if(tab==='employee') dmsRenderEmployee(el);
}

// ── CALL SHEET ──
function dmsRenderCallSheet(el){
  const data = crmLoad('dms_coldcall');
  const today = new Date().toISOString().slice(0,10);
  const contactedToday = data.filter(r=>r.dmsContactedToday===today).length;
  const target = 50;
  const pct = Math.min(100, Math.round(contactedToday/target*100));

  // Search/filter state
  const q = (document.getElementById('dmsSearchInput')?.value||'').toLowerCase();
  const statusF = document.getElementById('dmsStatusFilter')?.value||'';
  let filtered = data;
  if(q) filtered = filtered.filter(r=>JSON.stringify(r).toLowerCase().includes(q));
  if(statusF) filtered = filtered.filter(r=>(r.status||'')=== statusF);
  filtered = filtered.slice(0,50);

  el.innerHTML = `
  <!-- Progress -->
  <div class="dms-progress">
    <span class="dms-progress-label">📞 ${contactedToday} / ${target} called today</span>
    <div class="dms-progress-bar"><div class="dms-progress-fill" style="width:${pct}%"></div></div>
    <span style="font-size:12px;color:var(--soft);white-space:nowrap">${pct}% of daily goal</span>
  </div>
  <!-- Filter bar -->
  <div class="dms-filter-bar">
    <input class="dms-search" id="dmsSearchInput" placeholder="Search business, city, zip…" oninput="dmsRender('leads')" value="${escH(q)}">
    <select class="dms-filter-sel" id="dmsStatusFilter" onchange="dmsRender('leads')">
      <option value="">All Statuses</option>
      <option value="new">New</option>
      <option value="hot">Hot Lead</option>
      <option value="callback">Call Back</option>
      <option value="warm">Warm</option>
      <option value="cold">Cold</option>
      <option value="not_interested">Not Interested</option>
      <option value="voicemail">Left Voicemail</option>
      <option value="no_answer">No Answer</option>
      <option value="do_not_call">Do Not Call</option>
      <option value="wrong_number">Wrong Number</option>
    </select>
    <span style="font-size:12px;color:var(--soft)">${filtered.length} records</span>
  </div>
  ${filtered.length===0
    ? '<div class="dms-card" style="text-align:center;padding:32px;color:var(--soft)"><div style="font-size:32px;margin-bottom:10px">📭</div>No records match your filters.</div>'
    : `<div class="dms-card" style="padding:0;overflow:hidden">
        <table class="dms-call-table">
          <thead><tr>
            <th>✓</th>
            <th>Business</th>
            <th>Phone</th>
            <th>Divisions</th>
            <th>Outcome</th>
            <th>Notes</th>
            <th>Escalate</th>
          </tr></thead>
          <tbody>${filtered.map(r=>dmsCallRow(r,today)).join('')}</tbody>
        </table>
      </div>`
  }`;
  // restore filter values
  if(q) document.getElementById('dmsSearchInput').value=q;
  if(statusF) document.getElementById('dmsStatusFilter').value=statusF;
}

function dmsCallRow(r, today){
  const contacted = r.dmsContactedToday===today;
  const divColors = {unipro:'#C8102E',quality3:'#9B1C1C',allpro:'#1B5FA8',filterman:'#065F46',gto:'#92400E',termac:'#6D28D9'};
  const divLabels = {unipro:'UniPro',quality3:'Q3',allpro:'AllPro',filterman:'Filter Man',gto:'GTO',termac:'Termac'};
  const divChips = (r.services||[]).map(s=>`<span style="background:${divColors[s]||'#6B7280'}22;color:${divColors[s]||'#6B7280'};border:1px solid ${divColors[s]||'#6B7280'}44;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${divLabels[s]||s}</span>`).join(' ');

  const outcomeOpts = [
    {v:'',l:'— Outcome —'},
    {v:'hot',l:'🔥 Hot Lead'},
    {v:'callback',l:'📅 Call Back'},
    {v:'warm',l:'☀️ Warm'},
    {v:'voicemail',l:'📬 Voicemail'},
    {v:'no_answer',l:'📵 No Answer'},
    {v:'not_interested',l:'👎 Not Interested'},
    {v:'wrong_number',l:'❓ Wrong Number'},
    {v:'do_not_call',l:'🚫 Do Not Call'},
  ].map(o=>`<option value="${o.v}" ${r.status===o.v?'selected':''}>${escH(o.l)}</option>`).join('');

  const escOpts = ['','Sales (auto-route)','Scheduling','Dispatch','Manager']
    .map(o=>`<option value="${o}">${escH(o)||'Escalate to…'}</option>`).join('');

  return `<tr id="dmsRow_${r.id}" style="${contacted?'opacity:.6':''}">
    <td><input type="checkbox" class="dms-check" ${contacted?'checked':''} onchange="dmsToggleContacted('${r.id}',this.checked)"></td>
    <td>
      <div class="dms-biz">${escH(r.business||r.name||'—')}</div>
      <div class="dms-addr">${escH(r.city||'')}${r.zip?` ${r.zip}`:''}</div>
      ${r.name&&r.name!==r.business?`<div class="dms-contact-info">${escH(r.name)}</div>`:''}
    </td>
    <td><a href="tel:${escH(r.phone||'')}" style="color:var(--blue);font-size:13px">${escH(r.phone||'—')}</a></td>
    <td>${divChips||'<span style="color:var(--soft);font-size:12px">—</span>'}</td>
    <td>
      <select class="dms-outcome-sel" onchange="dmsSetOutcome('${r.id}',this.value)">
        ${outcomeOpts}
      </select>
    </td>
    <td>
      <input class="dms-notes-input" type="text" value="${escH(r.dmsNotes||r.notes||'')}" placeholder="Notes…" onblur="dmsSaveNotes('${r.id}',this.value)">
    </td>
    <td style="display:flex;gap:6px;align-items:center">
      <select class="dms-escalate-sel" id="dmsEsc_${r.id}">
        ${escOpts}
      </select>
      <button class="dms-escalate-btn" onclick="dmsEscalate('${r.id}')">→</button>
    </td>
  </tr>`;
}

function dmsToggleContacted(id, checked){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id);
  if(!r) return;
  const today = new Date().toISOString().slice(0,10);
  r.dmsContactedToday = checked ? today : null;
  r.dmsContactedTs = checked ? Date.now() : null;
  crmSave('dms_coldcall', data);
  dmsRender('leads');
}

function dmsSetOutcome(id, outcome){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id);
  if(!r) return;
  r.status = outcome;
  r.updated = Date.now();
  crmSave('dms_coldcall', data);
  dmsToast(outcome ? `Outcome saved: ${outcome}` : 'Outcome cleared');
}

function dmsSaveNotes(id, notes){
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id);
  if(!r) return;
  r.dmsNotes = notes;
  r.updated = Date.now();
  crmSave('dms_coldcall', data);
}

function dmsEscalate(id){
  const sel = document.getElementById('dmsEsc_'+id);
  if(!sel||!sel.value) { dmsToast('Select escalation destination first'); return; }
  const data = crmLoad('dms_coldcall');
  const r = data.find(x=>x.id===id);
  if(!r) return;
  r.dmsEscalated = sel.value;
  r.dmsEscalatedBy = _dmsUser.name;
  r.dmsEscalatedTs = Date.now();
  r.updated = Date.now();
  if(sel.value==='Sales (auto-route)'){
    r.lifecycleStage = 'lead';
    r.status = 'hot';
    const leads = crmLoad('leads');
    if(!leads.find(x=>x.id===id)) { leads.unshift(r); crmSave('leads',leads); }
  }
  crmSave('dms_coldcall', data);
  dmsToast(`Escalated to: ${sel.value}`);
  dmsRender('leads');
}

function dmsSaveRecord(){}
function dmsCloseModal(){document.getElementById('dmsModalBg').classList.remove('open');}


function dmsRenderEmployee(el){
  el.innerHTML = `
  <button onclick="dmsNav('leads')" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#fff;border:1.5px solid var(--line);border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:var(--soft);letter-spacing:.04em;margin-bottom:18px">← Back to Call Sheet</button>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px">Employee Portal</div>
  <div style="font-size:13px;color:var(--soft);margin-bottom:20px">Access HR, learning, and benefits.</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
    ${[
      {icon:'📚',label:'Learning Center',sub:'Training modules & certifications',href:'learning-center.html'},
      {icon:'👥',label:'HR Portal',sub:'Time off, benefits, onboarding',href:'hr-portal.html'},
    ].map(item=>`<a href="${item.href}" target="_blank" style="display:block;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06);padding:20px;text-decoration:none;color:#1A1D21;transition:box-shadow .12s" onmouseover="this.style.boxShadow='0 4px 20px rgba(26,29,33,.14)'" onmouseout="this.style.boxShadow='0 1px 3px rgba(26,29,33,.08),0 4px 14px rgba(26,29,33,.06)'">
      <div style="font-size:28px;margin-bottom:8px">${item.icon}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;margin-bottom:4px">${item.label}</div>
      <div style="font-size:12px;color:#5A616B">${item.sub}</div>
    </a>`).join('')}
  </div>`;
}

// ── TOAST ──
function dmsToast(msg,dur=2800){
  const el=document.getElementById('dmsToast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',dur);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  try{
    const saved = JSON.parse(sessionStorage.getItem('dms_user')||'null');
    if(saved&&DMS_STAFF[saved.name]){
      _dmsUser={...DMS_STAFF[saved.name],name:saved.name};
      dmsEnterPortal();
    }
  }catch(e){}
  document.getElementById('dmsModalBg').addEventListener('click',e=>{
    if(e.target.id==='dmsModalBg') dmsCloseModal();
  });
});
</script>

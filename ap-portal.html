<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accounts Payable — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:150px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.alert .stat-num{color:var(--red)}.stat-card.good .stat-num{color:var(--green)}.stat-card.warn .stat-num{color:var(--orange)}
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.overdue{border-color:#FCA5A5;background:#FFF5F5}.card.warn{border-color:#FED7AA;background:#FFF7ED}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:14px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.card-amt{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:20px;text-align:right}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-due{background:#FEF3C7;color:#D8690B}.s-overdue{background:#FEE2E2;color:#C8102E}.s-ok{background:#DBEAFE;color:#1E40AF}.s-paid{background:#D1FAE5;color:#065F46}
.divtag{border-radius:4px;padding:1px 7px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:10px;color:#fff}
.cogs-tag{background:#6B21A8;color:#fff;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800;letter-spacing:.04em;margin-left:6px}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.fld{margin-bottom:12px}.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.dupwarn{background:#FEF2F2;border:1.5px solid #FCA5A5;color:#991B1B;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:10px}
.weekbar{display:flex;align-items:flex-end;gap:6px;height:120px;margin:8px 0 4px}
.weekcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px}
.weekfill{width:100%;background:var(--blue);border-radius:4px 4px 0 0;min-height:2px}
.weeklbl{font-size:9px;color:var(--soft);text-align:center}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Accounts Payable</span>
  <a class="nav-back" href="accounting-portal.html">&larr; Accounting Office</a>
  <a class="nav-help" href="user-manuals.html?role=ap-assistant" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div class="page-title">Accounts Payable</div>
  <div class="page-sub">Enter bills with the right coding, catch duplicates before they cost you, and never miss a due date. Feeds the same cash forecast the controller sees.</div>

  <div class="stat-strip" id="statStrip"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="enter" onclick="setTab('enter')">Enter a Bill</button>
    <button class="tab-btn" data-tab="bills" onclick="setTab('bills')">Bills Worklist</button>
    <button class="tab-btn" data-tab="timeline" onclick="setTab('timeline')">Cash-Out Timeline</button>
    <button class="tab-btn" data-tab="vendors" onclick="setTab('vendors')">Vendors</button>
    <button class="tab-btn" data-tab="expenses" onclick="setTab('expenses')">Expense Reports</button>
  </div>

  <div class="tab-panel active" id="tab-enter"></div>
  <div class="tab-panel" id="tab-bills"></div>
  <div class="tab-panel" id="tab-timeline"></div>
  <div class="tab-panel" id="tab-vendors"></div>
  <div class="tab-panel" id="tab-expenses"></div>
</div>

<div class="toast" id="toast"></div>

<script src="termac-finance.js"></script>
<script>
var F=window.TermacFinance, _tab='enter';
var AP_KEY='termac_payables', EXP_KEY='termac_expense_reports';
var DIVISIONS=['UniPro','Quality III','GTO','Filter Man','AllPro','Termac'];
var DIV_COLOR={'UniPro':'#1B5FA8','Quality III':'#0D7490','GTO':'#D8690B','Filter Man':'#1E7B3C','AllPro':'#6B21A8','Termac':'#C8102E'};
var APPROVAL_THRESHOLD=2500;
/* categories — COGS ones feed division margin (match controller's cost-of-goods rule) */
var CATEGORIES=[
  {name:'Chemicals',cogs:true},{name:'Parts & Materials',cogs:true},{name:'Filters',cogs:true},
  {name:'Fuel & Gas',cogs:true},{name:'Subcontractor',cogs:true},{name:'Equipment',cogs:true},
  {name:'Extinguisher Stock',cogs:true},{name:'Rent',cogs:false},{name:'Utilities',cogs:false},
  {name:'Insurance',cogs:false},{name:'Office & Admin',cogs:false},{name:'Vehicle',cogs:false},
  {name:'Professional Services',cogs:false},{name:'Other',cogs:false}
];
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function money(n){ return F?F.money(n):'$'+(Number(n)||0); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function normName(s){ return String(s==null?'':s).toLowerCase().replace(/[^a-z0-9]/g,''); }
function loadAP(){ return lsGet(AP_KEY); }
function isCOGS(cat){ var c=CATEGORIES.find(function(x){ return x.name===cat; }); return c?c.cogs:false; }
function dueMs(b){ return b.dueDate?Date.parse(b.dueDate):(Number(b.loggedAt)||0); }

function setTab(t){ _tab=t; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); }); document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+t); }); renderTab(); }
function renderTab(){ ({enter:renderEnter,bills:renderBills,timeline:renderTimeline,vendors:renderVendors,expenses:renderExpenses}[_tab]||function(){})(); }

function renderStats(){
  var ap=loadAP().filter(function(b){ return b.status!=='paid'; });
  var open=0, dueWk=0, overdue=0, unapp=0;
  var now=Date.now(), wk=now+7*86400000;
  ap.forEach(function(b){ var amt=Number(b.amount)||0; open+=amt; var d=dueMs(b);
    if(d&&d<now) overdue+=amt; else if(d&&d<=wk) dueWk+=amt;
    if(amt>=APPROVAL_THRESHOLD && b.status!=='approved') unapp++;
  });
  function card(num,lbl,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+num+'</div><div class="stat-lbl">'+lbl+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=
    card(money(open),'Open AP','')+
    card(money(dueWk),'Due This Week', dueWk>0?'warn':'')+
    card(money(overdue),'Overdue', overdue>0?'alert':'')+
    card(unapp,'Need Approval', unapp>0?'warn':'');
}

/* ---------- enter a bill ---------- */
function renderEnter(){
  var catOpts=CATEGORIES.map(function(c){ return '<option value="'+esc(c.name)+'">'+esc(c.name)+(c.cogs?' (cost of goods)':'')+'</option>'; }).join('');
  var divOpts=DIVISIONS.map(function(d){ return '<option>'+d+'</option>'; }).join('');
  document.getElementById('tab-enter').innerHTML=
    '<div class="card"><div class="sec-hdr" style="margin-top:0">New vendor bill</div>'+
    '<div id="dupZone"></div>'+
    '<div class="grid2"><div class="fld"><label>Vendor</label><input id="bVendor" oninput="checkDup()" placeholder="Vendor name"></div>'+
    '<div class="fld"><label>Amount</label><input id="bAmount" type="number" oninput="checkDup()" placeholder="0.00"></div></div>'+
    '<div class="grid2"><div class="fld"><label>Division</label><select id="bDiv">'+divOpts+'</select></div>'+
    '<div class="fld"><label>Category <span style="color:var(--blue);cursor:pointer;text-transform:none;letter-spacing:0" onclick="suggestCat()">· AI suggest</span></label><select id="bCat">'+catOpts+'</select></div></div>'+
    '<div class="grid2"><div class="fld"><label>Due date</label><input id="bDue" type="date"></div>'+
    '<div class="fld"><label>Invoice number</label><input id="bInv" placeholder="optional"></div></div>'+
    '<div class="fld"><label>Notes</label><textarea id="bNotes" rows="2" placeholder="What this bill is for"></textarea></div>'+
    '<button class="btn btn-green" onclick="saveBill()">Save Bill</button>'+
    '<div style="margin-top:10px;font-size:11px;color:var(--soft)">Categories marked cost of goods flow into division margin. Bills at or above '+money(APPROVAL_THRESHOLD)+' are flagged for controller approval.</div></div>';
}
function dupMatches(){
  var v=normName(document.getElementById('bVendor').value), amt=Number(document.getElementById('bAmount').value)||0;
  if(!v||!amt) return [];
  return loadAP().filter(function(b){ return normName(b.vendor)===v && Math.abs((Number(b.amount)||0)-amt)<0.01; });
}
function checkDup(){
  var z=document.getElementById('dupZone'); if(!z) return;
  var m=dupMatches();
  z.innerHTML=m.length?'<div class="dupwarn">Possible duplicate: a bill for this vendor and amount already exists ('+m.length+'). Check before saving so you do not pay twice.</div>':'';
}
async function suggestCat(){
  var v=document.getElementById('bVendor').value, n=document.getElementById('bNotes').value;
  if(!v && !n){ toast('Add a vendor or note first.'); return; }
  toast('Asking for a category...');
  var prompt='You categorize vendor bills for a fire protection and commercial kitchen services company. Vendor: "'+v+'". Note: "'+n+'". Choose the single best category from this exact list and reply with only the category name, nothing else: '+CATEGORIES.map(function(c){return c.name;}).join(', ')+'.';
  try{
    var res=await fetch('https://unipro-ai-proxy.tedscholl.workers.dev',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:30, messages:[{role:'user',content:[{type:'text',text:prompt}]}] }) });
    var data=await res.json();
    var text=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('').trim();
    var hit=CATEGORIES.find(function(c){ return text.toLowerCase().indexOf(c.name.toLowerCase())>-1; });
    if(hit){ document.getElementById('bCat').value=hit.name; toast('Suggested: '+hit.name); } else toast('No clear match, pick manually.');
  }catch(e){ toast('Could not reach the suggestion service.'); }
}
function saveBill(){
  var vendor=document.getElementById('bVendor').value.trim(), amount=Number(document.getElementById('bAmount').value)||0;
  if(!vendor||!amount){ toast('Vendor and amount are required.'); return; }
  if(dupMatches().length && !confirm('A bill for this vendor and amount already exists. Save anyway?')) return;
  var ap=loadAP();
  ap.unshift({ id:'ap'+Date.now(), vendor:vendor, amount:amount, division:document.getElementById('bDiv').value,
    category:document.getElementById('bCat').value, dueDate:document.getElementById('bDue').value||'',
    invoiceNum:document.getElementById('bInv').value||'', notes:document.getElementById('bNotes').value||'',
    status:'open', loggedAt:Date.now() });
  lsSet(AP_KEY,ap); toast('Bill saved.'); renderStats(); renderEnter();
}

/* ---------- bills worklist ---------- */
function renderBills(){
  var ap=loadAP().filter(function(b){ return b.status!=='paid'; });
  ap.forEach(function(b){ b._due=dueMs(b); });
  ap.sort(function(a,b){ return (a._due||9e15)-(b._due||9e15); });
  var h='<div class="sec-hdr">Open bills, soonest due first</div>';
  if(!ap.length){ h+='<div class="muted">No open bills. Enter one on the first tab.</div>'; document.getElementById('tab-bills').innerHTML=h; return; }
  var now=Date.now(), wk=now+7*86400000;
  ap.forEach(function(b){
    var amt=Number(b.amount)||0, over=b._due&&b._due<now, soon=b._due&&b._due<=wk&&!over;
    var cls=over?'overdue':(soon?'warn':''); var stat=over?['s-overdue','Overdue']:(soon?['s-due','Due Soon']:['s-ok','Open']);
    var needApp=amt>=APPROVAL_THRESHOLD && b.status!=='approved';
    h+='<div class="card '+cls+'"><div class="card-hdr"><div><div class="card-title">'+esc(b.vendor||'Vendor')+(isCOGS(b.category)?'<span class="cogs-tag">COGS</span>':'')+' <span class="divtag" style="background:'+(DIV_COLOR[b.division]||"#888")+'">'+esc(b.division||"")+'</span></div>'+
      '<div class="card-meta">'+esc(b.category||'Uncategorized')+(b.invoiceNum?' · #'+esc(b.invoiceNum):'')+(b.dueDate?' · due '+esc(b.dueDate):' · no due date')+(b.notes?' · '+esc(b.notes):'')+'</div>'+
      (needApp?'<div style="margin-top:4px"><span class="status s-due">Needs approval</span></div>':'')+'</div>'+
      '<div style="text-align:right"><div class="card-amt">'+money(amt)+'</div><span class="status '+stat[0]+'">'+stat[1]+'</span></div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
      '<button class="btn btn-green" onclick="payBill(\''+b.id+'\')">Mark Paid</button>'+
      (needApp?'<button class="btn btn-blue" onclick="approveBill(\''+b.id+'\')">Approve</button>':'')+
      '<button class="btn btn-outline" onclick="delBill(\''+b.id+'\')">Remove</button></div></div>';
  });
  document.getElementById('tab-bills').innerHTML=h;
}
function payBill(id){ var ap=loadAP(); ap.forEach(function(b){ if(b.id===id) b.status='paid'; }); lsSet(AP_KEY,ap); toast('Bill marked paid.'); renderStats(); renderBills(); }
function approveBill(id){ var ap=loadAP(); ap.forEach(function(b){ if(b.id===id) b.status='approved'; }); lsSet(AP_KEY,ap); toast('Bill approved.'); renderStats(); renderBills(); }
function delBill(id){ if(!confirm('Remove this bill?')) return; var ap=loadAP().filter(function(b){ return b.id!==id; }); lsSet(AP_KEY,ap); toast('Bill removed.'); renderStats(); renderBills(); }

/* ---------- cash-out timeline ---------- */
function renderTimeline(){
  var ap=loadAP().filter(function(b){ return b.status!=='paid'; });
  var now=Date.now(), D=86400000, weeks=[];
  for(var w=0;w<8;w++){ weeks.push({start:now+w*7*D,end:now+(w+1)*7*D,total:0}); }
  var overdue=0;
  ap.forEach(function(b){ var d=dueMs(b), amt=Number(b.amount)||0; if(!d){ return; } if(d<now){ overdue+=amt; weeks[0].total+=amt; return; } for(var w=0;w<8;w++){ if(d>=weeks[w].start && d<weeks[w].end){ weeks[w].total+=amt; break; } } });
  var max=Math.max.apply(null,weeks.map(function(w){return w.total;}).concat([1]));
  var h='<div class="sec-hdr">What goes out over the next 8 weeks</div>'+
    (overdue>0?'<div class="dupwarn">'+money(overdue)+' is already overdue and shown in week 1. Clear it first.</div>':'')+
    '<div class="card"><div class="weekbar">'+
    weeks.map(function(w,i){ var hpx=Math.round((w.total/max)*100)+2; return '<div class="weekcol"><div style="font-size:9px;color:var(--soft)">'+(w.total?money(w.total):'')+'</div><div class="weekfill" style="height:'+hpx+'px;background:'+(i===0&&overdue>0?'var(--red)':'var(--blue)')+'"></div><div class="weeklbl">Wk '+(i+1)+'</div></div>'; }).join('')+
    '</div><div style="font-size:11px;color:var(--soft);margin-top:6px">Total scheduled: '+money(weeks.reduce(function(s,w){return s+w.total;},0))+'. Bills with no due date are not shown here, add dates so they appear.</div></div>';
  document.getElementById('tab-timeline').innerHTML=h;
}

/* ---------- vendors ---------- */
function renderVendors(){
  var ap=loadAP(), map={};
  ap.forEach(function(b){ var k=b.vendor||'Unknown'; if(!map[k]) map[k]={vendor:k,open:0,paid:0,count:0}; map[k].count++; var amt=Number(b.amount)||0; if(b.status==='paid') map[k].paid+=amt; else map[k].open+=amt; });
  var rows=Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){ return b.open-a.open; });
  var h='<div class="sec-hdr">Vendors</div>';
  if(!rows.length){ h+='<div class="muted">No vendors yet.</div>'; document.getElementById('tab-vendors').innerHTML=h; return; }
  h+='<div class="card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--navy);color:#fff;text-align:left"><th style="padding:9px 12px">Vendor</th><th style="padding:9px 12px">Bills</th><th style="padding:9px 12px;text-align:right">Open</th><th style="padding:9px 12px;text-align:right">Paid</th></tr></thead><tbody>';
  rows.forEach(function(r){ h+='<tr style="border-top:1px solid var(--line)"><td style="padding:8px 12px;font-weight:600">'+esc(r.vendor)+'</td><td style="padding:8px 12px">'+r.count+'</td><td style="padding:8px 12px;text-align:right">'+money(r.open)+'</td><td style="padding:8px 12px;text-align:right;color:var(--soft)">'+money(r.paid)+'</td></tr>'; });
  h+='</tbody></table></div>';
  document.getElementById('tab-vendors').innerHTML=h;
}

/* ---------- expense reports ---------- */
function renderExpenses(){
  var ex=lsGet(EXP_KEY);
  var h='<div class="sec-hdr">Staff expense reports</div>';
  var pending=ex.filter(function(e){ return e.status!=='approved' && e.status!=='paid'; });
  if(!ex.length){ h+='<div class="muted">No expense reports submitted.</div>'; document.getElementById('tab-expenses').innerHTML=h; return; }
  if(!pending.length) h+='<div class="card" style="border-color:#A7F3D0;background:#ECFDF5;color:#065F46;font-weight:600">All expense reports are handled.</div>';
  pending.forEach(function(e){
    var amt=Number(e.total||e.amount)||0;
    h+='<div class="card warn"><div class="card-hdr"><div><div class="card-title">'+esc(e.employee||e.name||'Staff')+' <span class="divtag" style="background:'+(DIV_COLOR[F.normDiv(e.division)]||"#888")+'">'+esc(e.division||"")+'</span></div>'+
      '<div class="card-meta">'+esc(e.purpose||e.notes||'Expense report')+(e.submittedDate?' · '+esc(e.submittedDate):'')+'</div></div>'+
      '<div style="text-align:right"><div class="card-amt">'+money(amt)+'</div><span class="status s-due">Pending</span></div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-green" onclick="approveExpense(\''+esc(e.id||'')+'\')">Approve</button></div></div>';
  });
  document.getElementById('tab-expenses').innerHTML=h;
}
function approveExpense(id){ var ex=lsGet(EXP_KEY); ex.forEach(function(e){ if((e.id||'')+''===(id+'')) e.status='approved'; }); lsSet(EXP_KEY,ex); toast('Expense report approved.'); renderStats(); renderExpenses(); }

renderStats(); renderTab();

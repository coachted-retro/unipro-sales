name: UniPro Permit Harvester

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run harvester
        env:
          SHEET_API_URL: ${{ secrets.SHEET_API_URL }}
          TARGET_ZIPS: ${{ secrets.TARGET_ZIPS }}
        run: python permit-harvester.py

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Studio — AllPro Stainless — Termac One</title>
<link rel="icon" type="image/png" href="termac-one-logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
:root{--red:#C8102E;--green:#1E7B3C;--blue:#1B5FA8;--yellow:#F2B705;--orange:#D8690B;--purple:#6B21A8;--navy:#1A1D21;--bg:#EEF0F2;--panel:#FFF;--ink:#1A1D21;--soft:#5A616B;--line:#D7DBE0;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Barlow,sans-serif;font-size:13px;min-height:100vh}
.nav{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;color:#fff}
.nav-sep{width:1px;height:28px;background:#2A2E33}
.nav-title{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#BFC4CA}
.nav-back{margin-left:auto;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none}
.nav-help{margin-left:10px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 10px}
.wrap{max-width:1100px;margin:0 auto;padding:22px 16px}
.page-title{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em}
.page-sub{font-size:13px;color:var(--soft);margin-top:3px;margin-bottom:16px}
.stat-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:140px}
.stat-num{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:24px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.warn .stat-num{color:var(--orange)}.stat-card.good .stat-num{color:var(--green)}.stat-card.purple .stat-num{color:var(--purple)}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-weight:700;font-size:15px}
.card-meta{font-size:11px;color:var(--soft);margin-top:2px}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.btn-green{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-outline{background:none;border:1.5px solid var(--line);color:var(--soft)}
.sec-hdr{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:18px 0 8px}
.muted{color:var(--soft);font-size:12px;padding:16px;text-align:center}
.status{border-radius:4px;padding:2px 8px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-draft{background:#E5E7EB;color:#374151}.s-sent{background:#DBEAFE;color:#1E40AF}.s-approved{background:#D1FAE5;color:#065F46}.s-changes{background:#FEE2E2;color:#C8102E}.s-fab{background:#FEF3C7;color:#D8690B}.s-done{background:#D1FAE5;color:#065F46}
.fld{margin-bottom:12px}.fld label{display:block;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:Barlow,sans-serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.spec-grp{border:1.5px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.spec-grp h4{font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--purple);margin-bottom:10px}
.photo-thumb{width:90px;height:90px;object-fit:cover;border-radius:8px;border:1.5px solid var(--line)}
.rev-row{border-left:3px solid var(--purple);padding:6px 0 6px 12px;margin-bottom:8px;font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo">TERMAC ONE</span>
  <span class="nav-sep"></span>
  <span class="nav-title">Design Studio · AllPro Stainless</span>
  <a class="nav-back" href="termac-os.html">&larr; Hub</a>
  <a class="nav-help" href="user-manuals.html?role=design" target="_blank">? Help</a>
</div>

<div class="wrap">
  <div id="view-list">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><div class="page-title">Stainless Design Studio</div>
      <div class="page-sub">Every AllPro stainless project, its spec sheet, drawings, revisions, and client sign-off in one place. Approved specs hand off to the Project Manager.</div></div>
      <button class="btn btn-purple" onclick="newProject()">+ New Project</button>
    </div>
    <div class="stat-strip" id="statStrip"></div>
    <div id="projList"></div>
  </div>

  <div id="view-detail" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var KEY='termac_stainless_projects', ACCT_KEY='termac_crm_accounts', _cur=null;
function days(ms){ return Math.floor((Date.now()-(ms||Date.now()))/86400000); }
function ageClass(d){ return d>=30?'s-changes':d>=14?'s-fab':'s-approved'; }
var GRADES=['304','316','316L','430','201'], GAUGES=['11 ga','12 ga','14 ga','16 ga','18 ga','20 ga'];
var FINISHES=['#3 Brushed','#4 Brushed','#7 Polished','#8 Mirror','2B Mill','Bead Blast'];
var WELDS=['TIG continuous','TIG stitch','Spot','Seam','Riveted / bolted'];
var STATUS_LABEL={draft:'Draft',sent:'Sent for Approval',approved:'Approved',changes:'Changes Requested',fab:'In Fabrication',done:'Complete'};
var STATUS_CLS={draft:'s-draft',sent:'s-sent',approved:'s-approved',changes:'s-changes',fab:'s-fab',done:'s-done'};
function lsGet(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
function lsSet(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
function find(id){ return lsGet().find(function(p){ return p.id===id; }); }
function save(p){ var all=lsGet(); var i=all.findIndex(function(x){ return x.id===p.id; }); if(i>=0) all[i]=p; else all.unshift(p); lsSet(all); }

function renderStats(){
  var all=lsGet();
  var active=all.filter(function(p){ return p.status!=='done'; }).length;
  var sent=all.filter(function(p){ return p.status==='sent'; }).length;
  var approved=all.filter(function(p){ return p.status==='approved'; }).length;
  var fab=all.filter(function(p){ return p.status==='fab'; }).length;
  function card(n,l,cls){ return '<div class="stat-card '+(cls||'')+'"><div class="stat-num">'+n+'</div><div class="stat-lbl">'+l+'</div></div>'; }
  document.getElementById('statStrip').innerHTML=card(active,'Active Projects','')+card(sent,'Awaiting Approval', sent?'warn':'')+card(approved,'Approved','good')+card(fab,'In Fabrication','purple');
}
function renderList(){
  document.getElementById('view-list').style.display='';
  document.getElementById('view-detail').style.display='none';
  renderStats();
  var all=lsGet(), el=document.getElementById('projList');
  if(!all.length){ el.innerHTML='<div class="muted">No projects yet. Click New Project to start a stainless spec.</div>'; return; }
  el.innerHTML=all.map(function(p){
    var s=p.spec||{};
    return '<div class="card"><div class="card-hdr"><div><div class="card-title">'+esc(p.client||'Untitled')+'</div>'+
      '<div class="card-meta">'+esc(p.site||'')+(s.grade?' · '+esc(s.grade)+' / '+esc(s.gauge||''):'')+(p.pm?' · PM: '+esc(p.pm):'')+' · '+days(p.createdAt)+'d old</div></div>'+
      '<div style="text-align:right"><span class="status '+(STATUS_CLS[p.status]||'s-draft')+'">'+(STATUS_LABEL[p.status]||'Draft')+'</span>'+(p.status!=='done'&&p.status!=='approved'?'<div style="margin-top:4px"><span class="status '+ageClass(days(p.createdAt))+'">'+days(p.createdAt)+'d in stage</span></div>':'')+'</div></div>'+
      '<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-purple" onclick="openProject(\''+p.id+'\')">Open</button>'+
      (p.status==='approved'?'<button class="btn btn-green" onclick="handoffPM(\''+p.id+'\')">Hand off to PM</button>':'')+'</div></div>';
  }).join('');
}
function newProject(){
  var p={ id:'sp'+Date.now(), client:'', site:'', contact:'', pm:'', division:'AllPro', status:'draft', createdAt:Date.now(),
    spec:{dims:'',grade:'304',gauge:'14 ga',finish:'#4 Brushed',weld:'TIG continuous',drains:'',backsplash:'',edges:'',hardware:'',nsf:'',notes:''},
    photos:[], revisions:[], approval:{status:'',client:'',date:'',note:''} };
  save(p); openProject(p.id);
}

function openProject(id){
  _cur=id; var p=find(id); if(!p) return;
  document.getElementById('view-list').style.display='none';
  var d=document.getElementById('view-detail'); d.style.display='';
  var s=p.spec||{};
  function opt(arr,v){ return arr.map(function(x){ return '<option'+(x===v?' selected':'')+'>'+x+'</option>'; }).join(''); }
  d.innerHTML=
    '<button class="btn btn-outline" onclick="renderList()" style="margin-bottom:14px">&larr; All Projects</button>'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">'+
    '<div><div class="page-title" style="font-size:24px">'+esc(p.client||'New Project')+'</div>'+
    '<div class="page-sub">'+esc(p.site||'')+'</div></div>'+
    '<span class="status '+(STATUS_CLS[p.status]||'s-draft')+'" style="align-self:center">'+(STATUS_LABEL[p.status]||'Draft')+'</span></div>'+

    '<div class="spec-grp"><h4>Project</h4>'+
    '<div class="fld"><label>Linked account</label><select id="f_acct" onchange="linkAccount()">'+acctOptions(p.accountId)+'</select>'+(p.accountId?'<div style="font-size:11px;color:var(--green);margin-top:4px">Linked. Specs, drawings, and documents stay with this account.</div>':'<div style="font-size:11px;color:var(--soft);margin-top:4px">Link to a CRM account so everything stores with the customer record.</div>')+'</div>'+
    '<div class="grid2"><div class="fld"><label>Client</label><input id="f_client" value="'+esc(p.client)+'"></div>'+
    '<div class="fld"><label>Site address</label><input id="f_site" value="'+esc(p.site)+'"></div></div>'+
    '<div class="grid2"><div class="fld"><label>Client contact</label><input id="f_contact" value="'+esc(p.contact)+'"></div>'+
    '<div class="fld"><label>Assigned PM</label><input id="f_pm" value="'+esc(p.pm)+'" placeholder="Project manager"></div></div></div>'+

    '<div class="spec-grp"><h4>Material & Construction</h4>'+
    '<div class="grid3"><div class="fld"><label>Steel grade</label><select id="f_grade">'+opt(GRADES,s.grade)+'</select></div>'+
    '<div class="fld"><label>Gauge</label><select id="f_gauge">'+opt(GAUGES,s.gauge)+'</select></div>'+
    '<div class="fld"><label>Finish</label><select id="f_finish">'+opt(FINISHES,s.finish)+'</select></div></div>'+
    '<div class="grid2"><div class="fld"><label>Weld type</label><select id="f_weld">'+opt(WELDS,s.weld)+'</select></div>'+
    '<div class="fld"><label>Edges / corners</label><input id="f_edges" value="'+esc(s.edges)+'" placeholder="Marine edge, radius corners..."></div></div>'+
    '<div class="fld"><label>Dimensions</label><input id="f_dims" value="'+esc(s.dims)+'" placeholder="L x W x H, sections, cutouts"></div></div>'+

    '<div class="spec-grp"><h4>Features & Hardware</h4>'+
    '<div class="grid2"><div class="fld"><label>Drains / sinks</label><input id="f_drains" value="'+esc(s.drains)+'" placeholder="Drain locations, sink bowls"></div>'+
    '<div class="fld"><label>Backsplash</label><input id="f_backsplash" value="'+esc(s.backsplash)+'" placeholder="Height, returns"></div></div>'+
    '<div class="fld"><label>Hardware schedule</label><input id="f_hardware" value="'+esc(s.hardware)+'" placeholder="Legs, casters, brackets, fasteners"></div>'+
    '<div class="fld"><label>NSF / compliance notes</label><input id="f_nsf" value="'+esc(s.nsf)+'" placeholder="NSF requirement, AHJ notes"></div>'+
    '<div class="fld"><label>Other notes</label><textarea id="f_notes" rows="2">'+esc(s.notes)+'</textarea></div></div>'+

    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+
    '<button class="btn btn-green" onclick="saveSpec()">Save Spec</button>'+
    '<button class="btn btn-purple" onclick="saveRevision()">Save as Revision</button>'+
    '<button class="btn btn-blue" onclick="printSpec()">Spec Sheet for Client</button>'+
    '<button class="btn btn-outline" onclick="setStatus(\'sent\')">Mark Sent for Approval</button>'+
    '</div>'+

    photosBlock(p)+ approvalBlock(p)+ revisionsBlock(p);
}

function photosBlock(p){
  var imgs=(p.photos||[]).map(function(u,i){ return '<div style="position:relative"><img src="'+esc(u)+'" class="photo-thumb"><button onclick="delPhoto('+i+')" style="position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer">×</button></div>'; }).join('');
  return '<div class="spec-grp"><h4>Drawings & Photos</h4>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">'+(imgs||'<span class="muted" style="padding:0">No drawings or photos yet.</span>')+'</div>'+
    '<div style="display:flex;gap:8px"><input id="f_photo" placeholder="Paste drawing or photo URL" style="flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px"><button class="btn btn-outline" onclick="addPhoto()">Add</button></div>'+
    '<div style="font-size:11px;color:var(--soft);margin-top:6px">Shop drawings and field photos. Direct upload to Termac photo storage wires in with the R2 account.</div></div>';
}
function approvalBlock(p){
  var a=p.approval||{};
  return '<div class="spec-grp"><h4>Client Approval</h4>'+
    (a.status==='approved'?'<div class="card" style="border-color:#A7F3D0;background:#ECFDF5;color:#065F46;font-weight:600;margin:0 0 10px">Approved by '+esc(a.client||'client')+(a.date?' on '+esc(a.date):'')+(a.note?' — '+esc(a.note):'')+'</div>':
      a.status==='changes'?'<div class="card" style="border-color:#FCA5A5;background:#FEF2F2;color:#991B1B;font-weight:600;margin:0 0 10px">Changes requested'+(a.note?': '+esc(a.note):'')+'. Update the spec and re-send.</div>':
      '<div class="muted" style="text-align:left;padding:0 0 10px">Send the spec sheet to the client, then record their decision here once they respond.</div>')+
    '<div class="grid2"><div class="fld"><label>Client name (sign-off)</label><input id="f_apprName" value="'+esc(a.client)+'"></div>'+
    '<div class="fld"><label>Date</label><input id="f_apprDate" type="date" value="'+esc(a.date)+'"></div></div>'+
    '<div class="fld"><label>Note</label><input id="f_apprNote" value="'+esc(a.note)+'" placeholder="Approved as drawn / requested changes"></div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-green" onclick="recordApproval(\'approved\')">Record Approval</button>'+
    '<button class="btn btn-red" onclick="recordApproval(\'changes\')">Record Changes Requested</button></div></div>';
}
function revisionsBlock(p){
  var revs=(p.revisions||[]);
  if(!revs.length) return '<div class="spec-grp"><h4>Revision History</h4><div class="muted" style="padding:0;text-align:left">No revisions saved yet. Save as Revision snapshots the current spec so you always know which version the shop is building.</div></div>';
  return '<div class="spec-grp"><h4>Revision History</h4>'+revs.slice().reverse().map(function(r,i){
    var n=revs.length-i;
    return '<div class="rev-row"><strong>Rev '+n+'</strong> · '+new Date(r.ts).toLocaleString('en-US')+(r.by?' · '+esc(r.by):'')+(r.note?' — '+esc(r.note):'')+'</div>';
  }).join('')+'</div>';
}

function acctOptions(sel){
  var accts=lsGet2(ACCT_KEY);
  var opts='<option value="">Not linked</option>';
  opts+=accts.map(function(a){ return '<option value="'+esc(a.id)+'"'+(a.id===sel?' selected':'')+'>'+esc(a.name)+(a.division?' ('+esc(a.division)+')':'')+'</option>'; }).join('');
  return opts;
}
function lsGet2(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function linkAccount(){
  var id=val('f_acct'); var a=lsGet2(ACCT_KEY).find(function(x){ return x.id===id; });
  if(a){ if(document.getElementById('f_client')) document.getElementById('f_client').value=a.name||val('f_client'); if(document.getElementById('f_site')&&a.address) document.getElementById('f_site').value=a.address; toast('Linked to '+a.name+'.'); }
}
function collectSpec(){
  return { dims:val('f_dims'),grade:val('f_grade'),gauge:val('f_gauge'),finish:val('f_finish'),weld:val('f_weld'),
    edges:val('f_edges'),drains:val('f_drains'),backsplash:val('f_backsplash'),hardware:val('f_hardware'),nsf:val('f_nsf'),notes:val('f_notes') };
}
function val(id){ var e=document.getElementById(id); return e?e.value:''; }
function saveSpec(silent){
  var p=find(_cur); if(!p) return;
  p.client=val('f_client'); p.site=val('f_site'); p.contact=val('f_contact'); p.pm=val('f_pm'); p.accountId=val('f_acct'); p.spec=collectSpec();
  save(p); if(!silent){ toast('Spec saved.'); openProject(_cur); }
}
function saveRevision(){
  saveSpec(true); var p=find(_cur); if(!p) return;
  var note=prompt('Revision note (what changed)?')||'';
  p.revisions=p.revisions||[]; p.revisions.push({ ts:Date.now(), by:p.pm||'Design', note:note, snapshot:JSON.parse(JSON.stringify(p.spec)) });
  save(p); toast('Revision saved.'); openProject(_cur);
}
function setStatus(st){ saveSpec(true); var p=find(_cur); if(!p) return; p.status=st; save(p); toast('Marked '+(STATUS_LABEL[st]||st)+'.'); openProject(_cur); }
function recordApproval(kind){
  saveSpec(true); var p=find(_cur); if(!p) return;
  p.approval={ status:kind, client:val('f_apprName'), date:val('f_apprDate'), note:val('f_apprNote') };
  p.status = kind==='approved' ? 'approved' : 'changes';
  save(p); toast(kind==='approved'?'Approval recorded.':'Changes recorded.'); openProject(_cur);
}
function handoffPM(id){
  var p=find(id||_cur); if(!p) return;
  if(p.status!=='approved'){ toast('Approve the spec before handing off.'); return; }
  p.handedToPM=true; p.handedAt=Date.now(); p.status='fab'; save(p);
  toast('Handed to the Project Manager. It will appear in the PM portal once that is live.');
  renderList();
}
function addPhoto(){ var u=val('f_photo').trim(); if(!u) return; var p=find(_cur); p.photos=p.photos||[]; p.photos.push(u); save(p); openProject(_cur); }
function delPhoto(i){ var p=find(_cur); p.photos.splice(i,1); save(p); openProject(_cur); }

function printSpec(){
  saveSpec(true); var p=find(_cur); if(!p) return; var s=p.spec||{};
  var w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to print.'); return; }
  function row(l,v){ return v?'<tr><td style="font-weight:bold;width:200px;padding:6px 10px;border:1px solid #ccc">'+l+'</td><td style="padding:6px 10px;border:1px solid #ccc">'+esc(v)+'</td></tr>':''; }
  var html='<html><head><title>Stainless Spec - '+esc(p.client)+'</title><style>body{font-family:Arial,sans-serif;padding:34px;color:#1A1D21}h1{font-size:22px;margin-bottom:2px}h2{font-size:13px;color:#6B21A8;margin:18px 0 6px;text-transform:uppercase;letter-spacing:.06em}table{width:100%;border-collapse:collapse}.sign{margin-top:30px;border-top:1px solid #999;padding-top:14px;font-size:13px}</style></head><body>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>AllPro Stainless — Project Specification</h1><div>'+esc(p.client)+' &middot; '+esc(p.site)+'</div></div><div style="text-align:right;font-size:12px;color:#555">Termac Family of Companies<br>267-421-6336<br>tscholl@termac.com</div></div>'+
    '<h2>Material & Construction</h2><table>'+row('Steel Grade',s.grade)+row('Gauge',s.gauge)+row('Finish',s.finish)+row('Weld Type',s.weld)+row('Edges / Corners',s.edges)+row('Dimensions',s.dims)+'</table>'+
    '<h2>Features & Hardware</h2><table>'+row('Drains / Sinks',s.drains)+row('Backsplash',s.backsplash)+row('Hardware',s.hardware)+row('NSF / Compliance',s.nsf)+row('Notes',s.notes)+'</table>'+
    '<div class="sign"><strong>Client Approval</strong><br><br>This specification is approved as drawn for fabrication.<br><br>Signature: ____________________________   Print: ____________________   Date: ____________</div>'+
